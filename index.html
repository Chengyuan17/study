  {ch:11, type:"noun", q:`两级传播`, a:`两级传播是指大众传播的信息不是直接流向一般受众，而是要经过意见领袖这个中介，即表现为“大众传媒一意见领袖一一般受众”的两级过程。这是关于“传播流”的一种理论，是拉扎斯菲尔德等人根据意见领袖在传播过程中的存在提出的。`, explain:`两级传播就是信息先影响一批“关键人物”，再由他们影响更多普通人。也就是说，媒体并不是每次都直接打到所有受众身上，而是往往先经过意见领袖这一层过滤和转述。这说明大众传播和人际传播其实是连在一起的。`, frame:`起手：拉扎斯菲尔德等“传播流”研究中的过程模型。写清链条“大众传媒—意见领袖—一般受众”的两级性。收束点明与一级直接传播观的区别及中介过滤含义。`},
  {ch:11, type:"noun", q:`非公众`, a:`非公众是指处在某组织的影响范围中，但其观点、态度和行为不受这个组织的影响，也不对这个组织产生影响力的公众。这是从组织的公关问题所面对的对象公众群体进行分类延伸出的概念。`, explain:`非公众就是和某个组织当前没有实际关系、也不需要特别去沟通的人。公关里把人分成公众和非公众，目的不是给人贴标签，而是为了搞清楚：哪些人是真正会影响组织、也会被组织影响的，资源该优先放在哪些人身上。`, frame:`起手界定：处于组织影响范围内却与组织互不影响的公众。放入公众分类中说明其公关投入优先级通常较低。收束可对比潜在公众、知晓公众以显示分类意义。`},
  {ch:11, type:"noun", q:`员工关系`, a:`员工关系是组织的内部公共关系，做好组织的公共关系首先要协调好组织内部各种关系和力量，员工关系是一切社会组织的公共关系的起点，是其他一切类型的公众关系的基础和前提，建立良好员工关系的原则是：要有合作的诚意，要尊重员工及他们的劳动，给予员工生活，劳动的安全感，以诚实与公平的道德准则对待员工，给予员工发展的机会，让员工了解组织，树立须导楷模等，改善员工关系的主要方法是：征询员工意见与倾听员工建议：抓好管理人员，与意见领袖员工的沟通；举办定期演讲与员工会议：建立各种员工沟通媒介：完善职工记录，处理好职工职业生涯中遇到的问题等。`, explain:`员工关系就是组织和内部员工之间的关系管理。它不是简单发工资就完了，而是要让员工了解组织、认同组织、愿意配合组织。因为员工其实是组织最靠前的一批“代言人”，内部关系搞不好，外部形象往往也站不稳。`, frame:`起手：内部公关对象，是一切公关的起点与基础。先写原则要点：尊重、公平、安全感、发展机会、信息透明、领导示范等。再写方法：征询倾听、管理者与意见领袖沟通、会议媒介、职工档案与生涯关怀。收束强调内聚方能外信。`},
  {ch:11, type:"noun", q:`心理细分`, a:`心理细分是根据消费者所处的社会阶层、生活方式及个性特征对市场加以细分，在同一地理细分市场中的人可能显示出迥然不同的心理特征，企业按照消费者的心理特征来细分消费者市场，心理因素十分复杂，包括生活方式、个性、购买动机、价值取向以及对商品供求局势和销售方式的感应程度等变量。`, explain:`心理细分，就是不再只按年龄、收入、职业去分消费者，而是看他们怎么想、怎么看生活、为什么买东西。比如同样是年轻人，有的人追求新潮，有的人讲实用，这就是心理差异。它的价值在于，很多购买行为真正的驱动力，不在表面人口特征，而在人的内心偏好和价值观。`, frame:`起手：在市场细分中按心理变量划分人群。写清与地理细分交叉：同地不同心理。展开变量：生活方式、个性、动机、价值取向、对营销刺激的敏感度等。收束说明其用于更精准沟通与定位。`},
  {ch:11, type:"noun", q:`中华广告公会`, a:`中华广告公会是1927年由上海“维罗”“耀南”等六家广告社组织发起成立的，是当时规模较大，持续时间较长、产生一定影响的广告行业组织。中华广告工会的主要功能是解决同业之间的纠纷和争取共同的利益，对近代上海广告业的行业自治管理起到了一定的作用。`, explain:`中华广告公会就是民国时期广告行业自己组织起来的同业团体。它主要负责协调同行关系、维护共同利益，也说明当时中国广告业已经开始从零散经营走向行业联合和自我规范。`, frame:`起手时间与地点：1927年上海，由多家广告社发起。写性质：近代较有影响的行业组织。展开功能：调解同业纠纷、争取共同利益、行业自治。收束一句评价其对上海广告业治理的作用。`},
  {ch:11, type:"short", q:`“媒介规范理论”的主要形式。`, a:`媒介规范理论是指大众传播媒介应当如何运作，或者人们期望媒介应如何组织，以及为了更广泛的公共利益和社会整体而进行运作的观念。该理论包含以下几种主要形式：
（1）极权主义理论
极权主义理论又称权威主义理论，是欧洲中世纪后期极权主义制度下的产物。其最大的特点是主张媒介必须以权力或权威的意志为转移，一切必须为统治者服务。主要内容包括：
①报刊必须对当权者负责，维护国王和专制国家的利益。
②报刊必须绝对服从于权力，不得批判占统治地位的道德和政治价值。
③政府有权对出版物进行事先检查，这种检查是合法的。
④对当权者或当局制度的批判属于犯罪行为，将给予严厉的法律制裁。
极权主义传播制度及其理论随着资产阶级革命的胜利而崩溃。
（2）自由主义理论
自由主义理论是在欧美资产阶级革命中形成的媒介规范理论，其核心反映了资产阶级自由主义的观点。主要内容包括：
①任何人都拥有出版自由的权利而不必经过政府的特别许可。
②除人身攻击外，报刊有权批评政府和官吏。
③新闻出版不应接受第三者的事先检查。
④在涉及意见、观点和信念的问题上，“真理”和“谬误”的传播应该同样得到保证。
自由主义理论有两个原则，一是“言论的公开市场”原则，二是“自我修正”原则。早期自由主义理论对打破封建专制制度，确立自由、平等和民权思想起了巨大作用。但随着资本主义发展到垄断阶段，它成了维护垄断资本利益的理论；在全球信息化的今天，进一步演变成了个别传播大国推行文化帝国主义的理论依据。
（3）社会责任理论
社会责任理论是对自由主义理论的一种修正，由美国新闻自由委员会于20世纪40年代后期提出。其主要内容有：
①大众传播具有很强的公共性，媒介机构必须对社会和公众承担一定的义务和责任。②媒介的新闻报道和信息传播应该符合真实性、正确性、客观性、公正性等专业标准。
③媒介必须在现存法律和制度的范围内进行自我约束。
④公众有权要求媒介从事高品位的信息传播，这种干预是正当的。
社会责任理论提出的目的有两个方面，一是为了防止传播事业高度垄断而引起的社会矛盾激化：二是为了防止由媒介内容的浅薄化、煸情化和刺激化而引起的社会道德和文化的堕落。
（4）民主参与理论
民主参与理论是20世纪70年代以后在西方国家出现的新的媒介规范理论，它的背景是社会信息化的发展和受众权利意识的提高。民主参与理论要求大众传媒向一般民众开放，允许受众自主参与。其主要观点有：
①任何个人和弱小群体都拥有知晓权、传播权和媒介接近权。
②媒介应主要为受众而存在，而不应主要为媒介组织、职业宣传家或广告赞助商而存在。
③与大规模的、单向的、垄断的大媒介相比，小规模的、双向的、参与的媒介更合乎社会理想。民主参与理论的核心价值是多元性、小线模性、双向互动性、传播关系的平等性。
民主参与理论的产生，反映了一般民众对社会责任理论的失望心理。
（5）发展中国家的媒介规范理论
20世纪70年代以来，发展中国家的媒介规范理论兴起。该理论反映了发展中国家面临的经济落后、政局不稳，在大众传播的硬件和软件两个方面对西方发达国家依赖程度很高的现实状况。其要点包括：
①大众传播活动必须与国家政策保持同一轨道，以推动国家发展为基本任务。
②媒介的自由必须伴随相应的责任和义务。
③在传播内容上要优先选择本国文化、优先使用本民族语言。
④在新闻和信息合作领域，优先发展同地理、政治和文化比较接近的其他发展中国家的关系。
⑤在事关国家利益和社会稳定的利害问题上，国家有权对传播媒介进行检查、千预、限制乃至管制。
（6）我国的媒介规范理论
面的内容：
我国的社会主义媒介制度及其规范理论正在发展和探索过程当中。就目前而言，它包括了以下几个方
①新闻传播事业实行社会主义公有制，防止私有资本垄断，保障社会主义新闻自由。
②新闻传播事业是中国共产党领导下的事业，必须坚持党性原则。
③执行报道新闻、传播信息、引导舆论、提供娱乐等多方面的社会职能。
分。④通过沟通生产、流通和消费服务于国民经济发展，其本身也是新兴的信息和知识产业的重要组成部`, explain:`媒介规范理论的主要形式，简单说就是几种不同社会对媒体“该怎么管、该怎么用”的回答。比如极权主义强调服从统治，自由主义强调媒体自由，社会责任理论强调自由不能没有责任，苏联共产主义理论则强调媒体服务于社会主义事业。你把它理解成不同制度下媒体角色的不同标准，就比较好记。`, frame:`起手定义媒介规范理论关切媒介组织与公共利益。按六种形式逐一简陈核心主张，与164同结构但可更压缩。收束说明从极权到社会主义反映媒介角色与社会目标的演变。`},
  {ch:11, type:"short", q:`传播学批判学派的主要流派。`, a:`传播学的批判学派是在法兰克福学派的影响下，以欧洲学者为主发展起来的传播学学派。目前批判学派中较有影响的流派包括：政治经济学派、文化研究学派、意识形态“霸权”理论、哈贝马斯的批判理论等。
（1）政治经济学派
其代表是英国累斯特大学大众传播研究中心的G.默多克和P.格尔丁等人。该学派依据马克思关于若一个阶级是社会上占统治地位的物质力量，则同时也是社会上占统治地位的精神力量，支配着物质生产资料的阶级同时也支配着精神生产资料的观点，从经济基础对上层建筑的决定作用出发来揭示资本主义社会大众传媒支配与控制的现状。
（2）文化研究学派
文化研究学派又称伯明翰学派，以英国伯明翰大学现代文化研究所的S.霍尔、D.莫利等人为代表，主张从上层建筑和意识形态的相对独立性出发来研究资本主义社会的大众传播。
文化研究学者的主要观点可以概括如下：
①大众传播是资本主义社会系统的一个重要组成部分，它在规定社会关系、行使政治统治方面发挥着重要的意识形态功能，并具有相对的独立性。
②大众传播可以分为两个部分：一是文化产品的生产过程：二是文化产品的消费过程。
③讯息符号是与一定的价值体系或意文作系结合在一起的，上众传催的将号化活动，从本质上来说是按照支配阶级的价值体系为事物“赋子意义”。
④受众的符号解读过程却不是完全核动的，由于符号的多文性和受众社会背景的多样性，受众可以对
a.同向解读或“优先式解读”，即按照媒介慧子的意义来理解讯息。
b.妥协式解读，即部分基于媒介提示的意义、部分基予自己的社会背景来理解讯息。
c.反向解读或“对抗式解读”，即对媒介提示的讯息意义微出完全相反的理解。（3）意识形态“霸权”理论
批判学派的学者把“霸权”看作是支配阶级在一定历史时期内为维护自身利益而行使社会主导权和文化主导权的能力，而实现“霸权”的手段不是通过直接的高压政策，而是通过决定国家的经济、政治和文化方向，使被支配阶级对现有权力结构和社会关系产生认同或从属意识。
（4）哈贝马斯的批判理论
①哈贝马斯认为西方理性化进程主要表现为技术理性的发展和在各个生活领域的全面渗透，然而技术理性本身无法解决生活世界的价值观问题，因此哈贝马斯提出了沟通理性的概念，试图通过沟通行为的理性化进程解决晚期资本主义社会面临的诸多危机。
②1981年哈贝马斯提出了交往行为理论，他认为交往行为概念有四个功能：一是理解的功能，有助于把握知识：二是合作的功能，使社会形成一个有机的整体，以实现社会的目标：三是社会化功能，即能够使个体认同社会规范和价值取向，从而有助于形成某种价值导向：四是社会转型功能。因为前三种功能的总目的就是要重建历史唯物主义，重现资本主义国家的应有功能，实现资本主义社会的结构转型、结构交迁和社会进化。`, explain:`传播学批判学派不太满足于只研究“传播有没有效果”，它更关心传播背后是谁掌权、谁赚钱、谁在塑造意识形态。不同流派像法兰克福学派、政治经济学派、文化研究，切入点不一样，但都在提醒我们：媒体不是中性的，它和资本、权力、文化控制常常连在一起。`, frame:`起手交代批判学派与法兰克福学派的渊源及欧洲主导。按流派分述：政治经济学派从经济基础看媒介控制；文化研究学派看意识形态生产与消费及三种解读；霸权理论强调同意而非强制的领导权；哈贝马斯侧重建构交往理性与交往行为四功能。收束点明共同关注权力、意识形态与民主参与。`},
  {ch:11, type:"short", q:`公共关系传播的目的。`, a:`公共关系是指社会组织运用信息传播沟通的手段处理自身的公众关系问题，以达到组织与公众的相互了解、相互适应、优化组织社会生态环境目的的管理活动，要使少数的、特定的社会组织（公关主体）同众多的、不确定的社会公众（公关客体）之间建立、维持良好的关系，就需要采用社会公众普遍接受的手段和方法，依靠真实、有效的信息交流、传播、沟通来实现。公共关系传播的目的有以下几点：
（1）构建有利于组织生存、发展的社会生态环境。
人类社会发展的历史告诉我们，任何一个个人或组织，要想获得理想的社会环境，保证自己的社会地位，顺利地生产和发展下去，都要科学、合理地处理同自己密切相关的各种社会关系。只有科学、合理地处理好这些关系，才能创造出最佳的社会关系环境来保证事业的成功。不同的组织所开展的处理关系的活动具体目标虽有所不同，所针对的公众对象虽各有侧重，但其实质上都是在争取各自公众的理解与支持，都是力图处理好与自己公众的社会关系，本质上都是在为自己构建更好的生存和发展的社会空间。
（2）监察社会环境的变化，确保组织决策适应社会变化，反映社会发展变化趋势。
公共关系管理的这一目的主要是依靠日常的公关信息搜集、舆论监测分析等具体公关工作职责来实现的。公共关系工作首先要清楚了解变化运动着的环境信息，这样才有可能进一步达到对组织内部、外部环境及其变化趋势的了解。这对于社会组织所起的作用有如“雷达”：它向外可发出各种组织征询性或试探性的信息，向内可大量收集社会各方发出的信息，包括各方面对组织发出信息的反应，以此来评估社会舆论，了解和把握环境的变化情况。
（3）协调各种力量，协助决策层解决经营管理中遇到的各种问题，消除各种偏见和误解。
这一目标主要是依靠提供公关咨询建议、传播沟通管理、关系协调管理等具体公关工作职责来实现的。现代组织机构是一个具有内在联系，同时又与外界环境发生物质、能量、信息交换的开放系统。对于这样的一个系统，其内部各子系统、各要素间，以及系统与外部环境间的协调是非常重要的。只有协同才能使社会组织机构的系统成为一个结构稳定、发展有序、功能最优的有机整体。
（4）增进组织经营管理活动的经济效益，确保组织经营管理活动的社会效益最大化。
这一目标主要是依靠做好公关管理的每个环节，以及公关策划、形象管理、品牌管理、信誉管理等具体公关工作职责来实现的，在进行信息搜集、舆论监察时，注意发掘信息的使用价值，就能主动捕提到级营时机，直接为组织创造经济和带来社会数益，在策动信息传播沟通时，科学介绍组织，推动组织与公司的相互理解、相互造应，就能为组烈的经营管得创造最佳的社会生态环境，在组织内部关系协调上，公共关系可以努力创造竞争向上的组织文化机围，通过传播沟通激发员工的工作热情，提高工作效率，创造更高经营效益，同时，公共关系的舆论管理、形象管理、品牌管理、信誉管理等，都有助于实现创造溢价目标。`, explain:`公共关系传播的目的，不是单纯把消息发出去，而是一步步影响公众。先让人知道你，再让人理解你、对你有好感，最后愿意支持你、配合你。也就是说，公关传播真正追求的不是“发了多少”，而是有没有建立起信任和合作关系。`, frame:`起手一句公关传播依托真实沟通建立关系。按四项目的展开：营造有利生存发展的关系生态；监测环境像雷达支撑决策；协调偏见误解、辅助管理决策；追求经济效益与社会效益统一。收束回扣“传播服务于组织—公众互信与可持续”。`},
  {ch:11, type:"short", q:`按报介划分广告的类型。`, a:`技传襦媒介划分，总体上可以将广告分为三类：
（1）大众传播媒体广告
大众传播媒体广告可分为视听广告和印刷广告，视所广告又称为电子媒体广告，包括电视广告和广播广告、印刷广告主要有报纸广告和杂志广告，电影广告也是一种大众传播媒体广告。
（2）小众传播崔体广告
相对于大众传播提体，还有很多理体役播范据验小，登众晋体较少，被称之为小众传播媒体。这些是体往往可以真接都响消费者的购买行为，弥补和配合大众保摄媒体的传播活动，有时也可统称为促销媒体。小众传播报体广告主要有三类：户外广告、直接广告、销售现场广告。另外还有促销广告（SP广告）、交通广告、报纸夹页广告等。
（3）新兴媒体广告
随載现代科学技术的发展进步资产生的新健体，互联网、数字电视以及各种移动终端等都可成为广告信息的传播载体，数字化使大众传播做体的功能得到进一步增强，更能适应广大受众对包括广告信息在内的各类信息的需求：可以促进待钱道体与数字提体的沟通互动，为传播广告信息提供更加优越的条件。`, explain:`按媒介来分，广告可以分成报纸杂志这类印刷广告，广播电视这类电子广告，路牌灯箱这类户外广告，还有网络广告、直邮广告等。这样分的意义在于，不同媒介面对的人、呈现方式和效果都不一样，所以广告策略也得跟着变。`, frame:`起手按传播媒介三分法。先大众媒体：电子与印刷细分到广电报刊及电影等；再小众媒体：户外、直邮、售点及促销、交通等并点明贴近购买决策；最后新兴媒体：互联网、数字电视、移动终端及与传统媒体互动优势。收束一句数字化拓展广告形态。`},
  {ch:11, type:"short", q:`分析反“客里空”运动的作用和影响。`, a:`（1）反“客里空”运动始末
反“客里空”活动是1947年6月《晋经日报》发起的以批评和自我批评方式对新闻失实现象进行的检查和纠正的运动。
土地改革运动兴起后，土改宜传报道一度出现右的顿向。对此，中共中央晋绥分局机关报《晋绥日报》自1947年6月起率先检查其新报道工作中存在的右错识和阅失实问题。6月15日，《晋绥日报》刊登苏联鹏本《前线》中一个惯于弄虚作假，吹牛拍马的战地特泥记者客里空的情节，因而这场运动被称为反“客里空”运动。
之后，《晋绥日报》采用在报纸上公开进行批评与自我批评的方式发动群众揭露假报道，维护新闻真实性原则。反“客里空”运动得到中共中央的售定，新华社于8月28日发表专论《锻炼我们的立场与作风-学（晋绥日报）检查工作》，9月1日发表社论《学习《晋绥日报》的自我批评》，将反“客里空”运动推广到其他解放区的新闻界，至1948年春季基本结束。
（2）反“客里空”运动的作用
这场反“客里空”运动，发扬了批评与自我批评的优良传统，克服了土改宣传中右的倾向，检查纠正了新闻报道失实的现象，维护了新闻真实性原则，改造了新闻工作者的立场与作风，提高了新闻工作的政治素质，但也存在“左”的偏向，误伤了一些好人。
（3）反“客里空”活动的影响
①反“客里空”活动是党的新闻事业史上首次反对虚假报道，坚持新闻真实性的运动，查究了新闻失实的原因，并在此基础上做到了思想和行动的端正和调整，是维护新闻真实性的一次胜利。
②形成了监督的风气。在这场运动中，党报十分重视群众作用，根据群众不满反省自身工作、积极展开批评，表达群众的呼声和意愿，成为交换意见、展开批评、监督社会的平台。
③在这次活动中，为了有效地防止新闻报道的失实和偏差，针对稿件中的某一观点或疑难不清的问题，或者阐释交代政策，或者表达赞成什么、反对什么，或者提出问题，加以说明或补充，表达编者的意见，即运用了“偏者按语”，这一编辑手段对后来的由板书报产生了降路的生期，
④通过反客里空运动。改造了新例工作者的立场和作风，提高了新侧工作者的政治素质，新网工作者的职业道德素质得以改造。`, explain:`反“客里空”运动的核心，就是反对新闻里的空话、假话和不调查就乱写。它要求新闻工作者老老实实深入实际，讲真情况，不搞虚浮作风。这个运动的影响很大，因为它把“新闻必须真实”这个原则进一步立了起来，对后来中国新闻工作作风都有很深影响。`, frame:`起手叙事：1947年《晋绥日报》借《前线》客里空形象发起，经新华社评论推广至解放区。再写作用：批评与自我批评、纠正土改报道偏差与失实、改造作风、提高政治素质并指出可能“左”的误伤。影响层面：党报史上首次系统性反假新闻、群众监督风气、编者按语等编辑手段的积累。收束定位新闻真实传统的确立。`},
  {ch:11, type:"short", q:`联系新园传播实际，论述“提高我国国际传播他力”与建立世界信息传播铁序的关系。`, a:`（1）提升国际传播能力
国际传播是以国家社会为基本单位，以大众传播为主要手段的国与国之间的信息传播，国际传播的基本主体是国家，除此之外还包括各种国际组织和机构以及活跃在国际事务领域中的个人。国际传播是一种由政治所规定的跨国界传播，对内政与外交具有重要的影响：它与国家和民族利益密切相关，传播主体通常以国家社会代表的身份出现。
一个国家的国际传播能力是其文化软实力的组成部分，是维护国家形象的重要手级，构建现代传播体系，提高我国国际传播能力，是使国际社会了解中国，提升国家文化软实力，塑请国家良舒形象的必然要求，对于提升我国的国际影响和国际地位，加强我国媒体在国际典论格局中的地位和作用具有十分重要的意义。
（2）建立世界信息传播秩序
现行的全球性信息系统并不是一个机制合理，结构平衡的系统，而是存在着严重的不平衡和不平等状况。主要表现在：当今世界上“信息富有国”和“信息贫困国”之间的两极分化十分严重：少数发达国家凭借自己强大的经济、技术和资本实力控制着当今世界的信息生产和传播，造成了世界信息单向流通的不平衡、不平等结构：这种结构维护的是少数发达国家的利益，而把大多数发展中国家置于受控制、受支配的地位。
对此，发展中国家为了维护自身利益，围绕建立“均衡、平等”的世界信息传播新序问题，而与发达国家之间展开了一场旷日持久的大论战，称为“新世界信息秩序”论争，这场论争始于1973年的《阿尔及尔宣言》，经历三个阶段，至今仍是国际传播的一个重要议题。
（3）“提高我国国际传播能力”与建立世界信息传播秩序的关系
新形势、新任务要求我们必须高度重视和大力加强国际传播能力建设，要充分认识提高国际传播能力的重要性，增强扩大对外传播能力的紧迫感和责任感，构建覆盖广泛、技术先进的现代传播体系，形成中国经济社会发展水平和国际地位相称的国际传播力，才能打破西方媒体垄断格局，建立世界信息传播新秩序。
①提高国际传播能力，是顺应世界传媒发展趋势，实现我国媒体跨越式发展的需要。媒体全球化是与经济全球化的进程相伴而生并随着传播手段的成熟而不断发展的。这是媒体发展规律，也是媒体发展的必然条件。
②提高国际传播能力，是更好地让国际社会了解中国、认识中国，向世界说明中国的需要。随着经济全球化的深入发展和我国改革开放的全面推进，中国的前途命运与世界的前途命运紧密地联系在一起，实践证明，传播力决定影响力。拥有强大的国际传播力，才能确保传播的自主性，让国际社会更好地了解认识中国。没有强大的国际传播能力，向世界介绍一个真实的中国、营造对我有利的国际奥论环境是难以做到的。
③提高国际传播能力，是积极参与国际文化竞争，增强我国国际影响力的需要。国际传播能力作为软实力，是综合国力的重要组成部分，其影响力也是国际竞争力的重要方面。当今激烈的国际竞争中，我国要全面实现对外发展目标，发展与世界各国交往合作关系，在加强经济实力的同时，必须大力加强包括国际传播能力在内的软实力，更加有力地应对国际舆论的新挑战。
④提高国际传播能力，是打破西方舆论垄断，促进世界信息传播秩序更加公正合理的需要。发达国家凭借强大经济实力，在掌握现代通信技术和促进传播全球化方面占据着优势。在信息传播中，他们通过议程设置，把全世界发生的事情按照西方思维和价值观进行报道传播，形成了舆论传播的强势，不但抢占发展中国家媒介市场，对发展中国家的文化传统形成冲击，而且还对发展中国家的核心价值观以至内政外交进行干预。有效应对西方思想舆论渗透，抵制西方媒体的歪曲报道，已经成为广大发展中国家的共识。广大发展中国家需要更多客观的、代表发展中国家的声音，作为世界上最大发展中国家的中国，应当从加强传播能力建设入手，以更加主动的姿态发出自己的声音，向世界阐释自己的观点主张及各项方针政策，为世界提供更多可供选择的客观公正的信息，这既是广大发展中国家对我们的强烈愿望，也是我们为世界信息公平所应作的努力。`, explain:`提高我国国际传播能力，说到底就是让中国在国际舆论场里不总是被别人替你说，而是能自己把中国故事讲出去、讲清楚、讲得让人愿意听。只有传播能力强了，别人才不容易随意误读你，你也更有底气去推动世界信息传播秩序变得公平一点。所以这两个问题其实是一体两面：前者是增强自己的发声能力，后者是争取更合理的话语环境。`, frame:`起手界定国际传播能力软实力属性与“讲好中国”的必要性。再写世界信息秩序问题：南北信息结构失衡、西方垄断与单向流动。关系论证：加强自主现代传播体系才能打破垄断、提供多元信息，呼应发展中国家建立均衡秩序诉求。分三点展开必要性：顺应媒体全球化与跨越式发展；掌握对外说明中国的主动权；参与文化竞争与舆论博弈。收束落到中国作为最大发展中国家应以能力建设推动更公正全球传播结构。`},
];

function cleanAnswerText(a) {
  return (a || '').replace(/\r/g, '').replace(/^[\s，,、]+/m, '').trim();
}

function collectYears(a) {
  const set = new Set();
  (a.match(/\d{4}年/g) || []).forEach(y => set.add(y));
  (a.match(/\d{1,2}世纪\d{0,2}年代/g) || []).forEach(y => set.add(y));
  return [...set];
}

function collectBookTitles(a) {
  return [...new Set(a.match(/《[^》]{1,40}》/g) || [])];
}

function extractQuotedConcepts(a) {
  const out = [];
  (a.match(/[""]([^""]{2,28})[""]/g) || []).forEach(x => {
    const t = x.replace(/[""]/g, '').trim();
    if (t.length > 1) out.push(t);
  });
  return [...new Set(out)];
}

function extractPeople(a) {
  const names = new Set();
  const re = /([\u4e00-\u9fff]{2,4})(等人|提出|认为|指出|创办于|创刊|撰写|主编|代表)/g;
  let m;
  while ((m = re.exec(a)) !== null) names.add(m[1]);
  return [...names].slice(0, 8);
}

function extractEnglishTokens(a) {
  const raw = a.match(/\b[A-Za-z][A-Za-z0-9.\-]{1,14}\b/g) || [];
  return [...new Set(raw)].slice(0, 6);
}

function buildKeywords(text, type, q) {
  const kw = new Set();
  collectBookTitles(text).slice(0, 4).forEach(k => kw.add(k));
  extractQuotedConcepts(text).slice(0, 4).forEach(k => kw.add(k));
  extractPeople(text).slice(0, 4).forEach(k => kw.add(k));
  extractEnglishTokens(text).forEach(k => kw.add(k));
  const aka = text.match(/(?:又称|也称|外文简称|简称)(?:为)?[：:\s]*[《「]?([^\s，。,；;\n]{2,22})/);
  if (aka) kw.add(aka[1].replace(/[》」]/g, '').trim());
  if (type === 'noun') {
    const qt = q.replace(/[“”"'「」《》\s]/g, '').trim();
    if (qt.length >= 2 && qt.length <= 20) kw.add(qt);
  }
  return [...kw].filter(Boolean).slice(0, 6);
}



function buildMemory(text, type, q) {
  const mem = [];
  const years = collectYears(text);
  if (years.length) mem.push('时间锚点：' + [...new Set(years)].slice(0, 3).join('、'));
  const people = extractPeople(text);
  if (people.length) mem.push('关键人物：' + people.slice(0, 3).join('、'));
  const books = collectBookTitles(text);
  if (books.length && !mem.length) mem.push('必记书刊：' + books.slice(0, 3).join('、'));
  if (mem.length === 0) {
    if (type === 'noun') mem.push('首句下定义，后面按时间/主体/特点展开');
    else mem.push('抓题眼：把题目关键词在答案里各圈一遍再背');
  }
  return mem.slice(0, 2);
}

function buildStudyEnrichment(a, type, q) {
  const text = cleanAnswerText(a);
  return {
    keywords: buildKeywords(text, type, q),
    memory: buildMemory(text, type, q)
  };
}

function mergeCardHints(auto, index) {
  const o = HINT_INDEX_OVERRIDES[index];
  if (!o) return auto;
  return {
    keywords: 'keywords' in o ? o.keywords : auto.keywords,
    memory: 'memory' in o ? o.memory : auto.memory
  };
}

const QUESTIONS = RAW_CARDS.map((c, i) => {
  const e = mergeCardHints(buildStudyEnrichment(c.a, c.type, c.q), i);
  return {
    type: c.type,
    year: CHAPTERS_MAP[c.ch],
    q: c.q,
    keywords: e.keywords,
    explain: c.explain || '',
    frame: c.frame || '',
    answer: c.a,
    memory: e.memory
  };
});

function getFilterTriggerLabel(panel) {
  if (panel === 'type') return '题型';
  if (panel === 'year') return '年份';
  return '';
}

function updateFilterTriggers() {
  document.querySelectorAll('.filter-trigger').forEach(btn => {
    const panel = btn.dataset.panel;
    btn.classList.toggle('active', currentFilterPanel === panel);
    const label = btn.querySelector('.filter-trigger-label');
    label.textContent = getFilterTriggerLabel(panel);
  });
}

function renderFilterPanel() {
  const panel = document.getElementById('filterPanel');
  if (!currentFilterPanel) {
    panel.classList.remove('show');
    panel.innerHTML = '';
    updateFilterTriggers();
    return;
  }

  if (currentFilterPanel === 'type') {
    panel.innerHTML = `<div class="type-options">${TYPE_FILTER_ITEMS.map(item => (
      `<button class="type-option${currentType === item.id ? ' active' : ''}" data-type-option="${item.id}">${item.icon}<span>${item.label}</span></button>`
    )).join('')}</div>`;
  } else if (currentFilterPanel === 'year') {
    const years = [...new Set(QUESTIONS.map(q => q.year))].sort((a, b) => Number(b) - Number(a));
    panel.innerHTML = `<div class="filter-options-scroll"><div class="year-chips"><button class="year-chip${currentYear ? '' : ' active'}" data-year-option="">全部</button>${years.map(y => `<button class="year-chip${currentYear === y ? ' active' : ''}" data-year-option="${y}">${y}</button>`).join('')}</div></div>`;
  }

  panel.classList.add('show');
  updateFilterTriggers();
}

  document.querySelectorAll('.filter-trigger').forEach(btn => {

      const panel = btn.dataset.panel;

    });

  document.getElementById('filterPanel').addEventListener('click', e => {
    const typeOption = e.target.closest('[data-type-option]');
    if (typeOption) {
      const nextType = typeOption.dataset.typeOption;
      if (nextType === 'daily') { showToast('每日打卡功能即将上线'); return; }
      if (currentType !== nextType) currentType = nextType;
      currentIndex = 0;
      currentFilterPanel = '';
      filterAndRender();
      return;
    }

    const yearOption = e.target.closest('[data-year-option]');
    if (yearOption) {
      currentYear = yearOption.dataset.yearOption;
      currentIndex = 0;
      currentFilterPanel = '';
      filterAndRender();
    }
  });
}

function syncFooterButtons() {
  document.getElementById('footerExplainBtn').classList.toggle('on', currentAssistMode === 'explain');
  document.getElementById('footerFrameBtn').classList.toggle('on', currentAssistMode === 'frame');
  document.getElementById('footerAnswerBtn').classList.toggle('on', currentAssistMode === 'answer');
}

function renderAssistPanel() {
  const panel = document.getElementById('assistPanel');
  const head = document.getElementById('assistHead');
  const body = document.getElementById('assistBody');
  const q = filteredCards[currentIndex];

  if (!currentAssistMode || !q) {
    panel.classList.remove('show');
    head.innerHTML = '';
    body.textContent = '';
    body.className = 'assist-body';
    syncFooterButtons();
    return;
  }

  const meta = ASSIST_META[currentAssistMode];
  head.innerHTML = `${meta.icon}<span>${meta.title}</span>`;

  if (currentAssistMode === 'explain') {
    if (q.explain) {
      body.textContent = q.explain;
      body.className = 'assist-body';
    } else {
      body.textContent = 'AI 通俗理解尚未生成，请运行生成脚本';
      body.className = 'assist-body empty';
    }
  } else if (currentAssistMode === 'frame') {
    body.textContent = q.frame || '';
    body.className = 'assist-body';
  } else {
    body.textContent = q.answer;
    body.className = 'assist-body';
  }

  panel.classList.add('show');
  syncFooterButtons();
}

// ========================= Filter & Render =========================
function filterAndRender() {
  const keepKey = arguments[0] || '';
  const baseCards = getBaseCards();
  renderFilterPanel();
  filteredCards = baseCards;
  if (filteredCards.length === 0) {
    document.getElementById('qText').textContent = '该分类暂无题目';
    document.getElementById('progressLabel').textContent = '0 / 0';
    document.getElementById('progressFill').style.width = '0%';
    currentAssistMode = '';
    renderAssistPanel();
    return;
  }
  const matchedIndex = keepKey ? filteredCards.findIndex(card => getQuestionKey(card) === keepKey) : -1;
  currentIndex = matchedIndex >= 0 ? matchedIndex : Math.min(currentIndex, filteredCards.length - 1);
  if (currentIndex < 0) currentIndex = 0;
  renderQuestion();
}

function renderQuestion() {
  const q = filteredCards[currentIndex];
  if (!q) return;

  currentAssistMode = '';
  renderAssistPanel();

  const badge = document.getElementById('qBadge');
  badge.textContent = TYPE_NAMES[q.type];
  badge.className = 'q-badge ' + (TYPE_BADGES[q.type] || '');

  document.getElementById('qText').textContent = q.q;

  document.getElementById('progressLabel').textContent = `${currentIndex + 1} / ${filteredCards.length}`;
  document.getElementById('progressFill').style.width = ((currentIndex + 1) / filteredCards.length * 100) + '%';
}

// ========================= Footer =========================
function bindFooter() {
  document.getElementById('footerExplainBtn').addEventListener('click', () => toggleAssistMode('explain'));
  document.getElementById('footerFrameBtn').addEventListener('click', () => toggleAssistMode('frame'));
  document.getElementById('footerAnswerBtn').addEventListener('click', () => toggleAssistMode('answer'));
}

function toggleAssistMode(mode) {
  currentAssistMode = currentAssistMode === mode ? '' : mode;
  renderAssistPanel();
}

function goQuestion(dir) {
  if (filteredCards.length === 0) return;
  const next = currentIndex + dir;
  if (next < 0) { showToast('已经是第一题了'); return; }
  if (next >= filteredCards.length) { showToast('已经是最后一题了'); return; }
  const c = document.getElementById('swipeArea');
  c.classList.add(dir > 0 ? 'slide-left' : 'slide-right');
  setTimeout(() => { currentIndex = next; renderQuestion(); c.classList.remove('slide-left','slide-right'); }, 180);
}

// ========================= Font Panel =========================
function bindFontPanel() {
  const panel = document.getElementById('fontPanel');
  const btn = document.getElementById('fontBtn');
  btn.addEventListener('click', e => { e.stopPropagation(); panel.classList.toggle('show'); });
  document.addEventListener('click', e => { if (!panel.contains(e.target) && e.target !== btn) panel.classList.remove('show'); });

  const targets = () => [document.getElementById('assistBody')];

  document.getElementById('fpSize').addEventListener('input', function() {
    document.getElementById('fpSizeVal').textContent = this.value + 'px';
    targets().forEach(t => t.style.fontSize = this.value + 'px');
  });

  document.getElementById('fpLine').addEventListener('input', function() {
    const v = (this.value / 10).toFixed(1);
    document.getElementById('fpLineVal').textContent = v;
    targets().forEach(t => t.style.lineHeight = v);
  });

  document.querySelectorAll('.fp-color').forEach(c => {
    c.addEventListener('click', () => {
      document.querySelectorAll('.fp-color').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      targets().forEach(t => t.style.color = c.dataset.color);
    });
  });

  document.querySelectorAll('.fp-bg').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.fp-bg').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      const isDark = b.dataset.bg === '#1A1A2E';
      document.body.classList.toggle('dark', isDark);
      if (!isDark) {
        document.body.style.background = b.dataset.bg;
        document.querySelector('.q-flow').style.background = '';
        document.querySelectorAll('.q-section').forEach(s => { s.style.borderColor = ''; });
      } else {
        document.body.style.background = '';
        document.querySelector('.q-flow').style.background = '';
        document.querySelectorAll('.q-section').forEach(s => { s.style.borderColor = ''; });
      }
    });
  });
}

// ========================= Swipe =========================
function bindSwipe() {
  let sx = 0, sy = 0;
  const area = document.getElementById('swipeArea');
  area.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, { passive: true });
  area.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) { dx > 0 ? goQuestion(-1) : goQuestion(1); }
  }, { passive: true });
}


// ========================= Toast =========================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

init();
</script>
