<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>背题小程序</title>
<style>
:root {
  --footer-h: 56px;
  --purple: #7B2FF2;
  --purple-mid: #9B5DE5;
  --purple-light: #C77DFF;
  --purple-glow: rgba(123,47,242,.12);
  --purple-bg: #F5F0FF;
  --purple-card: #FAF7FF;
  --bg: #FAFAFE;
  --card: #fff;
  --text: #1A1A2E;
  --text2: #444;
  --text3: #717171;
  --border: #EDE8F5;
  --radius: 12px;
  --tr: .28s cubic-bezier(.4,0,.2,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  user-select: none; -webkit-user-select: none; overflow-x: hidden;
}

/* ===== Main Area ===== */
.main {
  min-height: 100vh;
  padding: 0 0 calc(var(--footer-h) + 16px) 0;
}

/* ===== App Header ===== */
.topbar {
  position: sticky; top: 0; z-index: 90; background: var(--card);
  border-bottom: 1px solid var(--border); padding: 10px 14px;
  display: flex; flex-direction: column; gap: 10px;
}
.topbar-row {
  display: flex; align-items: center; gap: 8px; min-width: 0;
}
.filter-triggers {
  display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; flex: 1; min-width: 0;
}
.filter-trigger {
  min-width: 0; border: none; border-radius: 12px; padding: 8px 10px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  cursor: pointer; transition: all .2s; color: var(--text3); background: #F4F1FA;
}
.filter-trigger.active {
  color: var(--purple); background: var(--purple-bg);
  box-shadow: inset 0 0 0 1px #E2D4FF;
}
.filter-trigger-label {
  font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.filter-trigger svg,
.type-option svg {
  width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.8; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
}
.filter-panel {
  display: none; padding: 10px 12px; border-radius: 12px;
  background: rgba(123,47,242,.04); border: 1px solid var(--border);
}
.filter-panel.show { display: block; }
.filter-options-scroll { overflow-x: auto; scrollbar-width: none; }
.filter-options-scroll::-webkit-scrollbar { display: none; }
.type-options {
  display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px;
}
.type-option {
  min-width: 0; border: 1px solid var(--border); border-radius: 12px; background: #fff;
  color: var(--text3); cursor: pointer; transition: all .2s; padding: 10px 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
}
.type-option.active {
  color: var(--purple); background: var(--purple-bg); border-color: #E2D4FF;
}
.type-option span {
  font-size: 11px; font-weight: 700;
}
.year-chips { display: flex; gap: 6px; min-width: max-content; }
.year-chip {
  flex-shrink: 0; padding: 5px 12px; border-radius: 14px; font-size: 13px;
  font-weight: 600; cursor: pointer; transition: all .2s;
  color: var(--text3); background: var(--purple-bg); border: 1px solid transparent;
}
.year-chip.active { color: #fff; background: linear-gradient(135deg, var(--purple), var(--purple-mid)); }
.topbar-btn {
  width: 34px; height: 34px; border: none; border-radius: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  background: var(--purple-bg); color: var(--purple); font-size: 13px; font-weight: 700;
  flex-shrink: 0; transition: all .2s;
}
.topbar-btn:active { transform: scale(.93); }
/* ===== Content ===== */
.content { padding: 14px 16px; max-width: 960px; margin: 0 auto; transition: opacity .2s, transform .2s; }
.content.slide-left { opacity: 0; transform: translateX(-24px); }
.content.slide-right { opacity: 0; transform: translateX(24px); }

/* Progress */
.progress { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; font-size: 13px; color: var(--text3); font-weight: 500; }
.progress-track { flex: 1; height: 3px; background: #eee; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--purple-light)); border-radius: 2px; transition: width .3s; }

/* Unified question flow */
.q-flow {
  display: flex; justify-content: center;
}
.q-section {
  padding: 16px; position: relative; border-radius: 24px;
  border: 1px solid var(--border); background: var(--card);
  box-shadow: 0 10px 30px rgba(26,26,46,.06), 0 2px 10px rgba(26,26,46,.04);
}
.q-section.sec-question {
  width: 100%;
  max-width: 860px;
  min-height: calc(100vh - 250px);
  margin: 0 auto;
  padding: 28px 24px;
  background: var(--card);
}
.sec-label { font-size: 12px; font-weight: 600; color: var(--purple); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; letter-spacing: .03em; }
.sec-label svg { width: 14px; height: 14px; stroke: var(--purple); stroke-width: 2; fill: none; }

/* Question */
.q-head {
  display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 18px;
}
.q-badge {
  display: inline-block; padding: 7px 14px; border-radius: 999px; font-size: 13px;
  font-weight: 700; letter-spacing: .02em;
}
.badge-noun { background: #F0E6FF; color: #6B2FD6; }
.badge-short { background: #E8E0FF; color: #5224B3; }
.badge-essay { background: #DCD0FF; color: #42199A; }
.q-title {
  max-width: 720px; margin: 0 auto; text-align: center;
  font-size: 30px; font-weight: 800; color: var(--text); line-height: 1.8; letter-spacing: .01em;
}
.assist-panel {
  display: none; max-width: 760px; margin: 28px auto 0; padding: 18px 18px 16px;
  border: 1px solid var(--border); border-radius: 18px; background: var(--purple-bg);
  box-shadow: none;
}
.assist-panel.show { display: block; }
.assist-head {
  display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
  font-size: 12px; font-weight: 600; color: var(--purple); letter-spacing: .03em;
}
.assist-head svg {
  width: 14px; height: 14px; stroke: var(--purple); stroke-width: 2; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
}
.assist-body {
  font-size: 15px; line-height: 1.85; color: var(--text2); white-space: pre-wrap; font-weight: 400;
}
.assist-body.empty {
  font-size: 13px; color: var(--text3); font-style: italic;
}

/* ===== Footer ===== */
.footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,.92); border-top: 1px solid var(--border); z-index: 90;
  height: calc(var(--footer-h) + env(safe-area-inset-bottom, 0px));
  box-shadow: 0 -1px 10px rgba(0,0,0,.04); padding-bottom: env(safe-area-inset-bottom, 0px);
  backdrop-filter: blur(10px);
}
.footer-row {
  display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px;
  height: var(--footer-h); padding: 8px 12px 0;
}
.f-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: none;
  background: #fff; color: var(--text3); font-size: 14px; font-weight: 700; cursor: pointer;
  padding: 10px 12px; border-radius: 12px; transition: all .15s; border: 1px solid var(--border);
}
.f-btn svg { width: 15px; height: 15px; stroke: currentColor; stroke-width: 1.8; fill: none; }
.f-btn:active { background: var(--purple-bg); }
.f-btn.on { color: var(--purple); }
.f-btn.on { background: var(--purple-bg); border-color: #E7DAFF; }
/* ===== Font Panel ===== */
.font-panel {
  position: fixed; bottom: calc(var(--footer-h) + 8px); right: 14px;
  background: var(--card); border-radius: var(--radius); box-shadow: 0 4px 24px rgba(0,0,0,.12);
  padding: 16px; width: 240px; z-index: 100;
  transform: translateY(10px); opacity: 0; visibility: hidden; transition: all .25s ease;
}
.font-panel.show { transform: translateY(0); opacity: 1; visibility: visible; }
.fp-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
.fp-row { margin-bottom: 14px; }
.fp-label { font-size: 12px; color: var(--text3); font-weight: 500; margin-bottom: 6px; display: flex; justify-content: space-between; }
.fp-val { color: var(--purple); }
.fp-slider { width: 100%; accent-color: var(--purple); margin: 0; }
.fp-colors { display: flex; gap: 8px; flex-wrap: wrap; }
.fp-color {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all .15s; position: relative;
}
.fp-color.active { border-color: var(--purple); box-shadow: 0 0 0 2px var(--purple-glow); }
.fp-bgs { display: flex; gap: 8px; }
.fp-bg {
  flex: 1; height: 32px; border-radius: 8px; cursor: pointer;
  border: 2px solid transparent; transition: all .15s;
  display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600;
}
.fp-bg.active { border-color: var(--purple); }

/* ===== Dark Mode ===== */
body.dark {
  --bg: #1A1A2E;
  --card: #252540;
  --text: #E0E0E0;
  --text2: #BCBCBC;
  --text3: #8E8E9A;
  --border: #3A3A52;
  --purple-bg: #2E2450;
  --purple-card: #302548;
  --purple-glow: rgba(155,93,229,.2);
}
body.dark .q-badge { opacity: .9; }
body.dark .badge-noun { background: #352A60; color: #C7A5FF; }
body.dark .badge-short { background: #2A3550; color: #90CAF9; }
body.dark .badge-essay { background: #35284A; color: #CE93D8; }
body.dark .assist-panel {
  background: var(--purple-bg);
  border-color: var(--border);
}
body.dark .progress-track { background: #333; }
body.dark .fp-bg { border-color: #444; }
body.dark .font-panel { box-shadow: 0 4px 24px rgba(0,0,0,.4); }

/* ===== Toast ===== */
.toast {
  position: fixed; top: 50px; left: 50%; transform: translateX(-50%) translateY(-16px);
  background: linear-gradient(135deg, var(--purple), var(--purple-mid)); color: #fff;
  padding: 8px 22px; border-radius: 20px; font-size: 13px; font-weight: 600;
  opacity: 0; transition: all .3s ease; z-index: 300; pointer-events: none;
  box-shadow: 0 4px 16px rgba(123,47,242,.25);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== Responsive ===== */
@media (max-width: 480px) {
  .topbar { padding: 10px 12px 8px; }
  .content { padding: 12px; }
  .q-section.sec-question {
    min-height: calc(100vh - 230px);
    padding: 24px 18px;
    border-radius: 20px;
  }
  .q-title { font-size: 23px; line-height: 1.7; }
  .topbar-row { gap: 8px; }
  .filter-triggers { gap: 6px; }
  .filter-trigger { padding: 8px 6px; }
  .filter-trigger-label { font-size: 11px; }
  .type-options { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
@media (min-width: 768px) {
  .topbar,
  .content {
    max-width: 960px;
    margin: 0 auto;
  }
  .topbar { padding-top: 14px; }
  .q-section.sec-question {
    min-height: calc(100vh - 270px);
    padding: 36px 34px;
  }
  .q-title { font-size: 34px; }
  .assist-body { font-size: 16px; }
}
@media (min-width: 900px) {
  .content { max-width: 1080px; padding: 22px 24px; }
  .q-section.sec-question {
    min-height: calc(100vh - 290px);
    padding: 44px 42px;
  }
  .q-title { font-size: 38px; }
  .footer-row {
    max-width: 640px;
    margin: 0 auto;
  }
}
</style>
</head>
<body>

<!-- Main -->
<div class="main">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-row">
      <div class="filter-triggers">
        <button class="filter-trigger" id="typeFilterBtn" data-panel="type">
          <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="13" y2="11"/></svg>
          <span class="filter-trigger-label">题型</span>
        </button>
        <button class="filter-trigger" id="yearFilterBtn" data-panel="year">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span class="filter-trigger-label">年份</span>
        </button>
      </div>
      <button class="topbar-btn" id="fontBtn">Aa</button>
    </div>
    <div class="filter-panel" id="filterPanel"></div>
  </div>

  <!-- Content -->
  <div class="content" id="swipeArea">
    <div class="progress">
      <span id="progressLabel">1 / 5</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:20%"></div></div>
    </div>
    <div class="q-flow" id="qFlow">
      <!-- Question -->
      <div class="q-section sec-question">
        <div class="q-head">
          <span class="q-badge" id="qBadge">名词解释</span>
        </div>
        <div class="q-title" id="qText">加载中...</div>
        <div class="assist-panel" id="assistPanel">
          <div class="assist-head" id="assistHead"></div>
          <div class="assist-body" id="assistBody"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="footer" id="footer">
  <div class="footer-row">
    <button class="f-btn" id="footerExplainBtn"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>AI通俗理解</button>
    <button class="f-btn" id="footerFrameBtn"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>答题框架</button>
    <button class="f-btn" id="footerAnswerBtn"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>参考答案</button>
  </div>
</div>

<!-- Font Panel -->
<div class="font-panel" id="fontPanel">
  <div class="fp-title">显示设置</div>
  <div class="fp-row">
    <div class="fp-label">字体大小 <span class="fp-val" id="fpSizeVal">15px</span></div>
    <input type="range" class="fp-slider" min="13" max="22" value="15" id="fpSize">
  </div>
  <div class="fp-row">
    <div class="fp-label">行间距 <span class="fp-val" id="fpLineVal">1.8</span></div>
    <input type="range" class="fp-slider" min="14" max="28" value="18" id="fpLine">
  </div>
  <div class="fp-row">
    <div class="fp-label">字体颜色</div>
    <div class="fp-colors" id="fpColors">
      <div class="fp-color active" data-color="#444" style="background:#444" title="默认"></div>
      <div class="fp-color" data-color="#333" style="background:#666" title="深灰"></div>
      <div class="fp-color" data-color="#3B5323" style="background:#3B5323" title="护眼绿"></div>
      <div class="fp-color" data-color="#5C4033" style="background:#8B6914" title="暖棕"></div>
    </div>
  </div>
  <div class="fp-row">
    <div class="fp-label">背景色</div>
    <div class="fp-bgs" id="fpBgs">
      <div class="fp-bg active" data-bg="#FAFAFE" data-text="var(--text)" style="background:#FAFAFE;color:#999;border-color:#eee">白</div>
      <div class="fp-bg" data-bg="#F5F0FF" data-text="var(--text)" style="background:#F5F0FF;color:#9B5DE5">紫</div>
      <div class="fp-bg" data-bg="#FFF8F0" data-text="#5C4033" style="background:#FFF8F0;color:#B8860B">暖</div>
      <div class="fp-bg" data-bg="#1A1A2E" data-text="#CCC" style="background:#1A1A2E;color:#777">暗</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const CHAPTERS_MAP = ["2005","2006","2007","2008","2009","2010","2011","2012","2013","2014","2016","2018"];

const RAW_CARDS = [
  {ch:0, type:"noun", q:`“拒检”运动`, a:`拒检运动”是指国统区新闻界争取新闻出版自由的一场斗争。1945年8月7日，重庆国
在其他进步出版机构的支持下，不送国民党当局审查而自行出版了黄炎培撰写的《延安归来》一书，提“拒检运动”的序幕。9月1日和4日，重庆《新华日报》先后发表社评支持“拒检运动”。这一运动到各界广泛支持，迅速扩展到成都、昆明等地，并由出版界扩展到新闻界。拒检运动的兴起与发展，使国民党当局陷入被动局面。为了缓和国内外的矛盾，国民党当局被迫做出让步，于9月12日宣布：“自10月1日起废止战时新闻检查制度。但收复区在军事行动尚未完成以前除外。”这收复区例外的规定，是国民党当局有意留下的一个“尾巴”。9月22日，国民党中央第10次常会通过了废止新闻出版检查制度的决定与办法。国统区新闻文化界为之奋斗多年的取消新闻出版检查制度的斗争，终于获得了巨大的胜利。`, explain:`1945年抗战刚胜利，国民党还在搞新闻审查制度，出版物得先送审才能发。重庆出版界实在忍不了了，直接不送审就出书，这就是'拒检运动'。后来新闻界也跟进，全国多个城市响应，逼得国民党不得不宣布废除新闻检查制度。简单说就是新闻界用集体不服从的方式，争取到了出版自由。`, frame:`起手用一句话定性：国统区新闻界为争取新闻出版自由而发起的斗争。接着按时间线交代导火索——《延安归来》不经审查出版拉开拒检序幕，写《新华日报》等支持及运动向多地、出版界与新闻界扩展。再写当局被动让步：宣布废止战时新闻检查、指出收复区例外这条"尾巴"，并补中央常会正式通过决定。收束点题：多年斗争取得重大胜利，同时点出国民党仍留后手。`},
  {ch:0, type:"noun", q:`《共产主义杂志》`, a:`《共产主义杂志》，创刊于1847年9月的伦敦，是以科学革命理论为指导的第一个国际共产主义组织（共产主义同盟）的正式刊物，开创了共产主义机关报刊的历史。杂志共16页，分序言、社论、文章，批判了各种错误思潮。由于缺乏资金，仅出一期。`, explain:`这是共产主义同盟（最早的国际共产主义组织）的官方刊物，1847年在伦敦创刊。它的历史意义在于'第一个'——第一个以科学革命理论指导的国际共产主义组织的机关报。不过因为没钱，只出了一期就停了。考试记住'第一个国际共产主义组织机关报'这个定位就行。`, frame:`先交代创刊时空（1847年9月伦敦）与刊物属性：共产主义同盟机关刊物、共产主义机关报刊史的开端。再概括内容与任务：批判错误思潮、传播革命理论。最后以"仅出一期"收束，点明因经费停刊，体现其开创性与短暂性。`},
  {ch:0, type:"noun", q:`中东通讯社`, a:`中东通讯社是埃及共和国唯一的官方通讯社，外文简称MENA，简称中东社。是中东和阿拉伯地区成立最早的通讯社，总社在开罗。1956年由埃及两大日报和两大出版社筹资成立，1960年收归国有。1980年由埃及协商委员会遴选该社董事会主席和两名主编。国内有26个分社。国外有15个分社和记者站，大多集中在中东和北非各国。每天用阿拉伯、英、法3种文字发稿。着重报道埃及、中东、非洲和不结盟国家的事务。设有图片部和电视新闻部，向国内外提供或交换图片和电视新闻。还为中东和非洲国家的通讯社培训人员。`, explain:`中东通讯社就是埃及的官方通讯社，英文缩写MENA。它是整个中东和阿拉伯地区最早成立的通讯社，总部在开罗。1956年由民间创办，1960年被国有化。每天用阿拉伯语、英语、法语三种语言发稿，重点报道埃及和中东、非洲的新闻。你可以把它理解为埃及版的'新华社'。`, frame:`起手界定：埃及唯一官方通讯社，简称与地位（中东阿拉伯地区最早）。再写总社、1956年创立与1960年国有化及治理结构要点。接着分国内国外网络、多语种发稿与报道侧重。最后补图片电视新闻、培训等延伸职能，体现国家通讯社的完整功能。`},
  {ch:0, type:"noun", q:`意见领袖`, a:`意见领袖是拉扎斯菲尔德等人在两级传播论（two-step flowof communication）中提出的一个重要概念，是指人群中那些首先或较多接触大众传播信息，并将经过自己加工后的信息传播给其他人的人。意见领袖介入传播过程，加快了信息传播进程并扩大了传播信息的影响。其特点是：①与被影响者一般处于平等关系而非上下级关系；②并不集中于特定的群体或阶层，而是均匀地分布于社会上任何群体和阶层中；③其影响力一般分为“单一型”和“综合型”；④社交范围广，拥有较多的信息渠道，对大众传播的接触频度高、接触量大。`, explain:`意见领袖就是你朋友圈里那个'消息灵通人士'。拉扎斯菲尔德研究发现，大众媒体的信息并不是直接影响所有人，而是先影响一群爱看新闻、爱分享的人，再由他们传给身边的人。这些'中间人'就是意见领袖。他们的特点是：跟普通人是平等关系、分布在各个阶层、社交面广、接触媒体多。`, frame:`先点明出自两级传播，给出核心界定：较多接触媒介并加工后再传他人的人。接着写其在传播链中的作用——加速扩散、放大影响。最后分条呼应答案：与受影响者多为平等关系、分布广泛、影响力单一/综合型、渠道多接触频密，不必逐条展开但要覆盖要点。`},
  {ch:0, type:"noun", q:`文化帝国主义`, a:`文化帝国主义又称媒介帝国主义（media imperialism），是指个别文化高压国家利用各种手段，以一种文化模式来取代世界文化的多元性和多样性的过程，是现代帝国主义总过程的一部分。文化帝国主义有三个特点：①它以强大的经济、资本实力为后盾，主要通过市场来进行扩张；②它是一种文化价值的扩张，即通过含有文化价值的产品或商品的销售来实现全球性文化支配；③由于信息产品的文化含量最高（或者说信息本身就是文化产品），那么，很明显，这种文化扩张主要是通过信息产品的传播来实现的。`, explain:`文化帝国主义说白了就是文化上的'以强凌弱'。某些大国利用经济和技术优势，通过市场把自己的文化产品（电影、音乐、新闻）大量倾销到其他国家，慢慢让全世界都接受它那一套价值观，取代本土文化的多样性。因为信息产品天然就是文化载体，所以这种扩张主要通过媒介传播实现，也叫'媒介帝国主义'。`, frame:`可先写别称媒介帝国主义，再一句界定：强势国家以单一文化模式挤压世界文化多样性，属现代帝国主义一部分。随后按答案顺序展开三特点：经济资本后盾与市场扩张；文化价值随商品输出实现支配；信息产品文化含量高故多借信息传播完成扩张。收束回扣"取代多元性"这一本质。`},
  {ch:0, type:"noun", q:`传播制度`, a:`，传播制度是指一定社会制度中对大众传播活动直接或间接地起着制约、控制作用的部分。传播制
度是社会制度的反映，它体现了社会制度或制度性因素在各个方面对传播媒介活动的制约和影响。传播制度中既包括媒介与政府的关系问题，也包括媒介与社会群体和广大受众的关系问题；既包括言论出版的自由与权利问题，也包括言论出版者所应承担的责任和义务问题。传播制度体现全部社会结构和社会关系的复杂性。`, explain:`传播制度就是社会对媒体活动的'游戏规则'。它规定了媒体跟政府什么关系、跟公众什么关系、言论自由的边界在哪、媒体要承担什么责任。不同社会制度下传播制度不一样，比如有的国家媒体归国家管，有的归市场管。总之，传播制度反映的是整个社会结构的复杂性。`, frame:`起手定义：社会制度中对大众传播起制约控制的部分。再写它反映社会制度，体现制度性因素对媒介的多方面影响。随后用并列方式覆盖：政媒关系、媒介与群体及受众、言论出版自由与权利、责任义务，最后一句强调其折射社会结构复杂性。`},
  {ch:0, type:"noun", q:`公共关系`, a:`公共关系是指社会组织为了塑造组织形象，通过传播、沟通手段来影响公众的科学与艺术。这一概念具体包含三方面意思：①公共关系活动的根本目的就是塑造组织形象。②社会组织通过传播、沟通手段影响公众。公共关系的主体是社会组织，客体是公众，手段是传播、沟通。③从理论上讲，公共关系是一门科学；从运作上讲，公共关系又是一种艺术。它是科学与艺术的统一体。`, explain:`公共关系就是一个组织通过各种传播手段来'管理自己形象'的技术和艺术。三个要点：目的是塑造好形象；方法是传播和沟通；本质是科学和艺术的结合。简单说，企业请公关公司帮忙做品牌宣传、危机处理，都属于公共关系的范畴。`, frame:`先给总定义：组织塑形象、用传播沟通影响公众的科学与艺术。再按答案拆成三层展开：目的在组织形象；主体客体手段分别是组织、公众、传播沟通；理论上是科学、运作上是艺术，收束"科艺统一"。`},
  {ch:0, type:"noun", q:`“报刊宣传运动”`, a:`报刊宣传运动是指一种有目标、有计划的经常性公共关系活动，是公共关系职业化的雏形。19世纪中叶到20世纪初，报刊宣传运动孕育公共关系的职业思想，一个机构生存和发展需要通过舆论传播与沟通影响公众。19世纪30年代，民主政治发展、经济繁荣、科技进步，美国传播事业快速发展。便士报运动造就了一批商业性专业传播人。`, explain:`报刊宣传运动是公共关系的'前身'。19世纪中后期，美国企业开始意识到：想要生存发展，就得通过报刊来影响公众舆论。于是出现了一批专门帮企业做宣传的人，这就是最早的'公关人'。便士报运动让报纸变得便宜、普及，也给这些专业传播人提供了平台。`, frame:`先界定性质：有目标有计划的经常性公关活动，视为公关职业化雏形。再写19世纪中叶至20世纪初与机构生存发展的舆论沟通需求。接着交代便士报与传播业发展如何催生商业性专业传播人。收束点出它为现代公共关系奠定职业思想基础。`},
  {ch:0, type:"noun", q:`独立公众`, a:`独立公众又称为中立公众或不确定公众，是指对社会组织奉行的政策、采取的行动持中立态度或尚未表态或态度还不明确的公众。独立公众往往是社会组织公共关系工作的竞争之地。做好这部分公众的沟通工作，争取他们对社会组织的了解、支持和合作，是公共关系工作的重点。独立公众的态度具有极大的可塑性，既可向顺意公众转化，也可向逆意公众转化，宜采取说服、争取的工作方式，争取他们向组织有利的方向转化，绝不能掉以轻心。当条件成熟时，可以将之转化为顺意公众。`, explain:`独立公众就是对一个组织既不支持也不反对、态度暧昧的那群人。他们是公关工作的'必争之地'，因为态度可塑性强——做得好能变成支持者，做得差就变成反对者。所以公关工作的重点就是争取这些'骑墙派'。`, frame:`起手写别名中立/不确定公众，界定态度中立或未表态者。再强调公关意义：争取他们的关键战场，态度可塑，可向顺意或逆意转化。最后写工作取向：说服争取、不可掉以轻心，条件成熟时促成向顺意转化。`},
  {ch:0, type:"noun", q:`广告活动`, a:`广告活动是指广告主根据自己的营销需求提出广告目的或目标之后，广告代理公司会同广告主及有关部门决定达成这一目标的最佳方法，然后在此基础上确定达成广告目标的阶段、手法及措施，把以上这些努力与企业的其他营销努力相结合，然后去执行所计划的这些活动的过程。概括来说，广告活动就是设定广告目的，制定广告策略，然后在市场上执行这些策略的过程。`, explain:`广告活动就是从定目标到执行的完整过程：广告主先想清楚要达到什么效果，然后跟广告公司一起策划怎么做，选什么媒体、用什么创意、分几个阶段，最后落地执行。简单概括就是三步：定目标、定策略、去执行。`, frame:`先概括流程：广告主提出目标后，代理与相关部门确定达成路径与阶段手法措施，并与整体营销结合执行。再用一句话收束：设定目的、制定策略、在市场上落实策略的全过程，突出"策划—执行"闭环。`},
  {ch:0, type:"short", q:`如何理解传播效果的含义，并适当举例说明。`, a:`（1）传播效果的含义
在传播学研究领域，传播效果这个概念具有以下双重含义：
①它指带有说服动机的传播行为在受传者身上引起的心理、态度和行为的变化。说服性传播，指的是通过劝说或宣传来使受传者接受某种观点或从事某种行为的传播活动，这里的传播效果，通常意味着传播活动在多大程度上实现了传播者的意图或目的。
例如，父母劝说孩子不要沉迷于网络游戏，应该把主要精力放在学习功课上，他们使用了规劝、感化等各种各样的说服方法，希望孩子能够理解父母的一片苦心。在这里，传播效果便意味着父母的主观意图是否得到了实现，换言之，也是孩子是否听从了父母的教诲。
②它指传播活动尤其是报刊、广播、电视等大众传播媒介的活动对受传者和社会所产生的一切影响和结果的总体，不管这些影响是有意的还是无意的、直接的还是间接的、显在的还是潜在的。
例如，记者写了一篇关于物价即将上调的消息，本意是让受众有一个心理准备，但结果也许引起了消费者恐慌或大规模的抢购风潮。
（2）传播效果的三个层面
传播效果又可以分为不同层面。传播效果依其发生的逻辑顺序或表现阶段可以分为三个层面：外部信
息作用于人们的知党和记忆系统，引起人们知识量的增加和认知结构的变化，属于认知层而上的效果；作用于人们的观念或价值体系而引起情绪或感情的变化，属于心理和态度层面上的效果；这些变化通过人们的言行表现出来，即成为行动层面上的效果。从认知到态度再到行动，是一个效果的累积、深化和打大的过程。
以报刊、广播、电视为代表的大众传播的社会效果，包括以下三个层面：
①环境认知效果。
在现代社会，我们对周围世界的知觉与印象在很大程度上依赖于大众传播媒介。大众传媒是以传递信报道事实、提示社会上发生的事件为己任的，但它们并不是有闻必录。传媒报道什么、不报道什么从什么角度进行报道，都在影响着我们对周围环境的知觉与印象。这种效果，传播学中也称“视野制约效果”，即大众传播制约着我们观察社会和世界的视野。
②价值形成与维护效果。
大众传媒在报道的新闻和传达的信息中，通常包含着是与非、善与恶、美与丑、进步与落后的价值判断。大众传媒提倡什么、反对什么，客观上起着形成与维护社会规范和价值体系的作用。这种作用是通过传媒的舆论导向功能发挥出来的，它可以通过舆论引导形成新的规范和价值，又可以通过舆论监督来维护既有的规范和价值。
③社会行为示范效果。
大众传媒的影响并不仅仅表现在认知和价值取向的领域，它们还通过向社会提示具体的行为范例或行为模式来直接、间接地影响人们的行动。大众传播具有“地位赋予”功能，一种行为如果得到传媒的广泛报道和传播，往往会成为一般人学习或仿效的对象。`, explain:`传播效果有两层含义：一是说服性传播有没有达到目的（比如爸妈劝孩子别玩游戏，孩子听没听）；二是传播活动对社会产生的所有影响，不管是有意还是无意的（比如一条物价新闻本想让大家有心理准备，结果引发了抢购潮）。效果分三个层面：先是认知变化（知道了），再是态度变化（认同了），最后是行动变化（去做了），层层递进。`, frame:`起手说明"传播效果"有双重含义，避免只写一种。第一层写带说服动机的传播引起的心理态度行为变化，并紧扣"是否实现传播者意图"，用父母劝孩子少玩游戏的例子点到为止。第二层写大众传播对社会与个人的总体影响，有意无意、显在潜在皆可，用物价报道引发抢购说明非意图后果。随后过渡到三个层面：认知—态度—行动的逻辑递进。最后分三点概述大众传播社会效果：环境认知（视野制约）、价值形成与维护（舆论导向）、行为示范（地位赋予），各用一两句展开。`},
  {ch:0, type:"short", q:`如何认识“议程设置功能”理论。`, a:`（1）“议程设置功能”的内涵
“议程设置功能”作为一种理论假说，最早见于美国传播学家麦库姆斯和肖于1972年在《舆论季刊》上发表的一篇论文。他们认为，大众传播具有一种为公众设置“议事日程”的功能，传媒的新闻报道和信息传达活动以赋予各种“议题”不同程度的显著性的方式，影响着人们对周围世界的“大事”及其重要性的判断。
（2）“议程设置功能”理论的特点
①传播效果分为认知、态度和行动三个层面，这些层面同时也是一个完整意义上的效果形成过程的不同阶段，“议程设置功能”假说的着眼点是这个过程的最初阶段，即认知层面上的效果。
②“议程设置功能”理论所考察的，不是某家媒介的某次报道活动产生的短期效果，而是作为整体的大众传播具有较长时间跨度的一系列报道活动所产生的中长期的、综合的、宏观的社会效果。这里着眼的是传播媒介的日常新闻报道和信息传播活动所产生的影响。
③“议程设置功能”理论暗示了这样一种媒介观，即传播媒介是从事“环境再构成作业”的机构。即传播媒介对外部世界的报道不是“镜子”式的反映，而是一种有目的的取舍选择活动。
（3）“议程设置功能”理论的意义
①“议程设置功能”理论则从考察大众传播在人们的环境认知过程中的作用入手，重新揭示了大众传媒的有力影响，为效果研究摆脱“有限论”的束缚起了重要的作用。
②“议程设置功能”理论中所包含的传播媒介是“从事环境再构成作业的机构”的观点，把西方主流传播学长期以来力图回避的一个重要问题-大众传播过程背后的控制问题重新摆在了人们面前。
③“议程设置”研究与我国的舆论导向研究之间也有一定的理论接点。
（4）“议程设置功能”理论的不足
①它只强调了传播媒介“设置”或形成社会议题的一面，而没有涉及反映社会议题的一面。
②媒介的“议程设置功能”是强大的，但也不能把它的效果绝对化。`, explain:`议程设置理论的核心就一句话：媒体不能决定你怎么想，但能决定你想什么。媒体通过反复报道某些话题，让这些话题变成公众眼中的'大事'。它跟以前的传播理论不同——不是直接改变你的态度，而是影响你'关注什么'。但这个理论也有局限：它只说了媒体设置议题，没说媒体也会反映社会已有的议题。`, frame:`起手交代麦库姆斯和肖1972年论文及核心命题：媒介通过显著性安排影响公众对"大事"重要性的判断。接着分特点：效果定位于认知层面初期；考察中长期宏观的日常报道累积；媒介观是"环境再构成"而非镜子反映。再写意义：揭示强影响、引出控制问题、与舆论导向研究的接点。最后单列不足：重"设置"轻"反映"、不可效果绝对化，形成完整评价。`},
  {ch:0, type:"short", q:`公共关系传播的原则。`, a:`公共关系传播顺利进行要遵循以下几个原则：
（1）目的明确原则
公关传播是带有明确目的性的传播，它的总目标是树立、改善组织形象，形成有利的舆论环境，获得各界的支持。公关传播根据传播效果四层次理论，可分为以下四种：
①引起公众注意。
②诱发公众兴趣。
③取得公众的肯定态度。
④促发公众的支持行为。
（2）双向沟通原则
双向沟通原则是指传播双方互相传递、互相理解的信息互助原则。具体包含：一是沟通必须由两人以上进行；二是沟通双方互为角色；三是沟通双方相互理解并有所交流。组织与公众的沟通应注意以下两个方面：
①创造沟通的共识区域。
②具备反馈意识。
（3）平衡理论原则
①A-A式平行沟通。
公关传播就是要创造A-A式的平行沟通的环境，即双方均以成人状态参与沟通，并随时注意公众反应，不断调节使其保持在A-A状态之中。这种方法就是以个人心态的平衡去引导、建立双方关系的平衡。
②情感沟通。
情感是形成态度的重要条件，平衡理论要求在沟通中诉诸情感，通过情感互动和思想交流，产生接近与认同，达到态度的一致和关系的平衡。公关传播追求组织与公众之间态度、感情的一致和关系的平衡。
（4）有效沟通原则
公共传播追求的是有效沟通，即通过沟通使公众理解、喜爱、支持组织。影响与公众有效沟通的因素，包括以下方面：
①信息的真实性与信息量的大小。
②传播者的方式与态度。
③传播内容的制作技巧与传播渠道的畅通。
（5）沟通的七个“C”原则
①可信赖性；②一致性；③内容；④明确性；⑤持续性与连贯性；⑥渠道；⑦被沟通者的接受能力。`, explain:`公关传播要遵循几个原则：第一，目的要明确（引起注意→激发兴趣→获得认同→促成支持）；第二，要双向沟通，不能只说不听；第三，要平衡对等，像成年人之间的对话而不是居高临下；第四，要有效，信息必须真实，方式要恰当，渠道要通畅。`, frame:`起手点题：公关传播要顺畅须遵循若干原则。按答案顺序组织：先目的明确原则，总目标落脚形象与舆论，可点到四层次（注意—兴趣—态度—行为）。再双向沟通（共识区、反馈）。继之以平衡理论（A-A平行沟通、诉诸情感求关系平衡）。再有效沟通及影响因素。最后补七个"C"作收束或独立一段列举，提示阅卷人你覆盖全面。`},
  {ch:0, type:"short", q:`处理社区关系的一般做法。`, a:`社区作为组织的经营场所和办公地点的所在地，是组织赖以生存的环境。处理好与社区的关系是组织公关工作的重要任务。
（1）社区关系的含义
社区是一个社会性的概念，是指由共同生活于一定区域的人们因利益关系紧密而构成的一种社会集体。具体而言，居住于一定区域、具有共同联系并彼此交往的人们，就构成了一个社区。例如村庄、集镇、街坊邻居、城市的一个市区或郊区，甚至整个城市，都是在规模上大小不一的社区。
社区是一个相对独立的地域性社会，每个社区都有其特定的人口和特定的地理区域，其居民之间有着某些共同的利益，以及重要的社会交往。社区关系亦称“区域关系”“地方关系”。它是指社会组织与其所在地的地方政府、社会团体和其他组织以及当地居民之间的邻里关系。
（2）建立良好社区关系的意义
建立良好的社区关系，是为了争取社区公众对组织的了解、理解和支持，为组织创造一个稳固的生存环境；同时体现组织对社区的责任和义务，通过社区关系扩大组织的区域性影响，其意义表现在以下几个方面：
①社区关系影响着组织的生存环境。
社区如同组织扎根的土壤，没有良好的社区关系，组织就会失去立足之地。社区公众是由特定的活动空间所确定的，区域性、空间性很强。地方性组织的活动直接受社区公众的制约，社区关系便直接影响着
组织其他各方面的关系，如员工家属关系、本地顾客关系、地方的政府关系和媒介关系风，跨区域的
组织也不能脱离特定的区域，甚至要善于同各种不同背景的社区公众打交道，以争取社区提供各种地方性的服务和支持，使跨区域性组织能够在各种完全不同的社区环境下生存和发展。
②社区关系影响着组织的公众形象。
社区公众涉及当地社会政治、经济、文化、教育等各个方面和阶层，类型繁多，涉及面广，对组织客观上存在着各种不同感受、要求和评价：由于处在同一社区，对组织的某一种评价和看法又极容易相互传播，形成区域性的影响，从而形成组织的某一种公众形象。组织的社区关系好坏，直接影响着组织的址会公众形象。
（3）处理社区关系的方法
①树立居民意识。
从社区公众的角度来看，不论组织的性质、规模等方面如何，但有一点是共同的，那就是每个组织都是社区的一员。因此，组织应自觉遵守社区的各种规定，服从社区公约、行为规范，承担为社区应尽的各种义务。
②为社区建设尽职尽责。
组织在社区除了尽量做好一个好“居民”外，还需要为社区建设尽职尽责，充分利用自己的技术、资金、人才和设备等方面的优势，积极支持社区的全面发展和建设，多为社区提供无偿的服务。
③维护社区的生态环境。
随着全球对环境危机的日益关切以及政府对环境的重视，生态环境问题已成为当前组织所面临的一项重大问题。组织应当树立公众利益优先的思想，在生产经营过程中应树立环保的新形象。为此，组织应花大力气改革传统的工艺流程，减少各种污染，包括水污染、空气污染、噪音污染等，并积极参加绿化工程，开发绿色环保产品，适应绿色消费，通过各种活动来保护环境。`, explain:`社区关系就是组织跟'邻居'的关系。处理好了，等于给自己营造了稳定的生存土壤。怎么做呢？首先把自己当社区一份子，遵守规矩；其次积极回馈社区，出钱出力搞建设；最后注意环保，别污染环境给邻居添堵。社区口碑好不好，直接影响组织的整体形象。`, frame:`起手说明社区是组织生存环境与公关重点任务。先界定社区与社区关系含义，可举村庄、街区等说明地域性与邻里关系。再分两点谈意义：关乎生存土壤与各类关系联动；关乎区域舆论与组织形象。最后进入方法：居民意识、尽责建设、生态环保与绿色形象，按答案三条展开，形成"是什么—为何—怎么做"。`},
  {ch:0, type:"essay", q:`试论述改革开放以来我国新闻学研究的过程及特点。`, a:`（1）1978年年底党的十一届三中全会召开，确定了国家实行改革开放的整体发展战略，从此中国新闻事业进入了一个新的发展时期，新闻学研究也迎来了历史上最好的发展时期。
伴随着改革开放新时期的到来，新闻工作的重点开始逐渐由以阶级斗争为纲转移到以经济建设为中心的轨道上来。与此相应，新闻学研究也开始逐渐回归到对新闻学本身和新闻媒体自身实践问题的研究上来。
（2）随着新闻改革逐步提上日程，一些新闻院系媒体和省市纷纷建立专门的新闻研究机构，出版新闻学术刊物，开展学术研讨活动，促进了新闻学研究和新闻改革的全面展开。从20世纪80年代开始，各种学术讨论会相继召开，许多新闻改革实践与理论问题进入新闻学界的研究视野。
以1980年5月在兰州召开的“西北五报新闻学术研讨会”为例，这次研讨会有来自全国30多个新闻单位、新闻教育和研究机构的代表参加，探讨的问题十分广泛，包括报纸的性质、作用和任务，党报的党性和人民性，报纸上的批评与自我批评，新闻的真实性，报纸的指导性，新闻工作的客观规律等一些基本理论问题，对促进新闻改革，深化理论研究具有启示意义。
（3）我国新闻学研究十分活跃，一些学者开始吸收与引进西方新闻学与传播学的研究成果，同时结合新闻改革实践，对新闻观念、报道内容、传播形式、管理体制、经营理念和运行机制等诸多领域深入开展研究，取得了许多成果。
（4）在管理和经营方面也进行了许多观念更新，使得新闻媒体逐步确立起“事业单位企业化管理”的新的管理和经营思路，形成了新的运行体制和机制，开始逐渐步入企业化管理，市场化经营，社会化服务的发展道路，有力地推动了新闻传媒产业的发展。
这些反映新闻改革最新成果的新闻观念和经营理念，大大丰富了社会主义新闻学的理论内涵，也促进了新闻改革的深入发展。
（5）进入新时期以来，我国的新闻学研究始终瞄准党和国家工作大局的需要，瞄准人民群众的信息与文化需要，瞄准媒体改革发展的需要，坚持结合新闻工作实际开展研究，力求遵循新闻学术规范开展研究，在服务媒体改革服务学科建设和服务社会发展等方面取得了重大进展，发挥智库的作用。`, explain:`改革开放后，中国新闻学研究经历了大转型：从以阶级斗争为纲转向以经济建设为中心，从政治挂帅回归到研究新闻本身。各地纷纷成立研究机构、办学术刊物，引进西方传播学理论，同时结合中国实际探索新闻改革。媒体也从纯事业单位逐步走向'事业单位企业化管理'，新闻学研究越来越注重服务实践。`, frame:`以十一届三中全会为起点，交代工作重心转移与新闻学研究回归本体与实践问题。接着写80年代研究机构、刊物、研讨会及典型会议议题，体现研究与改革互动。再写引进西方新闻学传播学并结合观念、内容、体制、经营等研究。补"事业单位企业化管理"等经营观念更新及对产业发展的推动。最后收束：围绕大局与人民需要、结合实践、讲规范、服务改革与智库作用，体现新时期特点。`},
  {ch:0, type:"essay", q:`如何全面理解“信息主权”问题。`, a:`（1）信息主权的含义
信息主权，是诺顿斯登和席勒在《国家主权和国际传播》中提出的概念。信息主权，即一个国家对本国的信息传播系统进行自主管理的权利，这是信息时代的国家主权的重要组成部分。一般而言，信息主权包括以下三个方面的内容：
①对本国信息资源进行保护、开发和利用的权利。
②不受外部干涉，自主确立本国的信息生产、加工、储存、流通和传播体制的权利。
③对本国信息的输出和外国信息的输入进行管理和监控的权利。
其中第三项内容直接涉及跨国界传播，其功能包括保护国家机密和排除危及国家安全的有害信息等重要方面。
（2）信息主权是在全球信息化的背景下，国家主权面临着新的威胁因素的背景下提出来的。
①信息化使各国国内信息系统与全球信息系统连成一体，国内系统受到国外因素更为直接的影响。来自外部的信息干扰，有可能使一国的信息系统遭到破坏，使国家失去危机管理能力而陷于混乱。同时，在世界上还存在强权政治的情况下，个别传播大国有可能凭借自己的技术优势，通过“劫持”他国电信系统，阻断信息和数据往来等手段来达到其政治目的。
②信息主权同样是一个与建立“新世界信息秩序”密切相关的问题。广大发展中国家认为，在世界信息单向流通的不平衡结构下，传播弱国的信息主权没有任何保障，这种状况使它们在政治、经济、文化各个领域处于极为不利的状态。
（3）发展中国家的学者主张，与拥有领土、领空、领海、资源以及社会制度的主权一样，一个国家对自己的信息传播资源和传播制度同样应该拥有主权，这是在信息时代保障国家主权完整的重要条件。对信息主权的重视和保护，已经成了世界各国规划和建设本国信息系统的重要指导思想。`, explain:`信息主权就是一个国家对自己的信息传播系统拥有自主管理权。包括三方面：保护和开发本国信息资源、自主决定传播体制、管控信息进出口。在全球化时代，有些大国可能通过信息手段干涉别国内政，所以信息主权跟领土主权一样重要。尤其对发展中国家来说，没有信息主权就没有真正的独立。`, frame:`起手给出信息主权提出语境与核心界定：国家对本国信息传播系统的自主管理权，信息时代国家主权组成部分。接着分三项权利展开：信息资源的保护开发利用；自主确立信息生产流通体制；对信息输出与外来输入的管理监控，并点明第三项与跨国传播、国家安全相连。再写全球信息化背景下面临的外部威胁与强权技术风险，并关联"新世界信息秩序"与南北信息单向流动困境。最后以发展中国家立场收束：信息主权与领土等资源主权并列，是维护主权完整的重要条件，已成各国建设信息系统的指导思想。`},
  {ch:1, type:"noun", q:`《香港船头货价纸》`, a:`《香港船头货价纸》是我国历史上第一份中文商业报纸、最早的经济类报纸和最早的以单页报纸形式两面印刷的中文报纸，1857年11月3日由孖刺报馆创办。所刊内容以船期、商品价格、商业行情、商业信息和广告为主，主要读者对象为商店职员。1873年改版为日报，后又脱离《孖刺报》，成为中国人自己办的报纸，直至1919年停刊。`, explain:`这是中国历史上第一份中文商业报纸，1857年在香港创办。内容主要是船期、商品价格、商业行情和广告，读者主要是商店职员。可以把它理解为那个时代的'商业信息日报'。后来改版为日报，转为华人自办，一直出到1919年。记住'第一份中文商业报纸'这个考点。`, frame:`起手堆叠"三个最早"：首份中文商业报、最早经济类报、最早双面印刷单页中文报，并写1857年孖刺报馆创办。再概括内容以船期行情广告为主及读者。最后交代1873年改日报、脱离孖刺报、华人自办及1919年停刊，体现演变与终结。`},
  {ch:1, type:"noun", q:`“癸丑报灾”`, a:`“癸丑报灾”是指袁世凯政府在1913年为迫害摧残国民党报刊制造的一系列查封报馆的事件。“二次革命”失败后，袁世凯政府借军事胜利对国民党系统的报刊以及其他异己报刊大肆摧残，凡国民党系统的报刊一律扣以“乱党报纸”的罪名而查封。到1913年底，全国继续出版的报纸只剩下139家，较之民国元年的500家锐减300多家，北京的上百家报纸也只剩下20余家。报刊减少至三分之一，报人大批被捕被害。`, explain:`'癸丑报灾'发生在1913年。袁世凯镇压了二次革命后，把所有国民党系的报纸都扣上'乱党报纸'的帽子查封。全国报纸从500多家锐减到139家，北京从上百家只剩20多家，大批记者被捕被害。这是中国近代新闻史上最严重的一次新闻迫害事件。'癸丑'是农历纪年，1913年是癸丑年。`, frame:`起手点明时间主体：1913年袁世凯政府迫害报刊。再写"二次革命"失败后以"乱党报纸"为名查封国民党及异己报刊。用数据收束：年底报纸锐减、北京报业重创，强调"癸丑报灾"的规模与残暴，可点到报人受害。`},
  {ch:1, type:"noun", q:`《法兰西共和国公报》`, a:`《法兰西共和国公报》是巴黎公社时期最重要的报纸。它原是梯也尔政府机关报，1871年3月18日起被法国国民自卫军接管，巴黎公社成立后成为公社机关报，共出版66期。该报除发布重要宣言、法令、决议和指示外，还澄清事实真相，戳穿敌人的谎言。后该报印刷发行业务落入私人之手，文风刻板，不太关心群众利益。`, explain:`这是巴黎公社时期最重要的报纸。原本是法国政府的机关报，1871年巴黎公社起义后被接管，变成了公社的官方喉舌，一共出了66期。主要发布公社的法令、决议，也揭露敌人的谎言。但后来印刷业务落入私人手中，报纸变得刻板，不太关心群众利益了。`, frame:`起手定性：巴黎公社时期最重要报纸，原政府机关报，3月18日后被接管，公社成立后为机关报，交代出版期数。再写功能：发布法令决议、澄清事实驳斥谣言。最后补后期印刷落入私人、文风刻板脱离群众的局限，形成完整评价。`},
  {ch:1, type:"noun", q:`流言`, a:`流言是指一种通常以口头形式在人们中间流传，涉及人们信念而目前没有可靠证明标准的一种特殊的陈述或话题。流言是集合行为中的主要信息形式。流言的特点：①流言总是以“传播真相”的形式出现的，其目的是让人们“确信”或“相信”所传播的言论或消息是“事实”。②流言传播的渠道主要是人际的口头传播。③流言的内容往往涉及一些特殊的事件或敏感的话题，这些事件或话题容易唤起一般人的重视、关心或兴趣。④流言是一些没有确切证据的信息，或者说至少在其流行期间缺少可靠的证据。`, explain:`流言就是来源不明、无法证实的消息。它有四个特点：伪装成'真相'让你相信；主要靠口口相传；内容通常涉及敏感话题容易引人关注；缺乏可靠证据。流言是群体聚集行为中最主要的信息传播方式，容易在社会不安定时期大量产生和扩散。`, frame:`先下定义：口头流传、关乎信念而缺乏可靠证明的特殊陈述。再点明常出现在集合行为中。随后按流言特点分述：以"真相"面目出现、渠道多为人际口头、内容常涉敏感事件、证据不足或流行期难证实，可按序号组织以免遗漏。`},
  {ch:1, type:"noun", q:`拟态环境`, a:`拟态环境是指由大众传播活动形成的信息环境。它并不是客观环境的镜子式再现，而是大众传播媒介通过对新闻和信息的选择、加工和报道，重新加以结构化以后向人们所提示的环境。而传播媒介大多具有特定的倾向性，因而“拟态环境”并不是客观环境的再现，只是一种“象征性的环境”。拟态环境是说明大众传播社会影响力的重要概念，由美国学者李普曼在其所著的《公众舆论》一书中提出。`, explain:`拟态环境是李普曼提出的概念。意思是媒体给我们呈现的并不是真实世界的'镜像'，而是经过选择、加工后重新构建的'拟态世界'。我们以为自己了解的世界，其实很大程度上是媒体'编辑'过的版本。这个概念说明了大众传播对人们认知的巨大影响力。`, frame:`起手界定：大众传播造成的信息环境，非镜子式再现。再写经选择加工结构化后呈现，故为象征性环境。补提出者李普曼与著作。最后一句点其理论价值：解释大众传播的社会影响力。`},
  {ch:1, type:"noun", q:`传播流`, a:`传播流是指由大众传媒发出的信息，经过各种中间环节，“流”向传播对象的社会过程。构成这项研究的代表性成果有拉扎斯菲尔德等人的《人民的选择》、卡兹等人的《个人影响》、罗杰斯的《创新与普及》以及克拉帕的《大众传播效果》。“传播流”的观点认为，大众传播并不是直接“流”向一般受众，而是要经过“意见领袖”这个中间环节，即“大众传播→意见领袖→一般受众”。后来，罗杰斯把大众传播过程区分为两个方面，一是作为信息传递过程的“信息流”，二是作为效果或影响的产生和波及过程的“影响流”。前者可以是“一级”的，即信息可以由传媒直接“流”向一般受众；而后者则是多级的，要经过人际传播中许多环节的过滤，后发展成为“多级”或“N级传播”模式。`, explain:`传播流是指信息从大众媒体出发，经过各种中间环节，最终到达受众的过程。核心发现是：信息不是直接从媒体到所有人，而是先到'意见领袖'，再由意见领袖传给普通人。后来罗杰斯把它分成'信息流'（可以一步到位）和'影响流'（必须经过多个环节），发展成了多级传播模式。`, frame:`起手定义：大众传媒信息经中间环节流向受众的社会过程。再列举代表性研究著作作为学术坐标。接着写经典观点：经意见领袖两级传播，并交代罗杰斯区分信息流与影响流、影响流多级化。收束体现研究演进。`},
  {ch:1, type:"noun", q:`服务性公共关系`, a:`服务性公共关系，是指组织通过向公众提供满意服务的方式来构建良好的公共关系。其目的在于
以实际行动使目标公众得到实惠。通过提高公众满意度，塑造良好的组织形象，争取公众的支持，增强组织的市场竞争力，促进组织的稳步发展。服务性公共关系的特点，是以实际的行动使公众满意，从而对组织形成正面的印象和积极的评价。`, explain:`服务性公共关系就是用实际行动赢得好感——不是嘴上说说，而是真的为公众提供满意的服务。通过提高公众满意度来塑造组织形象，争取支持。简单说就是'做比说更重要'，用服务品质说话。`, frame:`先界定：以提供满意服务来建立良好公关。再写目的——实惠公众、提高满意度、塑形象、争支持促发展。最后点特点：靠实际行动赢得正面印象与评价，区别于空泛宣传。`},
  {ch:1, type:"noun", q:`广告环境`, a:`广告环境是指影响和制约广告活动策略、计划的诸种因素，包括两个层面：一个层面是指影响广
告活动产生、发展的宏观环境；一个层面是指影响广告传播活动实施的微观环境。广告的微观环境，与广告行业自身经营有关。而宏观环境则是与广告主企业的经营、市场营销联系在一起的。`, explain:`广告环境就是影响广告活动的各种内外因素。分两层：宏观环境是跟企业经营和市场大环境相关的因素（经济形势、政策法规等）；微观环境是跟广告行业自身运作相关的因素（媒体渠道、竞争对手等）。做广告前必须分析环境，才能制定有效策略。`, frame:`起手总括：制约广告策略与计划的诸因素。再分宏观与微观两层：宏观连企业营销大环境，微观连广告行业与执行。收束说明两层如何共同作用于广告活动。`},
  {ch:1, type:"noun", q:`广告主题`, a:`广告主题是指在精确分析市场、消费者和产品特性的基础上确定好广告要传达的内容。广告主题是广告所要表达的重点和中心思想，是广告作品为达到某项目标而要表述的基本观念，是广告表现的核心，也是广告创意的主要题材。广告的其他要素都是为广告主题服务的。只有主题鲜明、诉求突出才有可能是优秀的广告作品，否则，整个广告作品缺乏统一的指南，各种信息就会显得杂乱无章，很难引起受众的注意。广告主题涉及的核心问题是市场，它的确立建立在市场调查和科学分析的基础上。广告主题正确与否直接关系到广告的成败。`, explain:`广告主题就是一个广告想要传达的核心信息，相当于广告的'灵魂'。好的广告主题必须建立在市场分析的基础上，抓住产品最突出的卖点，用一个鲜明的中心思想把所有广告元素统一起来。主题不清晰，广告就是一盘散沙。`, frame:`起手说明主题来自对市场、消费者、产品的分析，是广告要传达的核心内容与中心思想。再写主题统帅创意与各要素，鲜明突出才有效。最后强调确立依赖市场调查与科学分析，点"主题正确关乎成败"。`},
  {ch:1, type:"noun", q:`广告提案`, a:`广告提案是运用口头说明的方式，以视听媒介为手段，将广告策划中有关广告活动企划、创意构想、调查结果等重要部分呈现给广告主的一种形式。即把创意策划准确生动地向客户提交与说明，以求赢得客户的赞赏与支持。广告提案是广告策划结果的一种阐述形式，其重要性不亚于广告策划书。在提案的过程中，要充分了解自己的目的，诚心关心广告主的利益.精心准备提案细节，透彻阐述策划要点。`, explain:`广告提案就是广告公司向客户'推销'自己的创意方案的过程。不只是交一份文件，而是要口头演示加视听展示，把策划的精华生动地呈现出来，让客户认可并买单。提案质量直接决定能不能拿下这个客户，所以准备工作必须非常充分。`, frame:`先界定：以口头说明配合视听手段，向客户呈现策划创意与调研等要点的形式。再写目的：准确生动说服客户、争取支持。最后点其与策划书并重，并提示提案态度：明确目的、关心客户利益、准备充分、讲透要点。`},
  {ch:1, type:"short", q:`“知沟假说”？`, a:`（1）“知沟”理论的诞生
美国传播学家蒂奇诺等人，提出了这样一种理论假说：由于社会经济地位高者通常能比社会经济地位低者更快地获得信息，因此，大众媒介传送的信息越多，这两者之间的知识鸿沟也就越有扩大的趋势。这即是“知沟”理论的诞生。
（2）“知沟”假说与形成的主客观原因
大众传播的信息传达活动无论对社会经济地位高者还是低者都会带来知识量的增加，但由于社会经济地位高的人获得信息和知识的速度大大快于后者，随着时间的推移，最终结果是两者之间的“知沟”不断变宽，差距不断扩大。
蒂奇诺认为，除了接触媒介和学习知识的经济条件的因素以外，造成“知沟”扩大的原因还有以下几个方面：
①传播技能上的差异-获得关于公共事物和科学的知识，需要一定程度的阅读和理解能力。
②已有知识储存量的差异-知识储存越多，对新事物、新知识的理解和掌握越快。
③社交范围的差异-社交范围越广，人际交流越活跃，获得知识的过程越能加速。
④信息的选择性接触、理解和记忆的因素-生活的水准、层次与媒介的内容越接近，对媒介的接触和利用程度越高。
⑤大众传播媒介的性质-传播有一定深度的关于公共事务和科学知识的媒介主要是印刷媒体，其受众主要集中于高学历阶层。
在上述无论哪一方面，社会经济地位高的阶层都处于有利的状况，这是造成社会“知沟”不断扩大的根本原因。`, explain:`'知沟'理论说的是：大众媒体越发达，穷人和富人之间的知识差距反而越大。因为社会经济地位高的人获取信息更快更多（教育水平高、社交面广、接触媒体多），所以媒体信息越多，他们进步越快，差距就越拉越大。这个理论提醒我们：信息平等并不等于知识平等。`, frame:`起手交代蒂奇诺等提出"知沟"假说：媒介信息增加反而可能扩大高低社会经济地位者的知识差距。再解释机制：两者知识都增但高者更快故鸿沟加宽。随后分条概述扩大原因：传播技能、既有知识、社交范围、选择性接触理解记忆、媒介性质等，落脚"高地位群体处处占优"。`},
  {ch:1, type:"short", q:`如何看待大众传媒的公共性与公益性`, a:`（1）大众传媒具有公共性与公益性的依据
大众传媒拥有自己的经营目标和宣传目标，但是，它们与单纯的营利企业不同，与宗教或政治团体的单纯机关媒介也不同。大众传媒的活动，在更大程度上受到公共性和公益性的制约。这种公共性和公益性的依据包括以下三个方面：
①大众传媒是现代社会必不可少的信息生产者和提供者，在满足社会的普遍信息需求方面起着一种公共服务的作用。
②大众传媒的信息生产和传播活动对社会的政治、经济和文化道德具有广泛而强大的影响力，这种影响力涉及到普遍的社会秩序和社会公共生活。
③大众传媒是某些“稀有”公共传播资源（例如广播电视使用的电波频率）的受托使用者，作为公共财产的使用人，它们必须对社会和公众承担相应的义务和责任。
（2）公共性与公益性对大众传播的制约
①这种公共性和公益性，是大众传媒的权利基础：大众传媒拥有最大限度的采访权、言论权、编辑权和刊载权，并拥有广泛的舆论监督的权利。
②另一方面，公益性和公共性也对大众传媒产生重要的制约，它要求传媒的活动必须符合社会公共利益。例如，传媒不得泄露国家机密，损害国家利益；不得煽动社会骚乱，扰乱正常的社会秩序；不得传播宗教或种族歧视内容，破坏社会团结；不得侵犯公民的隐私权和名誉权，损害个人的合法权利；不得传播淫秽色情或唆使、诱发社会犯罪的暴力内容，危害健康的社会道德和社会安定。
③媒介报道新闻和提供信息必须坚持真实和客观原则，不得以虚假内容损害受众利益等等。公共性和公益性对传媒活动的这些制约，有些体现为法律形式的限制，有些则作为受众监督和传媒自律的重要规范发挥作用。`, explain:`大众传媒不同于一般企业，它具有公共性和公益性。理由有三：第一，它是社会不可或缺的信息提供者，承担公共服务功能；第二，它的报道对社会各方面影响巨大；第三，它使用的是公共资源（如电波频率）。所以媒体既享有广泛的采访报道权利，也必须承担社会责任，不能造谣、侵权、传播有害内容。`, frame:`起手承认传媒有经营与宣传目标，但受公共性公益性更强约束。先列三条依据：公共服务的信息供给；广泛社会影响力；稀有公共资源受托使用须担责。再转制约：既是权利基础（采访报道监督等），也要求符合公共利益，举例违法不良内容禁止、真实客观等。收束：制约来自法律、受众监督与自律等多渠道。`},
  {ch:1, type:"short", q:`媒体广告组织的主要职能是什么？`, a:`（1）媒介广告组织的含义
媒介广告组织是指媒介自己设立专门从事媒介广告经营的广告组织。这里所说的媒介既包括报社、杂志社、广播电台、电视台等大众传播媒介，即传统意义上的“四大媒介”，也包括网络媒体等新媒体。
（2）媒介广告组织的主要职能
①及时、正确发布广告
这是媒介广告组织的基本职能，广告部门自然就是要通过有组织地、按计划地把与客户签订了合同的广告按照规定的时间、版面位置发布，而且必须保证不能出现任何差错。
②向广告主和广告代理公司提供有关服务信息
媒介有责任和义务向客户及时提供有关报刊的发行数量，每个版面的编辑方针，广播电台、电视台的收听、收视率，每个频率、节目时段的收听、收视率，每个新的专题栏目、影视故事片的内容情况方面的详细资料。
③监督修正广告的内容和形式
媒介除了要严格遵守法律、各种行政法规，杜绝违法广告的发布，而且还应该对虽然并不违法，但是对社会道德、社会价值标准可能起到负面影响的广告给予修正。
④进行临时性广告设计制作和修改补充的工作
对于一些应急的情况，考虑到时间等方面的因素，媒介的广告部门会需要进行一些临时性的设计和制作工作，且会承接一些零散的社会服务类的分类广告。
⑤开发业务渠道，拓展新型广告阵地，发挥媒介自身优势
媒介的广告组织最重要的职能是不断开发新的业务渠道，增加广告收入，其首要内容就是巩固现有的客户群体，发展新的客户。同时，媒介广告组织还应该努力地研究自己的媒介，借鉴国内外先进的方法和思路，进行广告发布形式和内容的创新，充分利用媒介的各类资源。
⑥协助媒介的编辑部门和其他经营部门，当好参谋
新闻媒介的编辑部门、经营部门和广告部门应该是一架完整机器的各个组成部分，分工不同，但是最终的目标是一致的。`, explain:`媒体广告组织就是媒体自己设的广告部门，主要职能有六项：按时准确地发布广告；向客户提供发行量、收视率等数据；审核广告内容是否合规；处理临时性的广告制作需求；开发新的广告客户和广告形式；配合编辑部门做好整体运营。`, frame:`先界定媒介广告组织是媒介自设的广告经营部门，涵盖传统四大媒介与网络等。再按职能顺序作答：规范刊播；向客户与代理提供发行量收视率等数据；审核修正内容与形式；应急设计制作与分类广告；开拓渠道与创新形态；协调编辑与其他经营部门。提示按序号列全即可拿分。`},
  {ch:1, type:"short", q:`简述改革开放以来我国广告业的发展状况。`, a:`改革开放以来我国广告业的发展可以划分为三个阶段。
（1）初步恢复阶段（1979～1982年）
当代广告业的恢复和发展始于1979年。这一年，中共中央宣传部发出《关于报刊、广播、电视台刊播外国商品广告的通知》。1979年农历正月初一，上海电视台首次播出人参桂酒的广告，标志着我国（大陆）电视广告的发轫。自此广播广告、报纸广告重新登堂入室。
本阶段的特点包括：①广告解禁，并逐步被社会接受：②广告管理逐渐规范化：③国有大型广告公司组建：④广告研究和广告教育起步。
（2）补偿性发展阶段（1983～1992年）
经过了复苏时期的发展，20世纪80年代中期到90年代中期的中国广告业进入了新的阶段，从此我国广告业驶入持续发展的快车道。
本阶段的特点包括：①低起点、高速度发展：②企业经历广告“蜜月期”：③外资广告公司登陆中国。
（3）转型发展阶段（1993年至今）
1993年7月，国家工商行政管理局和国家计划委员会共同制定了《关于加快广告业发展的规划纲要》，明确广告业是知识密集、技术密集、人才密集的高新技术产业，提出我国广告业的发展战略和重点目标，进一步推动了我国广告业的发展进程。
本阶段的特点包括：①广告市场增幅趋缓：②广告管理依法进行：③媒体格局变化：④广告主趋向成熟：⑤国际广告公司迅速发展。`, explain:`改革开放以来中国广告业分三个阶段：第一阶段（1979-1982）是恢复期，广告解禁，1979年上海电视台播出了大陆第一条电视广告；第二阶段（1983-1992）是高速发展期，低起点高速度，很多企业靠广告一炮而红，外资广告公司也开始进入；第三阶段（1993至今）是转型期，增速放缓但趋于成熟，广告法出台，媒体格局变化，行业走向规范化。`, frame:`起手总述分三阶段。第一阶段1979—1982：以电视首条广告等为标志，写解禁接受、管理规范、国有大公司、教研起步。第二阶段1983—1992：高速增长、企业广告热、外资公司进入。第三阶段1993至今：纲要定位高新技术产业，写增速、法治、媒体格局、广告主成熟、国际公司发展等特点。收束体现从恢复到转型。`},
  {ch:1, type:"essay", q:`简述世界近代资产阶级报业的演进、发展过程及其阶段性特征。`, a:`（1）近代资本主义报业产生的背景
①资本主义市场经济的兴起以及由此产生的社会变化，形成了对新闻事业的内在的社会需求。
a.从经济上看，人们为了在市场上进行竞争与生存发展，对信息的需求量剧增。一些重要的商业城市或港口，成为近代新闻的发源地。
b．从政治上看，资本主义生产关系和制度的诞生，特别是在16、17世纪之交，社会政局动荡，社会信息量剧增，社会各阶层对新闻信息的需求也剧增。特别是新兴的阶级和政治力量更加迫切地需要传播信息、宣传政治观点，左右舆论，以促进社会变革。因此，近代报纸是在欧洲封建社会向近代社会过渡的背景下产生的。
②社会和物质技术条件的发展
印刷术的日趋进步和造纸工业的发展为近代报业提供了技术和物质基础：交通和邮政事业的日趋发达扩大了报纸发行的空间，增强了报纸的时效性：人口日益集中，城市逐渐增多为报纸提供了大量且较为集中的市场。
（2）近代资本主义报业的产生
近代新闻事业的主体形式是报纸，近代报纸诞生的标志-每周定期刊物的出现。
①最早的定期报刊产生于德意志地区。
新航路开辟以后，欧洲的贸易集散地逐渐移到大西洋沿岸，英法德等国都出现了一些重要的商业城市，它们取代威尼斯等地中海城市而成为新的信息中心。德意志是金属活字印刷的发源地，又是南欧和北欧交通贸易的连接点，因此出现了最早的定期报刊。
1609年德意志地区出现两种周报：《通告-报道或新闻报》，在沃尔芬比特尔发行；《报道》，在斯特拉斯堡出版。
②最早的日报也诞生于德意志地区。
1650年莱比锡一位书商创办的《新到新闻》通常被认为是世界上第一张日报。
（3）近代报刊的发展历程
①资产阶级革命时期的政论报刊
资产阶级报刊的发展与资产阶级革命的发展紧密联系。1566年尼德兰人民揭开了资产阶级革命的序幕后，英、美、法先后进行了资产阶级革命。19世纪中叶以后，德、意、日等国也从封建社会演进到资本主义社会。各国国情不同，历程也有很大差异，但各国报业的发展却有共同的规律：
a.资产阶级革命以前，资产阶级报刊受封建统治者的压制，封建统治者通过出版许可制、内容审查制，英国甚至用设立“星法庭”等手段压制异己思想和信息的传播。
另一方面，封建统治者出版官报，扶植御用报刊，制造舆论，维护其封建统治。资产阶级报刊中，围绕着革命、改良、保守或维护封建统治等重大问题，从各自的阶级利益出发，进行争论，这就是史称的政论报纸时期。
b.在资产阶级革命过程中，资产阶级思想家首先举起出版自由的旗帜，宣传民主思想，论述出版自由的重要性。资产阶级革命后，建立了资产阶级的政权，资产阶级报刊的发展过程受两个因素的制约：
第一，各国的资产阶级革命是否彻底，建立起怎样的政治制度。
第二，该国的资产阶级共和制是否巩固，有无封建复辟。
②资产阶级革命后的政党报刊
资产阶级革命后，各国报业无论发展快慢，均经历了一个政党报刊为主的时期。这些党政报刊的共同特点是：政治上有明显的倾向性；内容上侧重于时政新闻和言论；读者对象主要是政界和上层人士。从政党报刊的特点看，它们是政论报刊的发展。
③18世纪工业革命后：廉价报刊为主
a.廉价报刊
指的是工业革命后各国先后出现的面向社会中下层的通俗小报，因售价低而得名。世界上第一家成功的廉价报纸是1833年本杰明·戴在美国纽约创办的《太阳报》。在这之后又陆续出现了其他的廉价报刊。这样，报纸便从“政党报刊”时代过渡到“大众化报刊时代”。
b.廉价报纸的特点是：
第一，政治上标榜独立，不受制于某个政党。
第二，经济上自主经营，不依赖政法或政党津贴。
第三，读者对象为平民大众，也称大众化报纸。
第四，内容上注重地方新闻、社会新闻以及各种趣味性的软新闻。
第五，形式上文字通俗，版面活泼，可读性强。
第六，经营上完全商业化，大量刊登广告，以此降低售价，扩大发行，进而赢得更多的广告。
廉价报纸的出现使商业报纸更加兴盛，逐步成为资产阶级报业的主体，并为其向现代报业演变奠定了基础。`, explain:`近代资产阶级报业经历了三个阶段：第一阶段是革命时期的政论报刊，资产阶级用报纸宣传民主思想、反对封建专制；第二阶段是革命后的政党报刊，各党派办报宣传自己主张，读者主要是政界和上层人士；第三阶段是工业革命后的廉价报纸，面向普通大众，靠广告收入降低售价，标志着'大众报纸'时代的到来。这三个阶段反映了报纸从政治工具到大众消费品的转变。`, frame:`起手交代近代报业产生的经济政治动因与社会技术条件（信息需求、印刷交通城市等）。再写定期报刊出现与德意志地区早期周报、日报地位。随后按阶段递进：革命前政论报刊与压制；革命中出版自由旗帜；革命后政党报刊特点；工业革命后廉价报《太阳报》等及六条特点，说明向大众化商业化转型。收束指出廉价报奠定现代报业基础，体现"演进+阶段特征"题干要求。`},
  {ch:1, type:"essay", q:`简析新媒介的发展趋势及其特点。`, a:`（1）新媒体的含义
“新媒体”是相对传统媒体（包括报纸、杂志、广播、电视等媒体）而言的。是指利用数字技术、网络技术，通过互联网、宽带局域网、无线通信网和卫星等渠道，以电视、电脑和手机为终端，向用户（即受众）提供视频、音频、语音数据服务、远程教育等交互式信息和娱乐服务，以此获取经济利益的一种传播形式。
（2）新媒体的特点
以数字技术为代表的新媒体，其最大特点是打破了媒介间的壁垒，消融了媒体介质之间，地域、行政之间，甚至传播者与接受者之间的边界。具体包括以下几个方面：
①媒体个性化突出。
由于技术的原因，以往所有的媒体几乎都是大众化的。而新媒体却可以做到面向更加细分的受众，可以面向个人。个人可以通过新媒体定制自己需要的新闻。每个新媒体受众手中最终接收到的信息内容组合可以是一样的，也可以是完全不同的。这与传统媒体受众只能被动地阅读或者观看毫无差别的内容有很大不同。
②受众选择性增多。
从技术层面上讲，新媒体时代，人人都可以接收信息，人人也都可以充当信息发布者，打破了只有新闻机构才能发布新闻的局限，充分满足了信息消费者的细分需求；与传统媒体的“主导受众型”不同，新媒体是“受众主导型”。受众有更大的选择，可以自由阅读，可以发布信息。
③表现形式多样。
新媒体形式多样，各种形式的表现过程比较丰富，可融文字、音频、画面为一体，做到即时地、无限地扩展内容，从而使内容变成“活物”。除了大容量之外，新媒体还有“易检索性”的特点：可以随时存储内容，查找以前内容和相关内容非常方便。
④信息发布实时。
与广播、电视相比，只有新媒体才真正具备无时间限制，随时可以加工发布。新媒体与用强大的软件和网页呈现内容，可以轻松地实现24小时在线。
⑤交互性极强。
新媒体独特的网络介质使得信息传播者与接受者的关系走向平等，受众不再轻易受媒体摆布，而是可以通过新媒体的互动，发出更多的声音，影响信息传播者。
（3）新媒体的发展趋势
在现代科技影响下，当代媒体产业结构面临深刻的调整，主要发展趋势包括以下几个方面：
①新兴媒体行业将引领时代潮流，新媒体产业在媒体产业中的比重迅速上升。
在发达国家如美国、日本、韩国，新兴媒体产业所占比重尤其高于传统媒体产业。美国十分注重把高新技术应用到文化娱乐业。世界将进入数字娱乐信息时代，数字娱乐在美国国内生产总值中将占一半的份额，新技术、新产品将使数字娱乐全面超越传统娱乐方式。日本媒体产业依托数字化信息技术，也已完成了从早期媒体产业向现代媒体产业的转型。
②部分传统的媒体行业将逐步走向衰微，适应市场需求的媒体行业将继续保持活力。
新媒体产业对报刊、图书出版等传统媒体产业构成了巨大的挑战。新兴媒体产业的崛起，对传统媒体产业，特别是传统媒体构成冲击是毫无疑问的。但影响的范围和程度仍有待进一步观察和研究。一些适应市场需求的传统文化行业仍将继续保持活力。
③文化内容将成为媒体产业核心竞争力。
现代科技使文化表现形式日新月异，“传媒汇流”为文化传播手段提供了极为广阔的空间。过去稀缺的媒体资源、传输资源出现了过剩的现象，文化内容短缺问题日益突出。没有内容，新媒体产业就成为毫无意义的空壳，如同一台无效运转的机器。在21世纪，“创意性文化内容的时代”已经到来，在未来的竞争中，文化内容是最重要的竞争力。`, explain:`新媒体就是基于数字技术和网络技术的新型传播形式。它最大的特点是打破了各种边界——媒体之间的、地域之间的、传播者和接收者之间的。具体表现为：个性化定制内容、受众可以主动选择和发布信息、融合文字音视频多种形式、可以24小时实时更新、互动性极强。发展趋势是新媒体占比快速上升、部分传统媒体衰落、内容成为核心竞争力。`, frame:`先界定新媒体相对传统媒体，点数字网络与多终端交互服务。再分特点展开：个性化细分、受众主导选择多、表现形式融合与易检索、实时发布、强互动平等。最后写趋势：新媒体产业比重上升、部分传统媒体式微但优质内容仍活、内容成为核心竞争力与创意时代，可点到传媒汇流。`},
  {ch:2, type:"noun", q:`北岩报团`, a:`北岩报团是英国的第一个报团，由哈姆斯沃思创办，因为他于1905年受封北岩勋爵，这个报团通常被称为“北岩报团”。哈姆斯沃思创办《回答》杂志后，又创办了《每日邮报》《每日镜报》，购买了《观察家报》（1905），控制了《泰晤士报》（1908），以及多种地方报刊，开创了富有英国特色的大众化报刊的事业。被称为舰队街的拿破仑，组成了庞大的报业帝国，并开始了英国报业的垄断化进程。后他的弟弟H．哈姆斯沃思（1914年受封罗瑟米尔勋爵），继承了该报团的大部分报刊，但《泰晤士报》转让给了阿斯特家族，随后《每日镜报》于1931年分离出去。以后该报团称“罗瑟米尔报团”或联合报业公司。`, explain:`北岩报团是英国第一个报团，由哈姆斯沃思创办。他先办杂志，再办《每日邮报》《每日镜报》，又买下《观察家报》、控制《泰晤士报》，建立了庞大的报业帝国，被称为'舰队街的拿破仑'，开启了英国报业的垄断化进程。后来报团传给他弟弟，改名罗瑟米尔报团。`, frame:`起手点明英国第一个报团、北岩勋爵与名称由来。再按办报购报线索：《回答》《每日邮报》《每日镜报》《观察家》《泰晤士报》及地方报，点"舰队街拿破仑"与垄断化开端。最后交代弟弟继承、部分转让分离及后世称罗瑟米尔报团/联合报业公司。`},
  {ch:2, type:"noun", q:`三社四边协定`, a:`“三社四边协定”是早期通讯社为垄断市场而对各自势力范围进行的规定和划分。欧洲三大通讯社哈瓦斯社、路透社和沃尔夫社，分别属于当时资本主义世界三个举足轻重的国家。它们在走向国际性通讯社的过程中，既有激烈的竞争和冲突，又有暂时的妥协和合作，后来它们的业务日益越过国界，而且同殖民扩张的进程相联系，经过十来年的激烈争夺，把世界新闻市场基本分割完毕。为了确认既成事实和各自的垄断范围，1870年1月17日他们签订了“联环同盟”协定。该协定以三大通讯社为主，美国的纽约联合新闻社虽然也参加、但不能插足美国以外的地区，所以通常被称为“三社四边协定”。`, explain:`'三社四边协定'是19世纪三大通讯社瓜分世界新闻市场的协议。法国的哈瓦斯社、英国的路透社、德国的沃尔夫社三家经过长期争夺后，在1870年签了'联环同盟'协定，把全世界的新闻采集范围划分完毕。美国的纽约联合新闻社虽然也参加了，但被限制在美国境内。所以叫'三社四边'。`, frame:`起手解释：早期通讯社划分势力范围的垄断协定。再写三大社及与殖民扩张、国际竞争的关系。接着交代1870年"联环同盟"及美国社参与但受限，说明"四边"由来。收束点明其本质是瓜分世界新闻市场的分赃式合作。`},
  {ch:2, type:"noun", q:`《六合丛谈》`, a:`《六合丛谈》是上海第一家中文报刊，月刊。英国伦敦传教士亚历山大·伟列亚力1857年创刊于上海，不同于此前的其他刊物，本刊物并非纯粹性宣传基督教义的宗教性刊物，而是综合性期刊。在内容上，《六合丛谈》刊有宗教、科学、文学、新闻等，是一份综合性的新闻性期刊。亚历山大本意是想将其办成新闻性刊物，但是又想使所有的人都成为自己刊物的读者，遂将宗教宣传、自然科学、商业行情、中外新闻融于一起，办成一个大杂烩。《六合丛谈》发行区域大，但是实际发行量很小，一年后停刊。`, explain:`《六合丛谈》是上海第一份中文报刊，1857年由英国传教士创办。跟之前的宗教刊物不同，它是综合性期刊，包含宗教、科学、文学、新闻等内容，想做成'大杂烩'吸引所有人。但正因为定位太杂，实际发行量很小，出了一年就停刊了。`, frame:`起手：上海第一家中文报刊、月刊、1857年传教士创办。再写性质为综合性新闻期刊而非纯宗教，内容杂糅宗教科学文学新闻及商业行情。最后评价：发行面大销量小、一年停刊，体现理想与效果落差。`},
  {ch:2, type:"noun", q:`极权主义理论`, a:`极权主义理论又称威权主义，是一种在对社会事物进行评价和判断时，从与外部权力或权威的关系上考虑问题的认知态度和思维方式。这一理论是在15世纪中叶近代印刷技术发明后不久，欧洲封建专制主义的气候下产生的，现代仍有残余。其最大特点是主张媒介必须一切以权力或权威的意志为转移，一切必须为统治者服务。主要内容包括：①报刊必须对当权者负责，维护国王和专制国家的利益；②报刊必须绝对服从于权力，不得批判占统治地位的道德和政治价值；③政府有权对出版物进行事先检查，这种检查是合法的；④对当权者或当局制度的批判属于犯罪行为，应给予严厉的法律制裁。极权主义传播制度及其理论随资产阶级革命的胜利而崩溃。`, explain:`极权主义理论就是'媒体必须听政府的'。核心主张：报刊必须维护统治者利益、绝对服从权力、政府有权事先审查出版物、批评当局就是犯罪。这套理论产生于15世纪欧洲封建专制时期，随着资产阶级革命胜利而崩溃，但在现代仍有残余。`, frame:`起手写别称威权主义及产生背景（印刷术后专制气候）。再写核心：媒介从属于权力意志。随后按答案四条展开：对当权者负责；服从权力不批判主流价值；合法事先检查；批判制度属犯罪重惩。最后一句：随资产阶级革命崩溃但现代有残余。`},
  {ch:2, type:"noun", q:`非语言符号`, a:`非语言符号，是指不以人工创制的自然语言为语言符号，而是以其他视觉、听觉等符号为信息载体的符号系统。非语言符号大致包括：①语言符号的伴生符，如声音的高低、大小，速度的快慢，文字的字体、大小、粗细、工整或潦草等，都是声音语言或文字的伴生物，也称为副语言。②体态符号，如动作、手势、表情、视线、姿势等。由于它们也能像语言那样传递信息，有人也称之为“体态语言”。一般而言，体态符号既可以独立使用，也可以与语言并用，它们在形成语境（传播情境）方面起着重要的作用。③物化、活动化、程式化、仪式化的符号。`, explain:`非语言符号就是除了文字和口头语言之外的所有传播信号。包括三类：副语言（说话的声调、语速、文字的字体大小）、体态语言（手势、表情、眼神、姿势）、仪式化符号（礼仪、程序等）。它们可以独立传递信息，也可以配合语言使用，对营造传播情境非常重要。`, frame:`先界定：非人工语言符号，而以视听等为载体。再分三类叙述：伴生符/副语言；体态符号及语境作用；物化活动化仪式化符号。提示答题时先总后分，避免与语言符号混淆。`},
  {ch:2, type:"noun", q:`群体暗示`, a:`群体暗示是指处于激动的人群中的个人具有很强的“被暗示性”，周围人的话语、表情、动作乃至现场的氛围，对他都成为有力的暗示刺激，使他的信念、思维和行为方式迅速与现场的人群融为一体。
群体暗示通常伴随着集合行为出现。集合行为通常是大量人群聚集于狭小的物理空间，人们保持着高密度的接触，参加者通常处于亢奋、激动的精神状态，这样一些情境状态容易使他对周围的信息失去理智的分析批判能力，表现为一味地盲信和盲从。`, explain:`群体暗示就是：当一个人处在激动的人群中时，周围人的情绪、语言、动作都会对他产生强烈的暗示作用，让他不自觉地跟着群体行动。人群越密集、情绪越亢奋，个人就越容易失去理性判断，表现为盲目跟风。这就是为什么群体事件中人容易做出平时不会做的事。`, frame:`起手界定：亢奋人群中个人易被现场言行氛围暗示而失去独立判断。再写多与集合行为相伴：高密度接触、激动状态导致盲信盲从。收束点出其与理性批判能力减弱的关系，呼应集合行为信息环境。`},
  {ch:2, type:"noun", q:`整合营销传播`, a:`整合营销传播是指统筹运用各种传播方式并加以最佳组合，以特定的目标群体为传播对象，传送基本一致的营销信息，促进联系和沟通的系统传播活动。它的特点是：①以消费者为核心；②以消费者数据库为基础；③以建立消费者和品牌之间的关系为目的；④以“一种声音”为内在支持点；⑤以各种传播媒介的整合运用为手段。`, explain:`整合营销传播就是把所有传播手段（广告、公关、促销等）统一协调起来，对特定目标群体发出'一个声音'的一致信息。核心特点：以消费者为中心、基于消费者数据库、目标是建立品牌关系、各渠道统一口径。简单说就是'所有渠道说同一件事'。`, frame:`先下定义：整合多种传播方式向特定群体传递一致营销信息的系统活动。再按五个特点顺序展开：以消费者为中心；数据库基础；建品牌关系；"一种声音"；跨媒介整合手段，可各用半句解释。`},
  {ch:2, type:"noun", q:`广告媒体计划`, a:`广告媒体计划是指一系列的决策，包括把广告信息传播给未来的购买者或者产品、品牌的使用者。媒体计划也是一个过程，它意味着要做出许多决策，并随着策划的进展，每一决策都可能被修改甚至被抛弃。广告媒体计划是选择媒体的指导，它要求制定具体的媒体目标，以及设计具体的媒体战略来达到这些目标。一旦这一系列决策做出，并且目标和战略也制定出来以后，这些信息就有组织地形成了广告媒体计划。`, explain:`广告媒体计划就是规划'广告在哪里出现、什么时候出现、出现多少次'的方案。它包括一系列决策：选什么媒体、投多少量、什么时间段投放，并且要随时根据效果调整。媒体计划是广告成功的关键——创意再好，放错了地方也白搭。`, frame:`先界定：面向未来购买者或使用者的一系列媒体选择与决策过程，且随策划推进可修正。再写内涵：制定媒体目标与战略并形成书面计划。收束强调其指导性——把抽象目标落实为可执行的媒体组合方案。`},
  {ch:2, type:"noun", q:`隐性公共关系`, a:`隐性公共关系是指在短时期内看不出显著效果，但可对组织的发展产生长远影响的，具有一定延续效应的公共关系结果。公共关系主要从事组织机构信息传播，关系协调与形象管理事务的咨询、策划、实施和服务的管理职能。包括选创组织的成功，降低组织失败的影响，宜布变更等。`, explain:`隐性公共关系是指那些短期看不出效果、但长期会产生深远影响的公关活动。跟立竿见影的活动不同，它更像是'润物细无声'的工作，慢慢塑造组织形象、积累信誉，效果是延续性的。`, frame:`先界定：短期不显效但对组织有长远延续影响的公关结果。再可简要关联公关职能：信息传播、关系协调、形象管理及咨询策划实施服务。收束点题：重长期声誉与关系资产，区别于立竿见影的显性活动。`},
  {ch:2, type:"noun", q:`公共关系公司`, a:`公共关系公司又称公共关系咨询公司或公共关系顾问公司，是指由一定数量的各具专长的公共关系专家组成的、专门向各种社会组织提供收费公共关系咨询的社会服务性机构。其主要服务方式是为客户进行公共关系咨询，有时也受客户委托，直接为客户组织、实施公共关系活动，主要服务对象是那些未建立专门公关机构或没有专职公关人员的社会组织。有时也为已经建立专门公关机构的大中型企业提供高层次的或者专门化的公共关系咨询或服务。`, explain:`公共关系公司就是专门帮别的组织做公关的'外包公司'。它由各类公关专家组成，主要服务方式是咨询和代理执行。客户通常是那些没有自己公关部门的中小组织，有时也为大企业提供高端或专业化的公关服务。`, frame:`先界定：由公关专家组成、向社会组织收费提供专业咨询服务的机构，别名顾问公司。再写服务方式：咨询为主、受委托代为实施活动。最后写服务对象：无专职公关的组织及需高层次专项服务的大机构。`},
  {ch:2, type:"short", q:`媒介控制有哪几种方式？`, a:`媒介控制的方式，具体包括如下：
（1）国家和政府的政治控制
国家和政府的政治控制是媒介控制的主要方面。这种控制的目的，是通过规定大众传播体制，制定有关法律、法规和政策，来保障媒介活动为国家制度、意识形态以及各种国家目标的实现服务。
（2）利益群体和经济势力的控制
媒介控制中存在着种种社会利益群体和经济势力的控制。由于这些控制也是在一定社会制度和传播制度的范围内进行的，因此也带有明显的制度性因素。社会群体能够通过自己的媒介来维护自身的利益，传播自己的主张。资本主义制度下，除了垄断资本和少数大利益集团外，一般社会群体的传播权利是不能得到保障的，传播媒介的控制权主要掌握在垄断资本手中。
（3）广大受众的社会监督控制
许多传播内容会直接影响到受众的利益。因此，广大受众对传播媒介的活动拥有进行社会监督的正当权利。受众进行社会监督控制的手段包括：①个人信息的反馈。②结成受众团体，以群体运作方式对媒介活动施加影响。③诉诸于法律手段。④通过影响媒介的销售市场来制约媒介活动。
（4）传媒的内部控制
传媒的内部控制是指大众媒介的编辑方针，是大众传媒的自律。`, explain:`媒介控制有四种方式：第一，政府通过法律法规进行政治控制（最主要的）；第二，利益集团和资本势力通过经济手段控制媒体（谁出钱谁说了算）；第三，受众通过反馈、维权、用脚投票进行社会监督；第四，媒体自身的编辑方针和职业自律。这四种力量共同制约着媒体的行为。`, frame:`起手总括"媒介控制"有四类。按答案展开：国家政府政治控制（体制法规政策服务国家目标）；利益群体与经济势力（制度内利益表达，点垄断资本）；受众社会监督（反馈、团体、法律、市场）；传媒内部控制（编辑方针与自律）。提示先分类后各用一两句，结构清晰。`},
  {ch:2, type:"short", q:`大众传播效果研究经历了哪几个发展阶段？`, a:`从20世纪初到现在，传播效果研究已有近百年的历史，它本身也经历了一个发展变化的过程。就对大众传播效果的性质和影响力强弱的认识而言，这一过程大致可分为三个阶段：20世纪初至30年代末为第一时期；40年代至60年代为第二时期；70年代以后至现在为第三个时期。这三个时期，无论是效果观、媒介观还是受众观都有明确的变化。这些变化，与时代的演进、媒介环境的变迁以及效果研究的理论视角和方法的改变有着密切的关系。
（1）第一阶段：早期的“子弹论”或“皮下注射论”
20世纪初至30年代末是传播效果研究的初级阶段，也是大众报刊、电影、广播等媒介迅速普及和发展，人们对它们的社会作用和影响力既寄予高度期待又感到深深担忧的时期。
①这一时期大众传播理论的核心观点：
传播媒介拥有不可抵抗的强大力量，它们所传递的信息在受传者身上就像子弹击中躯体，药剂注入皮肤一样，可以引起直接速效的反应；它们能够左右人们的态度和意见，甚至直接支配他们的行动。
②在这个时期，人们普遍认为大众传播拥有极大的影响力。产生这种观念的原因有以下几个方面：
a.大众传媒发展的迅猛势头所产生的社会冲击是巨大的。在这个时期，大众报刊飞速普及，电影和广播等新的电子媒介也不断登场，大众传媒不仅成了人们获得外界信息的主要渠道，而且深深地渗透到个人、家庭和社会生活的各个方面。
b.在这个时期，无论是国家、政党、团体还是社会活动家、企业广告宣传人员，对传播媒介的利用都达到空前的程度，一般个人无时无刻不处于各种形式的宣传或说服活动的包围之中，也使得人们处处感受到传播的“力量”。
c.第一次世界大战的宣传战史研究以及宣传技巧研究。
d.“子弹论”观点的出现与当时西方流行的本能心理学和社会学理论也有密切的关系。
③对早期“子弹论”的评价
“魔弹论”是错误的，这主要表现在它是一种唯意志论观点，它过分夸大了大众传播的力量和影响，忽视了影响传播效果的各种客观社会因素，并且否定了受众对大众传媒的能动的选择和使用能力。
它对传播过程做了过于简单的描述：一方是全能的媒介在发送信息；另一方是分散的大众在等待着接受它，其间别无他物。随着传播效果研究的深入，这种观点自然会被人们抛弃。
（2）第二阶段：“传播流”研究与“有限效果论”
从20世纪40年代开始，传播效果研究开始进入第二个时期，“魔弹论”的效果观逐渐受到否定。这个时期的重要特点是，社会调查法和心理实验法普遍应用于传播学研究，学者们开始对传播效果产生的过程与机制进行实证考察。
①这个时期的主要研究领域有三个：一是“传播流”研究；二是说服性传播的效果研究；三是“使用与满足”研究。
传播流，指的是由大众传媒发出的信息，经过各种中间环节，“流”向传播对象的社会过程。构成这项研究的代表性成果有拉扎斯菲尔德等人的《人民的选择》、卡兹等人的《个人影响》、罗杰斯的《创新与普及》以及克拉帕的《大众传播效果》。
②《人民的选择》
《人民的选择》是拉扎斯菲尔德等人在1940年美国总统大选期间，围绕大众传播的竞选宣传，对选民投票意向的影响所做的一项实证调查的研究报告。通过这次分析，他们提出了对后来的传播效果乃至整个传播学研究产生了重大影响的一系列理论假说。其中包括：
a.“政治既有倾向”假说。
政治既有倾向，指的是人们在接触传媒宣传之前已有的政治态度。拉扎斯菲尔德等人认为，人们在就政治问题进行决策之际，这种决策的性质并不取决于一时的政治宣传和大众传播，而是基本上取决于人们既有的政治立场和态度，他们把这个观点称为“政治既有倾向”假说。
b.“选择性接触”假说。
受众并不是不加区别地对待任何传播内容，而是更倾向于“选择”那些与自己的既有立场、态度一致
或接近的内容加以接触。很明显，这种“选择性”接触活动的结果，更可能在加强原有态度的方向上起作
用，而不是导致它的改变。
c.“意见领袖”和“两级传播”。
大众传播并不是直接“流”向一般受众，而是要经过意见领袖这个中间环节，即“大众传播-意见领袖-一般受众”。这就是两级传播概念的产生。
d.对大众传播效果类型的概括。
既有倾向的作用、选择性接触机制以及意见领袖的发现，揭示了传播效果产生过程中存在着众多的制约因素。他们把大众传播可能产生的效果分为“无变化”“小变化”“强化”“结晶”和“改变”五种。
③《个人影响》和《创新与普及》
a.《个人影响》提出了“中介因素”的概念。
卡兹和拉扎斯菲尔德认为，制约和影响大众传播效果的“中介因素”主要有四种：选择性接触机制；媒介本身的特性；讯息内容以及受众本身的性质。
b.罗杰斯在《创新与普及》中把大众传播过程区分为两个方面：一是作为信息传递过程的“信息流”；二是作为效果或影响的产生和波及过程的“影响流”。前者可以是“一级”的，即信息可以由传媒直接“流”向一般受众；而后者则是多级的，要经过人际传播中许多环节的过滤。这样，罗杰斯就把“两级传播”模式发展成为“多级”或“N级传播”模式。
《人民的选择》《个人影响》和《创新与普及》，可以说是“传播流”研究的三部曲。这些研究揭示了大众传播效果的产生是一个极为复杂的社会过程，其间存在着众多的中介环节和制约因素，单一的大众传播并不能左右人们的态度。这些结论，从正面否定了强调简单的“刺激一反应”关系的“子弹论”观点。但另一方面，正因为“传播流”研究的焦点集中于揭示效果产生的制约因素，其结论强调了大众传播效果和影响的无力性，人们把它称为“无力的大众传播观”。
④《大众传播效果》与“有限效果论”
1960年，克拉帕在《大众传播效果》一书中对《人民的选择》和《个人影响》以来的“传播流”研究进行了系统总结，并提出了关于大众传播效果的“五项一般定理”。克拉帕的观点极力强调了大众传播影响的无力性和效果的有限性，因而被称为“有限效果论”。
⑤“说服性传播”的效果研究
“说服性传播”的效果，指的是受传者的态度沿传播者说服意图的方向发生的变化。在这个意义上，它是一种“纯效果”。第二次世界大战期间，霍夫兰等人在军队里进行了一系列心理实验，这是关于“说服与态度改变”的最早的实证研究。
a.这些研究揭示了效果的形成并不简单地取决于传播者的主观愿望，而是受到传播主体、信息内容、说服方法、受众属性等各种“条件”的制约。这些研究结论，同样是否定“魔弹论”效果观的有力证据。
b.霍夫兰等人的“说服性传播”效果研究主要采用实验心理学方法，包括前后比较法和控制对照法等，在许多研究中，这些方法是综合并用的。此后，霍夫兰的心理实验法与拉扎斯菲尔德的抽样调查法一起，成为传播效果研究的主要方法。
（3）20世纪70年代以后的宏观效果理论
①进入20世纪70年代后，在对“有限效果论”进行批评和反思的基础上，传播效果研究领域又出现了一批新的理论模式或假说，其中包括“议程设置功能”理论、“沉默的螺旋”理论、“知沟”研究、“培养分析”研究等。
这些理论或假说的主题、内容各不相同，但有几个共同的特点：第一，它们研究的焦点大都集中于探索大众传播综合的、较长期的和宏观的社会效果；第二，它们都不同程度地强调传媒影响的有力性；第三，它们都与社会信息化的现实密切结合在一起。
②20世纪90年代以后直到21世纪的今天，效果研究的一个突出热点是，探讨媒介技术对社会发展的推动作用以及对社会生活产生的影响。`, explain:`传播效果研究分三个阶段：第一阶段（20世纪初-30年代）是'子弹论'时期，认为媒体威力无穷，说什么受众就信什么；第二阶段（40-60年代）是'有限效果论'时期，发现传播要经过意见领袖等中间环节，效果其实有限；第三阶段（70年代至今）是宏观效果理论时期，又重新认识到媒体在议程设置、沉默螺旋等方面的强大影响力。核心变化就是从'无所不能'到'有限'再到'有条件地强大'。`, frame:`起手划分三时期：20世纪初—30年代末；40—60年代；70年代以后至今，并点效果观媒介观受众观随时代而变。第一时期写魔弹论核心、形成原因、为何被否定。第二时期写传播流研究、《人民的选择》等假说、有限效果论与说服实验。第三时期写议程设置、沉默的螺旋、知沟、培养分析等宏观有力效果及新技术议题。收束体现"强弱效果"的学术摆动。`},
  {ch:2, type:"short", q:`公共关系中的公众有哪些特点？`, a:`（1）公共关系的公众的含义
公共关系公众，是指与特定的公共关系主体相互联系、相互作用的个人、群体或组织的总和，是公共关系传播沟通对象的总称。“公众”在公共关系工作中是一个特殊的范畴，具有特定的含义。一个社会组织的公共关系工作并非针对全社会的公众，而是针对在社会公众中与组织直接或间接相关的某些特定组织、群体和个人。
（2）公共关系中的公众的特点
①整体性
a.公众不是单一的群体，而是与某一组织运行有关的整体环境。任何组织的生存和发展都离不开一定的公众环境。公众环境与自然环境、地理环境不同，是指组织运行过程中必须面对的社会关系和社会舆论的总和。这些社会关系和社会舆论范围很广，涉及组织内部和外部，社会方方面面，而且相互关联，成复杂。
b.公共关系工作不可只注意其中某一类公众，而忽略其他公众。对其中任何一种公众的疏忽，都可能致使整个公众环境的恶化。公众环境恶化必然影响组织的生存和发展。因此，首先应该将组织面对的公众视作一个完整的环境，要用全面、系统的观点来分析自己面临的公众。
②共同性
a.公众不是一盘散沙，而是具有某种内在共同性的群体。当某一群人、某一社会阶层、某些社会团体因为某种共同性而发生内在联系时，便成为一类公众。这种共同性即相互之间的某种共同点，比如共同的利益、共同的需求、共同的目的等，这样一些共同点，使一群人或一些团体和组织具有相同或类似的态度和行为，构成组织所面临的一类公众。
b.了解和分析自己的公众，必须了解和分析其内在的共同性，内在的联系，这样才可能化混沌为清晰，从公众整体中区分出不同的对象来
③多样性
公众的存在形式不是单一的，而是复杂多样的。“公众”仅是个统称，具体的公众形式可以是个人，可以是群体，也可以是团体或组织，日常的公共关系工作对象，包括各种各样的个人关系、群体关系、团体关系、组织关系，等等。即便是同一类的公众，也可以有不同的存在形式。公众形式的多样性，决定了沟通方式和传播媒介的多样性。
④变化性
a.公众不是封闭僵化、一成不变的对象，而是一个开放的系统，处于不断变化发展的过程之中。任何组织面临的公众，其性质、形式、数量、范围等均会随着主体条件、客观环境的变化而变化。
b.公众环境的变化，必将导致公共关系工作目标、方针、策略、手段的变化。反过来，组织自身的变化也会导致公众环境的变化，如组织的政策、行为、产品的变化使公众的意见、评价、态度或行为发生相应的变化，这种变化的结果又可能倒过来对组织产生影响、制约作用。
⑤相关性
公众不是抽象的、各组织“通用”的，而是具体的，与特定的组织相关的。公众总是相对一定的公共关系行为主体（组织或个人）而存在的。一群人之所以成为某一组织的公众，是因为他们与该组织具有一定的相关性、互动性。这种相关性是组织与公众形成公共关系的关键，寻找公众、确定公众很重要的就是寻找和确定这种相关性，并把它们具体的担心揭示出来，分析清楚，从而确定自己的工作目标。`, explain:`公关中的公众有五个特点：整体性（是一个完整的环境，不能只顾一类忽略其他）、共同性（因共同利益或需求而联系在一起）、多样性（个人、群体、组织都可以是公众）、变化性（随条件变化而变化，不是一成不变的）、相关性（必须跟特定组织有利益关联才算公众）。`, frame:`先简要界定公关公众是与组织相互作用的传播沟通对象总和，非泛指全社会。再分特点展开：整体性（公众环境系统，不可偏废）；共同性（内在共同点分类）；多样性（个人群体组织形态多）；变化性（主客体互动中数量性质变）；相关性（特定组织相关联才有公众意义）。可按序号列关键词并各补一句。`},
  {ch:2, type:"short", q:`公共关系有哪些主要功能？`, a:`（1）公共关系的含义
公共关系是一种多侧面多层次的经营管理活动，每一侧面每一层次的公共关系活动都有其相对独立的作用，但同时又彼此联系、相互渗透，共同发挥着公共关系的整体性作用，这种整体性作用就是公共关系活动的基本功能。公共关系的功能主要是指在履行其职责的基础上对公共关系主体、公共关系客体以及整个社会发挥的作用和功效，它主要表现公共关系工作者能够做什么。公共关系的功能主要表现在树立形象、协调关系、全员教育、优化环境四个方面。前两个功能是公共关系对组织的直接功能，后两个则是间接功能。
（2）公共关系对组织的直接功能-树立组织形象、协调好关系网络
①树立组织形象。
组织形象是社会组织的总体表现与特征以及他们在社会公众中的反映与评价，社会公众对组织的总体评价构成组织的总体形象。其内容主要包括产品形象、员工形象、服务质量、环境形象、组织风貌等各种形象要素。
然而组织形象的塑造是一项复杂的系统工程，需要遵循科学的原则。根据公共关系学的理解，主要遵循有效性原则、总体性原则、符号化原则。
②协调网络关系。
公共关系作为组织与公众沟通的桥梁。发挥着协调沟通的重要功能。现代社会中，组织面临着复杂多变的各种关系，面对众多的公共群体，组织必须谨慎地处理各种社会关系和利益关系。
协调关系网络一般包括以下两个方面：
a.组织内部的协调沟通。
对组织内部的协调主要可以从三个方面着手：
第一，建立沟通渠道，促进组织内部的信息交流。
第二，培养组织各个职能部门之间的协作意识。
第三，建设组织文化，培养员工共同的价值观和道德取向，增强员工对组织的向心力和凝聚力。
b.组织与外部的协调沟通。
对组织外部关系的协调工作也可以从三个方面着手：
第一，及时做好沟通联络工作，积极寻求组织和公众的共同点，谋求组织与外部的良好合作关系。
第二，与社会公众建立广泛的联系，增进组织和公众之间的相互了解，使组织与公众建立起真诚有效的密切合作关系。
第三，运用公共关系的各种沟通协调手段广交朋友，广结人缘，消除敌意，创造一个“人和”的环境。
（3）公共关系对于个人和社会的间接功能-提高个人素质、优化社会环境
①提高个人素质。
a.公共关系促使个人观念更新。
第一，公共关系是塑造组织形象的艺术，组织的形象与个人的形象是分不开的。它灌输给每一个人有关形象的意识，在注重组织形象的同时也必须注重个人的形象。
第二，公关强调“公众至上”，以尊重公众的意愿、满足公众的需求为己任，培养人们强烈的尊重他人意识。
第三，公关谋求组织与公众之间的合作，表现出强烈的合作意识。
b.公共关系有助于个人能力的提高。
第一，为了树立组织的形象，公关部常以独特新颖、出奇制胜的专题活动吸引公众，这种创造性的活动需要富有创造能力的人来胜任，在工作中培养了人的创造能力。
第二，公关活动常要和各种人、各种矛盾打交道，要处理各种突发事件，要适应不断变化的公众和环境，因而促使个人交际能力、自我调节能力、应变能力的提高。
②优化社会环境。
公共关系活动作为联系组织与公众之间的桥梁，可以促使社会环境优化，公共关系的作用主要体现在对社会互动环境和社会心理环境的优化上。
a.优化社会互动环境。
社会互动是指社会的横向发展，指社会上人与人，群体与群体之间的交往和相互作用，主要通过沟通社会信息，协调社会行为和净化社会风气实现。
b.优化社会心理环境。
从社会学、心理学角度分析，任何个人都有合群的需要、感情的需要、交往的需要，如果这些需要得不到满足或满足不够，就会导致个人心理失调。公共关系恰好能提供给社会一些良好的关系氛围，用真诚、广泛的社会交往使人们摆脱孤独和隔阂，使社会心理环境得到优化。`, explain:`公共关系有四大功能：直接功能两个——树立组织形象和协调关系网络（内部要沟通协作，外部要广交朋友）；间接功能两个——提高个人素质（培养形象意识、创造力和交际能力）和优化社会环境（促进社会交往、改善心理氛围）。`, frame:`起手一句总功能：树立形象、协调关系、全员教育、优化环境，并点直接间接之分。先写直接功能：塑形象（要素与有效性、总体性、符号化原则）与协调内外关系（内部沟通协作文化；外部联络广结善缘）。再写间接功能：促使个人观念与能力更新；优化社会互动与心理环境。收束回扣"多侧面整体作用"。`},
  {ch:2, type:"essay", q:`试析《新青年》在新文化运动中的作用。`, a:`1915年9月15日，由陈独秀主编的《青年杂志》第1卷第1号在上海正式出版发行。不久，为避免与基督教上海青年会主办的《上海青年》杂志混名，遂从第2卷第1号起易名。一份刊物的创世，引发一场伟大的历史事件，并对历史的发展、社会的进步产生巨大的推动作用，这在历史上是不多见的。《新青年》与新文化运动及五四爱国运动紧密联系在一起，并对中国现代社会的走向起着难以估量的作用。《新青年》的开创，使它成为介绍新文化、新知识、新思想的园地。在中国的近代，在一段时间在一定程度上，它反映了新文化知识分子的群体意志，成为中国思想的领导中心，开创了中国历史的新纪元。
（1）《新青年》的创刊标志着新文化运动的兴起，它擂响了思想解放运动的战鼓
《新青年》创刊之后，在一年多的时间里，它首先紧紧抓住思想文化问题，如陈独秀创办《新青年》，就以“除旧布新”作为方向。这一时期，刊物上发表的易白沙的《孔子平议》、胡适的《文学改良刍议》、鲁迅的《狂人日记》和吴虞《吃人与礼教》等文章带给中国思想界的震撼，对于思想解放所起的重大作用，是当时其他报刊上的政治、时评性文字所不可比拟的。
（2）《新青年》是新文化运动的一面旗帜
《新青年》除了以一般性言论指导全国进步人士之外，还有针对性地以通信形式来回答各地青年提出的种种问题。这些回信绝大部分随即发表在《新青年》上，回信是陈独秀作为新文化运动的统帅视不同情况而发出的具体的思想指令，在当时所起的积极作用极大。当时不少青年，如王统照、叶挺、俞颂华等都曾致函《新青年》，在与陈独秀书信往来中，受到启发与鼓励，思想日益进步，投身于新文化运动，为中国革命做出了重要的贡献
（3）宣传马克思主义，培养新一代青年
1920年9月，即从8卷1号起，《新青年》改组为中国共产党上海发起组的机关刊物，积极进行马克思主义理论宣传，成为在中国传播马克思主义的主要阵地，在广大革命知识分子中发生了广泛的影响，对中国共产党的成立和中国革命运动的发展做了思想上的准备。《新青年》从1915年创刊到1922年休刊，其间有7个年头。这7年，是中国知识分子，尤其是青年知识分子思想大解放的年代，是新旧思潮大激战的年代，也是中国由旧民主主义革命开始向新民主主义革命转变的年代。《新青年》适应了时代的要求，指引着这个时代前进的步伐，培育了整整的一代青年。`, explain:`《新青年》是新文化运动的旗帜。1915年陈独秀创办后，发表了一系列震撼思想界的文章（胡适的白话文主张、鲁迅的《狂人日记》等），猛烈批判旧文化旧道德。陈独秀还通过书信指导全国青年的思想。1920年起，《新青年》转向宣传马克思主义，成为中共成立的思想摇篮，培养了整整一代革命青年。`, frame:`起手以1915创刊、改名《新青年》点题，交代与新文化、五四的关联。第一块写创刊作为思想解放号角，举批判旧礼教、文学改良、鲁迅小说等例。第二块写刊物作为旗帜，以通信答疑指导青年。第三块写1920后改组为上海发起组机关刊物，传播马克思主义、为建党做思想准备。收束评价培育一代青年、推动社会转型。`},
  {ch:2, type:"essay", q:`试述世界信息生产和流通结构不平衡的表现。`, a:`发展中国家建立世界新闻传播新秩序的斗争，不是一个偶然的现象，而是直接来自世界新闻传播严重的不平衡状态。这种不平衡不仅意味着在新闻传播力量、新闻流向等方面，发展中国家与发达国家存在着相当大的差距，而且意味着发展中国家变动的现实不可能得到全面真实的反映。造成这种不平衡状态的根本原因在于这些国家的经济实力和技术水平的悬殊。世界信息生产和流通结构的不平衡表现在以下几个方面：
（1）传播力量的不平衡
①传播媒介的分配不均
西方少数发达国家凭着雄厚的经济实力和发达的科学技术，建立了异常强大的新闻传播事业，拥有大量现代化的新闻传播工具。反之，广大发展中国家由于经济不发达，文化教育事业落后，科学技术水平低，新闻传播事业基础与设施薄弱，新闻传播工具既缺乏又落后。
②新传播技术导致不平衡加剧
a.某些大国凭借着强大的经济、技术实力，企图在电波、网络空间构筑起新的霸权。
b.传播工具的普及率及其先进程度决定着信息量的获取能力。
c.新技术带来的不仅有福音，还有巨大的信息不平衡。广大发展中国家拥有的新闻传播力量，与它们在国际政治舞台上的地位、在世界总人口中所占的比例，是极不相称的。
如果不是所有的国家、所有的人都能享有信息，信息社会就只能加深、而不是缩小世界各国间的“信息鸿沟”，其结果将是，信息大量集中于富国，发展中国家则过着前所未有的-物质和信息的双重贫困生活。
（2）传播流向的不平衡
少数发达国家凭借其强大的现代化的新闻传播媒介和设备，垄断了世界新闻的采集和发布市场。来自发达国家的新闻信息源源不断地流向发展中国家，而发展中国家向发达国家输出的新闻，不仅数量少，而且很难为发达国家的主流媒介接受。所以国际市场上的新闻流动，基本上是单向的，即由发达国家流向发展中国家，由“北”流向“南”。
（3）传播内容的不平衡
①世界新闻传播的不平衡，不仅仅指数量上西方国家通讯社、电台、电视台及其新闻产品垄断或控制了发展中国家的新闻市场，更为重要的是，西方发达国家的机构并不是根据发展中国家的需要，而是根据自身的需要播报新闻的。它们按照西方的政治观点、价值观念、文化传统来筛选、采制新闻，因此报道内容存有很强烈的主观观念。
②西方新闻媒介有关发展中国家的报道内容严重失衡，在总体上扭曲了发展中国家的国际形象，损害了发展中国家的社会稳定和经济发展，阻碍了世界各国人民的相互了解和合作，也在根本上破坏了世界范围内新闻自由采集、自由传播的现实基础。
（4）评价
世界新闻传播的不均衡状态，在政治、经济、思想、文化等方面给发展中国家带来很大的危害。发展中国家的领导人也意识到了问题的严重性，为捍卫来之不易的独立，争取经济自主，从60年代末70年代初就开始了为建立平等新闻传播秩序的斗争。他们或者是在国际会议上大声疾呼，或撰写文章痛陈利害，或积极组建发展中国家传播机构的合作组织，强烈要求并致力于打破世界新闻秩序，建立自由、平等、均衡、公正的世界新闻新秩序。`, explain:`世界信息流通不平衡主要表现在四个方面：传播力量不均（发达国家媒体资源远超发展中国家）、流向单向（信息从北方发达国家流向南方发展中国家）、内容偏颇（西方媒体按自己的价值观报道发展中国家，常常歪曲事实）。这种不平衡的根源在于经济实力和技术水平的悬殊，发展中国家一直在争取建立更公平的信息秩序。`, frame:`起手点题：不平衡根源于经济实力与技术差距，并关联发展中国家争取新秩序。分块展开：传播力量——媒介分配不均与新技术加剧数字鸿沟；流向——发达国家垄断采集发布、新闻由北向南单向；内容——按西方价值观筛选、扭曲发展中国家形象及危害。最后评价：政治经济思想文化危害，并写60年代末以来抗争与建立公正秩序诉求。`},
  {ch:2, type:"essay", q:`影响消费者行为的主要因素有哪些？（5分）`, a:`消费者购买行为受到文化、社会、个人和心理因素的影响。
（1）文化因素
文化、亚文化和社会阶层对购买行为起到了重要作用，文化因素对消费者购买行为的影响最为广泛和深远。
（2）社会因素
消费者的购买行为同样也受到一系列社会因素的影响，包括相关群体、家庭、角色和地位。
（3）个人因素
购买者决策也受其个人特征的影响，特别是受其年龄和生命周期阶段、职业、经济环境、生活方式、个性以及自我观念的影响。
（4）心理因素
一个人的购买选择也受四种主要心理因素的影响，即动机，认知，学习以及信念和态度。`, explain:`影响消费者购买行为的因素有四类：文化因素（最深远的，包括文化传统和社会阶层）、社会因素（家庭、朋友、社会角色的影响）、个人因素（年龄、职业、经济状况、生活方式）、心理因素（动机、认知、学习、信念和态度）。做广告和营销就是针对这些因素来影响消费者决策。`, frame:`起手总括四类因素。分述文化（含亚文化阶层，点影响最广远）；社会（相关群体、家庭、角色地位）；个人（年龄生命周期、职业、经济、生活方式、个性、自我观念）；心理（动机、认知、学习、信念态度）。收束可一句点明四者交互作用于购买决策。`},
  {ch:2, type:"essay", q:`在上述影响消费者行为诸多因素中，中国黄酒品牌“古越龙山”近几年的广告活动对其中哪些因素运用得比较多？（3分）`, a:`中国黄酒品牌“古越龙山”广告活动运用的因素为文化因素、社会因素和心理因素。
（1）古越龙山在进行广告宣传的同时加大了黄酒基础性研究和酒文化的传播，充分利用黄酒文化来影响消费者。
（2）古越龙山推出的年份酒属于高档产品，其目标消费者应具有相应的社会地位。
（3）古越龙山的传播策略将从提升品牌的知名度、美誉度到全面提升品牌消费的忠诚度，把关注变成认知，让消费者不仅知道黄酒，还要了解黄酒、喜欢黄酒。这一点充分地利用了消费者的心理因素。`, explain:`古越龙山的广告主要利用了三个因素：文化因素——大力传播黄酒文化，用历史底蕴打动消费者；社会因素——推出高档年份酒，对标有社会地位的目标群体；心理因素——通过广告从提升知名度到培养忠诚度，让消费者从'知道黄酒'到'了解和喜欢黄酒'。`, frame:`起手呼应上题框架，明确古越龙山主要动用文化、社会、心理因素。分三点：文化——黄酒文化与基础性研究传播；社会——年份酒定位高档与目标群体社会地位；心理——从知名度美誉度到忠诚度，认知喜好层层推进。收束点出与题目要求的对应关系，避免泛泛谈四类。`},
  {ch:2, type:"essay", q:`古越龙山为什么选择中央电视台作为主要广告投放媒体？请阐述你自己的观点。（12分，字数300字左右）`, a:`古越龙山选择中央电视台作为主要广告投放媒体的原因如下：
（1）电视广告具有优势
①成本效用高
电视有最广泛的受众，而且还能到达印刷媒体不能有效到达的人群。
②冲击力大
电视将画面、声音、颜色、动作和戏剧结合起来，可导致一定程度的消费者参与，也能使产品显得重要、有趣。如果广告令人喜爱，还能使消费者产生对赞助商的正面的联想。
③影响面广
电视对文化有强烈的影响，人们更相信在电视上做广告的公司。
（2）中央电视台具有优势
①受众对广告常持有保留甚至怀疑态度，通常从媒体的可信度，判断广告的真实性。媒体的信誉好，社会地位高，广告可以借媒体的地位、信誉更好地说服目标公众。
②中央电视台具有其他媒体所不能替代的社会地位及公众信誉。在中央电视台播出的广告会增加其可信度，因此改变消费者的认知，进而产生购买行为。`, explain:`古越龙山选央视投广告的原因：第一，电视广告本身有优势——覆盖面广、画面声音结合冲击力大、成本效益高；第二，央视特别有优势——在中国具有无可替代的权威性和公众信誉，在央视播广告能大大增加品牌的可信度，帮助消费者建立信任，从而促进购买行为。`, frame:`起手先点题：古越龙山选央视是“媒体特性+品牌信任”的组合判断。中间分两翼展开：先写电视广告在覆盖面、声画冲击力与文化说服力上的优势，说明为何适合黄酒这类需建立认知与情感的品牌；再写央视的权威性与高信誉如何缓解受众对广告的怀疑、提升信息可信度并助推态度与购买。收束回扣企业目标：在全国性市场上快速建立品牌信任与声势，并与参考答案中的逻辑保持一致，可一句带出这是理性媒体组合而非单一“砸钱”。`},
  {ch:2, type:"essay", q:`如果你是古越龙山的品牌经理，你认为在2008年奥运会期间，古越龙山可以在品牌建设方面开展哪些工作？请说明你建议的理由。（10分，字数300字左右）`, a:`在2008年奥运会期间，古越龙山在品牌建设方面可开展的工作如下：
①成为奥运会的赞助商之一
奥运会是世界体育盛会，其赛事会受到世界各国的瞩目。古越龙山可通过奥运赞助的方式来提升品牌知名度和美誉度。
②以向世界宣传黄酒文化为目标展开一系列的营销活动
在影响消费者认知的基础上，进一步从文化层面深入。通过向世界宣传黄酒文化的基础上，推广自己的品牌。营销活动中介绍黄酒文化的同时可以提供黄酒的试喝，采用促销手段力争在一定的时间和空间内形成一个品牌的沟通高潮，产生轰动效应。
③加大企业广告在CCTV-5的投放力度
CCTV-5是体育频道，因此奥运会期间会得到更多消费者的关注。此时加大广告CCTV-5的投放力度能使有效传播次数迅速增多，广告的效果得到加强，借此来提升品牌形象，直接刺激销量。`, explain:`如果是古越龙山的品牌经理，奥运期间可以做三件事：第一，争取成为奥运赞助商，借世界级赛事提升品牌知名度；第二，围绕'向世界推广黄酒文化'策划系列营销活动，结合试饮促销制造品牌热度；第三，加大在央视体育频道的广告投放，因为奥运期间体育频道收视率暴涨，广告效果事半功倍。`, frame:`起手明确身份假设与奥运传播契机。主体用三条并列建议，每条先写“做什么”再写“为何有效”：奥运赞助借全球注意力抬升知名度与美誉度；以黄酒文化为主题的体验与促销制造话题高潮、深化品牌内涵；加大CCTV-5投放借赛事流量提高触达与转化。收束强调三条相互补强：曝光—文化—场景化传播形成闭环。`},
  {ch:3, type:"noun", q:`《中国报学史》`, a:`《中国报学史》是新闻学专家戈公振的名著，写于1925年至1926年，1927年11月由商务印书馆出版，曾多次再版，日本人小野保增译为日文，书名改为《支那新闻学史》，于1943年在东京出版。《中国报学史》全书共6章，第1章绪论，阐述报学史的定名、报纸的定义以及本书编辑方法。第2章至第6章，分别就官报独占时期、外报创始时期、民报勃发时期、民国成立以后、报界现状等阶段，全面、系统地评介报纸发展的历史，有明确的历史分期和报刊分类，且史料翔实，多为第一手材料，为中国报刊史研究提供了一个较为完整的理论框架和丰富的史料。本书从主要观点与论断到文字表述的字里行间，洋溢着作者的爱国、民主、进步思想和敬业乐业精神，为新闻学研究树立了治学与道德风范，被称为“中国新闻史研究开山之作”。`, explain:`《中国报学史》是戈公振的名著，1927年出版，被称为'中国新闻史研究的开山之作'。全书分六章，从官报时期一直写到民国报界现状，有明确的历史分期和报刊分类，史料翔实。这本书为中国新闻史研究提供了完整的理论框架，在治学和道德方面都树立了榜样。`, frame:`起手一句定性：戈公振《中国报学史》是中国新闻史研究的奠基性著作。接着交代写作与出版年代、全书六章结构及分期脉络（官报、外报、民报、民国以降与现状）。再点史料来源与史论结合的特点。最后收在评价：提供较完整框架与丰富史料，体现爱国进步与治学精神，被誉为新闻史研究开山之作。`},
  {ch:3, type:"noun", q:`《民国暂行报律》`, a:`《民国暂行报律》制定于1912年3月2日，是南京临时政府内务部为了对报刊出版进行初步管理而发布的一个简略的法令。该法令规定了三条管理办法：①出版报刊必须履行登记手续；②不得破坏共和国体；③报道失实，污毁个人名誉者应该更正等。但在当时民主、自由气氛空前高涨的报界，此报律受到了报界的一致反对，孙中山基于对新闻自由、言论自由的尊重，以及法律文件的制定必须经过参议院，不得违反程序的原则，下令取消了该报律。“暂行报律”被撤销一事，加深了人们对言论出版自由的认同。`, explain:`《民国暂行报律》是1912年南京临时政府内务部发布的，规定报刊要登记、不得破坏共和、报道失实要更正。但当时新闻自由气氛高涨，报界一致反对。孙中山认为这个法令没经过参议院，程序违法，下令撤销了。这件事反映了民国初年人们对言论出版自由的高度认同。`, frame:`起手交代时空与性质：1912年南京临时政府内务部颁布的简略报刊管理法令。中间按条文概括登记、维护共和体制、更正诽谤等要点，随即转折写报界强烈反对。再写孙中山以新闻自由与立法程序为由下令撤销及其影响。收束落到意义：强化社会对言论出版自由的认同。`},
  {ch:3, type:"noun", q:`“纽约三大便士报”`, a:`“纽约三大便士报”是指纽约的《太阳报》（1833年由本杰明·戴创办，美国第一份成功的廉价报纸）、纽约《先驱报》（1835年由贝内特创办）和纽约《论坛报》（1841年由格里利创办）。便士报是工业革命后出现的面向中下层读者的大众化报纸，特点是政治上标榜独立，内容上注重地方新闻、社会新闻以及各种消闲、趣味性软新闻；文字通俗，版面活泼，可读性强；经营上完全商业化，大量刊登广告，以此降低售价，扩大发行，进而赢得更多的广告。`, explain:`纽约三大便士报指的是1830-1840年代先后创办的三份廉价报纸：本杰明·戴的《太阳报》（美国第一份成功的廉价报）、贝内特的《先驱报》、格里利的《论坛报》。它们面向普通大众，内容通俗、价格便宜（一便士）、靠广告盈利，标志着美国报纸从精英读物变成了大众消费品。`, frame:`起手界定概念：纽约三张代表性便士报及其创办者与年代。中间归纳便士报面向大众的商品化形态：政治标榜独立、内容偏重社会新闻与趣味软新闻、文字通俗版面活泼。收束点经营逻辑：广告支撑低价扩发行，形成近代大众化报业模式。`},
  {ch:3, type:"noun", q:`选择性接受假说`, a:`选择性接受假说是拉扎斯菲尔德等在《人民的选择》中提出的关于受众在接收信息时选择性接受的假说。选择性接触假说是指受众并不是不加区别地对待任何媒介内容，而是更倾向于“选择”那些与自己的既有立场和态度一致或接近的媒介内容加以接触；选择性接触行为的结果更容易在强化人们原有态度的方向上起作用，而不是导致它的改变。选择性接受包含三个方面：①选择性接触，是指受众在接触大众传播活动之际，并不是不加区别地对待任何媒介和内容，而是更倾向于接触与自己的既有立场、观点、态度一致或接近的媒介或内容加以接触，而有意无意地回避那些与自己既有倾向相左的媒介或内容。②选择性理解，是指受众总要依据自己的价值观念及思维方式对接触到的信息做出独特的个人解释，使之同受众固有的认识相互协调而不是相互冲突。③选择性记忆，是受众在接触信息后，保留在记忆中的往往是那些与自己的既有兴趣、需求、立场、态度或观点一致或接近的内容。`, explain:`选择性接受假说说的是：人不是什么信息都照单全收的。我们天然倾向于只接触跟自己观点一致的信息（选择性接触）、按自己的方式理解信息（选择性理解）、记住跟自己立场吻合的内容（选择性记忆）。所以大众传播更容易强化人的既有态度，而不是改变它。`, frame:`起手说明出处与核心判断：拉扎斯菲尔德等提出，受众对信息并非照单全收。主体分三层展开选择性接触、选择性理解与选择性记忆，强调其常与既有立场一致并可能强化原态度。收束提醒答题完整性：三层都要点到机制差异，避免只写接触。`},
  {ch:3, type:"noun", q:`冷媒介`, a:`冷媒介是麦克卢汉就媒介分类提出的两个著名概念之一，另一个是热媒介。冷媒介传递的信息少而模糊，在理解之际需要更多的感官和思维活动的配合，相反，热媒介传递的信息比较清晰明确，接收者不需要动员更多的感官和思维活动就能理解。冷媒介与热媒介的区分在于说明媒介作用于人的形式不同，引起的心理和行为反应也不同。`, explain:`冷媒介是麦克卢汉提出的概念。冷媒介给你的信息少且模糊，需要你动脑子、调动多种感官去理解和补充（比如电话、漫画）；热媒介给的信息清晰完整，不太需要你费脑子（比如电影、广播）。区分的关键在于：受众需要参与多少才能理解信息。`, frame:`起手点明麦克卢汉冷热媒介分类。中间用对比句写冷媒介信息少而模糊、需受众更多参与补全意义；热媒介信息清晰、解码成本低。收束说明研究意图：解释不同媒介引发的心理与行为差异，不必展开过多例子。`},
  {ch:3, type:"noun", q:`姿态传播`, a:`姿态传播是指以姿态作为媒介的人际传播活动。人际传播是面对面的传播活动，基本媒体是语言，
除此之外还有表情、手势、动作等各种各样的姿态（gesture）符号。姿态是人际传播中自我表达的重要手段，姿态符号也能传达意义，又称为“体语”。姿态的主要功能是：①强调语言；②补充语言；③代替语言；④控制语言：⑤表达超语言的意义。`, explain:`姿态传播就是用表情、手势、动作等身体语言来传递信息。在面对面交流中，除了说话，我们的体态也在'说话'。姿态有五种功能：强调语言、补充语言、代替语言、控制语言节奏、表达语言无法表达的深层含义。也叫'体语'。`, frame:`起手界定：面对面人际传播中以姿态、表情、动作为媒介的传播。中间说明亦称体语，并分条对应其功能——强调、补充、替代、调控言语及表达超语言意义。收束回扣：姿态与语言共同完成自我表达与意义协商。`},
  {ch:3, type:"noun", q:`杰夫金斯`, a:`杰夫金斯是20世纪50年代后英国的公共关系理论专家和公关实务大师，从理论和实践上把公共关系推向了一个新的发展阶段。他在英国开办了第一家公共关系学校，讲授公共关系学、广告学和市场营销学等方面的课程，并且先后到过18个国家讲学。杰夫金斯是世界上撰写公共关系理论著作最多的公共关系专家，著有《市场学、广告学和公共关系学词典》《公共关系·广告·市场营销》《市场学和公共媒介设计》《公共关系学》《公共关系与市场管理》《公共关系与成功企业管理》等著作。他提出了“公共关系工作六部曲”，即：“估计形势-确定目标-确认公众-选择传播媒介与技巧-编制预算方案-评价结果”，从公共关系决策管理层面解决了管理过程和管理环节上的理论问题，对于公共关系工作管理和工作流程做出了科学规定，在实践中推动了公共关系活动的程式化、层次化、规范化发展，在公共关系发展史上具有划时代意义。`, explain:`杰夫金斯是20世纪后半叶英国最重要的公关理论家和实践者。他在英国开办了第一家公关学校，到18个国家讲学，写了最多的公关著作。他最大的贡献是提出了'公关工作六步法'：评估形势→确定目标→确认公众→选择媒介→编制预算→评价结果，让公关工作变得有章可循、规范化。`, frame:`起手交代身份与时代：英国公关理论与实务代表人物。中间写办学讲学、著作众多及国际影响。重点落在“公关工作六部曲”流程及其管理意义。收束评价：推动公关活动程式化、规范化，在公关史上具里程碑意义。`},
  {ch:3, type:"noun", q:`社区关系`, a:`社区是一个地理概念、位置概念，如城市、街道、村庄等。社区关系是指组织同所在地区的其他各种组织和全体居民的关系。类似于家庭同邻居的关系，社区关系是组织生存发展的外部环境的重要组成部分。社区关系的一般做法是：①向所有相邻单位和居民通报本组织的宗旨、生产经营项目、组织为繁荣地方经济所做的努力以及本组织将给社区带来的利益等信息。②经常走访、调查社区公众，了解对本组织的反映，及时发现问题，并加以改进和调整。③敞开大门，请社区公众通过同组织内各层成员的接触，建立感情联系。④积极主动地支持、参与社区内正常的公益性活动，使公众感觉到组织的存在，认识本组织对社区的价值。⑤为支持社区地方经济而尽力，在一定程度上可担任本社区经济发展的“龙头”，或成为本社区经济发展的“中坚”。`, explain:`社区关系就是组织跟所在地区各机构和居民的'邻里关系'。维护好社区关系的方法：主动通报自己的信息让邻居了解你、经常调查邻居的反馈及时解决问题、敞开大门建立感情、积极参与公益活动、支持地方经济发展。说白了就是做一个好邻居。`, frame:`起手先解释社区的空间含义，再界定社区关系是组织与所在地政府、团体及居民的关系。中间概括良好社区关系的价值：生存环境与区域形象。最后按做法类举：通报组织宗旨与贡献、走访倾听、开放沟通、参与公益、助力地方发展，体现“好邻居”责任。`},
  {ch:3, type:"noun", q:`公益广告`, a:`公益广告又称公共广告，是指为维护社会公德，帮助改善和解决社会公共问题而组织开展的广告活动。这类广告所传播的信息内容，主要是有关道德、教育、环境、健康、交通、公共服务等，涉及人们当前关心的社会问题，与社会公众利益密切相关。公益广告的主要特征：①不以营利为目的；②为社会共同利益而不是为某些团体或组织服务，有别于企业广告或公共关系广告，体现企业等所承担的社会责任。`, explain:`公益广告就是不以赚钱为目的、为社会公共利益服务的广告。内容涉及道德、环保、健康、交通等社会话题，比如'节约用水''拒绝酒驾'这类。它跟商业广告最大的区别就是不卖东西，而是传播正能量，体现广告主的社会责任。`, frame:`起手定义：为维护公德、推动公共议题而开展的非营利导向广告。中间列举议题领域并强调与公众利益相关。收束用两点特征收拢：不以营利为目的、服务社会共同利益并体现组织社会责任，区别于商业或公关广告。`},
  {ch:3, type:"noun", q:`广告调查`, a:`广告调查是围绕广告活动而组织展开的调查研究活动。它是市场调查的一个组成部分，是整个广告活动的开端和基础。广告调查的作用在于为广告决策提供充分有力的信息，为广告的创作设计提供依据，也为企业经营管理发挥参谋作用。广告调查的特点有：①目标明确；②操作性强；③注意保密；④具有累积性。`, explain:`广告调查就是在做广告之前进行的调研工作，包括了解市场情况、消费者偏好、竞争对手策略等。它是广告活动的起点和基础——没有调查就没有好创意。特点是目标明确、可操作、注意保密、成果可以积累复用。`, frame:`起手界定：围绕广告活动开展的调查研究，是市场调查的一部分并处于策划前端。中间写作用：为创意、媒体与经营决策提供依据。收束列特点：目标明确、可操作、注意保密、成果可累积，体现其专业边界。`},
  {ch:3, type:"short", q:`怎样理解“权利主体受众”？`, a:`权利主体受众是指受众不仅仅是传媒信息的使用者和消费者，他们还是构成社会共同体的成员，也是参与社会管理和社会公共事务的公众。这样的角色使公众作为权利主体在大众传播过程中享有以下基本权利：
（1）传播权-即一般意义上的表现自由和言论自由的权利。
（2）知晓权-通过大众传播渠道获得信息的权利，尤其指对公共权力机构的活动所拥有的知情或知察权。
（3）媒体接近权-利用大众传媒阐述主张、发表言论以及开展各种社会和文化活动的权利，其中
的一项重要内容是反论权。
（4）媒介监督权-大众传播的信息生产和传播活动涉及受众广泛的利益，受众有权通过各种形式对传媒的活动进行监督。`, explain:`'权利主体受众'是说受众不只是信息消费者，更是社会公民。作为公民，受众享有四项基本权利：传播权（言论自由）、知晓权（知道公共信息的权利）、媒介接近权（利用媒体发表意见的权利）、媒介监督权（监督媒体行为的权利）。`, frame:`起手一句总括：把受众视为社会成员与公众而非单纯消费者。主体按条列四项权利并用短定义串起：传播权（表达自由）、知晓权（尤其公共事务知情）、媒介接近权（含反论权等）、媒介监督权。收束点明逻辑：权利视角解释受众在传播结构中的地位。`},
  {ch:3, type:"short", q:`如何正确认识“循环传播模式”？`, a:`（1）循环传播模式
循环传播模式由美国学者奥斯古德和施拉姆于1954年提出。该模式中没有传播者和受传者的概念，传播双方都作为传播行为的主体，通过讯息的传受处于你来我往的相互作用之中；参与传播过程的每一方在不同阶段都依次扮演着译码者（执行接收和符号解读功能）、解释者（执行解释意义功能）和编码者（执行符号化和传达功能）的角色，并相互交替着这些角色（如下图所示）。
（2）正确认识循环传播模式
①循环传播模式体现了社会传播的双向性和互动性，这无疑是正确的。
②这个模式也有其缺陷：a.它把传播双方放在完全对等或平等的关系中，则与社会传播的现实情况不符。b.这个模式能够体现人际传播特别是面对面传播的特点，但在说明大众传播过程方面仍有局限性。`, explain:`循环传播模式是奥斯古德和施拉姆提出的。跟直线模式不同，它认为传播不是单向的，而是双方互动的——双方轮流扮演编码者、解释者、译码者的角色。优点是体现了传播的双向性，缺点是把双方放在完全对等的位置上，不太符合现实（现实中传播双方的资源和能力往往不对等），而且它更适合解释面对面传播，对大众传播解释力有限。`, frame:`起手交代提出者与时间：奥斯古德—施拉姆循环模式。中间描述双方互为主客体、角色在译码—解释—编码间轮换，体现互动。收束辩证评价：肯定双向互动价值，再指出对等关系与现实不符、对大众传播解释力有限两点缺陷。`},
  {ch:3, type:"short", q:`公共关系有哪几种活动模式？`, a:`社会组织的公共关系在不同时期、面对不同公众、处理不同问题时，采用适当的方法和一定的技术、技巧所形成的系统就是公共关系模式。公共关系活动模式包括以下几种：
（1）宣传性公共关系
特点是利用大众传播媒介，直接向公众传递组织的各种信息，加强公众对组织的了解程度，形成有利于组织发展的社会环境。该模式指导性强，可在短时间内取得预期的沟通效果，但易停留在与公众的表面接触上，活动的长久性效果难以把握。
（2）公益性公共关系
以各种精心设计的公益性活动、赞助性活动进行的公共关系活动。它以公众普遍关注的社会现象和人物为主要活动对象，通过调动人们的同情心和社会责任感达到树立组织形象，改善公众关系的目的。追求的是长远的、整体的利益。
（3）征询性公共关系
以采集信息、舆论调查、民主测验等形式开展公共关系活动。目的在于及时发现问题，并通过解决问题获得公众的好感。防止各种细小问题的扩大化。
（4）交际性公共关系
特点是通过人与人的直接接触、为组织广交朋友，建立广泛的社会关系网络，建立直接的、有一定权威性的信息网络。具有直接性、人情味和灵活性，容易引起感情的共鸣。
（5）服务性公共关系
以向社会公众提供产品和服务为手段的公共关系。目的在于以实际行动和看得见的产品获得公众的了解与评价。用事实影响并改变公众。
（6）还有发挥不同功能的一些公共关系模式，如建设型公共关系、维系型公共关系、防御型公共关
系、进攻型公共关系、矫正型公共关系。`, explain:`公共关系有六种活动模式：宣传型（通过媒体传播组织信息）、公益型（通过公益活动树立形象）、征询型（通过调查采集反馈、及时解决问题）、交际型（通过人际交往广交朋友）、服务型（通过优质服务赢得认可）。此外还有建设型、维系型、防御型、进攻型、矫正型等按功能划分的模式。`, frame:`起手先定义公关模式是方法与技巧的系统组合。主体按类型各用一两句写手段与效果取向：宣传性、公益性、征询性、交际性、服务性，并补建设/维系/防御/进攻/矫正等。收束提醒改卷看点：名称—手段—特点对应，不必长篇展开。`},
  {ch:3, type:"short", q:`公共关系有哪些主要职能？`, a:`公共关系的职能主要有如下几点：
（1）收集信息公共关系的首要任务就是要充当组织的眼睛和耳朵，为组织的生存发展提供关于环境的信息，提供用于决策的各种依据。信息是组织参与竞争的实力与资本。
（2）咨询建议咨询建议是要求公共关系机构和人员要向组织的决策层和各级管理者提供有关组织生存、发展各方面
情况的报告和建议，充当组织的“智囊”和“参谋”。
（3）传播沟通
传播是连接公共关系的主体与客体的桥梁，公关的过程实际上就是信息交流、意见与情感沟通的过程，是组织与公众“双向沟通”的过程。公关活动应特别重视组织通过大众传播媒介等手段如何使自身信息有效地向外传输.
（4）教育引导
教育引导是以传播知识为主要手段在内外公众之间寻求利益共同点的活动。①在内部员工中树立全员公关意识，引导员工将个人利益同组织的形象和声誉相结合；②全面提升组织形象，通过职业训练使全体员工成为合格的组织成员；③主动出击引导外部公众，为他们提供产品服务的相关知识和信息，把公关工作做在消费者对本组织产生印象之初，甚至之前。
（5）社会交往
组织同公众之间的联系不仅要通过大众传播媒介进行，还要借助于大量直接交往的社会活动，通过多种形式的公共关系活动为组织广结人缘，建立广泛的、较为稳固的、有一定感情基础的社会横向关系网络。
（6）协调疏通
在正常情况下，协调疏通能使组织内的所有部分的行为达到和谐一致；使组织同外部环境之间的关系达到最佳状态。在特殊情况下，协调疏通又表现为一种消除矛盾、化解问题的“消防队”作用。`, explain:`公共关系有六大职能：收集信息（当组织的眼睛和耳朵）、咨询建议（当智囊和参谋）、传播沟通（搭建组织与公众的桥梁）、教育引导（在内部培养公关意识、对外引导公众认知）、社会交往（广结人缘建立关系网）、协调疏通（平时促进和谐、危机时当消防队）。`, frame:`起手说明公关职能是组织与环境互动的系统功能。主体依次展开信息收集、咨询建议、传播沟通、教育引导、社会交往、协调疏通，每条点出“做什么—为何关键”。收束用一句收拢：从情报、决策支持到关系管理与危机化解形成链条。`},
  {ch:3, type:"essay", q:`简述资产阶级革命时期代表性报刊（含其他出版物）的情况及其发展特征。`, a:`自从尼德兰人民揭开了资产阶级革命的序幕后，英（1640年）、美（1775年）、法（1789年）等国先后进行了具有世界影响的资产阶级革命，这几个国家于革命前后发展起来的报业，在世界近代报业史上具有重要的地位和典型意义。而德、意、日等国，由于其资产阶级革命较为缓慢，直到19世纪中叶以后才通过民族统一战争或自上而下的变革，从封建社会演进到资本主义社会。由于缺乏相应的政治经济环境，它们的报业发展十分迟缓，直至19至20世纪之交，才逐渐赶上其他国家的步伐。
（1）资产阶级革命时期代表性报刊（含其他出版物）
①英国约翰·弥尔顿的政治小册子《论出版自由》，发表于1644年，18世纪在英、美、法广泛流传，是资产阶级反对封建势力、争取新闻自由的锐利武器。
②美国潘恩的政治小册子《常识》，发表于1776年，控诉了英国的血腥压迫，鼓舞人民反英斗争的士气，被称为美国独立战争的号角。
③法国马拉创办的《人民之友报》。1789年至1792年间出版，是资产阶级革命民主派的主要喉舌，同时也是法国大革命中最有影响的报纸，马拉宣称其办报目的在于教育人民运用自由。
（2）资产阶级革命时期资产阶级报业的发展特点
思想。①封建统治者压制出版自由，严禁资产阶级的书籍、政论小册子以及报刊宣传反封建的资产阶级民主
②革命爆发后，资产阶级政论小册子与报刊冲破限禁、迅速发展，动员人民进行革命斗争。
③革命胜利后，资产阶级报纸的作用发生了变化，从反对封建主义的舆论工具，转变为维护资本主义制度的工具。`, explain:`资产阶级革命时期的报刊有几个关键代表：英国弥尔顿的《论出版自由》倡导新闻自由、美国潘恩的《常识》鼓舞独立战争、法国马拉的《人民之友报》是大革命中最有影响的报纸。这个时期的报业特点：革命前被封建统治者压制，革命中成为动员人民的武器，革命后从反封建工具变成维护资本主义制度的工具。`, frame:`起手交代尼德兰以降英美德法等国资产阶级革命与报业典型性。代表部分按国别点到弥尔顿《论出版自由》、潘恩《常识》、马拉《人民之友报》等及其作用。特征部分按阶段写：封建压制—革命动员高涨—胜利后工具功能转向维护新制度。收束强调思想斗争与报业互动的主线。`},
  {ch:3, type:"essay", q:`结合当前国际传播形势，阐述“国际新闻选择中的价值标准”。`, a:`新闻选择中的价值标准是指构成新闻的信息中所包含有的引起受众普遍兴趣的各种素质。
（1）一般的新闻价值标准
中西新闻界普遍认为，新闻价值的构成要素有五个：
①及时。新闻是“易碎品”，时效越强越有生命力。
②接近。事件发生的地点离读者越近，新闻价值就越大。
③显著。显要人物引起的注意高于非显要人物。
④重大。新闻事实对现实和未来的影响程度越大，新闻价值越大。
⑤趣味。大多数受众对新奇、反常、变态、带人情味的东西更有兴趣。
（2）国际新闻选择中的价值标准
随着传播技术的创新和国际传播的飞速发展，跨文化传播中的差异、冲突和障碍也日渐显现，为此，学术界提供了一套用于国际新闻选择中的价值标准：
①时间跨度。与时效性概念接近，但强调不同媒介组织的不同时效要求。例如，在几小时内发生完成的事件，适合于日报或广播电视。
②强度或临界值。凡是特别重要，或重要性陡增引起特别关注的事件，就有可能受到媒介青睐。后者通常存在于某种媒介监测情况，如对政府、财政或一场不断扩大的冲突的监测。
③清晰性。一件事情的意义越清晰，越少受到怀疑，接受新闻处理的可能性越大。
④文化接近性或相关性。一个事件越接近预期受众的文化和兴趣，就越有可能中选。这里的文化是指由种族（民族）、语言、宗教、社会制度等因素决定的文化和社会价值观。
⑤一致性。符合某些既定期待和预想的事件，比那些与期待不一致的事件更有可能中选。例如，人们预测某国可能发生危机或冲突，与此相关的事情更能引起关注。
⑥意外性。事情越不平常，越难预料，就越有可能中选。
⑦连续性。一旦某个事件被确认具有新闻价值，就会引起对该事件或相关事件的持续关注。
⑧组合性。新闻事件的选择必须考虑媒介内容的整体构成和平衡，一些事件因作为对照而入选。
⑨社会文化价值观。除了上述新闻要素外，社会、受众群体或记者、编辑的社会价值观也会影响新闻选择。`, explain:`新闻价值的一般标准有五个：及时、接近、显著、重大、趣味。但国际新闻选择还有额外标准：时间跨度（事件持续时间要匹配媒体周期）、强度（够重要或重要性骤增）、清晰性（含义越明确越好）、文化接近性（越贴近受众文化越好）、一致性（符合预期）、意外性（越出人意料越好）、连续性（追踪报道）、组合性（平衡版面需要）、社会文化价值观等。`, frame:`起手界定新闻价值是引起受众兴趣的素质集合。先简述通用五要素作铺垫，再转入国际新闻选择的专门标准：时间跨度、强度、清晰性、文化接近、一致性、意外性、连续性、组合性与社会文化价值观等。收束联系形势：技术加速跨国流动，标准更需处理文化差异与框架预设，体现“国际语境下的把关逻辑”。`},
  {ch:2, type:"essay", q:`结合资料简述广告对企业和消费者有哪些影响和作用（6分）。`, a:`（1）广告对企业的影响和作用
①沟通产销信息，促进商品销售
广告活动是伴随着商品经济的繁荣而逐步兴起的。企业要把生产的产品和劳务尽可能地让消费者消费和使用，就必须使消费者充分了解有关商品信息，才能获得被选择的机会。广告是运用一定的媒体传递信息的，是“扩散的销售促进”，超越时空限制，把商品和劳务等信息及时、有效地传达渗透给目标，多次、重复、“强迫”消费者注意，促进销售。
②激发竞争活力，推动企业发展
广告能增加竞争的声势、向消费者提供选择和比较、激发活力。广告把生产信息公布于众，必然促进企业开发市场，扩大生产，从而降低成本，提高市场竞争能力。与此同时，企业要在激烈竞争的市场中得到生存和发展，还要加快产品更新换代，积极采用新技术，开发新品种，以提高广告的质量和力度。广告
反过来激发企业加固核心竞争力，以得到更强有力的广告诉求点。
（2）广告对消费者的影响和作用
①提供商品信息，帮助选择消费
广告通过传播媒体，把有关商品信息发布传送给广大消费者，速度快、范围广、形象真。人们能够通过广告，知悉新的产品、品牌、服务；获取购买上的便利，扩大商品选择的范围，节省时间，减少失误。
②刺激和引导消费，影响消费观念变化
广告具有比较强的信息传递功能，总是在强化人们的需求，促使产生消费动机和购买欲望，采取购买行动。广告具备较大的引导作用，能够创造流行、时尚，提倡和推动新的生活方式，促进商品大量销售，降低企业成本和售价。广告还具有给予消费者宣传教育的功能。`, explain:`广告对企业的作用：传播产品信息促进销售、激发竞争活力推动企业提升核心竞争力。广告对消费者的作用：提供商品信息帮助选择、刺激和引导消费、传播新的消费理念和生活方式。简单说，广告是连接企业和消费者的桥梁，两边都受益。`, frame:`起手用一句话分两半：对企业与消费者作用不同。企业侧先写沟通产销、扩大认知促进销售，再写激发竞争、推动创新与核心能力。消费者侧先写信息检索与降低选择成本，再写刺激需求、引导观念与生活方式。收束点明：信息功能与观念功能并重。`},
  {ch:2, type:"essay", q:`广告策划应包括哪些内容、应注意哪些问题（8分），并据此对海飞丝及清扬的广告策划做出评价（8分）。`, a:`（1）广告策划的内容和应注意的问题
①确定广告目标。
广告策划的首要任务，就是明确广告传播活动将要实现的目标。这需要考虑企业所面临的市场机会，目标消费者进入市场的程度，产品的生命周期和广告效果指标。
需要注意的问题：a.不能与企业总体目标相背离；b.切实可行、具体实在，可操作和可衡量；c.能与其他部门尤其是营销部门协调配合；d.即效性和迟效性的统一。
②明确广告对象。
广告对象即为广告目标市场，也就是现实的和潜在的商品购买者。广告目标市场以企业目标市场为基础，并根据市场的变化和产品生命周期的不同阶段，需要及时加以调整。
需要注意的问题是：确定广告目标市场，不应与企业目标市场有较大的偏差。广告目标市场应有一定的市场潜力；广告媒体可以到达，能使目标消费者最大程度地接触到广告信息。
③提炼广告主题。
广告主题是广告的中心思想，对广告主题进行构思、提炼，要以广告的宏观环境分析为基础，还要分析研究企业的内部经营环境。即企业的经营状况，商品特性，同时，竞争商品的有关信息也要考虑。
④制订广告战略。
广告战略是指按广告目标的要求，确定广告活动的方式方法，包括广告表现战略和广告媒体战略。广告表现战略通过广告创作来实现，广告媒体战略主要包括媒体的选择、确定广告发布日程和方式等项内容。
⑤进行广告预算。
正确编制广告预算，是广告策划的重要内容之一，是企业广告得以顺利开展的保证。
⑥进行广告效果测定。
（2）评价
①不同的受众定位
a.牢牢把握品牌年轻基调的清扬，目标锁定年轻精英白领。这与以去屑为主要诉求的消费者息息相关。相关研究表明，20～55岁年龄段的消费者中，有83％的人正受到不同程度的头屑困扰。头屑的滋长与新陈代谢有关，20-30岁的男人正值新陈代谢旺盛之际，此年龄段的消费者才是去屑市场的消费主力军。
b．从去屑概念的全新定义到终端促销战略，从斥巨资邀请“天价C罗”代言到创新运用清扬科技2.0的男士系列升级上市，清扬坚持自己的年轻、张扬、专业的品牌个性。
c.海飞丝通过成熟代言人这一符号，力图维护忠诚的中老年主顾。新品牌最大的市场武器是新，新是代表了新鲜、新颖、个性；但海飞丝20年积累起来的口碑、培养出来的用户忠诚度和强大的品牌信任度。2007年，以成熟稳重的形象深入人心的梁朝伟成为海飞丝的第一位男代言人，虽然期间海飞丝也尝试转型，但最终还是回归“熟男”形象，启用近五十岁的甄子丹为海飞丝男士新品代言。
②相似的情感和心理诉求
a.“做有销售力的广告”，是许多企业评判广告片好坏的标准。清扬广告片旨在寻找到最能打动目标消费者的功效诉求，即专注于具有双重强健头皮，持久去屑功效的清扬科技2.0上。加以运用C罗时尚、健康、活力的形象来呈现，十分符合清扬品牌定位及所要传达的高效去屑概念。精湛的球技及其在事业上的巨大成功使其成为众多球迷争相效仿的偶像。而清扬此次重金邀请C罗为品牌代言人，正是意在征服更多年轻、有作为的消费群。不仅成功要趁早，去屑也要像C罗一样“抢占先机”的明确定位为“双雄之争”增加了竞争筹码。最后不忘彰显清扬固有的张扬调性，“去赢、去征服”一句话，道出年轻精英白领内心的呼喊，找到消费者买点的再现。
b.相比清扬年轻的品牌定位与清晰的去屑功效定位，海飞丝此次由甄子丹代言的男士广告，诉求点则稍显模糊。由于最能打动目标消费者的去屑功能诉求已经被对手把持，并传播得火热，海飞丝选择挖掘目标受众心中的第二需求点予以应对。然而全新提出的“强根健发”概念似乎削弱了海飞丝作为老牌去屑洗发水的一贯定位，更让人不禁有“防脱发产品”之联想。由甄子丹代言的男士广告，以“男人专心于大事”的职场男性心理切入，由此与男人的感性选择对话，力求在情感战中有所斩获。
③销售市场各有千秋a.广告战已让此次双雄争霸进入白热化阶段，而终端市场才是短兵相接的前线。清扬的货架产品陈
列几乎全部紧挨海飞丝。一时间，各个终端货架上通用与男士系列蓝白分明，令人炫目，清扬也逐渐通过视觉上的差异化在终端吸引并巩固起自己的用户群体。
b.作为国内第一个提出“男性头皮并不相同”的品牌，清扬高调推广男女区分的去屑概念，并率先推出了清扬男士去屑洗发露，而如今最新升级的新清扬男士系列更是创新运用清扬科技2.0，使细分的四款男士产品更好地满足消费者去屑的功能诉求。自上市以来，清扬男士凭借与通用洗发水有别的炫蓝瓶设计，争抢了更多的消费者。据卖场促销员反映，清扬统一且具张力的瓶身颜色，第一时间吸引了前来购买的消费者眼球。这无疑为清扬在终端站增添了进一步扩大了男性市场的竞争优势。与此同时，清扬也将其品牌主色调黑色做得更为深入人心，无论是代言人的系列广告还是渠道宣传的品牌曝光及店内陈列，黑色酷炫的形象设计随处可见，对于消费者而言，这无疑也大大增加了清扬品牌的良好记忆度和辨识度。
c．自2007年海飞丝全新包装的月牙形流线设计面市以来，市场曾经一片哗然，销量也提升显著。而海飞丝推出的新品男士强根健发洗发水仍旧沿用了月牙形流线设计，采取了和以往去屑系列同样的包装设计。针对市场反应，海飞丝在男士产品的瓶子上，立即贴上了代言人甄子丹的标识以弥补产品包装上的不足。虽然不知道目前海飞丝的销售情况，但从市场上来看，海飞丝显然已经感受到了巨大的压力，很多配套的促销活动，也是针对清扬做的。`, explain:`广告策划包括六个步骤：确定目标、明确对象、提炼主题、制定战略、编制预算、测定效果。清扬的策划针对年轻精英，以'专业去屑'为差异化定位，用C罗代言，诉求精准。海飞丝作为老品牌用'信任牌'回应挑战，但新推的'强根健发'偏离了去屑核心定位，策略不够聚焦。`, frame:`起手先答策划板块：目标、对象、主题、战略、预算、测定，并对每块写“应注意什么”。后半转入海飞丝与清扬比较：受众定位与代言人符号、功效诉求清晰度、情感策略差异，再到终端陈列与促销对抗。收束强调：策划要素齐全后，用案例验证策略选择与竞争态势。`},
  {ch:2, type:"essay", q:`整合营销传播的含义和特点是什么（4分），结合案例资料分析海飞丝和清扬采取了哪些整合营销传播方式（4分）。`, a:`（1）整合营销传播的含义和特点
整合营销传播是指统筹运用各种传播方式并加以最佳组合，以特定的目标群体为传播对象，传送基本一致的营销信息，促进联系和沟通的系统传播活动。
整合营销传播的特点：
①以消费者为中心，重在与传播对象的沟通。
②注重各种传播方式的整合，使受众获得更多的信息接触的机会。
③突出信息传播以“一个声音”为主。
④强调传播活动的系统性。
（2）海飞丝和清扬采取的整合营销传播方式
整合营销传播方式通常是“推广组合”，即把人员推销、广告、公共关系和促销活动，正确而有效地组合成在一起的整体传播活动。
①海飞丝采取的整合营销传播方式
a．广告。海飞丝“有头屑，不行”，“头屑去无踪，秀发更出众”，“7大功效，彻底去屑”等广告层出不穷。面对清扬活跃的广告攻势，海飞丝打出“信任牌”，更换了新的广告诉求“从第一次开始就能有效去屑”，广告结束语为“谁的洗发水能做到？当然海飞丝”让消费者对海飞丝再次充满信心。6月，请梁朝伟拍摄新的广告片，主题是“信任海飞丝”。
b．公共关系。2007年5月，针对清扬有关“20年谎言”的挑战，海飞丝调动自己的媒体公关力量，
各大论坛上开始出现一些对清扬不利的论调，一些网站上开始出现质疑清扬产品功效以及清扬法国技术中心是否存在的话题。6月海飞丝联合中国皮肤医师协会、中国健康教育协会在桂林召开了首届全国头部皮肤健康峰会暨去屑技术高级研讨会。“信任海飞丝”的广告片与之相结合。
c.促销活动。海飞丝利用自己长久以来对终端的影响力，积极扩大重点零售终端的自然陈列和付费陈列位置，抢订阶段性促销排期，占据重要卖场核心促销摊位。另外，海飞丝进行降价促销，使得清扬和海飞丝的价差进一步加大。
②清扬采取的整合营销传播方式
a．公共关系。2007年4月27日联合利华在北京召开新闻发布会，高调推荐该公司十年以来推出的第一款新产品，首款男女区分的去屑洗发水“清扬”。根据2007年3月中国保健协会公布的《中国居民头皮健康状况调查报告》数据：20年来，中国消费者受头屑困扰的人群比例由原来的70％上升为83％，清扬在日后的公关活动中广为引用，暗指这个“20年谎言”的缔造者是海飞丝。
b．广告。锁定年轻人士，由台湾主持人小S代言，针对“海飞丝20年去屑谎言”，打出“说话算数”的去屑广告语。
c．促销活动。清扬在全国大规模招聘促销员，提供比其他品牌促销员高出2倍的薪资标准。2007年3月上市到5月，清扬全国300个大卖场的促销员几乎没有下过终端。4月在全国核心城市超过300家店建立去屑现场体验区。6月与沃尔玛等核心大卖场开展清扬环保行动，鼓励以旧换新。`, explain:`整合营销传播就是统一协调运用广告、公关、促销等多种手段，向目标群体传递一致的品牌信息。海飞丝采用了广告（换广告语、请梁朝伟代言）+公关（联合皮肤医师协会开研讨会）+促销（抢占卖场核心位置、降价促销）。清扬则用公关（新闻发布会暗示竞品20年失败）+广告（小S代言打去屑牌）+促销（高薪招促销员、建体验区、以旧换新）。`, frame:`起手给出IMC定义：多种传播工具整合、面向特定群体、传递一致信息。特点用四点概括：以消费者为中心、整合接触点、一个声音、系统性。案例部分分品牌写推广组合：海飞丝侧重广告信任诉求、公关反击与技术背书、终端与促销；清扬侧重发布会与数据公关、攻击性广告、体验促销与渠道活动。收束点题：对抗本质是整合节奏与叙事一致性之争。`},
  {ch:4, type:"noun", q:`《常识》`, a:`《常识》是促使美国从不列颠帝国中独立出来的出版物。作者托马斯·潘恩1774年在富兰克林的帮助下到达北美大陆，投身于北美的独立事业，并在1776年以“一个英国人”的名义发表了《常识》。《常识》成为北美人民的斗争纲领，其思想被随后的《独立宣言》所吸收。“在1776年的北美大陆，几乎人手一本《常识》。在当时的英国，它是《圣经》之后影响力最大，流传范围最广的一本书。整个世界、整个的现代政治文明都从这本书里得到启蒙。”它鼓舞了美国人民战斗的决心和勇气，被认为是独立战争的响
亮号角。`, explain:`《常识》是美国独立战争的'号角'。1776年潘恩以匿名方式发表这本小册子，猛烈抨击英国统治，呼吁北美独立。在当时的北美几乎人手一本，其思想直接被《独立宣言》吸收。可以说这是一本改变了一个国家命运的出版物。`, frame:`起手点明作者潘恩与1776年发表背景。中间写核心作用：动员独立、思想被吸收进《独立宣言》。收束用传播史评价：在北美广泛流传，被视为独立战争号角与现代政治启蒙文本之一。`},
  {ch:4, type:"noun", q:`红色中华通讯社`, a:`红色中华通讯社，简称“红中社”，是新华社的前身，是临时中央政府机关通讯社，1931年11月
7日在瑞金成立，每日发稿一两千字，主要为临时中央政府文告、宣言、红军战报和根据地建设消息。还利用红军电台抄收国民党“中央社”电讯和外国通讯社英文稿，经编辑后油印为“参考消息”（曾用名《无线电材料》《每日电讯》），供中央机关参阅。1934年10月随红军长征，途中新闻广播中断，但抄报未停，1935年11月在陕西瓦窑堡恢复新闻广播。1937年改名为新华社，新中国成立后不断发展壮大。`, explain:`红色中华通讯社是新华社的前身，1931年在江西瑞金成立。它每天发几千字的新闻，报道政府文告和红军战报。还有一个重要工作是用电台抄收国民党和外国通讯社的消息，编成'参考消息'供中央参阅。长征时一度中断新闻广播但没停止抄报，1937年改名新华社。`, frame:`起手定性：红中社为新华社前身，1931年瑞金成立的临时中央政府机关通讯社。中间写发稿内容与抄收编印参考消息类资料供中央参阅。收束写长征与瓦窑堡恢复广播及1937年改名新华社，体现由革命通讯社到国家通讯社的源流。`},
  {ch:4, type:"noun", q:`《京话日报》`, a:`《京话日报》是一份以市民读者为主要对象的时事性政治报刊，是辛亥革命以前北京最重要、最有影响力的白话报。《京话日报》于1904年8月16日在北京创刊，由彭翼仲创办并自任社长，1906年9月28日被清廷查封，彭翼仲被流放新疆。`, explain:`《京话日报》是辛亥革命前北京最有影响力的白话报，1904年由彭翼仲创办。它以普通市民为读者，用白话文报道时事政治。但只存在了两年多就被清廷查封，创办人彭翼仲被流放到新疆。`, frame:`起手定位：清末北京面向市民的重要白话时政报。中间写1904年彭翼仲创办、内容取向与影响力。收束写1906年被查封与创办人遭遇，点出其启蒙与受压并存的命运。`},
  {ch:4, type:"noun", q:`布鲁默的“自我互动”理论`, a:`布鲁默的“自我互动”理论是布鲁默在1968年出版的《象征互动论》中提出的一种理论。该理论认为，人能够与自身进行互动，即自我互动。人是拥有自我的存在，人在将外界事物和他人作为认识和行动的对象的同时，也把自己作为认识和行动的对象。在这个过程中，人能够与自己进行沟通与传播，并能够对自己采取行动。布鲁默认为，“自我互动”在本质上是与他人的社会互动的内在化。不过，“自我互动”并不是与他人的社会互动在头脑中的简单再现，而是一个能动的、创造性的过程，经过这个过程不断改变原来的自我，形成新的意志和行为主体。布鲁默的这个观点说明，人内传播是现实社会传播关系的反映，通过自我互动或自我传播，人能够在与社会、他人的联系上认识自己、改造自己，不断实现自我的完善和发展。`, explain:`布鲁默的'自我互动'理论说的是：人不只跟别人交流，还会跟自己交流。人会把自己当作认识和行动的对象，跟自己'对话'、反思、调整。这种自我互动本质上是社会互动的内化——你内心的对话其实反映了你跟社会的关系。通过这个过程，人不断认识自己、改造自己，实现自我完善。`, frame:`起手说明布鲁默1968年提出“人能与自身互动”。中间写人把自我对象化并进行内在传播，强调非简单再现而是能动建构新自我。收束回扣：人内传播反映社会关系，通过自我互动实现自我认识与发展。`},
  {ch:4, type:"noun", q:`“两面提示”`, a:`“两面提示”是指对某些存在对立因素的问题进行说服或宣传，通常会有两种做法：一种是仅向说服的对象提示自己一方的观点或于己有利的判断材料，称为“一面提示”；另一种是在提示己方观点或有利材料的同时，也以某种方式提示对立一方的观点或不利于自己的材料，称为“两面提示”。“两面提示”由于给对立观点以发言机会，给人一种“公平”感，可以消除说服对象的心理反感，但由于同时提示对立双方的观点，论旨变得比较复杂，理解的难度增加，在提示对方观点之际如果把握不好分寸，反而容易造成为对方做宣传的结果。`, explain:`'两面提示'就是在说服别人时，不光说对自己有利的理由，也提一下对方的观点。好处是显得公平，减少对方的抵触心理；坏处是内容变复杂了，如果把握不好分寸，反而等于帮对方做宣传。跟它对应的'一面提示'就是只说自己这边的道理。`, frame:`起手界定说服中对对立因素同时呈现材料的做法，并与一面提示对照。中间写“公平感”与降低心理反感之利，以及理解成本上升、可能替对方宣传之弊。收束提醒：答题要点在机制权衡而非只下价值判断。`},
  {ch:4, type:"noun", q:`作为权利主体的受众`, a:`作为权利主体的受众是指：当把受众看作社会成员和公众时，受众拥有各种各样的正当权利。受众不仅仅是传媒信息的使用者或消费者，他们还是构成社会的基本成员，也是参与社会管理和社会公共事务的公众。受众在大众传播过程中享有的基本权利包括：①传播权。传播权是构成社会的每个成员所享有的基本权利之一，在传统上称为表现自由或言论自由的权利。②知晓权。广义上，知晓权是指社会成员获得有关自身所处的环境及其变化的信息、保障社会生活所需的各种有用信息的权利，从这个意义上而言，它也是人的生存权的基本内容之一。狭义上，知晓权是指公民对国家的立法、司法和行政等公共权力机构的活动所拥有的知情或知察的权利，这是公民的一项基本政治权利，也意味着公共权力机构对公民负有信息公开的责任和义务。③媒介接近权。即一般社会成员利用传播媒介阐述主张、发表言论以及开展各种社会和文化活动的权利，同时，这项权利也赋予了传媒应该向受众开放的义务和责任。`, explain:`这个概念强调受众不只是被动的信息消费者，更是有权利的社会公民。受众享有传播权（言论自由）、知晓权（尤其是对公共权力的知情权）、媒介接近权（利用媒体发声和参与活动的权利）。媒体不能只把受众当'观众'，还要尊重他们作为公民的权利。`, frame:`起手总述：受众作为社会成员享有正当传播权利。主体分述传播权、知晓权（广狭可点到政治知情与信息公开责任）、媒介接近权（主张、言论与文化表达及媒体开放义务）。收束强调：权利视角超越消费主义受众观。`},
  {ch:4, type:"noun", q:`非商业广告`, a:`非商业广告，是指为了达到某种宣传的目的而做的广告，不含有商业性质，不获取盈利，如政治的、法律的、文化的广泛宣传，以及通知、公告、说明、启事等，亦称非经济广告。非商业广告主要三类：政治广告、公益广告和个人广告。非商业广告和商业广告有以下几点不同：①非商业广告与商业广告最明显的差异在于广告的内容及赞助者即广告主之不同。②商业性广告的盈利公司，他的广告内容通常为有形的商品或劳务，反之，非商业性广告通常强调动机、创意、态度及观点。③两者的广告目标更有显著的不同，商业广告是期待销售产品或劳务，非商业广告则是企图改变大众态度，或使社会运动普及。`, explain:`非商业广告就是不以赚钱为目的的广告，主要分三类：政治广告、公益广告、个人广告。跟商业广告最大的区别：商业广告卖产品，非商业广告改变态度或推动社会运动。比如竞选广告、环保宣传、寻人启事都属于非商业广告。`, frame:`起手定义非商业广告为非营利宣传目的。中间三分：政治、公益、个人，并对比商业广告在内容、赞助者、目标上的差异。收束点明：前者重态度与社会动员，后者重销售转化。`},
  {ch:4, type:"noun", q:`购买方式`, a:`购买方式是指消费者购买行为的特点和表现，由消费者的购买决策所决定形成多种购买方式。主要包括：①复杂性购买，当消费者初次选购价格昂贵、购买次数较少的、冒风险的和高度自我表现的商品时，由于对这些产品的性能缺乏了解，为慎重起见，他们往往需要广泛地收集有关信息，并经过认真地学习，产生对这一产品的信念，形成对品牌的态度，并慎重地做出购买决策。②和谐型购买，消费者购买一些品牌差异不大，但价格高的商品时，虽然他们对购买行为持谨慎的态度，但他们的注意力更多地是集中在品牌价格是否优惠、购买时间、地点是否便利，而不是花很多精力去收集不同品牌间的信息并进行比较，而且从产生购买动机到决定购买之间的时间较短。③多变型购买，消费者购买的商品品牌间差异大，但价格低，可供选择的品牌很多时，他们并不花太多的时间选择品牌，专注于某一产品，而是经常变换品种。④习惯性购买，消费者有时购买某一商品，并不是因为特别偏爱某一品牌，而是出于习惯。`, explain:`购买方式就是消费者买东西的行为模式，由决策过程决定。四种类型：复杂型（贵的、不熟悉的东西要仔细研究比较）、和谐型（贵但品牌差异不大的东西，主要看价格和便利性）、多变型（便宜但品牌多的东西，经常换着买）、习惯型（出于习惯购买，不太在意品牌）。`, frame:`起手说明购买方式由决策复杂程度决定。主体四分：复杂性购买、和谐型购买、多变型购买、习惯性购买，各用一句写触发条件与行为特征。收束提醒：不要混淆“品牌差异”和“价格/风险”维度。`},
  {ch:4, type:"noun", q:`中国公共关系联合会`, a:`中国公共关系联合会是中华人民共和国公共关系联合会的简称。中国公共关系联合会旨在坚定不移地走中国特色的社会主义道路，以科学发展的态度，加强公共关系的理论研究，促进中国特色的社会主义公共关系事业的发展，联络国内外公共关系组织、相关机构和人士，增进相互了解，大力弘扬中华文化，开展国际文化交流和经济合作，并积极参与国际、国内公共关系活动，全面促进中国大陆与港、澳、台以及世界各国公共关系事业的交流发展，积极推动全世界人类社会的和平与进步谋福祉，为中国特色社会主义建设服务，为提升国家国际形象、祖国统一，让世界了解中国，让中国走向世界出谋划策，为构建全人类和谐社会的伟大目标，并最终为实现中华民族的伟大复兴做出贡献。`, explain:`中国公共关系联合会是中国公关行业的全国性组织。主要做的事情：推动公关理论研究、促进国内外公关交流、参与国际公关活动、提升国家形象。可以理解为中国公关行业的'行业协会'。`, frame:`起手交代组织名称与定位：全国性公共关系联合组织。中间概括宗旨：坚持中国特色社会主义方向，推动理论与事业，联络国内外，促进文化交流与合作，服务国家形象与统一及和谐社会目标。收束一句：职能偏行业协同与国际传播层面的公共性使命。`},
  {ch:4, type:"noun", q:`潜在公众`, a:`潜在公众与现实公众相对应，是指将来有可能与组织发生直接利益关系的公众。潜在公众是由非公众转化而来的。对潜在公众可以有两种理解：一种是指有待开发，但尚未与组织发生任何利益关系的那部分公众，或称“潜在顾客”“潜在用户”；另一种是指已经和组织发生了某种关系，并由此出现了某些问题，但自己尚未意识到问题存在的公众群体。`, explain:`潜在公众就是目前还没跟组织发生直接关系，但将来可能会有关系的人群。两种理解：一种是'潜在客户'（还没买过你的产品但可能会买）；另一种是已经跟组织有某种关系但自己还没意识到问题存在的人群。他们是公关工作需要关注和培育的对象。`, frame:`起手界定与现实公众相对。中间展开两种常见含义：尚未发生关系但可开发的潜在顾客；或已发生关系却未意识到问题的群体。收束点公关意义：潜在公众是争取与预警并重的管理对象。`},
  {ch:4, type:"short", q:`如何运用传播实例解释“两级传播”理论？`, a:`（1）“两极传播”理论的含义
“两极传播”理论由拉扎斯菲尔德等人提出，他们在伊里调查中发现大众传播并不是直接“流”向一般受众，而是要经过意见领袖这个中间环节，即“大众传播-意见领袖-一般受众”。这即是两级传播概念的产生。
（2）实例分析“贾君鹏”事件是网络口碑营销的一个经典案例。2009年7月16日，有人在网上发帖：“贾君鹏你妈妈喊你回家吃饭”。这样一个12字网帖莫名蹿红，短短两天回复数达300621，点击数达760万。正是娱乐至死这样一个时代造就了一次成功的网络口碑营销。
该事件是由重庆一家传媒公司的CEO、网络营销专家敖春华主导的。他曾服务于各大知名品牌，他率领公司的10名员工们进行两个月的反复思量和流程设计，动用了四个执行席媒介，轮班监测执行情况，两小时一次电话汇报。总计动用网络营销从业人员800余人，注册ID2万余，回复10万余。大量的网络任务交给兼职的网民去完成。在引发轰动效应后，策划团队撤出，他们的回帖只占真正网络回帖的3％。根据这个赚了“6位数”的网络口碑营销个案，可以对两级传播论进行进一步的分析。
人际传播比大众传播更经常并且更有效。舆论领袖，在“贾君鹏”事件中可具体到兼职网民，在人际传播中的作用不可小视，他是一个告知者、说服者和证实者，在一定的领域发挥作用，他们容易被接触，混迹于各大MSN，SNS 发布消息，很容易引起注意，而且其言论很容易被与其同阶层的人接受，它既是受众的一部分，又影响着其他大批受众，同时舆论领袖又同宣传媒体和各种交易的中间商联系紧密，舆论领袖正是网络口碑营销的核心。信息，媒体，受众三合一的两级传播论是网络口碑营销的理论支持。`, explain:`'两级传播'理论说的是信息不是从媒体直接传到所有人，而是先到'意见领袖'再到普通人。用贾君鹏事件举例：策划团队先通过800多个兼职网民（相当于网络意见领袖）在论坛发帖炒作，这些人引爆了话题后，真正的网民自发跟进，最终2万个帖子中策划方只占3%。这说明意见领袖是传播链条中的关键环节。`, frame:`起手解释两级传播：信息经意见领袖再到一般受众。中间引入“贾君鹏”网络营销案例，写策划规模、兼职网民作为节点扩散。收束回扣理论：印证人际网络在放大与验证信息上常比单一大众路径更关键，注意把领袖角色落到可操作描述。`},
  {ch:4, type:"short", q:`如何正确认识“把关人”的理论与实质？`, a:`（1）“把关人”的理论
①“把关人”这个概念，最早是美国社会心理学家、传播学奠基人之一的库尔特·卢因提出的。1947
