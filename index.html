年，卢因在《群体生活的渠道》一书中再次论述了这个问题，认为在群体传播过程中存在着一些“把关人”，只有符合群体规范或“把关人”价值标准的信息内容才能进入传播的渠道。
②1950年，传播学者怀特将这个概念引进新闻研究领域，明确提出了新闻筛选过程的“把关”模式。这个模式说明：社会上存在着大量的新闻素材，大众传媒的新闻报道不是也不可能是“有闻必录”，而是一个取舍选择的过程。在这个过程中，传媒组织形成了一道“关口”，通过这道“关口”传达到受众那里的新闻只是众多新闻素材中的少数。
（2）“把关人”过程的实质
怀特的“把关”模式只是对新闻信息的取舍选择过程的一种简单概括，它指出了经过大众传媒这道关口，某些新闻入选、某些新闻遭到舍弃这一事实，但并没有说明哪些新闻会人选或遭到舍弃，而正是后面这个问题，才涉及“把关”过程的实质。
①传媒进行这种取舍选择的标准，首先涉及新闻信息的客观属性问题。新闻信息有两个本质属性：a.新闻信息必须有真实性，它传达的是客观的事实而不是虚构或捏造的事物；b.新闻信息必须具有及时性和新意，过时的事件、历史的回忆等，不能成为新闻。不具有这两个属性的信息，不能作为新闻加以传播。
②新闻的选择受到新闻制作中的业务标准和新闻传播中的市场标准的制约。这主要从新闻价值和新闻要素上理解。新闻价值，是指对一个事件能否成为新闻所做的价值判断。新闻要素，即构成这种价值判断的各种因素，包括时新性，重要性，显著性，接近性，趣味性。
③新闻价值或新闻要素研究，揭示了市场标准是新闻选择中“把关”的重要标准，理解这一点具有重要意义。但市场标准并不是唯一的“把关”标准。传媒组织除了具有经营目标以外，还有自己的宣传目标或社会目标。
综上所述，大众传媒对新闻和信息的选择或“把关”活动是一个复杂的过程。在理解把关活动的实质之际，人们不应仅止于新闻价值或新闻要素分析，而是应该把政治、经济和意识形态因素考虑在内。其原因，具体如下：
第一，大众传媒的新闻或信息的生产与传播并不具有纯粹的“客观中立性”，而是依据传媒的一定立场、方针和价值标准所进行的一种有目的的取舍选择和加工活动。
第二，新闻和信息的选择受到媒体的经营目标、受众需求以及社会文化等多种因素的制约，但是，与媒介的方针和利益一致或相符的内容更容易优先人选、优先得到传播。
第三，传媒的“把关”是一个多环节、有组织的过程，其中虽然也有记者、编辑个人的活动，但在媒介内部控制机制的作用下，个人因素所起的作用是有限的。“把关”过程及其结果，在总体上是传媒组织
的立场和方针的体现。`, explain:`'把关人'理论的核心是：新闻不是'有闻必录'，而是经过层层筛选的。从记者到编辑，每个环节都在决定什么新闻能被报道。把关标准包括：新闻价值（及时性、重要性等市场标准）和政治/经济/意识形态因素。重要的是认识到：把关不只是个人行为，它本质上反映的是媒体组织的立场和方针。`, frame:`起手溯源：卢因提出把关，怀特引入新闻筛选模式。中间写实质不止“挑新闻”，而是标准问题：真实性、时新性、业务与市场价值。收束上升到传媒立场、经营与意识形态，强调多环节组织化把关，个人作用有限。`},
  {ch:4, type:"short", q:`简述处理社区关系的一般做法。`, a:`社区作为组织的经营场所和办公地点的所在地，是组织赖以生存的环境。处理好与社区的关系是组织公关工作的重要任务。
（1）社区关系的含义
社区是一个社会性的概念，是指由共同生活于一定区域的人们因利益关系紧密而构成的一种社会集体。具体地说，居住于一定区域、具有共同联系并彼此交往的人们，就构成了一个社区。例如村庄、集镇、街坊邻居、城市的一个市区或郊区，甚至整个城市，都是在规模上大小不一的社区。
社区是一个相对独立的地域性社会，每个社区都有其特定的人口和特定的地理区域，其居民之间有着某些共同的利益，以及重要的社会交往。社区关系亦称“区域关系”“地方关系”。它是指社会组织与其所在地的地方政府、社会团体和其他组织以及当地居民之间的邻里关系。
（2）建立良好社区关系的意义
建立良好的社区关系，是为了争取社区公众对组织的了解、理解和支持，为组织创造一个稳固的生存环境；同时体现组织对社区的责任和义务，通过社区关系扩大组织的区域性影响，其意义表现在以下几个方面：
①社区关系之间影响着组织的生存环境。
社区如同组织扎根的土壤，没有良好的社区关系，组织就会失去立足之地。社区公众是由特定的活动空间所确定的，区域性、空间性很强。地方性组织的活动直接受社区公众的制约，社区关系便直接影响着组织其他各方面的关系，如员工家属关系、本地顾客关系、地方的政府关系和媒介关系风。跨区域的组织也不能脱离特定的区域，甚至要善于同各种不同背景的社区公众打交道，以争取社区提供各种地方性的服务和支持，使跨区域性组织能够在各种完全不同的社区环境下生存和发展。
②社区关系之间影响着组织的公众形象。
社区公众涉及当地社会政治、经济、文化、教育等各个方面和阶层，类型繁多，涉及面广，对组织客观上存在着各种不同的感受、要求和评价；由于处在同一社区，对组织的某一种评价和看法又极容易相互传播，形成区域性的影响，从而形成组织的某一种公众形象。组织的社区关系好坏，直接影响着组织的社会公众形象。
（3）处理社区关系的方法
①树立居民意识。
从社区公众的角度来看，不论组织的性质、规模等方面如何，但有一点是共同的，那就是每个组织都是社区的一员。因此，组织应自觉遵守社区的各种规定，服从社区公约、行为规范，承担为社区应尽的各种义务。
②为社区建设尽职尽责。
组织在社区除了尽量做好一个好“居民”外，还需要为社区建设尽职尽责，充分利用自己的技术、资金、人才和设备等方面的优势，积极支持社区的全面发展和建设，多为社区提供无偿的服务。
③维护社区的生态环境。
随着全球对环境危机的日益关切以及政府对环境的重视，生态环境问题已成为当前组织所面临的一项重大问题。组织应当树立公众利益优先的思想，在生产经营过程中应树立环保的新形象。为此，组织应花大力气改革传统的工艺流程，减少各种污染，包括水污染、空气污染、噪音污染等，并积极参加绿化工程，开发绿色环保产品，适应绿色消费，通过各种活动来保护环境。`, explain:`处理社区关系就是当好'邻居'。社区是组织扎根的土壤，关系不好就失去立足之地。具体做法三步走：树立居民意识（遵守社区规则、尽居民义务）、为社区建设出力（利用自身优势支持社区发展）、维护生态环境（减少污染、参与绿化）。社区口碑直接影响组织的公众形象。`, frame:`起手说明社区是组织生存土壤并界定社区关系。中间简写意义：环境影响与区域形象。主体落方法：居民意识、尽责建设、环保与绿色责任。收束提醒结构与前面“含义—意义—做法”同序即可。`},
  {ch:4, type:"short", q:`简述公共关系传播有哪些目的？`, a:`（1）公共关系传播的含义
公共关系传播，就是指社会组织综合运用多种传播媒介和传播方式，系统地、有计划地与相关公众以及所在社会进行双向的信息交流，以沟通双方的认识，协调双方的关系，树立起良好的组织形象，进而促进社会文明的建设和社会整体的发展。
（2）公共关系传播的目的
①向公众提供组织的有关信息。
社会组织要使公众对自己的工作、行为、目标有所理解和支持，要使组织中公众中建立起良好的形象，其根本前提就是要让公众对组织的行为、目标有所了解。这就要求公共关系人员必须借助于最有效的传播和沟通手段，经常地向公众提供及时、准确和有说服力的关于组织的最新信息和情况。同时，要想向人们提供有关组织的准确信息，还必须借助沟通渠道了解公众对组织的有关信息，以便使公共关系传播向公众提供的信息更有针对性和说服力。
②影响和改变公众对组织的态度。
社会组织自身形象的好坏直接体现在公众对组织持有的态度之中。公众态度可以分为正态度和负态度，前者是对组织的肯定性评价，后者则是对组织的否定性评价。虽然人们的态度一旦形成就会具有相对稳定的特征，但是随着信息的不断交流和外界条件的变化，人们的态度也是可以转变的。公共关系传播活动就是运用各种传播手段和媒介来促使公众对组织产生好感，由负态度转变为正态度。
③引起社会组织所期待的公众行为。
公共关系传播除了向公众提供信息，改变公众的态度以外，更主要的是促使公众对组织采取理解和支持的行为。公共关系传播的功能就在于要社会组织适应公众环境，要公众环境适应社会组织，从而使社会组织同公众之间达到完美和谐的统一。`, explain:`公关传播有三个核心目的：第一，向公众提供组织信息（让人了解你）；第二，影响和改变公众态度（让人喜欢你，把负面评价变正面）；第三，引发公众的支持行为（让人帮助你）。三个目的层层递进，最终目标是让组织和公众之间达到和谐统一。`, frame:`起手先给公关传播定义：组织运用媒介与公众双向交流。目的分三层递进：提供组织信息并形成双向了解；影响与转变公众态度；导向所期望的支持性行为。收束用一句串起：认知—态度—行动的传播链条。`},
  {ch:4, type:"essay", q:`试述1949年以来香港报业的发展过程及其阶段性特征。`, a:`（1）随错综复杂的政治斗争报业逐渐发展
①战后香港医治战争的创伤，报业逐渐复苏并得以发展。从二战结束到60年代中期，是香港当代报业的第一阶段，这一时期影响香港报业布局和报纸内容的主要因素是中国的政治局势。1949年前后中国共产党和台湾国民党都在香港布置宣传阵线，香港的报业因此而形成左右对峙、左中右三派并存的局面。战后左派爱国报纸发展很快，主要有《大公报》《文汇报》《新晚报》《晶报》《香港商报》，在五六十年代全盛时期，它们曾三分香港报业的天下。香港《大公报》创办于1938年，战后直到年代中，主要由费彝民等负责该报以报道则一经新闻为主，以工商界人士为主要读者对象。《大公报》同时着力经营副刊，并曾一度刊载市民喜闻乐见的武侠小说、马经等内容，创出了特色。香港《文汇报》创刊1948年，其宗旨是以文会友、以文报国，宣传中华文化、促进内外文化的交流，内容重心放在文教方面，以文员和学生为主要读者对象。
②五六十年代香港的右派报纸也颇具竞争力。台湾国民党在香港的宣传喉舌《香港时报》，主要进行反共宣传及宣扬国民党的成就。该报创办于1949年，在台北设有分社，报纸半数销往台湾，《香港时报》的业务特点是，着重经营体育版，体育新闻吸引不少读者。香港还有一些拥护或倾向国民党的商办报纸，其中以《工商日报》为代表。这家大报战前在香港已举足轻重，战后一度与《华侨日报》《星岛日报》几成“三报鼎立”之势。该报支持和拥护台湾国民党政府的重大政策，其读者主要是商界的亲台人士、亲台的“自由工会”的职工。此外，香港部分中间报纸的立场也倾向台湾，在报眉上印有“中华民国”的字样，较有名的有《华侨日报》《星岛日报》。《华侨日报》较注重台湾消息，称台湾为“自由中国”，不过该报在报道手法上能保持中立，允许刊登一些有利于中国大陆的新闻。
（2）在快速腾飞的经济带动下市场化报纸兴盛
①70年代到中英谈判之前，是当代香港报业的第二个发展阶段。香港经济的起飞，为报业的蓬勃发展提供了条件。就报社数量而言，70年代堪称香港报业发展史上最兴旺的时期。随着香港社会本土意识的增强，一批以本地意识为价值取向的商业化报纸，成为香港报业的主流，其中尤以走大众化路线的报纸影响最大。这些报纸较多报道富刺激性或阴暗面的内容，如灾难、犯罪、暴力、性等，并以提供娱乐内容为主，文字上简洁通俗、常用方言俚语。《成报》在二十多年里，一直是办得最成功的一张大众化报纸，销量冠全港报纸之首，但70年代末，创办不到十年的《东方日报》后来者居上，成为近年来香港销量最大的报纸。此外《天天日报》《新报》《快报》等，都是较有影响的大众化报纸。这些大众化报纸以赚钱为目的，奉行在商言商的宗旨，迎合读者的需要，提供不少消遣娱乐的内容和社会环境方面的消息，但同时对社会风气和各层次的读者，也形成负面的影响，对青少年影响尤其大。
②70年代严肃类报纸也在发展，这些报纸注重政治、经济、国际关系、社会福利等内容，比较关心社会事务，重视分析和评论，有较高的采编水平，不搞煽情宣传。在香港，严肃报纸能够生存，主要因为它们创出了特色，《明报》是一个代表。《明报》最主要的特色是其着力经营的中国报道。从60年代开始，该报的中国新闻和有关言论就开始引人注目，内地“文化大革命”中，该报大量刊登文革消息，是除左派报纸外，首家开辟中国消息专版的报纸，并在副刊开辟多个专栏刊登有关中国的“内幕新闻”，备受读者注意。70年代《明报》销量跻身于日报的第三位，仅次于大众化的《东方日报》和《成报》。这个时期专业性报纸也开始发展，香港经济的飞速发展和股市的空前兴旺，给财经类报纸提供较大的发展空间。
（3）过渡时期香港报业异彩纷呈
①过渡时期香港新闻界的社会责任意识逐渐增强，各报对前途的关注就是表现之一。在中英谈判前后，香港报纸纷纷报道“前途新闻”，热闹一时。中英联合声明签署之后，香港报纸的活跃情况和对未来的关注，达到空前的程度。所有报纸均将香港基本法的起草、筹备委员会的工作以及未来特区政府的运作等，作为重大新闻。同时中英对香港事务的安排，如新机场问题、交接仪式事务，也受到传媒的广泛注意。
②过渡时期“中国因素”又开始受到重视。内地改革开放以后，香港报纸获得内地新闻的渠道更广。中英就香港前途的会谈掀起香港记者到大陆采访的第一个热潮，多家报纸开始创设“中国组”，一批采访“两地关系”的记者应运而生。英文《南华早报》《虎报》在报道中国新闻上竞争激烈，中文报纸也更重视中国新闻的质量。香港报纸对中国新闻的报道，内容逐渐多元化，经济消息和软性新闻所占比重增加，而经济报道的重点逐渐从宏观政策转向微观动态。
（4）报业管理的香港化
进入新时期，有关香港新闻传媒的话题，成为香港人谈论的热点之一，其中讨论最多的是新闻自由问题。新闻自由涉及传媒与政治的互动、传媒与政府的关系、新闻法规、新闻道德、新闻自律等多方面的问题。香港有充分的新闻自由，香港的新闻自由又是在多种矛盾中求生存。港英政府制定严苛的管制新闻媒介的法令，但奉行的则是立法严，执法宽的政策，让媒介享有较多的新闻自由。`, explain:`1949年以来香港报业分四个阶段：第一阶段（战后-60年代中）左中右三派并存对峙；第二阶段（70年代）经济起飞带动商业化大众报纸兴盛，《东方日报》《成报》等走煽情路线卖得好，《明报》等严肃报纸靠中国报道创出特色；第三阶段（中英谈判前后）前途新闻成为热点，中国因素回归；第四阶段（回归后）新闻自由问题成为焦点。总体趋势是从政治驱动转向市场驱动。`, frame:`起手总述：香港报业与政治经济互动分期明显。按阶段写战后左右对峙与左中右格局及代表报纸；经济起飞期大众化报纸兴盛与负面效应、严肃报与专业报并存；过渡期对前途与中国新闻升温；管理层面新闻自由与法例矛盾中的运作特征。收束强调：政治变量让位于本土市场与责任意识增强的演变。`},
  {ch:4, type:"essay", q:`论述马克思恩格斯的精神交往理论。`, a:`（1）精神交往论的含义
①交往是一个体现人的总体活动之关系性的概括性范畴。在生产力发展的一定阶段上的一切物质交往，是指以物为媒介的人与人的交往关系。观念、思维、人的精神交往，是指以语言为媒介的人与人的精神交往关系。
②马克思、恩格斯把交往作为与生产力和分工同等重要的范畴来看待。他们认为交往与生产，从人类诞生起就存在着密不可分的关系，没有生产，就不会有交往；没有交往，也就不会有生产。分工产生于生产的需要，而交往则是实现生产和分工的保障。生产力、分工和交往的发展程度，不但决定着一个社会或民族的内部结构，而且制约着他们的外部关系。
③人类的生产活动可以分为两类：一类是物质生产，即生产必需的物质生活资料的生产，与此相应的是人与人之间的物质交往活动；一类是精神生产，即表现在某一民族的政治、法律、道德、宗教、形而上学等的语言中的生产，与此相应的则是人与人之间的精神交往。
④物质生产和精神生产构成了人类生产活动的总体，而物质交往和精神交往则构成了人类交往活动的总体。
（2）精神交往与现代传播间的关系
①联系
精神交往是指以语言为媒介的人与人的社会关系，而在现代传播学当中，传播指的是以信息为媒介的人与人的社会关系，两者涉及的对象和范畴并没有多大差异。
②区别
a.在行为主义传播学里，传播基本上作为孤立的精神或心理现象来看待，他们往往单纯地就信息研究信息、就传播研究传播，而马克思主义精神交往理论则要求把精神交往放在人类社会交往的大系统中加以考察，不但要研究人的精神活动本身，而且要研究精神活动与物质活动的关系、与物质生产和物质交往的关系，有助于我们从更广阔的视野来观察人类社会的传播活动和传播关系。
b.马克思、恩格斯认为，精神交往是与精神生产相联系的，离开了精神生产，就没有精神交往。精神生产既然属于一种生产，必然也存在着生产力和生产关系的辩证运动，因此，人们的精神交往关系也与一定阶段上的精神生产力发展水平以及精神生产资料的占有方式密切相关。美国的行为主义传播学有意无意地回避这些重大问题，因而不能从根本上揭示人与人之间的传播关系的本质。
c.从马克思主义观点来看，精神生产既然是一种生产，就必然有它的产品。精神生产的产品在现代社会更多地表述为信息，从事精神产品生产的行业称为信息产业。物质产品的消费大多是一次性的，而信息产品的消费则一般是多次性的。精神内容的生产与一定的思想、观念、意识、道德、政治、法律、宗教和意识形态相联系，这是马克思主义的一个基本观点。美国行为主义传播学虽然不否认信息中包含着思想观念和价值倾向，然而却不想从信息的生产过程和生产结构中去寻找这些倾向产生的原因。
（3）精神交往论的启示
①一定的精神生产和精神交往与一定的物质生产和物质交往相适应。
人类的精神生产和精神交往起源于物质生产和物质交往活动，物质生产力的发展水平对精神生产和精神交往起着重要的制约作用，精神生产和精神交往关系反映着物质生产和物质交往关系。研究现代信息社会，决不能忽视精神生产资料的占有方式和社会制度对信息生产和信息传播的制约作用。
②精神生产和精神交往除了受到物质生产和物质交往制约，还有其独立性和能动性。
这主要表现在精神生产和精神交往的发展，反过来也推动着物质生产和物质交往的发展。在物质生产达到一定的发达程度之际，精神生产的状态如何将会成为制约社会发展的主要矛盾。精神生产和精神交往既然与物质生产和物质交往相区别，那么它就具有与物质生产和物质交往不同的特殊规律。`, explain:`马克思恩格斯的精神交往理论核心观点：人类活动分物质生产和精神生产，对应物质交往和精神交往。精神交往（传播）不能孤立看，必须放在整个社会关系中考察——它受物质生产制约（经济基础决定上层建筑），但也有独立性和能动性（能反过来推动社会发展）。跟西方行为主义传播学不同，马克思主义要求我们关注传播背后的权力结构和生产关系。`, frame:`起手界定精神交往：以语言为媒介的观念互动，并与物质交往并列。中间写与生产分工关系及精神生产概念。对比传播学：对象相近但马克思主义强调整体社会系统、精神生产关系与信息意识形态根源。收束写启示：物质制约与相对能动并存，研究信息社会不可忽视制度与生产资料占有。`},
  {ch:3, type:"essay", q:`什么是广告战略？（4分）案例中所说的王老吉的蓝海战略的实质是什么？（6分）`, a:`（1）广告战略是指在一定时期内指导广告活动的带有全局性的宏观谋略。广告战略是广告发布者在宏观上对广告决策的把握，它是以战略眼光为企业长远利益考虑，为产品开拓市场着想。广告战略具有全局性、指导性，对抗性、目标性、稳定性的特征。它规范着广告活动的实施并对各个广告环节有指导作用。
广告战略的目的是提高广告宣传效果，使企业以最低的开支达到最好的营销目标。在当今市场竞争日趋激烈的情况下，一个企业、一种产品要在市场上取得立足之地，或者为了战胜竞争对手以求得发展，几乎都与正确地运用广告战略有着密切关系。广告战略是依据市场营销战略，为广告活动策定包含如下内容的基本计划：①以市场营销战略为核心，具有明确的广告目的；②选定为达成其目的的目标市场；③设定诉求主题；④媒介组合；⑤与其他促销活动相互配合，相互协调。
广告战略经过周密的调查研究，高瞻远瞩，审时度势，从战略的眼光出发，进行长远的全局的谋划，不失时机地为着实现企业总的战略目标服务的。正确的营销战略，是广告战略的基础；敏锐的战略眼光，是制定有效的广告战略的前提。
（2）王老吉的蓝海战略的实质
王老吉公司的蓝海战略提出了其准确的定位，包括其产品、广告主题以及包装价格等。从此以后王老吉不再陷于药饮和普通饮料难以界定的尴尬局面，而是将自身定位为具有预防上火功效的饮料。王老吉采用了差异化战略，从一种新角度来满足市场需求，开创新的市场空间，提升其产品的核心竞争力。同时在准确定位的基础上，通过央视以及地方强势媒体的组合进行大规模宣传，使其顺利地引起消费者注意，迅速在饮料市场占有了一席之地。王老吉的蓝海战略打破了价格与成本之间的常规法则，在实现差异化的同时，还实现了规模化和低成本，并且协同和提升了整个企业经营活动。`, explain:`广告战略就是站在全局和长远角度规划广告活动的宏观方案。王老吉的蓝海战略实质是：通过准确的差异化定位（从'凉茶'重新定位为'预防上火的功能饮料'），开辟了一个没有竞争对手的新市场空间。再配合央视和地方媒体的大规模广告投放，迅速占领了消费者心智。`, frame:`起手定义广告战略：指导较长时期广告活动的全局性谋略，并点全局性、指导性、对抗性、目标性、稳定性等。补充其与营销战略衔接的要素。后半转案例：王老吉蓝海在“预防上火饮料”差异化定位、媒体组合放大认知、以价值创新同时追求规模与低成本。收束回扣：战略是定位—传播—经营协同。`},
  {ch:3, type:"essay", q:`请结合案例说明广告定位与广告战略的关系。（6分）`, a:`（1）广告定位是广告代理和企业根据消费者的需求、关注点和偏爱，确定准备宣传的商品的市场地位，也就是在市场上树立产品的恰当形象，确定其所扮演的角色。定位的重点在于对潜在消费者的心理施加影响，使其产生一种符合广告主心愿的印象。
（2）广告战略是广告定位的基础和前提，广告战略根据营销计划和前期的调查与分析确定目标受众，了解目标受众、受众特点、受众对产品类别和产品品牌的态度及使用习惯。王老吉将其产品定位为功能型饮料是在寻求差异化广告战略的前提下提出，是差异化广告战略的有力体现和诠释。
（3）广告定位是广告战略的细化和提升。王老吉确定了功能型饮料的新市场定位，使其广告战略更加清晰和形象化，因此凭借该定位提出了“怕上火，喝王老吉”的广告主题。通过广告宣传在消费者心目中快速形成品牌认知，为王老吉的广告战略进一步推广和实施添足了马力，强化了战略实施的可操作性。`, explain:`广告定位和广告战略的关系：战略是基础，定位是细化。王老吉先确定了差异化战略（要跟其他饮料不一样），然后在此基础上做出'功能饮料'的精准定位。反过来，这个定位又让战略更加清晰和可执行，催生了'怕上火喝王老吉'的经典广告语。战略和定位是互相支撑的关系。`, frame:`起手分别定义广告定位与广告战略。中间写关系：战略通过调研与受众分析为定位提供前提；定位把战略具体化为心理占位与诉求。案例串王老吉：差异化战略下形成功能饮料定位与“怕上火”主题相互强化。收束一句：定位提升战略的可执行性与识别度。`},
  {ch:3, type:"essay", q:`请结合红罐王老吉的做法，说明广告定位的方法有哪几种？（6分）请用你自己的理解，阐述“怕上火，喝王老吉”这一新的广告定位与原来相比有哪些优势？（8分）`, a:`（1）广告产品定位策略包括实体定位策略和观念定位策略两大类。
①实体定位
a.功效定位。功效定位就是在广告活动中突出产品的特异功效，使该产品在同类产品中有明显区别，以增强选择性需求。它是以同类产品的定位为基准，选择有别于同类产品的优异性为宣传重点，以增强产品的竞争力。
b.品质定位。品质定位是通过强调产品具体的良好品质而对产品进行定位。其实质也就是通过广大消费者对产品品质的认识来启动自己的需求欲望和购买欲望并在其心目中确定了产品的位置。
c.市场定位。市场定位是市场细分策略在广告中的具体运用，将产品定位在最有利的市场位置上。它又称目标市场定位。
d.价格定位。价格定位是指因产品的品质、性能、造型等方面与同类产品相近似，没有什么特殊的地方可以吸引消费者，在这种情况下，广告产品便可以运用价格定位策略，使商品的价格具有竞争性，从而击败竞争对手。
②观念定位
a.逆向定位。逆向定位是借助于有名气的竞争对手的声誉来引起消费者对自己的关注、同情和支持，以便在市场竞争中占有一席之地的广告产品定位的方法与策略。
b.是非定位。是非定位是从观念上人为地把产品市场加以区分的定位方法。
c.品牌定位。产品的高级阶段是形成该行业的品牌，也就是说品牌是对所有产品信息的综合。这个过程正是广告的用武之地。
（2）王老吉新广告定位的优势
①王老吉新广告展现了王老吉从“凉茶”到“功能性饮料”的功效定位变迁及准确诉求，是王老吉深度差异化战略的有力诠释，富有成效地把竞争者一步步甩开，开拓了一片竞争较小的市场空间，开拓了功能性饮料的蓝海市场，获得了差异化和低成本的复合效果，实现了产品的价值创新，赢得了强大的市场竞争优势，夯实了自身的品牌实力。
②“怕上火，喝王老吉”新的广告定位，利用了产品本身药用价值，提高了王老吉的品牌势能，在受众心目中形成了强烈的产品及品牌认知，王老吉是可以祛火的功能观念在消费者的消费过程中逐步变得根深蒂固。
③“怕上火，喝王老吉”新的广告定位所带来的消费者心理需求上的满足，更增加了王老吉在市场竞争上的成功砝码。当今中国社会正处在改革开放及经济发展的转型时期，与此同时，伴随着信息技术革命所带来的全球化也使公众从心理上感受到了更多的不确定因素，这内外双重叠加的不确定性，使得公众承受了超乎以前任何时代的心理压力，从而演变成了一种心理“上火”所导致了精神焦虑。“怕上火，喝王老吉”的广告诉求，从深层次和潜意识里可以帮助公众在一定程度上消除这种焦虑，使消费者在实体价值之外得到了心理、情绪等方面的更大满足和安慰，这是王老吉新定位的隐性优势，也是更为强大的优势。`, explain:`广告定位方法分两大类：实体定位（功效、品质、市场、价格）和观念定位（逆向、是非、品牌）。王老吉用的是功效定位——突出'预防上火'的功能。'怕上火喝王老吉'的新定位有三大优势：第一，开辟了功能饮料蓝海市场；第二，把药用价值转化为品牌认知，让'上火就喝王老吉'变成消费者的条件反射；第三，暗合了现代人的焦虑心理，不只是身体降火，更是心理安慰。`, frame:`前半按两大类列方法：实体定位（功效、品质、市场、价格）与观念定位（逆向、是非、品牌等），结合红罐王老吉说明主要落在功效与市场空白的功效—品类重塑。后半对比旧定位：新定位把凉茶药用价值转译为日常功能饮料场景，打开蓝海、提高品牌势能与心理安抚（焦虑时代“上火”隐喻），优势从差异化、认知深度到情绪满足三层收束。`},
  {ch:5, type:"noun", q:`小报`, a:`小报最早出现于北宋末年，盛行于南宋，是中国古代的非法报纸。其内容以邸报还没有发表或不准备发表的“朝廷之差除，台谏百官之章奏”为主，旨在为关心政局的官僚士大夫提供参考；小报所刊载的消息，不完全可靠；有时被利用来作为党同伐异的材料。发行小报的是一部分驻在首都负责传送邸报的各地进奏官、个别政府中下级官员、一部分坊间书肆的主人。宋朝的封建统治者严禁小报的出版，但难为禁绝。元明清等朝也出现过类似小报的出版物，当时称为“小本”“小钞”或“报条”，同样遭到封建统治者的查禁。`, explain:`小报最早出现在北宋末年，是古代的'非法出版物'。内容主要是邸报上没有或不准公开的朝廷消息，满足官僚士大夫对政治内幕的需求。发行人包括进奏官、中下级官员和民间书商。朝廷一直在禁止但始终禁不绝，说明民间对政治信息的需求是压不住的。`, frame:`起手定性：宋代以降非法民间新闻性传播。中间写内容来源、对象与可靠性问题及党争工具化风险。收束写传播者构成与屡禁不止，并点到后世类似形态，突出其与官方邸报的关系。`},
  {ch:5, type:"noun", q:`《法兰西共和国公报》`, a:`《法兰西共和国公报》是巴黎公社时期最重要的报纸。它原是梯也尔政府机关报，1871年3月18日起被法国国民自卫军接管，巴黎公社成立后成为公社机关报，共出版66期。该报除发布重要宣言、法令、决议和指示外，还澄清事实真相，戳穿敌人的谎言。后该报印刷发行业务落入私人之手，文风刻板，不太关心群众利益。`, explain:`这是巴黎公社的官方报纸。1871年巴黎起义后被公社接管，用来发布法令、澄清事实、反驳敌方谎言。一共出了66期。但后来因为印刷业务落入私人手中，报纸变得官僚刻板，脱离了群众。`, frame:`起手说明巴黎公社时期最重要机关报地位与原政府报背景。中间写报道法令、澄清事实、反对造谣。收束指出后期私营化后脱离群众的局限，体现革命报刊的转折。`},
  {ch:5, type:"noun", q:`“黄色新闻”`, a:`黄色新闻是指以煽情手法炮制的新闻。它是建立在煽情主义基础上，注重犯罪、丑闻、流言蜚语、离婚、性的问题，强调灾害和体育新闻的报道。黄色新闻报道的特殊做法包括：①使用大字号煽动性标题（黑体字或套红色印刷），经常对不甚重要的新闻加以渲染、夸张，整个报纸版面给人以耸人听闻的虚感；②滥用照片，以至偷窃和伪造照片；③种种欺骗手法，如捏造访问内容和新闻报道，歪曲性的标题，假科学，假学术；④星期日增刊，登载彩色滑稽连环画和肤浅的文章；⑤标榜同情“受压迫者”，发动运动反对平民所遭受的欺辱。`, explain:`'黄色新闻'就是用煽情手法炮制的新闻，特点是：大标题耸人听闻、滥用照片甚至造假、捏造采访内容、靠犯罪丑闻性暴力吸引眼球。名字来源于19世纪末纽约报纸上的黄色漫画专栏。虽然它标榜'同情受压迫者'，但本质上是为了卖报纸而不择手段。`, frame:`起手定义黄色新闻为煽情主义报道潮流。中间列常见议题与版式手法，并点夸张标题、照片滥用、欺骗性操作等。收束评价：以刺激阅读与商业竞争为导向，损害新闻专业规范。`},
  {ch:5, type:"noun", q:`传播过程的直线模式`, a:`传播过程的直线模式是指描述传播过程的“5W模式”和“香农-韦弗”的数学模式通称为。这种模式的缺陷是没有考虑到传播的反馈因素和体现社会传播因素的双向性。1948年，哈罗德·拉斯韦尔在其《传播在社会中的结构与功能》一文中提出这个模式，被视为传播过程研究的经典模式，称之为“拉斯韦尔公式”。该模式将传播过程分为以下五个基本要素（谁who、说什says what、通过什么渠道in which channel、对谁 to whom、取得什么效果 with what effect），并按照一定的结构顺序将它们排列。1949年，C．香农（ClaudShannon）和W.韦弗（Weaver）在《传播的数学理论》中提出的用以解释电报通信过程的传播模式。他们认为，整个传播过程中存在与通道中的噪音干扰可能会导致发出的信号与接收的信号之间产生差别，从而使得由信源发出的讯息与由接收器还原并到达信宿的讯息二者的含义可能不一样。数学模式把传播描述成一种直线的单向传播过程，整个过程由5个环节和一个不速之客 噪音构成。“噪音”概念的引入，是这一模式的一大优点。`, explain:`传播过程的直线模式有两个代表：拉斯韦尔的5W模式（谁说了什么通过什么渠道对谁说取得什么效果）和香农-韦弗的数学模式（增加了'噪音'概念，说明信号传输中会有干扰）。这两个模式的共同缺陷是把传播看成单向过程，没有考虑反馈和双向互动。`, frame:`起手说明直线模式主要指5W与香农—韦弗数学模式。中间概述要素与噪音概念的价值。收束写缺陷：忽视反馈与社会过程，难完整解释大众传播，为后续循环与系统模式铺垫。`},
  {ch:5, type:"noun", q:`媒介控制`, a:`媒介控制通常包括国家和政府的政治控制，利益群体和经济势力的控制，广大受众的社会监督控制，传媒的内部控制等。①国家和政府的政治控制是媒介控制的主要方面。这种控制的目的，是通过规定大众传播体制，制定有关法律、法规和政策，来保障媒介活动为国家制度、意识形态以及各种国家目标的实现服务。②媒介控制中存在着种种社会利益群体和经济势力的控制。由于这些控制也是在一定社会制度和传播制度的范围内进行的，因此也带有明显的制度性因素。社会群体能够通过自己的媒介来维护自身的利益，传播自己的主张。资本主义制度下，除了垄断资本和少数大利益集团外，一般社会群体的传播权利是不能得到保障的，传播媒介的控制权主要掌握在垄断资本手中。③许多传播内容会直接影响到受众的利益。因此，广大受众对传播媒介的活动拥有进行社会监督的正当权利。受众进行社会监督控制的手段包括：
a.个人信息的反馈。b.结成受众团体，以群体运作方式对媒介活动施加影响。c.诉诸于法律手段。d.通过影响媒介的销售市场来制约媒介活动。④传媒的内部控制。传媒的内部控制是指大众媒介的编辑方针，是大众传媒的自律。`, explain:`媒介控制就是各种力量对媒体行为的制约。四种控制方式：政府通过法律法规进行政治控制（最主要）、利益集团通过经济手段施加影响、受众通过反馈投诉和市场选择进行社会监督、媒体自身通过编辑方针进行内部自律。`, frame:`起手总括媒介受多重力量约束。分述政治与法律体制控制、利益集团与经济势力、受众社会监督、传媒内部编辑方针与自律。收束强调：把关并非单一主体，而是制度、市场与公众互动的结果。`},
  {ch:5, type:"noun", q:`意见领袖`, a:`意见领袖是指活跃在人际传播网络中，经常为他人提供信息、观点和建议，并对他人施加个人影响的人物。他们在大众传播效果的形成过程中起着重要的中介或过滤的作用，由他们将信息扩散给受众，形成信息传递的两级传播。意见领袖一般颇具人格魅力，具有较强综合能力和较高的社会地位或被认同感。在社交场合比较活跃，与受其影响者同处一个团体并有共同爱好，通晓特定问题并乐于接受和传播相关信息。在信息传播中，信息输出不是全部直达普通受传者，有的只能先传达到其中一部分，而后再由这一部分人把讯息传递给他们周围的最普通的受众。有的讯息即使直接传达到普通受众，但要他们在态度和行为上发生预期的改变，还须由意见领袖对讯息做出解释、评价和在态势上做出导向或指点。`, explain:`意见领袖就是人际传播网络中的'关键节点'——那些爱看新闻、爱分享观点、对身边人有影响力的人。媒体信息先传到他们那里，经过他们的解读和推荐再传给更多人。他们通常社交活跃、在某个领域很懂行、乐于分享，是信息传播链条中不可或缺的中间环节。`, frame:`起手界定意见领袖处于人际网络中介位置。中间写其提供信息、解释与影响两级传播路径，并点人格、地位、活跃度等条件。收束提醒：答题抓“过滤—放大—导向”机制即可。`},
  {ch:5, type:"noun", q:`购买决策过程`, a:`购买决策过程一般由引起需要、收集信息、评价方案、决定购买和购买后行为五个阶段构成。①引起需要，从购买者对某一问题或需求的认识开始。内在的和外部的刺激因素都可能引起需求。②收集信息，一位被唤起需求的消费者可能会去寻求更多的信息。消费者信息来源主要有个人来源（如家庭、朋友、邻居、熟人）、商业来源（如广告、推销员、经销商、包装、展览）、公共来源（如大众传播媒体、消费者评审组织等）、经验来源（如处理、检查和使用产品）等。③评价方案，消费者的评价方案包括：a.产品属性；b.属性权重；c.品牌信念；d.效用函数；e.评价模型。④决定购买。⑤购买后行为。消费者在购买产品之后会体验某种程度的满意感和不满意感。营销者必须监视购后满意、购后行为、购后产品的使用和处理。购买者的满意感是其产品期望和该产品可认知绩效之间的函数。`, explain:`购买决策过程分五步：产生需求→收集信息（从朋友、广告、媒体等渠道）→评估比较方案→做出购买决定→购后体验（满意就复购，不满意就吐槽）。广告主要在前两个环节发挥作用：唤起需求和提供信息。`, frame:`起手给出五阶段框架。依次用短句说明从需要唤起、信息搜寻、方案评价、购买到购后满意与行为反馈。收束点营销含义：企业应管理期望与购后体验以减少失调。`},
  {ch:5, type:"noun", q:`地方性广告`, a:`地方性广告是针对本地的广告。地方性广告强调价格、可获得性、地理位置以及营业时间等信息。地方性广告主是积极的整合营销传播的倡导者。地方性广告的传播范围更窄，市场范围更小，选用的媒介多是地方性传播媒介，如地方报纸、电台、电视台、路牌、霓虹灯等。地方性广告多为配合密集型市场营销策略的实施，广告宣传的重点是促进人们使用地方性产品，或认店购买。`, explain:`地方性广告就是针对本地市场的广告，强调价格、地址、营业时间这些实用信息。用的也是地方性媒体如当地报纸、电台。目的是让本地消费者知道'你在哪、卖什么、多少钱'，促进到店购买。跟全国性广告侧重品牌形象不同，地方性广告更注重直接带来销量。`, frame:`起手界定：面向本地市场、强调可得性与地理便利的广告。中间写媒介选择与密集型分销策略配合。收束点出传播范围窄、促进到店与本地消费转化的目标。`},
  {ch:5, type:"noun", q:`《舆论明鉴》`, a:`《舆论明鉴》是爱德华·伯奈斯（或译为爱德华·伯内斯）所著的第一本公共关系专著。1923年出版，它的出版标志着系统的公共关系学科研究的开始。该书首次提出并论述“公共关系咨询”的概念，并阐述了“公共关系咨询”的两个作用：①推荐导致商业界和工业界执行合理的社会行为的对策；②通过宣传这些政策和行为，为其委托人赢得公众的支持和好感。该著作在公共关系理论的发展史上具有重要意义。`, explain:`《舆论明鉴》是伯尼斯1923年出版的第一本公共关系专著，标志着公关学科研究的正式开始。书中首次系统提出了'公共关系咨询'的概念，阐述了公关咨询的两大作用：帮企业制定合理的社会行为策略、通过传播为客户赢得公众好感。`, frame:`起手点明作者伯内斯1923年首部公关专著地位。中间写提出“公共关系咨询”概念及两大作用：促进行为合理化与通过宣传赢得支持。收束评价：标志公共关系系统化理论研究开端。`},
  {ch:5, type:"noun", q:`危机公关的“3T”原则`, a:`危机公关的“3T”原则是危机处理的一个法则，有三个关键点，每个点以“T”开头，所以称之为“3T”原则。具体包括：①Tell You Own Tale（以我为主提供情况）。强调政府牢牢掌握信息发布主动权。②Tell It Fast（尽快提供情况）。强调危机处理时政府应该尽快不断地发布信息。③Tell It All（提供全部情况）。强调信息发布全面、真实，而且必须实言相告。该原则由英国危机公关专家里杰斯特（M.Regester.Michael）在《危机管理》（Crisis Management）一书提出，强调危机处理时把握信息发布的重要性。`, explain:`危机公关的3T原则由英国专家里杰斯特提出，核心就是三句话：Tell Your Own Tale（自己主动说，掌握信息发布主动权）、Tell It Fast（快速说，第一时间不断发布信息）、Tell It All（全部说，信息要全面真实）。简记：主动、快速、全面。在危机中谁先发声、说得快说得全，谁就掌握了舆论主导权。`, frame:`起手说明3T是危机信息发布准则。分条对应：以我为主掌握主动权、快速持续发布、全面真实不隐瞒。收束交代里杰斯特出处并提醒：答题核心是危机沟通节奏与可信度的统一。`},
  {ch:5, type:"short", q:`简述传播制度如何体现“全部社会结构和社会关系的复杂性”。`, a:`（1）大众传播概述
大众传播是一个具有强大影响力的社会信息系统，任何一个国家和社会都会把它纳入社会制度的轨道，
因此大众传播也是一种制度化的传播。
大众传播在特定的社会制度条件下进行。传播制度是现代社会结构的重要组成部分。社会制度，是指在特定的社会活动领域中围绕着一定目标形成的具有普遍意义的、比较稳定的和正式的社会规范体系，包括政治法律制度、经济制度和思想文化制度等。一定的社会制度对大众传播的控制，体现为一定形态的传播制度，因此，传播制度也就是社会制度中对大众传播活动直接或间接地起着制约和控制作用的部分。
（2）传播制度作为社会制度的反映，反映着现代社会诸多社会关系
其内容十分复杂，它体现了社会制度或制度性因素在各个方面对传播媒介活动的制约和影响。传播制度中既包括媒介与政府的关系问题，也包括媒介与社会群体以及广大受众的关系问题；既包括言论出版的自由与权利问题，也包括言论出版者所应承担的社会责任和义务问题。
（3）传播制度体现了全部社会结构和社会关系的复杂性
传播制度从国家和政府的政治控制、各种利益群体和经济势力对传播媒介的控制，以及广大受众的社会监督控制这三个方面对大众传播起着控制和制约作用的社会规范体系。`, explain:`传播制度就是社会对媒体的'规矩'。它之所以体现社会关系的复杂性，是因为它涉及三方面的控制：政府的政治控制（通过法律法规）、利益集团和经济势力的控制（谁出钱谁有话语权）、受众的社会监督（公众的反馈和维权）。媒体处在这三股力量的交汇点上，所以传播制度必然反映出整个社会结构的复杂面貌。`, frame:`起手用一两句点明：传播制度是社会制度的一部分，大众传播被纳入制度化轨道。接着分两层展开：先说明传播制度如何体现政府、利益群体、受众及权利义务等多重关系；再落到答案的核心句——从国家政治控制、利益群体与经济势力控制、受众社会监督三方面概括制约体系。收束回扣题干：正因为关涉多重力量，才体现社会结构与社会关系的复杂性。`},
  {ch:5, type:"short", q:`简述群体传播的社会功能。`, a:`人以群体的形式进行活动，是人的社会性的体现。每一个人都生活在一定的群体之中，是群体传播的参与者。
（1）群体传播具有重要的社会功能，即群体是将个人与社会相联结的桥梁和中间纽带。群体是社会的中观系统，是社会的组成部分，或是“局部社会”。
（2）个人在参与社会活动之际，首先是作为局部社会-群体的一员出现，一个人如果不能做一个合格的群体成员，同样也做不了合格的社会成员。群体帮助个人完成社会化过程，训练和分配社会角色，形成社会规范和准则，调节和控制个人的行为。
（3）群体传播，有助于社会秩序的维持，使社会秩序的连续性得到保证。
（4）群体通过社会分工与协作，将分散的个人力量集结起来，能够完成个人所不能完成的社会工作和事业。因此，群体同样是推动社会发展的重要力量。`, explain:`群体传播你可以理解成“人和大社会之间的一座桥”。人不是一出生就会按社会规则做事的，很多规矩、角色和价值观，都是先在家庭、班级、单位这些群体里慢慢学会的。同时，群体还能把分散的个人组织起来，去完成一个人做不了的事，所以它既帮个人完成社会化，也帮社会维持秩序、推动合作。`, frame:`先交代人与群体、群体传播的前提。然后按答案顺序写功能：群体是个人与社会的桥梁（中观纽带）；参与群体是个人社会化的途径（角色、规范、行为调节）；再写对秩序连续性的作用；最后写分工协作集结力量、完成个人无法承担的社会任务。收束可点明：群体传播既是社会化机制，也是社会整合与发展动力。`},
  {ch:5, type:"short", q:`我国当代广告业的发展经历了哪几个阶段？`, a:`我国当代广告业的发展经历了以下几个阶段：
（1）初步恢复阶段
从20世纪50年代一直到70年代末“文化大革命”结束，这段时间由于计划经济体制和政治环境的影响，中国的广告业处于停滞甚至消亡的状态。户外广告被拆除，换成政治宣传标语；报纸数量减少，报纸广告逐渐消失。
中国共产党第十一届三中全会召开，会议提出将全党的工作重心转向社会主义现代化建设，这标志着改革开放时代的到来。1979年初，报纸媒体率先恢复广告业务。广告解禁，并逐步被社会接受。广告管理逐渐规范化。1981年，中国对外经济贸易广告协会成立。1982年，国家工商总局下设广告司，国家工商总局颁布《广告管理暂行条例实施细则》。国有大型广告公司组建。1981年，中国广告联合总公司成立，它是我国第一家集团性广告公司。广告研究和广告教育起步1983年，厦门大学开办广告学专业，这是我国高等院校开办的第一个广告学专业。
（2）补偿性发展阶段
经过了复苏时期的发展，20世纪80年代中期到90年代中期的中国广告业进入到一个以“低起点、高速度”为特点的补偿性发展阶段。市场上存在着大量中小型公司，在经营过程中也有很多不规范的行为。
在这个阶段，不少国内企业逐步认识到广告的作用，在广告特别是电视广告上的大量投入造就了一批知名品牌，这些品牌包括燕舞、大宝、太阳神、健力宝、郑州亚细亚等。尽管此时广告主的广告活动还相对单一，但是市场反应却非常好。在经历长期的物资短缺经济之后，这些率先进行广告宣传的企业，很容易就在消费者的空白心智中留下了深刻的印象。这一阶段从广告中得到好处的企业正在经历它们与广告的
“蜜月期”。
从20世纪80年代中期以来，全球顶尖的广告公司陆续登陆中国，这些公司最初进入中国市场的直接理由是它们代理的国际品牌客户进入了中国市场。
（3）转型发展阶段
20世纪90年代中期以来，上一个10年出现在中国广告市场的那种高速发展已发生明显的转变，在大多数年份，广告营业额的增长都在10％～20％之间。广告市场营业额增长率的趋缓。
经过长时间的酝酿之后，《中华人民共和国广告法》于1994年颁布，并于次年正式实施。
在本阶段，作为广告主体重要组成部分的媒介格局发生很多变化，这些变化包括报纸扩版、省级卫视上星、互联网渗透率提升、楼宇广告等新型广告形式涌现等等。广告主趋向成熟。国际化广告公司在这个阶段完成了从登陆到布局到占据领导地位的过程。广告行业格局的这种变化是经济全球化的必然结果。`, explain:`我国当代广告业大致走了几步路。改革开放前，受计划经济和政治环境影响，广告基本停摆；1979年以后开始恢复，报纸、电视先后重新做广告，行业算是“活过来了”；接着80年代进入快速补偿性发展期，广告公司、广告教育、行业管理都起来了；再往后就是逐渐成熟，法律更完善、竞争更激烈，广告也越来越专业化、市场化。`, frame:`按时间轴分三段最清晰。第一段写50年代至文革末的停滞与户外、报纸广告状况，用十一届三中全会转折，点到1979恢复、管理规范、协会与广告司、中广联、厦大专业等标志性节点。第二段写80年代中至90年代中“低起点高速度”的补偿期、不规范与电视造牌、国际品牌入华。第三段写90年代中以来增速放缓、《广告法》、媒介变局、广告主成熟与外资布局。最后用一句概括：从恢复到补偿再到转型。`},
  {ch:5, type:"short", q:`简述公共关系传播的模式。`, a:`（1）公共关系传播是指特定的社会组织为实现公共关系目标，综合运用各种传播方式和传播媒介，有计划地与公众进行信息交流沟通的活动过程。
（2）公共关系传播的基本模式
对于公共关系实践中所形成的传播模式，美国的葛罗尼格（J.E.Gruning）和亨特（T.Hunt）把它概括为四种模式：宜传型、公共信息型、双向非对称性、双向对称型。
①宣传型模式。这种模式旨在通过新闻宣传制造轰动效应，以吸引公众的注意力，传播性质为单向。
②公共信息型模式。传播组织的真实情况，以便公众了解组织，传播性质为单向
③双向非对称型模式。这种模式目的在于通过科学方法，诱导和劝服公众接受组织的某种观点，并进而支持组织的行为方式，此传播模式性质虽为双向，但其在组织和公众之间的效果并不均衡，它相对来说只有利于组织，公共关系人员作为信息的提供者吸引公众的反馈意见仅为提高诱导劝服工作的有效性。
④双向对称型模式。它强调对话，注重坦诚、完整、准确的双向交流，目的是促进相互理解，其传播性质是双向的，且在组织和公众之间的传播效果是均衡的。
（3）公共关系传播模式的发展趋向
从历史的、发展的角度来分析这四个传播模式，还可看到人类对公共关系传播这一事物的认识发展趋向。这种发展趋向主要表现为：
①对公共关系传播功能的认识，从主观宜扬，客观提供信息，科学诱导，到促进相互理解的发展趋向。
②对公共关系传播方式的认识，从线性的单向传播、利用反馈的双向沟通，到双向传播沟通的发展趋向。
③对公共关系传播关系的认识，从任意支配公众、不对称的双向沟通关系，到双向对等共享信息的传播关系的发展趋向。`, explain:`公共关系传播常说有四种模式。最早的是宣传型，就是单向往外喊，重点是制造声势；公共信息型也是单向，但更像发官方通报，主要告诉公众“我们是什么情况”；双向非对称型开始听反馈了，不过目的还是更有效地说服公众；双向对称型才最理想，强调组织和公众平等沟通、互相调整。简单说，就是从“我只管说”慢慢走向“我认真和你谈”。`, frame:`先下定义：组织为公关目标综合运用媒介与方式的信息沟通过程。主体部分按葛罗尼格与亨特四模式逐项简写性质与目的（宣传、公共信息、双向非对称、双向对称）。最后单列“发展趋向”三条：功能上从宣传到理解；方式上从单向到双向沟通；关系上从不对称到对等共享。`},
  {ch:5, type:"essay", q:`以埃德加·斯诺为例，简述早期外国记者对中国社会的客观报道及其积极作用。`, a:`（1）埃德加·斯诺在中国的活动
①埃德加·斯诺简介
埃德加·斯诺，美国新闻记者、作家，1928年秋来到中国，1928年9月至1930年3月，在美国人办的报纸《密勒氏评论报》任助理编辑、代理主编等职，兼任美国《芝加哥论坛报》驻远东记者，发表不少新闻作品，描绘了中国人民的苦难生活。1933年至1935年，任燕京大学新闻系讲师，同时兼任美国《纽约太阳报》和英国《每日先驱报》特约记者。“一二·九”运动爆发后，积极支持爱国的学生运动。
②斯诺在革命根据地的采访活动
1936年6月，斯诺在中国共产党地下组织的联系与协助下，离开北平到达西安，后进入陕北革命根据地。斯诺在陕北根据地进行了广泛的采访，见到了毛泽东、周恩来等中共领导人，又到甘肃、宁夏红军前线部队访问彭德怀等军队领导人。毛泽东多次同他长谈，包括他的革命经历和长征的经过等。斯诺还拍摄了许多照片，其中有著名的毛泽东头戴缀有五角红星的八角帽的照片。
③《西行漫记》的出版
1937年，在这些报道的基础上，他写成《红星照耀中国》一书，中文版书名为《西行漫记》。由于这
部书较早地公开介绍了中国共产党的革命斗争及其领导人的情况，出版后广泛流传，影响巨大，成为传诵一时的名著。
（2）早期外国记者对中国社会的客观报道及其积极作用
早期的外国进步记者，怀着崇高的职业使命感，以极大的勇气，甚至冒着生命危险深入革命根据地域进行采访报道。他们的报道对中国的抗战胜利、统一战线的维护以及取得国际的支持等方面都起到了重要的作用。纵观早期外国记者对中国社会的客观报道，其积极作用主要体现在以下三个方面：
①打破了国民党的新闻封锁，展现了革命根据地的真实面貌。
抗战的大部分时间，国民党一直对革命根据地实行严密的新闻封锁，企图割断解放区与外界的联系。与此同时，国民党顽固派还用一切不实之词对共产党中央及八路军、新四军进行造谣、诬蔑。而外国记者对于革命根据地的采访报道，打破了国民党的新闻封锁，戳穿了国民党的造谣、诬蔑，向世人展现了中共和根据地的真实面貌。
②架起沟通之桥，推动中国共产党为世界舆论所接受。
由于国民党的新闻封锁和造谣、诬蔑，使得美英等盟国对中国共产党缺乏基本的认识。他们对于中共的抗战情况只能得到一些片面的、间接的甚至是国民党当局编造出来的虚假信息。而外国记者对共产党的报道就成为盟国政府官员了解中共的重要渠道，也成为盟国政府对华决策过程中的一个重要信息来源。
③制约了国民党当局的反共图谋，维护了抗日民族统一战线。
抗日民族统一战线是中华民族抗战取得胜利的根本保证，而国民党顽固派却不断挑起事端破坏统一战线，致使统一战线多次面临破裂的危险。共产党为维护抗日民族统一战线，与国民党顽固派进行斗争的同时也做出了巨大的牺牲。对共产党的这些正义之举，外国记者进行了大量的报道，并积极呼吁维护统一战线，国共共同抗日。
外国记者关于国共关系与统一战线的报道、呼吁形成了有利于统一战线的舆论氛围，这种舆论氛围在一定程度上制约了国民党当局的反共图谋，维护了抗日民族统一战线。`, explain:`斯诺的意义，不只是他采访了中国，更重要的是他把中国真实的一面讲给了世界听。当时很多西方人对中国革命和中国社会有很多误解，斯诺跑到陕北实地采访，见了毛泽东、周恩来这些人，写出《红星照耀中国》，让外界第一次比较完整地看到共产党、红军和中国普通人的真实状态。所以他这种客观报道，既纠正了偏见，也提升了中国革命在国际上的理解度和影响力。`, frame:`先以斯诺为线：来华与采访经历、陕北采访与《西行漫记》的出版及影响。然后转向“早期外国记者群体”的客观报道，分三点展开积极作用：打破封锁、呈现根据地真实；成为盟国了解中共渠道、影响对华认知；报道与呼吁统一战线、制约反共图谋。收束强调：个案典型性加群体贡献，体现国际舆论与中国抗战的互动。`},
  {ch:5, type:"essay", q:`以快速发展着的新媒体为背景，阐述你的“受众观”。`, a:`网络等新媒体以一种势不可挡的态势在急速发展，传统的受众观在新时期出现了融合的现象，受众不再是单纯的某一种受众，而是多种受众群体的集合。新媒体背景下的受众观表现为以下几种：
（1）作为社会群体成员的受众
①受众作为社会群体的成员，并不是孤立的存在，而是分属于不同的社会集团或群体，有着不同的社会背景。受众对大众传媒的接触虽然是个人的活动，但这种活动通常受到他的群体归属关系、群体利益以及群体规范的制约。
②传播学研究表明，受众的群体背景或社会背景是决定他们对事物的态度和行动的重要因素，这种影响有时甚至超过大众传播的影响。拉扎斯菲尔德等人进行的IPP指数分析就证明了这一点。
③政治既有倾向假说。拉扎斯菲尔德等人提出了“政治既有倾向假说”，即在人们就选举或其他政治问题做出决定之际，这种决定并不取决于一时的政治宣传和大众传播，而是基本上取决于他们迄今所持的政治倾向。
④选择性接触假说。受众在接触大众传播的信息时并不是不加选择的，而是更愿意选择那些与自己的既有立场和态度一致或接近的内容加以接触，而对与此对立或冲突的内容有一种回避的倾向。
（2）作为“市场”的受众
①麦奎尔认为，如果从市场的角度考虑问题，受众可以定义为特定的媒体或讯息所指向的、具有特定的社会经济侧面像的，潜在的消费者的集合体，即把受众看作是信息产品的消费者和大众传媒的市场。
②“受众即市场”的观点，反映了传媒活动的某些特性，如经营性、商品性和竞争性，也能够揭示受众作为消费者某些行为特点。但是，从传播学的角度来看，这个概念是不完善的。不能将受众简单地等同于物质商品的消费者，也不能将传媒简单地等同于生产和提供物质商品的企业，归根到底，这由精神产品的生产和消费过程的特殊性所决定。
（3）作为权利主体的受众
受众不仅仅是传媒信息的使用者或消费者，他们还是构成社会的基本成员，也是参与社会管理和社会
公共事务的公众。当把受众看作是社会成员和公众时，受众拥有各种各样的正当权利。受众在大众传播过
程中享有的基本权利包括：
①传播权
传播权是构成社会的每个成员所享有的基本权利之一，社会成员是社会实践和社会生活的主体，他们
有权将自己的经验、体会、思想、观点和认识通过言论、创作、著述等活动表现出来，并有权通过一切合
法手段和渠道加以传播。
②知晓权
从广义上来讲，是指社会成员获得有关自身所处的环境及其变化的信息、保障社会生活所需的各种有用信息的权利。
从狭义上来讲，知晓权是指公民对国家的立法、司法和行政等公共权力机构的活动所拥有的知情或知察的权利，这是公民的一项基本政治权利，也意味着公共权力机构对公民负有信息公开的责任和义务。
③传媒接近权
传媒接近权即一般社会成员利用传播媒介阐述主张、发表言论以及开展各种社会和文化活动的权利，同时，这项权利也赋予了传媒应该向受众开放的义务和责任。`, explain:`新媒体时代谈受众，不能再把他们想成坐在那儿被动接收信息的人了。现在的受众一边看内容，一边评论、转发、二创，很多时候自己也是传播者。可同时他们又不是完全自由的，因为他们会受圈子、兴趣、算法推荐影响，更容易接触自己爱看的东西。所以今天的受众既是消费者，也是参与者，既有主动性，也还是会被平台和环境塑造。`, frame:`开篇点题：新媒体下受众是多重角色的集合。主体按三块：作为群体成员（群体归属制约媒介接触，补IPP与政治既有倾向、选择性接触）；作为市场（麦奎尔定义、合理处与片面处，精神产品特殊性）；作为权利主体（传播权、知晓权、传媒接近权分述）。收束强调：技术变了，但权利与群体逻辑仍须统合理解。`},
  {ch:6, type:"noun", q:`《大清报律》`, a:`《大清报律》是清末时期清政府颁布的一部关于规定报纸出版印发的律例。1908年3月14日，《大清报律》奉旨颁行，至1911年1月29日经修改并改名为《钦定报律》再次颁行。该报律共45条，险岩前些时候制定与颁行的报刊禁载的规定全部收入外，还新增了不少限制性条款，1910年清政府再次修订（大清报律》，并将修订本交资政院和军机处审议。1911年修订后的《钦定报律》共38条，另有4个附条保存了原报律的主要内容。`, explain:`《大清报律》说白了就是清政府专门拿来管报纸的法律。它表面上是在“立规矩”，实际上是想把报刊卡得更死，比如限制出版、加强审查、压缩言论空间。本质上，它不是为了保护新闻自由，而是为了把报纸牢牢管在朝廷手里，所以它代表的是晚清用法律形式控制舆论。`, frame:`起手定性：清末规范报刊出版的律例。接着写颁行与更名时间线（1908《大清报律》—1911改《钦定报律》）、条数变化及修订审议过程。再点内容特点：吸收此前禁载规定并增限制条款。收束说明其性质：清政府管制新闻的法律工具。`},
  {ch:6, type:"noun", q:`《向导》周报`, a:`《向导》周报是中共中央第一个政治机关报，1922年9月13日在上海创刊，蔡和森为第一任主编。《向导》周报以报道评论国内外时事政治为主要内容，致力于阐释贯彻中国共产党制定的反帝反封建的民主革命纲领，国共合作后大力宣传中国共产党关于建立各个革命阶级统一战线的政治主张，1927年7月18日终刊。`, explain:`《向导》周报是中共中央早期最重要的政治机关报之一。它1922年在上海创刊，主要不是发一般新闻，而是专门用来讲党的主张、分析时局、宣传反帝反封建和统一战线。你可以把它理解成那个时期共产党对外发声、统一思想的一支重要笔杆子。`, frame:`起手给地位：中共中央第一个政治机关报。写创刊时间地点、蔡和森首任主编。展开内容与宗旨：时事政治、阐释反帝反封建纲领、国共合作后宣传统一战线。收束：终刊时间，点明其在党的宣传史上的开创意义。`},
  {ch:6, type:"noun", q:`斯克里普斯报团`, a:`斯克里普斯报团是指美国第一个，也是世界上第一个报业集团。该报团形成于1885年，由著名报人爱德华·斯克里普斯创建。斯克里普斯报团下的报纸大多是廉价的大众报，在报纸业务方面，创办人斯克里普斯坚持用小标题和短消息，省去多余的字句，使报纸刊登尽可能多的消息和评论。报纸基本上代表了下层民众的利益。现在名称为“斯克里普斯-霍华德报业公司”。作为美国最老的报团，仍是美国较大的报团之一，一共拥有20多家报刊和十几家广播电视台，它的报刊业与电子传播产业的比例是7：3。`, explain:`斯克里普斯报团厉害的地方在于，它把报纸真正做成了大众生意。它主打便宜、短小、好读，面向普通人而不是少数精英，很多写法今天看都很现代，比如多用短消息、小标题，少说废话。它是美国也是世界上最早的报业集团之一，说明报业已经不再只是几份单独的报纸，而开始变成成规模、成体系的媒介企业。`, frame:`起手：美国也是世界首个报业集团，1885年形成，创建人斯克里普斯。展开业务与立场：廉价大众报、短消息多标题、代表下层。收束：今名斯克里普斯-霍华德公司，老报团地位及报刊广电大致格局。`},
  {ch:6, type:"noun", q:`流言`, a:`流言是指一种信源不明、无法得到确认的消息或言论，通常发生在社会环境具有较高的不确定性、正规的传播渠道不畅通或功能减弱的时期。流言的传播方式一般是口头的、非正式的、非官方的。在这些方面它与谣言有共同之处，但流言一般不是故意去伤害某人。某些流言具有消极的作用，甚至引起社会混乱，但它在动机和目的上与谣言是有区别的。集合行为中的主要信息形式是流言，但它与常态下的流言不同，其特点是流言信息的快速增殖，流言信息的回流和恶性循环，流言中伴随着大量的谣言。`, explain:`流言就是那种“大家都在传，但谁也说不清最早是谁说的”的消息。它往往出现在局势混乱、信息不透明的时候，因为正规渠道说得不够清楚，大家就会靠互相转述来补空白。它不一定像谣言那样一开始就带着恶意，但一旦越传越多、越传越夸张，也很容易把局面搞乱。`, frame:`先界定：信源不明、难以核实的讯息，多在不确定性高、正规渠道不畅时扩散。再写传播方式：口头非正式非官方，与谣言的异同（动机上流言未必蓄意伤人）。最后补集合行为中的流言：增殖快、回流循环、常夹杂谣言。收束点明：既可能扰序，也不能与谣言简单等同。`},
  {ch:6, type:"noun", q:`集合行为`, a:`集合行为是指在某种刺激条件下发生的非常态的社会集合现象。多以聚集、恐慌、流言、骚动的形态出现，往往对正常的社会秩序造成严重的干扰和破坏。集合行为不属于群体行为，其传播受到若干特殊传播机制的制约，包括群体暗示和群体感染。集合行为发生的基本条件有五个：①环境条件。即物质条件或必要的社会条件。②结构性压力。指经济萧条、自然灾害、失业等社会因素对社会一般人产生的心理压力，部分社会成员企图摆脱这种压力是产生集合行为的原因。③诱发因素。是指民众对社会的信任程度越来越低。④正常社会传播系统的功能减弱。⑤流言等非常态的传播机制活跃化。`, explain:`集合行为就是一群人在特殊刺激下，突然出现的那种不太正常的集体反应，比如恐慌、骚动、抢购、围观。它跟平时有组织的群体活动不一样，往往更冲动，也更容易被暗示、感染和流言带着跑。一般来说，社会压力大、诱发事件强、正常信息渠道又不顺的时候，集合行为就更容易冒出来。`, frame:`先定义：刺激下的非常态聚集现象及常见形态。说明与群体行为的区别。展开五个发生条件：环境、结构性压力、诱发因素、常态传播系统功能减弱、流言机制活跃。再点传播机制：暗示与感染。收束强调其对秩序的干扰性。`},
  {ch:6, type:"noun", q:`拟态环境`, a:`拟态环境是说明大众传播社会影响力的重要概念，由美国学者李普曼提出。拟态环境即传播媒介通过对象征性事件或信息进行选择、加工并重新结构化以后向人们提示的环境。李普曼认为，在大众传播产生之后，人与环境的互动关系发生了明显的变化，传统社会中人的行为是对环境的直接反应，而在现代社会，“人与其环境之间插入了一个拟态环境”，人的行为在很大程度上成了对拟态环境的反应。`, explain:`拟态环境这个词听起来绕，其实意思很简单：我们平时看到的“世界”，很多并不是世界本身，而是媒体帮我们挑过、剪过、重新拼过之后的版本。也就是说，我们以为自己是在对真实环境作反应，其实很多时候是在对媒体构造出来的“现实印象”作反应。这正说明大众传播为什么会对人的认知影响那么大。`, frame:`起手交代李普曼来源。核心句：媒介对象征性事件选择加工重构后提示的环境。展开人与环境关系变化：传统直接反应，现代行为多是对拟态环境的反应。收束点明：解释大众传播如何中介人与现实。`},
  {ch:6, type:"noun", q:`中华广告公会`, a:`中华广告公会是民国时期成立的广告协会。1927年在上海成立的中国广告公会，是我国广告同业的最早组织。1927年，上海“维罗”“耀南”等六家广告社组织发起成立了中华广告公会，创办人是维罗广告社的王梓濂和耀南广告社的郑耀南，当时组织广告公会，主要是为解决同业之间的纠纷和争取共同的利益，是当时规模较大、持续时间较长、产生一定影响的广告行业组织。`, explain:`中华广告公会可以理解成民国时期广告行业的“同行协会”。它是广告公司自己组织起来的，主要作用就是协调同行矛盾、维护共同利益，也说明那个时候广告业已经不是零零散散各干各的，而是开始有了行业意识和自我管理。`, frame:`起手：民国上海同业组织，1927由六家广告社发起。写创办人姓名与动机：协调纠纷、争取共同利益。收束：早期广告同业组织中规模与影响较大者。`},
  {ch:6, type:"noun", q:`广告战略调查`, a:`广告战略调查帮助广告公司明确广告活动针对的目标市场、目标市场中消费者的特征和偏好、市场竞争状况、品牌在消费者心目中的形象，以及对该类产品而言重要的因素等。广告战略调查决定广告“对谁说”“说什么”的问题。研究广告战略的目的是提高广告宣传效果，使企业以最低的开支达到最好的营销目标。`, explain:`广告战略调查，说白了就是在真正做广告之前，先把情况摸清楚。比如产品卖给谁、消费者喜欢什么、竞争对手在怎么打、自己品牌在别人心里是什么形象。它解决的就是“广告到底对谁说、说什么才有用”这两个关键问题。没有这一步，后面的创意和投放很容易变成盲打。`, frame:`先说明目的：为战略层决策服务，弄清市场、消费者、竞争、品牌认知与关键诉求。再写解决的问题：对谁说、说什么。收束点明：服务于提高广告效果与营销目标，是广告调查的战略环节。`},
  {ch:6, type:"noun", q:`公共关系要素`, a:`公共关系是指某一组织为改善与社会公众的关系，促进公众对组织的认识，理解及支持，达到树立良好的组织形象，促进商品销售的目的的一系列公共活动。它本意是社会组织、集体或个人必须与其周围的各种内部、外部公众建立良好的关系。公共关系由三个要素组成：①社会组织，在公共关系的三大构成要素中，处于主体地位，它具有主导性；②公众，是公共关系的客体，具有权威性；③传播，是构成公共关系的中介，它具有效能性。`, explain:`公共关系有三个基本要素：组织、公众、传播。组织是主动做事的一方，公众是组织要影响、要沟通、要争取的人，传播则是把两边连起来的手段。少了哪一个都不行，所以公关不是自己闷头做宣传，而是组织通过传播去和公众建立关系。`, frame:`先一句总括公关三要素。再分述主体社会组织及其主导性；客体公众及其权威性；中介传播及其效能性。收束可呼应：三者缺一不可，构成公关活动的基本结构。`},
  {ch:6, type:"noun", q:`积极型公共关系状态`, a:`积极型公共关系状态是指组织机构有目的、有计划地实施各种活动之后所形成的公共关系状态。人们一般把公关状态分为“消极型”与“积极型”。“消极型公共关系状态”是指各方在无意识中形成的公共关系状态。任何一个社会组织，不论自觉与否，在社会生活中都有一个相对固定的关系状态，也是特定时期组织在公众心目中的形象。`, explain:`积极型公共关系状态，就是组织不是被动等别人评价自己，而是主动通过活动、传播和沟通去经营自己的形象，最后形成比较好的关系状态。和它相对的消极型状态，就是你虽然也有形象，但那是自然形成的，自己并没有认真去管。一个是主动经营出来的，一个是放着不管慢慢形成的，这就是关键区别。`, frame:`先对比消极型与积极型：消极是无意识形成的关系状态，积极是有目的有计划活动后的状态。再写任何组织客观上都有相对固定形象。收束强调：积极型是自觉塑造的结果，是公关追求的方向。`},
  {ch:6, type:"short", q:`简述“文化帝国主义”。`, a:`（1）文化帝国主义的含义
文化帝国主义，是指个别文化高压国家凭借文化优势利用各种手段，大力拓展和占领世界文化市场。利用先进的科学和发达的国民教育使文化始终居世界领先地位，大力开拓和占领世界文化市场，企图将这种一国的文化优势变成世界性的文化优势，它是以一种文化模式来取代世界文化的多元性和多样性的过程，是现代帝国主义总过程的一部分。
（2）文化帝国主义的特点
①它以强大的经济、资本实力为后盾，主要是通过市场而进行的扩张过程。
②它是一种文化价值的扩张，即通过含有文化价值的产品或商品的倾销而实现的全球性文化支配。
③由于信息产品的文化含量最高，因此这种文化扩张主要是通过信息产品的传播而得到实现的。
（3）文化帝国主义的实质
在文化扩张的过程中，由于大众传播媒介是一种最有力的制度化手段，因而文化帝国主义也称为媒介帝国主义。对文化帝国主义表示担忧的已不仅仅是发展中国家，不少发达国家也对此引起了警惕，从而积极制定措施来维护自己的民族文化和传统文化。`, explain:`文化帝国主义你可以简单理解成文化上的“强国压弱国”。一些强国靠经济、技术和媒介优势，把自己的电影、新闻、娱乐、价值观大规模输送到别国，时间一长，别人的本土文化空间就会被挤压。因为这种扩张很多时候是靠媒介和信息产品完成的，所以它也常被叫作媒介帝国主义。`, frame:`起手解释概念：文化高压国以优势扩张、以单一模式挤压文化多元，属现代帝国主义一部分。接着三条特点：经济资本后盾与市场扩张；文化价值随商品倾销实现支配；信息产品含量高故多借信息传播实现。最后点实质：常称媒介帝国主义，发展中国家与部分发达国家均警惕并自保民族文化。`},
  {ch:6, type:"short", q:`如何看待大众传媒的公共性与公益性。`, a:`（1）大众传媒是传递新闻信息的载体，包括报纸、通讯社、广播、电视、新闻纪录影片和新闻性期刊的总称。大众传媒活动的制约因素除了社会制度和意识形态以外，主要来自于它的公共性和公益性。
①大众传媒的公共性是指它们作为社会公众了解沟通外界的重要信息来源，是为整个社会所共有的，不仅新闻工作者具有使用参与大众传播的权利，社会公众也具有使用大众传媒进行监督、批评、请愿等权利。
②大众传媒的公益性是指大众传媒是某些稀有公共传播资源的受托使用者，作为公共财产的使用人，它们必须对社会和公众承担相应的责任和义务。
（2）公共性和公益性的依据包括三个方面：
①大众传媒是现代社会必不可少的信息生产者和提供者，在满足社会的普遍信息需求方面起着一种公共服务的作用。
②大众传媒的信息传播活动对社会的政治、经济、文化、道德具有广泛而强大的影响，这种影响涉及普遍的社会秩序和社会公共生活。
③大众传媒是某些稀有的公共传播资源的受托使用者，必须对社会和公众承担相应的义务和责任。
公共性和公益性是大众传媒的权利的基础，也是其责任和义务的依据。`, explain:`大众传媒为什么不能只当普通公司看？因为它本身就带着公共性和公益性。所谓公共性，就是大家都要靠它获取重要信息，它不是只服务老板的；所谓公益性，就是它占用的很多资源本来就是公共资源，比如频率、频道，所以它天然该对社会负责。正因为这样，媒体不能只想着赚钱，还得讲真实、讲责任、讲公共利益。`, frame:`先界定大众传媒并引出制约因素中的公共性与公益性。再分别解释公共性（社会共有、公众监督表达权）与公益性（稀有公共资源受托使用须尽责）。然后列三条依据：公共服务的信息供给；广泛社会影响；资源受托与义务。收束：二者既是权利基础也是责任依据。`},
  {ch:6, type:"short", q:`简述广告与市场营销的关系。`, a:`（1）广告活动和市场营销都是商品经济发展到了一定程度的产物。作为一门学科的建立，是市场经济孕育的结果。从一开始，这两门学科就紧密地结合在一起，相互影响，密不可分。
（2）广告与市场营销的关系可以体现在如下两个方面：
①广告活动是营销活动的组成部分。
作为一种组织职能，市场营销传统上由四类活动构成，分别是生产、定价、分销和促销，广告是营销组合中促销活动可能采用的多种手段之一。广告策略要服从于市场营销策略，作为营销活动的先导，在市场营销的总体目标下发挥作用，体现了一种整体与局部的关系。
②广告在“创造、沟通和传递顾客价值”中扮演重要角色。
顾客价值不仅仅是由产品或者服务本身创造的，广告对于品牌的塑造是形成消费者价值感知的重要来源。`, explain:`广告和市场营销的关系，可以理解成“整体和部分”的关系。市场营销管的是产品怎么卖出去，广告只是其中一种重要手段，主要负责把信息和价值传给消费者。但广告又不只是帮你吆喝，它还会影响消费者怎么看这个品牌、觉得它值不值得买。所以广告一方面受营销目标指挥，另一方面又在帮品牌塑造顾客价值感。`, frame:`起手：商品经济到一定阶段的共生学科。分两点展开：广告是营销组合中促销手段之一，策略服从总体营销目标，整体与局部关系；再写广告在创造、沟通、传递顾客价值中的作用，特别是对品牌与价值感知。收束一句：工具性与价值塑造并重。`},
  {ch:6, type:"short", q:`简述公共关系传播的原则。`, a:`公共关系传播的原则包括：
（1）目的明确原则
公共传播是带有明确目的性的传播，它的总目标是树立、改善组织形象，形成有利的舆论环境，获得各界的支持。公共传播根据传播效果四层次理论，可分为四种：
①引起公众注意。
②诱发公众兴趣。
③取得公众的肯定态度。
④促发公众的支持行为。
（2）双向沟通原则
双向沟通原则是指传播双方互相传递、互相理解的信息互助原则。具体包含以下内容：
①沟通必须由两人以上进行。
②沟通双方互为角色。
③沟通双方相互理解并有所交流。
（3）平衡理论原则
平衡理论原包括两种方式：
①A-A式平行沟通。公共传播就是要创造A-A式平行沟通，即双方均以成人状态参与沟通，并随时注意公众反应，不断调节。
②感情沟通。平衡理论要求在沟通中诉诸情感，通过情感互动和思想交流，产生接近与认同，达到状态一致和关系平衡。
（4）有效沟通原则
有：
公共传播追求的是有效沟通，即通过沟通使公众理解、喜爱、支持组织。影响与公众有效沟通的因素
①信息的真实性与信息量的大小。坚持公关信息传播的真实性原则。传播中的所有信息和所进行的各种活动必须是真实的。
②传播者的方式与态度。
③传播内容的制作技巧与传播渠道的畅通。
（5）符合公众利益、注重社会效益的公关传播伦理原则
传播中坚持组织利益和公众利益一致的原则。`, explain:`公共关系传播讲究几个原则，核心其实就一句话：既要会说，更要会沟通。它首先得目标明确，知道自己想让公众知道什么、接受什么；其次不能光自己讲，还得听反馈，所以要双向沟通；再往深一点，组织和公众最好能在情感和态度上找到平衡；最后还得讲效果，信息要真实，方式要得当，渠道要顺，不然再好的话也落不到人心里。`, frame:`按原则逐条作答最稳。目的明确原则并点到四层次效果；双向沟通（角色互换、相互理解）；平衡理论（A-A平行沟通与感情沟通）；有效沟通（真实、传播者态度、内容与渠道）；伦理原则（公众利益与社会效益）。收束可点明：目的—过程—效果—伦理一条线。`},
  {ch:6, type:"essay", q:`分析廉价报纸产生的社会历史条件及其特征。`, a:`（1）廉价报纸产生的社会历史条件
①廉价报刊是指工业革命后各国先后出现的面向社会中下层的通俗小报，因售价低廉而得名。
②廉价报纸出现的原因在于：社会经济飞速发展，城市化进程加快，人口迅速集中，为报纸大量发行流通提供了条件；经济的发展需要普遍高劳动者素质，于是教育有所普及，粗通文字的平民增多，形成了新的广大读者群；阶级力量发生新的变化，工业资产阶级和工业无产阶级同时在扩大，这就推动了各国政治变革的进程，使办报的政治环境逐步改善；高速轮转印刷机的产生，降低了印刷成本，报纸印得更快更多；随着工商业的繁荣，广告数量大为增加，广告费收入成为报社的主要来源，报纸廉价销售成为可能。
（2）廉价报刊的特征
①政治上标榜独立，不受制于某个政党。
②经济上自主经营，不依赖政府或政党的津贴。
③读者对象为平民大众，也称大众化报纸，这是一种新兴的资产阶级商业报纸。
④内容上注重地方新闻、社会新闻以及各种消闲性、趣味性的软新闻。
⑤形式上文字通俗，版面活泼，可读性强。
⑥经营上完全商业化，大量刊登广告，以此来降低售价，扩大发行，进而赢得更多的广告。
廉价报纸的出现使商业报纸更加兴盛，逐步成为资产阶级报业的主体，并为其向现代报业演变奠定了基础。`, explain:`廉价报纸出现，不是偶然的，而是工业革命把很多条件都凑齐了。城市人口多了，识字的人也多了，机器印刷更快更便宜，广告收入又能补贴成本，所以报纸终于能低价卖给普通人。它的特点也很明显：不再主要服务政客和上层，而是面向大众，内容更接地气，经营上也更像一门生意。这标志着报纸真正走向大众化。`, frame:`分两大块：条件与特征。条件先界定廉价报面向中下阶层，再列经济社会城市化、教育读者群、政治环境改善、印刷技术、广告收入等动因。特征按政治独立、经济自主、读者大众、内容软新闻、形式通俗、经营广告支撑六点展开。收束：商业报纸主体化并为现代报业奠基。`},
  {ch:6, type:"essay", q:`从提升中国国际传播力的角度阐述“信息主权”问题。`, a:`（1）信息主权的含义及内容
信息主权是指一个国家对本国的信息传播系统进行自主管理的权利，是信息时代国家主权的重要组成部分。
它包括三方面的内容：
①对本国的信息资源进行保护、开发和利用的权利。
②不受外部干涉，自主确立本国的信息生产、加工、储存、流通和传播体制的权利。
③对本国信息的输出和外国信息的输入进行自主管理和监控的权利。
（2）信息主权的问题及其重要性
冷战结束后，个别超级大国并没有放弃制霸全球的战略，反而加速了实施这一目标的步伐。其主要策略是：
①直接使用军事手段对其他主权国家实行高压政策。
②使用经济制裁、经济掣肘或制造金融动荡来左右别国经济局势。
③使用信息手段来干预别国内政、煽动民族矛盾、制造社会混乱。在跨国传播技术十分发达的今天，信息手段成了个别霸权国家干涉别国内政的最常用、最廉价手段。
随着世界格局的变化和全球信息化的发展，跨国传播中的信息主权以及文化冲突问题成为人们新的关注内容。对信息主权的重视和保护，已成为各国规划和建设本国信息系统的重要指导思想。
（3）信息主权与国家主权和提升国际传播力的关系
①信息主权的概念是在全球信息化、国家主权面临新的威胁因素的背景下提出来的。全球信息化使各国国内信息系统与全球信息系统连成一体，国内系统受到国外因素更为直接的影响。来自外部的信息干扰，有可能使一国的信息系统遭到破坏，使国家失去危机管理能力而陷于混乱。尤其是在世界信息单向流通的不平衡结构下，传播弱国的信息主权没有任何保障，这种状况使它们在政治、经济、文化各个领域处于极为不利的状态。
②信息主权是国家主权的有机组成部分，是提升国际传播力的重要保证。一个国家对自己的信息传播资源和传播制度应该拥有主权，这是在信息时代保障国家主权完整的重要条件。对于中国这样一个发展中大国来说，掌握信息主权，是保障国家主权完整，提升国际传播力的必要条件。`, explain:`信息主权说白了，就是一个国家有权自己管自己的信息系统，决定本国信息怎么生产、怎么传播、哪些进来、哪些出去。在今天这个时代，国际舆论和信息流动本身就是实力的一部分。如果中国国际传播能力弱，就很容易总被别人定义、被别人解释。所以提升国际传播力，其实也是在守住信息主权，争取更公平的话语位置。`, frame:`起手定义信息主权及三方面内容（资源、体制自主、出入境信息管理）。再写问题侧：霸权常用信息手段干预内政，信息化使主权威胁新形态。然后扣题中国：单向流通结构下弱国吃亏，信息主权是国家主权组成部分。收束：对中国而言，守住信息主权才能保障主权完整并提升国际传播力。`},
  {ch:5, type:"essay", q:`阅读案例材料，并回答下列问题：`, a:`（1）对“网络公关”的特征进行分析。（5分）
分）（2）结合此案例谈谈中央外宣办等四部门联合开展整治非法网络公关行为专项行动的必要性。（10
据媒体报道，2010年7月16日，某报刊登了一篇所谓“深海鱼油造假严重”的新闻，随即网上相继出现大量宣传“深海鱼油不如地沟油”的攻击性文章。
之后，网络攻击深海鱼油的行动有组织地向深层次发展，攻击添加深海鱼油的产品不能食用，最后矛头直指伊利实业集团股份有限公司生产的“QQ星儿童奶”，煽动消费者抵制加入了深海鱼油的伊利“QQ星儿童奶”。
随后，相关文章纷纷出现在我国大型门户网站论坛、个人博客和百度等主流网站的问答栏目。
伊利集团公司迅速向呼和浩特市公安局经济技术开发区分局报案，呼和浩特市警方随即立案侦查。
警方经过为期两个多月的缜密侦查发现，这起看似商战的事件，实为“一网络公关公司受人雇佣，有组织、有预谋、有目的、有计划，以牟利为目的实施的”损害企业商业信誉案。
警方证实：2010年7月14日，蒙牛“未来星”品牌经理安勇与北京博思智奇公关顾问有限公司共同商讨炒作打击竞争对手-伊利“QQ星儿童奶”的相关事宜，并制定网络攻击方案。
据警方介绍，这些网络攻击手段包括：寻找网络写手撰写攻击帖子，并在近百个论坛上发帖炒作，煽动网民情绪：联系点击量较高的个人博客博主撰写文章发表在博客上，并“推荐到门户网站首页”“置顶”“加精”等操作，以提高影响力；以儿童家长、孕妇等身份拟定问答稿件，“控诉”伊利乳业公司，总计涉及费用约28万元。网络炒作历时一个月，其中点击量最高的一个帖子点击数达20余万人次。警方表示，这起案件目前已告破，涉案人员已被刑拘。
（1）“网络公关”的特征
①网络公关是指利用互联网的高科技表达手段营造企业形象，为现代公共关系提供新思维方式、策划思路和传播媒介的方式。
②“网络公关”的特征：
a.“网络公关”具有聚焦性。
网络传播已经成为目前公共关系传播的主要形式之一。网络公关的本质还是传统公共关系学，承载在“网络”媒介形态上，应用了互联网这一新媒体平台，运用了传播的技巧和互联网新媒体来进行的一项专业公关服务。网络的特殊性使得危机的信息传播比危机本身的发展要快得多。
b.“网络公关”具有破坏性。
网络公关营销依靠互联网作为特殊载体，网络公关具有极为广泛的传播性、即时性、信息长期残留性等特点。由于危机的出现具有突然性，必然不同程度地给企业造成破坏，造成混乱和恐慌，而且由于决策的时间以及信息有限，往往会导致决策失误，从而带来无可估量的损失。
c.“网络公关”具有急迫性。
危机一旦爆发，其破坏性的能量就会被迅速释放，并呈快速蔓延之势，如果不能及时控制，危机会急剧恶化，使企业遭受更大损失。在网络公关的过程中，网络公关的主体最好不是企业，而是用第三方去影响第三方，有点类似于口碑营销。
d.“网络公关”具有意外性。
意外性是指在网络环境下，时间和空间范围得到了最大程度的延伸和扩展。危机的源头无处不在，危机爆发的具体时间、实际规模、具体态势和影响深度，都是始料未及的。
（2）开展专项行动的必要性
①开展专项活动有利于打击不法竞争行为。
近年来，一些企业和个人采用违法违规手段开展网络公关活动，社会上出现了一大批非法网络公关机构。例如“网络水军”“网络推手”“灌水公司”“删帖公司”“投票公司”等。非法网络公关机构利用不正当手段打击竞争对手、歪曲捏造事实并进行敲诈勒索，有些机构甚至通过话题炒作制造虚假网络民意牟利、从事私下交易牟取非法利益等。非法网络公关行为败坏了网络环境，破坏了市场经济秩序，损害社会公众利益，广大人民群众对此强烈不满，要求政府有关部门依法进行整治。
②专项行动有利于整治违法违规的非法网络公关行为。
通过专项行动，有利于查处非法网络公关重大案件，曝光隐藏的违法违规事件；有利于清理网上非法网络公关
信息，遏制非法网络公关信息发布，使互联网传播秩序和市场经济秩序得以维护；有利于阻断非法网络公关传播途径，规范网络传播秩序和网络公关行为；有利于为我国经济社会发展构建规范有序、文明诚信的网络环境。`, explain:`网络公关本来是企业在网上做沟通、塑造形象的一种手段，但它一旦被滥用，就可能变成黑公关。案例里那些有组织地发文、带节奏、攻击竞争对手的做法，看起来像普通舆论，其实背后可能是有人拿钱操盘。整治非法网络公关的必要性就在这里：它不只是伤害某家企业，也会污染网络舆论环境，误导公众判断。`, frame:`第一问先界定网络公关，再分特征展开（聚焦性、破坏性、急迫性、意外性），可各用一句机制解释。第二问结合伊利案例：非法公关有组织攻击商誉，再上升到整治必要性——打击不正当竞争、曝光查处、清理信息、规范秩序、营造诚信网络环境。收束：案例是缩影，专项行动回应乱象与公共利益。`},
  {ch:7, type:"noun", q:`《中国女报》`, a:`《中国女报》是中国近代第一份宣传民主革命的妇女刊物。1907年1月14日在上海创刊。秋瑾、陈伯平任编辑兼发行人。该报以妇女为主要读者对象，以争女权、争独立、争解放为宗旨。主要撰稿人有黄公、陈志群、徐寄尘等。宣称致力于宣传爱国、革命和女权，比同时期其他妇女刊物态度激进，具有鲜明的民主革命倾向，是中国早期妇女刊物中的一面旗帜。设有“社说”“译编”“传记”“文苑”“新闻”等栏目，文言白话并用。1907年3月4日出版了第2期。当第3期已拟就目录，并征集到部分稿件时，因秋瑾被捕遇害而停刊。`, explain:`《中国女报》是中国近代很有代表性的妇女刊物，因为它不只是谈女性日常生活，而是直接把女权、独立、革命这些问题摆到台前来讲。秋瑾等人办这份报，就是想让女性意识到自己不是旧社会的附属品，而是能争权利、争解放的人。所以它在当时很激进，也很有旗帜意义。`, frame:`起手：近代民主革命取向的妇女刊物。写创刊时间地点、秋瑾与陈伯平、宗旨争女权独立解放。展开内容与栏目、文言白话并用及激进性。收束：出版期数与因秋瑾遇难停刊，点明旗帜意义。`},
  {ch:7, type:"noun", q:`《每日纪闻》`, a:`《每日纪闻》是公告式的官方公报。公元前59年，尤利乌斯·恺撒当选为罗马执政官后，下令每日公布元老院及公民大会的议事记录，并将其用尖笔书写在罗马议事厅外一块涂有石膏的特制木板上。当时的名称是“阿尔布（Album）”，后来人们称之为《每日纪闻》。其内容多为政府要事，政治性强，目的在于争取民众支持，扩大政治影响。罗马帝国的灭亡，部分原因是《每日纪闻》的停办，传播组织远落后于军事、商业、行政等社会组织的发展，无法协调复杂的活动。`, explain:`《每日纪闻》可以看成西方很早期的一种“官方公告栏”。古罗马把元老院和公民大会的重要内容写出来公示，让大家知道政府在做什么。虽然它带有明显的政治宣传目的，但从传播史角度看，它已经有点像后来的官方公报和制度化新闻发布了。`, frame:`起手：古罗马官方公告式公报。写恺撒下令公布议事记录、阿尔布木板及后称《每日纪闻》。展开内容与政治目的。收束可提传播组织滞后与帝国治理的关联（依答案侧重点）。`},
  {ch:7, type:"noun", q:`KDKA电台`, a:`KDKA广播电台是美国第一家广播电台，1920年11月2日，由西屋电器公司在匹斯堡开办，被认为是美国广播事业的开始。该台首次广播的内容，是关于哈定和考克斯在总统竞选中的得票数。其时效之快，使美国报界大吃一惊。KDKA电台的成功，标志着广播事业的正式诞生。从此，新兴的电台如雨后春笋般地涌现。播出内容有当地新闻、邀请艺人现场表演、为临睡前的孩子们朗读故事等。`, explain:`KDKA电台之所以重要，是因为它常被看作美国广播事业真正起步的标志。它一开播就把总统选举结果迅速传出去，让人们第一次强烈感受到无线电“比报纸还快”的冲击力。从这以后，广播一下子就火了，电台像雨后春笋一样冒出来。`, frame:`起手：美国首家广播电台，西屋公司匹兹堡，1920年11月2日开播。写首次播出大选计票及业界震动。展开节目类型与复制发展。收束：标志广播事业诞生。`},
  {ch:7, type:"noun", q:`“政治既有倾向”假说`, a:`“政治既有倾向”假说，由拉扎斯菲尔德等人提出。政治既有倾向，是指人们在接触传媒宣传之前已有的政治态度。在“伊里调查”中，研究人员根据调查对象的社会经济地位、宗教信仰和居住区域设计了一个IPP指数（政治既有倾向指数）作为显示他们的原有政治态度的综合指标。IPP指数分析的结果揭示，投共和党票的人大多原来就是共和党的支持者，而投民主党票的大多原来就是民主党的支持者。根据这一结果，拉扎斯菲尔德等人认为，人们在就政治问题进行决策之际，这种决策的性质并不取决于一时的政治宣传和大众传播，而是基本上取决于人们既有的政治立场和态度，他们把这个观点称为“政治既有倾向”假说。`, explain:`政治既有倾向假说想说的是：人们在接触政治宣传之前，心里其实早就有基本立场了。也就是说，选举时你投谁，往往不是临时看了几篇宣传就突然改主意，而是和你原来的阶层、宗教、生活环境、长期态度更有关系。所以大众传播并不是想怎么改造人就怎么改造人。`, frame:`起手：拉扎斯菲尔德提出，伊里调查与IPP指数。核心观点：政治决定更多取决于既有政治态度而非一时宣传。收束：与选择性接触等一起说明有限效果视角。`},
  {ch:7, type:"noun", q:`拉斯韦尔的“三功能说”`, a:`在传播学研究史上，最早对传播的社会功能做出较全面分析的是拉斯韦尔。他在1948年发表的《传播在社会中的结构与功能》一文中，将传播的基本社会功能概括为三个方面：①环境监视功能；②社会联系与协调功能；③社会遗产传承功能。拉斯韦尔的上述观点被称为传播的“三功能说”。这三项功能是包括人际传播、群体传播、组织传播在内的一切社会传播活动的基本功能，大众传播不仅具备这些功能，而且起着突出重要的作用。
循环模式
1954年，施拉姆在《传播是怎样运行的》一文中，在C·E．奥斯古德的观点启发的基础上，提
出了一个新的过程模式，称为“循环模式”。该模式与直线模式有明显的不同：①这里没有传播者和受传者的概念，传播双方都作为传播行为的主体，通过讯息的授受处于你来我往的相互作用之中。②该模式的重点不在于分析传播渠道中的各个环节，而在于解析传播双方的角色功能；参加传播过程的每一方在不同阶段都依次扮演着译码者（执行接收和符号解读功能）、解释者（执行解释意义功能）和编码者（执行符号化和传达功能）的角色，并相互交替着这些角色。奥斯古德和施拉姆的循环模式强调了社会传播的互动性，并把传播双方都看作是传播行为的主体，这无疑是正确的。③这个模式也有其本身的缺陷：a.它把传播双方放在完全对等或平等的关系中（至少从模式本身看来是如此），则与社会传播的现实情况有不符之处。在现实社会中，由于传播双方在政治、经济和文化地位、传播资源以及传播能力等方面通常存在着差异，这种完全对等或平等的传播关系与其说具有普遍性，不如说是极少见的。b.这个模式能够体现人际传播特别是面对面传播的特点，却不能适用于大众传播的过程。`, explain:`拉斯韦尔说传播最基本有三大功能。第一是环境监视，就是帮社会看外面发生了什么；第二是社会协调，把大家对事情的理解和反应慢慢拉到一起；第三是社会遗产传承，把知识、文化、经验一代代传下去。你把它理解成传播在社会里既负责“看”，也负责“连”，还负责“传”，就好记了。`, frame:`起手：拉斯韦尔1948年提出传播三功能说。正文按“环境监视—社会联系与协调—社会遗产传承”三层展开，先写传播帮助社会感知外部变化，再写它把零散信息组织成共同理解，最后写它把知识经验与文化一代代传下去。收束点明：这是早期对传播社会功能的经典概括。`},
  {ch:7, type:"noun", q:`艾耶父子（N·W·Ayer＆Son）广告公司`, a:`艾耶父子广告公司是第一家现代意义的广告代理公司。当时年仅20岁的青年人F．魏兰德·艾耶（F．waylandAyer）向他父亲借了250美元，开办广告公司，由于害怕别人认为他年轻不可信，便打出了他父亲的名义，即艾耶父子广告公司。起初，艾耶也是做中介生意，在1890年左右，他设计了一份公开的广告费率，告诉客户自己购买版面的底线和包括自己佣金在内的转变价。他为客户提供设计、撰写文案、
建议和安排适当媒介等多种服务。因此，艾耶广告公司被广告历史学家称为“现代广告公司的先驱”。`, explain:`艾耶父子广告公司的意义，在于它把广告代理从单纯倒卖版面，往真正的专业服务推进了一大步。它不只是帮客户买广告位，还会帮客户做文案、做策划、挑媒介。也就是说，广告代理不再只是中间商，而开始像今天这种能提供整套方案的现代广告公司了。`, frame:`起手：第一家现代意义广告代理公司，艾耶创办及“父子”名义。转折1890年公开费率、透明佣金。展开服务：设计、文案、媒介建议等。收束：被称为现代广告公司先驱。`},
  {ch:7, type:"noun", q:`广告的媒介策划`, a:`广告的媒介策划是指在广告活动推出之前，针对媒体的选择、媒体的刊播时间、广告量在各媒体上的分布等所做的通盘性计划。它决定了广告作品是否能够被看到、被哪些人看到、在什么背景下被看到以及看到的次数等与广告效果相关的关键问题。`, explain:`广告媒介策划，说白了就是提前想清楚广告到底投到哪里、什么时候投、投多少。因为一条广告能不能被看见、被谁看见、在什么情境里被看见，很多时候比广告文案本身还关键。所以媒介策划本质上是在安排广告的“出场方式”。`, frame:`起手界定：广告推出前对媒体选择与投放节奏的总体计划。展开：决定被谁看见、何时何地看见、频次等效果相关变量。收束：强调策划是连接创意与效果的关键环节。`},
  {ch:7, type:"noun", q:`边缘公众`, a:`边缘公众是指对问题还没有明确态度和明确倾向的公众群体。按公众对组织的态度可以将公众划分为：①顺意公众，即其意见和态度与组织的看法一致或基本一致的公众群体。②逆意公众，即其意见和态度与组织的看法相悖或基本相悖的公众群体，以及边缘公众。③边缘公众，介于顺意公众和逆意公众之间。`, explain:`边缘公众就是那种对组织还没完全站队的人，既不是铁杆支持者，也不是明确反对者。他们最值得争取，因为态度还有变化空间。公关工作很多时候真正要下功夫的，不是已经支持你的人，而正是这群还在观望的人。`, frame:`起手：按态度分类中的中间地带。先顺意、逆意，再写边缘公众态度未明。收束：公关中常需重点争取与转化。`},
  {ch:7, type:"noun", q:`爱德华·伯尼斯（Edward1 Bernays）`, a:`爱德华·伯尼斯是公共关系学科化的先驱者。出身维也纳的奥地利裔美国人爱德华·伯尼斯是著名心理学家弗洛伊德的外甥，1912年大学毕业后从事新闻工作，1913年他21岁时受聘担任福特汽车公司公关部经理；1919年他和夫人在纽约开办了一家正式的公共关系公司。1923年，他以教授的身份首次在纽约大学讲授公共关系课程，同年出版了被称为公共关系理论发展史的“第一个里程碑”的专著-《公众舆论的形成》。在书中，爱德华·伯尼斯详细地阐述了“公共关系咨询”这一概念，并提出了公共关系的原则、实务方法和职业道德守则等；1928年，他写出了《舆论》一书；1952年，他又写出了《公共关系学》教科书。爱德华·伯内斯在其将近80年的公关生涯中撰写的公共关系书籍达16部之多，他的主要贡献就在于一生都致力于公共关系学的学科化建设；他把公共关系学理论从新闻传播领域中分离出来，并对公共关系的原理与方法进行较系统的研究，使之系统化、完整化，最终成为一门相对独立完整的新兴学科。`, explain:`伯尼斯的重要性在于，他把公共关系从“会搞宣传的人做的事”，慢慢变成了一门能教、能学、能研究的专业。他办公司、开课程、写著作，还提出公共关系咨询这些概念，所以后来大家才会说，公共关系真正走向学科化、职业化，伯尼斯是关键人物。`, frame:`起手：公关学科化先驱，弗洛伊德外甥。按时间列：新闻与福特公关经历、开公司、1923纽大开课与《公众舆论的形成》里程碑、后续著作与教科书。收束：把公关从新闻学中系统化、独立成学科的贡献。`},
  {ch:7, type:"short", q:`简述“媒介进化与社会发展”的关系。`, a:`在当代社会，媒介技术的发展及其引起的巨大社会变化是最为引人注目的现象。关于“媒介进化与社会发展”的关系，存在着以下三种不同的观点或立场：
（1）技术决定论
在技术决定论者看来，技术是一种按自身逻辑发展的独立力量，它虽产生于人的需求，但它一旦成为气候，便很容易脱离人的控制而成为脱缰野马，因而，技术的后果内在于技术，而不取决于人的意志。
同时，技术塑造人类发展而不是服务于人类的目的，一种技术产生以后，人和社会在享受它提供的有限“自由”的同时，更多的是处处受到它的限制：人必须被动地适应技术条件或技术环境的制约，按照技术的逻辑改变自己的工作、生活方式，甚至是观念价值体系。
（2）社会决定论
这种立场的核心观点：技术起源于社会生活，产生于人的特定的价值的需求。没有人的社会需求，就不会有技术，这表明了人对技术的主体性-人是技术的主人而不是奴隶。
同时，技术不仅仅是工具和手段，它们也是伦理、政治和文化价值的体现，而社会的政治、经济制度则对技术的产生和发展有着最终的决定作用。
决定技术的最好例证。
从社会决定论的立场来看，中国的四大发明终究没能发展成影响力巨大的工业技术，恰恰是社会制度
（3）技术与社会互动论
无论是技术决定论还是社会决定论，都有把一方的作用绝对化的倾向，在对技术与社会的关系的看法上，互动论更能够全面地反映这种关系的实质。互动论者认为科学技术与社会政治是相互区分而又紧密联系的交互作用关系；科技作为生产力对社会政治具有推动和决定作用，而社会需要是技术的源泉与动力，政治和经济制度也反过来制约和决定技术。
从马克思主义辩证唯物论和历史唯物论的基本原理来观察技术发展与社会变革，我们也会发现二者处于辩证互动的关系之中。
①技术属于生产力的范畴，它通过推动经济成长改变社会利益关系和利益结构，掌握新技术的阶层属于新生产力的代表，随着其实力的上升，会与旧的制度发生矛盾，并要求实现社会变革。根据梅赛尼的研究，技术引发社会变革有两个途径：创造新机会、产生新问题。前者引发产业结构和社会结构的变化，后者推动新的制度转型。因此，技术发展引发社会变革是必然的，关键是建立一种通过技术发展来推动社会进步的良性机制，把技术的负面影响减少到最低限度。
②社会制度与社会形态对技术的发展也有重要的制约作用，这主要表现在：任何技术都有它产生和发展的社会根源，这里既包括社会需求，也包括文化价值的导向；社会制度和政策为技术的发展提供保障和约束，并在技术及它的社会结果之间起调节作用；新技术蕴含着各种各样的可能性，善用则善，恶用则恶，其可能性能否实现及实现程度，在很大程度上取决于它所存在的社会条件和制度环境。归根到底，技术是人类的主体活动的创造物，人如何利用和控制技术，社会占有结构、所有制关系如何，也反过来规定着技术的特点和性质。这个原理，同样适用于我们对媒介技术的考察。`, explain:`媒介进化和社会发展的关系，常见有三种看法。一种觉得技术最厉害，技术一变，社会就跟着变；一种反过来说，技术怎么发展，还是看社会需要它干什么；还有一种更稳妥，认为两边是互动的，技术会推着社会变，社会也会决定技术往哪儿用。考试里别站得太死，知道这三种思路就够了。`, frame:`起手：媒介演进与社会变迁关系存在不同立场。分述技术决定论、社会决定论各自主张与例证（如四大发明）。再写技术与社会互动论及马克思主义视角：生产力变革与制度制约双向。收束：取互动论较全面，并强调善用技术与制度调节。`},
  {ch:7, type:"short", q:`简述“意见领袖”理论在当今的发展。`, a:`（1）“意见领袖”的含义
意见领袖，是指活跃在人际传播网络中，经常为他人提供信息、观点或建议，并对他人施加个人影响的人物。意见领袖在传播效果形成过程中起着重要的中介和过滤作用。
意见领袖的特点包括以下方面：
①与被影响者处于平等关系而非上下等级关系。
②广泛分布在社会各个阶层。
③影响领域分为“单一型”和“综合型”。
④意见领袖的社交范围广，信息渠道多，大众传播信息接触量大。
（2）“意见领袖”理论在当今的发展
当今，在许多领域都存在“意见领袖”的说法。尤其是微博开通后，许多专家、学者、明星甚至是草根都成为某一圈子的“意见领袖”。
他们经常在微博中为他人提供信息、观点或建议，并对他人产生一定的影响。这些名人的微博粉丝量都达到万人以上，他们在微博中所提出的观点可能会影响上万人，甚至是千万人。`, explain:`意见领袖这个概念到今天并没有过时，只是换了长相。以前可能是社区里消息灵通、爱发表意见的人，现在可能是微博大V、主播、博主、垂类达人。变的是平台，不变的是逻辑：很多人并不是直接被媒体影响，而是先看这些“关键人物”怎么说，再决定自己怎么想。`, frame:`起手：意见领袖定义与在两级传播中的中介作用。简述与平等关系、分布、单一综合影响、渠道与接触量等特点。转向当代：微博等平台使专家明星草根均可成为圈层意见领袖，粉丝规模放大影响。收束：理论内核未变，载体与规模变了。`},
  {ch:7, type:"short", q:`简述新媒体对广告活动的影响。`, a:`（1）新媒体对广告主的影响
新媒体的有效传播途径使其到达率较高，能与受众深度沟通和互动。相对于电视媒体而言，新媒体的传播成本较低，有效覆盖率高。这种高性价比的广告效果对于广告主有非常大的吸引力，因此不少广告主会选择将企业的广告投放在新媒体上。
新媒体对传统媒体的影响
首先，在经营、服务、盈利的方式上，新媒体与传统媒体存在着同质化。新媒体分割传统媒体的广告
市场，直接影响传统媒体的原有利益格局。其次，新媒体跨越传统媒体的形态壁垒和行政边界，以纯粹信息和纯粹商业的姿态，形成跨媒体传播和跨行政区域传播的竞争态势，进一步加剧媒体间的市场竞争。
新媒体对广告公司的影响
随着新媒体的不断发展，新的营销模式以及广告形式也应运而生。广告主将眼光投入在新媒体的市场
上，这导致广告公司必须顺应新媒体的发展，通过创意产生更多适应新媒体投放的广告。
（4）新媒体对受众的影响
广告的传播通常带有一定的强制性，但是新媒体的产生在某些方面削减了广告的强制性。新媒体改变了传统媒体向受众单向传播信息的模式，所采取的更多的是与受众互动式的传递信息，使得广告活动能更有效地传播。
（5）新媒体对管理模式的影响
新媒体的管理机制相对模糊，其广告内容和播出长度可以任其发挥，并且其商业化门槛则相对较低，任何人都有机会利用新媒体投放广告。`, explain:`新媒体对广告最大的改变，就是广告不再只是单向轰炸了。它可以更精准地找到想要的人，也更方便互动、追踪效果，所以广告主会觉得更划算。反过来，这也在分走传统媒体的广告蛋糕，逼着广告公司去学数据、做新玩法。对受众来说，广告则越来越像内容的一部分，而不是单独插在旁边的一块。`, frame:`建议按主体分段：广告主（性价比、投放转移）；传统媒体（市场被分割、跨形态竞争）；广告公司（创意与形式适配新媒体）；受众（互动增强、强制性减弱）；管理（规则模糊、门槛与内容尺度问题）。收束：新媒体重塑广告生态各环节。`},
  {ch:7, type:"short", q:`简述公共关系的基本观念和工作原则？`, a:`（1）公共关系的基本观念和工作原则的含义
①公共关系的基本观念，是指人们在公共关系实践中逐渐丰富、不断完善所形成的，对社会组织如何处理与公众关系的基本认识，是如何开展公关工作的基本指导思想。
②公共关系工作的基本原则，则是在这种基本思想观念指导下，根据公关活动客观规律和要求而提出的基本的工作方法和准则。公关的基本工作原则是公关基本观念在公关实践中的具体化。
（2）公关观念与工作原则的主要内容
①树立公开性的观念，坚持提高透明度的工作原则。
②树立珍视信誉的观念，坚持公关传播工作的真实性原则。
③树立制度化的观念，坚持立足平时的工作原则。
④树立平等沟通的观念，坚持双向交流的工作原则。
⑤树立注重行为的观念，坚持首先自我完善的工作原则。
⑥树立科学的观念，坚持以调查研究为基础的工作原则。
⑦树立公众利益的观念，坚持公关工作的互惠原则。`, explain:`公共关系最基本的观念，其实就是别只想着“我要说什么”，而要先想“公众会怎么想”。所以它强调以公众为中心、讲诚信、讲长期形象，不搞一锤子买卖。工作原则上，则强调双向沟通、全员参与、和公共利益保持一致。说到底，公关不是包装假象，而是认真经营关系。`, frame:`起手：观念是指导思想，原则是实践中具体化。再列七组对应：公开—透明；信誉—真实；制度化—平时工作；平等沟通—双向；注重行为—自我完善；科学—调查基础；公众利益—互惠。收束：观念与原则一体两面。`},
  {ch:7, type:"short", q:`分析维新派的办报思想以及维新派报刊的历史进步作用。`, a:`（1）维新派的办报思想
①维新派早期的新闻思想
a.关于报纸的性质。
第一，把报纸视为一种强有力的舆论“利器”；第二，公开承认报纸的党派性。
b.关于报纸的作用问题。
第一，十分重视报纸的宣传鼓动作用；第二，十分强调报纸的沟通传播作用；第三，重视报纸的启蒙教育作用。
②维新派后期的新闻思想
a.提出报馆两大天职说：一是对于政府而为其监督者；二是对于国民而为其向导者。
b.提出衡量报纸好坏的四条标准：一是宗旨高而定；二是思想新而正；三是材料富而当；四是报事确而速。
c.提出比较全面的舆论观。
d.提出两种相辅相成的宣传方法，即浸润法和煽动法。浸润法即“旦旦而浸之，月月而润之”；煽动法即“故作惊人之语，造成极端之词”，使读者猛醒。
（2）维新派报刊的历史进步作用
①维新派的报刊宣传是新兴的资产阶级及其知识分子向中国两千多年的封建政治、思想和文化发起的一次重大冲击。从此，封建政治、思想和文化的传统地位开始动摇。维新派报刊宣传活动作用极大，主要表现在以下方面：a.向读者进行了救亡图存的爱国主义教育。b.向读者进行了资产阶级思想启蒙教育。c.推动了维新运动的发展，促进了变法的实现。
②维新派的报刊活动对我国近代新闻事业做出的主要贡献：a.冲破了封建统治者的言禁。几千年来的封建言禁被冲垮。后来尽管发生了戊戌政变，但是封建统治者垄断新闻事业的时代毕竟结束了。b.开了政治家办报的先河。康梁以后，报人、报刊的社会地位空前提高，办报的政治家也愈来愈多了。c.创造了报刊新文体，推动了政论写作的发展。以康梁为代表的维新派报刊政治家继承王韬报刊政论的传统，在政论写作中不断突破，锐意革新，逐渐形成了一种新的报章文体。这种文体的特点：疾呼救亡，直陈时弊，介绍西学，要求变法，谈古论今，条理清晰，感情充沛，语言半文半白，有时还夹有口语、俚语及外国语法，因而平易畅达，易于表现新思想。这种文体以梁启超在《时务报》上发表的政论最为典型，故被称为“时务文体”。`, explain:`维新派办报，不是为了单纯卖报纸，而是把报纸当成推动变法、开启民智的工具。他们想借报刊告诉大家旧制度有问题，中国得改。它的历史进步作用就在于，把很多原本只在少数人圈子里讨论的政治改革问题，真正推到了社会舆论层面，也为近代中国的报业发展和思想启蒙开了路。`, frame:`分两大部分。办报思想：早期论报纸性质（利器、党派性）与作用（宣传、沟通、启蒙）；后期报馆天职、四条标准、舆论观、浸润与煽动二法。历史作用：思想冲击与启蒙、推动变法；新闻史贡献：冲言禁、政治家办报、时务文体与政论革新。收束：思想与业务双重遗产。`},
  {ch:7, type:"short", q:`结合当前“自媒体”迅猛发展的现状，谈谈你对“使用与满足”理论的新认识。`, a:`使用与满足理论是起源于20世纪40年代的一种有关受众对媒介的使用动机的传播理论。传播学
家E·卡茨的《个人对大众传播的使用》是这一理论的代表作。
（1）“使用与满足”理论的主要内容
使用与满足理论把受众成员看作是有特定需求的人，把他们的媒介接触活动看作是基于特定的需求动机来“使用”媒介，从而使这些需求得到“满足”的过程。
该理论认为，受众面对大众传播并不是完全被动的。实际上，受众总是主动地选择自己所偏爱和需要的媒介内容和讯息，而且不同的受众还可以通过同一媒介讯息来满足不同的需要，达到不同的目的。因此，不是媒介在操纵人，而是人在使用媒介。而人使用媒介说到底只是为了满足其需要而已。使用与满足理论从受众角度出发，通过分析受众的媒介接触动机以及这些接触满足了他们的什么需求，来考察大众传播给人们带来的心理和行为上的效用，开创了从受众角度考察大众传播过程的先河。
（2）“使用与满足”理论的新认识
当前，“自媒体”迅猛发展，人们进入自媒体时代。自媒体时代是指以个人传播为主的媒介时代，人人都有麦克风，人人都是记者，人人都是新闻传播者。这种媒介基础凭借其交互性、自主性的特征，使得新闻自由度显著提高，传媒生态发生了前所未有的转变。自媒体时代，受众的“使用与满足”理论得到了新的发展。受众更加处于主动的地位，不仅仅是主动通过媒介选择需要的媒介内容和信息，而是通过媒体发布信息。
新媒体出现后，信息的发布不再垄断在一个高门槛的专业机构手中，越来越多的普通人可以自由发布信息、传播信息。从论坛、社区到博客，再到微博，媒体变得越来越个性化、个人化，公众发言的自由空间越来越大。微博对许多重点、热点事件都起到了重要的推动作用。受众在这一过程中充当信息发布者和信息获取者的双重角色，不仅满足自己获知信息的需要，也满足了自己分享信息的需要。而且自己发布信息这一举动同时又能满足他人获知信息的需要。所以，自媒体时代，“使用与满足”得到新的发展。`, explain:`“使用与满足”理论放到今天其实更好理解了。大家刷自媒体，不只是为了知道信息，还可能是为了放松、找认同、看热闹、表达自己、和别人互动。以前受众更多像“看的人”，现在很多人一边看一边发，一边用内容满足自己，一边又生产内容去满足别人。所以这个理论在自媒体时代反而更有生命力。`, frame:`起手：卡茨与使用与满足基本观点—受众主动用媒介满足需求。转向自媒体：个人即传播者，交互自主、生态变迁。展开：受众兼具发布与获取，满足获知、分享及利他获知；主动性升级。收束：理论框架仍适用，但“使用”含生产与传播。`},
  {ch:8, type:"noun", q:`《常识》`, a:`《常识》是托马斯·潘息（Thomas Paine，1737～1809）于1776年1月以“一个英国人”的署名而发表的政论小册子，在这本小册子里，他竭力主张北美殖民地脱离英国而独立，认为谈论和平是“荒唐透顶的说法”，“应该用武器这个最后的手段来解决争议”。《常识》集中反映了资产阶级革命派的观点，在舆论上起了极大的动员作用。《常识》是促使美国从不列颠帝国中独立出来的出版物，该书的出版深刻揭露了英国的黑暗与压迫本质，使得很多人最终下定决心与英国决裂，极大地鼓舞了美国独立士气，建立独立的美利坚合众国。同时它也是一本当代青年不可不读的经典名著。`, explain:`《常识》之所以有名，是因为它不是一本高深理论书，而是用普通人也听得懂的话，直接把“北美为什么该独立”讲明白了。潘恩等于把政治道理翻译成了大众语言，所以这本小册子才能在独立战争前起到那么大的鼓动作用。`, frame:`起手：潘恩1776年小册子，署名与主张北美独立。展开论点与动员舆论。收束：对美国独立的精神作用及思想史地位。`},
  {ch:8, type:"noun", q:`史沫特莱`, a:`艾格尼丝·史沫特莱，美国著名记者、作家和社会活动家，一个杰出的与众不同的女性。1892年，史沫特莱出生于美国密苏里州的奥斯古德。早年当过侍女、烟厂工人和书刊推销员，曾在《纽约呼声报》任职。1918年因声援印度独立运动而被捕入狱6个月，1919年起侨居柏林8年，积极投身印度民族解放运动，曾在柏林会见尼赫鲁。史沫特莱1928年底来华，在中国一待就是12年，抗战初、中期，她目睹日本对中国侵略，向世界发出了正义的声音，2007年，中共党史出版社出版的《联共（布）、共产国际与中国苏维埃运动（1931-1937）》第十五卷公布了一封尘封70年的密函，引出了一段鲜为人知的陈年往事史沫特莱可能是苏联派到中国的间谍。`, explain:`史沫特莱可以看作那批向世界介绍中国革命和中国抗战的重要外国记者之一。她长期关注中国，把很多中国人民的处境、斗争和革命情况写给西方读者看。她的价值就在于，她不是站在冷冰冰的旁观者立场，而是带着强烈同情和现场感去报道中国。`, frame:`起手交代史沫特莱的身份与来华背景，点明她既是记者也是社会活动家。中间重点写她在抗战时期对日军侵华的现场报道，以及如何把中国处境和抗争介绍给国际社会。结尾再收束她的立场与影响，点出她是向世界传播中国声音的重要外国记者。`},
  {ch:8, type:"noun", q:`新生事件`, a:`新生事件是指发生在抗日战争时期的一场以《新生》周刊为阵地的抗日运动。1934年2月，《新生》周刊创刊，杜重远任编辑兼发行人。它重新举起抗日的火炬，实际上是《生活》的继续。1935年5月，《新生》刊载《闲话皇帝》一文，泛论古今中外的君主制度，其中说到现阶段日本的天皇空有其名而无实权。日本驻沪总领事向国民党政府提出强烈抗议和无理要求，国民党政府当即查封《新生》周刊社，判处主编杜重远徒刑一年零两个月。国民党中央还电令其各级党部及新闻出版界，加紧查禁抗日言论，取缔抗日运动。这就是中日反动派合伙制造的“《新生》事件”。`, explain:`新生事件本质上是一起因爱国言论引发的新闻打压事件。因为《新生》周刊上的言论碰到了敏感的政治和外交神经，结果主办者杜重远等人受到严厉压制。这个事件说明，当时新闻言论空间其实非常脆弱，很多时候报刊一旦碰到政治高压，很容易就被整肃。`, frame:`起手：抗战时期围绕《新生》周刊的事件。写刊物与杜重远、继承《生活》抗日立场。《闲话皇帝》引发日方抗议，当局查封判刑。收束：国民党配合压制与中日反动势力合流性质。`},
  {ch:8, type:"noun", q:`沉默的螺旋`, a:`“沉默的螺旋”是传播效果理论重新回归到强大效果论的代表理论之一。“沉默的螺旋”最早是由诺依曼于1974年在《传播学刊》上发表的一篇论文中提出的，1980年以德文出版的《沉默的螺旋：舆论我们的社会皮肤》一书，对这个理论进行了全面的概括，诺依曼通过“沉默的螺旋”理论，重新提示了一种“强有力”的大众传播观。这个假说包括几个要点：①舆论的形成是大众传播、人际传播和人们对“意见环境”的认知心理三者相互作用的结果；②经大众传媒强调提示的意见由于具有公开性和传播的广泛性，容易被当作“多数”或“优势”意见所认知；③这种环境认知所带来的压力或安全感，会引起人际接触中的“劣势意见的沉默”和“优势意见的大声疾呼”的螺旋式扩展过程，并导致社会生活中占压倒优势的“多数意见”-舆论的诞生。`, explain:`沉默的螺旋说白了就是，人都怕自己成少数派、怕被孤立。于是当一个人感觉自己的意见不占上风时，往往就不太敢说；而支持主流意见的人看到声音更大，又会更敢说。这样一来，强势意见越来越强，弱势意见越来越沉默，就像螺旋一样越卷越明显。`, frame:`起手：诺依曼提出，强效果论代表。展开要点：大众与人际及认知互动；优势意见被感知；沉默与螺旋扩展形成舆论。收束：点明“社会皮肤”隐喻及舆论形成机制。`},
  {ch:8, type:"noun", q:`布鲁默的“自我互动”理论`, a:`布鲁默的“自我互动”理论是布鲁默在1968年出版的《象征互动论》中提出的一种理论。该理论认为，人能够与自身进行互动，即自我互动。人是拥有自我的存在，人在将外界事物和他人作为认识和行动的对象的同时，也把自己作为认识和行动的对象。在这个过程中，人能够与自己进行沟通与传播，并能够对自己采取行动。布鲁默认为，“自我互动”在本质上是与他人的社会互动的内在化。不过，“自我互动”并不是与他人的社会互动在头脑中的简单再现，而是一个能动的、创造性的过程，经过这个过程不断改变原来的自我，形成新的意志和行为主体。布鲁默的这个观点说明，人内传播是现实社会传播关系的反映，通过自我互动或自我传播，人能够在与社会、他人的联系上认识自己、改造自己，不断实现自我的完善和发展。`, explain:`布鲁默的“自我互动”理论想强调，人不是机械地接到刺激就行动的。人在做事前，会先在心里跟自己“说话”，会解释情境、判断意义、调整做法。也就是说，人会先和自己沟通一遍，再决定怎么对外行动，这就是所谓自我互动。`, frame:`起手：布鲁默象征互动论中人可与自我互动。展开：人内传播非简单再现他人互动，而是能动创造、重塑自我。收束：说明自我认识与社会联系通过自我传播完善。`},
  {ch:8, type:"noun", q:`热媒介`, a:`热媒介是麦克卢汉关于媒介分类提出的一个概念。“热媒介”传递的信息比较清晰明确，接收不需要动员更多的感官和思维活动氧能理解，它本身是“热”的，人们在进行信息处理时不必进行“热身运动”：而“冷媒介”则相反，它传达的信息含量少而模物，在理解时需要动员多种感官的配合和丰富的想象力，麦克卢汉认为书翰、报刊、广播、无声电影、照片等是“热媒介”，因为它们都作用于一种感官而且不需要更多的联想：而漫画、有声电影、电视等属于“冷媒介”，因为它们作用于多种感官，需要丰富的联想和参与，这个观点，在于说明载介作用于人的形式不同，引起的心理和行为反应也不同。`, explain:`热媒介和冷媒介的区别，关键不在名字，而在受众要不要自己“补”。热媒介提供的信息比较饱满、清楚，你不用花太多力气就能接收；冷媒介给的信息相对少、相对模糊，需要你自己多参与、多想象、多补全。所以别死背例子，抓住“信息越满，参与越少”就够了。`, frame:`起手：麦克卢汉媒介分类。对比热冷：热媒介信息清晰、单通道、少联想；冷媒介模糊、多感官参与。举例按答案：报刊广播无声电影偏热，漫画有声电影电视偏冷。收束：说明不同媒介引发不同参与与反应。`},
  {ch:8, type:"noun", q:`公众`, a:`公众是与特定的公共关系主体相互联系及相互作用的个人、群体或组织的总和，是公共关系传播沟通对象的总称，公众是除自己及与自己有相当关系或一定交往的人（或团体）外的人群，具有排他性。而与自己有相当关系或一定交往的人就是自己的特成群体，如亲戚、朋友、同学、邻居、同事、员工、合作伙伴或单位等等，法律意义上的公众必须是狭文上的公众，如果法律意义上的公众是广义上的公众，则立法毫无意义、司法会出现严重的逻辑错误和法理混乱，从而造成冤、假、错案。`, explain:`公关里的公众，不是随便指所有人，而是那些和某个组织有实际关系、会受它影响，或者能影响它的人。也就是说，公众一定是“和这个组织有关系的人群”，而且不同问题对应的公众也不一样，不是一个固定名单。`, frame:`起手先下定义：公众是与特定组织发生联系并相互作用的个人、群体或组织总和。中间写清它不是泛指所有人，而是与该组织有现实关联、会互相影响的人群，同时可顺带点出排他性与特殊群体。结尾落到公关语境：公众就是组织进行传播沟通和关系管理的对象。`},
  {ch:8, type:"noun", q:`IPRA`, a:`IPRA是国际公共关系协会 Imtemational Puibli： Relstins Asviaion的缩写，它于1955年在英国伦教成立，当时只有来自16个国家的数百名公关专家参NTM会，现在这一组织已拥有60个国家的会员。也的召开的第二届世界大会制定并通过了《国际公共共办，15年在希腊雅典召开的第三届世界大会又通过了《国际公共关系的会世界大会行为年在否罚世界大会上通过的《垦西路宜言）对公共关系职业复范化和交流都起了积权的准9年在了金纸奖”和“总统奖”，出版不定期的（国际公共关系协会通讯》和季刊《国际外共，微会评论），该协会在世界各地积极开展工作，为世界公关事业的发展做出了巨大的贡献。`, explain:`IPRA就是国际公共关系协会，你可以把它理解成全球公关行业里比较有代表性的国际组织。它的作用主要是推动公关行业交流、职业规范和伦理建设，让公共关系不只是各国自己各干各的，而是慢慢朝着更专业、更国际化的方向走。`, frame:`起手：国际公共关系协会英文缩写。写1955年伦敦创立、会员国由少到多。展开历届大会职业道德文件与行业规范化作用，及奖项、刊物等对交流推动。收束：全球性公关专业组织地位。`},
  {ch:8, type:"noun", q:`广告调查`, a:`广告调查是指通过系统地信息收集和分析，提供广告决策所需的相关信息，帮助广告公司制定或评估广告战略，并对广告效果做出评价的一种调查极式。它是代情训在的一组成部分，是整个广告活动的开端和基础。广告调查具有以下特点：①目标明码：②操作性理：③注意保志；③具有累积性。广告调查的内容主要有四个方面：①广告战略调查：②广告创意概念调查：②广告媒介调查：④广告效果调查。`, explain:`广告调查其实就是广告动手之前的“侦察工作”。先弄清楚市场是什么情况、消费者在想什么、竞争对手在干嘛、哪些媒介最有效。它的价值在于，广告不是凭感觉拍脑袋，而是先看清现实，再决定怎么说、对谁说。`, frame:`起手：系统收集分析信息支撑广告决策、评估战略与效果，活动开端与基础。展开特点：目标明确、可操作、累积性等（依教材表述）。再列内容四类：战略、创意概念、媒介、效果调查。收束：贯穿广告活动全流程的信息支撑。`},
  {ch:8, type:"noun", q:`广告活动的参与者`, a:`广告活动的参与者是指广告主、广告经营者、广告发布者、广告受众、广告管理者。参与广告活动的各方，在广告活动中扮演着不同的角色，彼此之间相互依存。但分工又有所不同。其中，广告受众占有举足轻重的地位，广告活动中的其他角色，基本上是围绕广告受众来各行其责的。广告主的经营以他们为转移，广告经营者和广告发布者的工作受其检验，广告管理者为其服务。开展广告活动，实际上是以消费者（广告受众）为中心来进行的。`, explain:`广告活动不是一个人能完成的，它通常是一条合作链。广告主要出钱、提需求，广告公司负责策划和创意，媒介负责发布，另外还可能有制作公司、调研机构这些配套角色。说到底，广告是一套分工协作出来的结果，不是谁单打独斗就能搞定的。`, frame:`起手列举五方：广告主、经营者、发布者、受众、管理者。展开分工相互依存，强调受众中心：其他角色围绕受众检验与服务。收束：广告活动以消费者为导向展开。`},
  {ch:8, type:"short", q:`简述“把关人”理论及其实质。`, a:`（1）“把关人”理论的含义
把关人（gatekeeper）理论是传播学先驱者库尔特·卢因通过对大众媒介“传播者”角色的研究而得出的一种传播理论。把关人又译为“守门人”，是指那些在新闻媒介系统中居于决断性的关键位置，对信息进行过滤和加工的人或组织，而这种对信息进行的过滤和加工的过程就是把关。1947年，卢因在《群体生活的渠道》一书中系统论述了这个问题，认为群体传播中存在着一些把关人，只有符合群体规范或把关人价值标准的信息才能进入传播渠道，1950年，传播学着环特将这个概您引入新闻研究，明确提出了新闻神选过程中的“把关”模式，这一模式说明，新闻报道是一个对事实加以取舍的过程，传媒内部存在着一系列的把关环节，把关是一种有组织的活动。
（2）“把关”过程的实质
①大众传媒的新闻报道与信息传播并不具有纯粹的“客观中立性”，而是根据传媒的立场、方针和价值标准而进行的取舍选择和加工活动。
②新闻和信息的选择尽管受到媒体的经营目标、受众需求以及社会文化等多种因素的制约，但是与煤介方针和利益一致或相符的内容更容易优先入选、优先得到传播。
③媒介的“把关”是一个多环节、有组织的过程，其中虽有记者，编辑个人的活动，但“把关”的结果在总体上是传媒组织的立场和方针的体现。`, explain:`把关人理论的意思很简单：新闻不是发生了就一定会原样进媒体，中间总有人在筛选。记者、编辑、媒体机构都会判断什么能发、怎么发、发到什么程度。所以媒体呈现出来的世界，并不是现实的原封不动复制，而是经过层层把关后的版本。这也是它的实质所在。`, frame:`起手：卢因把关人，怀特引入新闻研究。含义：过滤加工信息的人与组织。展开实质三点：非纯粹客观、受立场与经营等因素影响、多环节有组织体现媒介方针。收束：把关是价值与组织的选择过程。`},
  {ch:8, type:"short", q:`简述选择性接受假说。`, a:`选择性接受是受众在处理信息之际的选择性倾向之一，即受众在接触信息后，保留在记忆中的往往是那些与自己的既有兴趣，需求，立场，态度或观点一致或接近的内容，选择性接受的倾向，在实验心理学中也得到了证明。它与选择性接触，选择性认知一样，都是制约传播效果的重要因素。选择性接受包括三个方面：
（1）选择性接触
选择性接触是指受众在接触大众传播活动之际，并不是不加区别地对待任何媒介和内容，而是更倾向于接触与自己的既有立场、观点、态度一致或接近的媒介或内容，而有意无意地回避那些与自己既有倾向相左的媒介或内容。选择性接触行为更容易在强化受众既有立场和态度的方向上起作用，而不是导致它们的改变。这个概念由美国传播学家拉扎斯菲尔德等人在《人民的选择》中最早提出。
（2）选择性理解
选择性理解是指受众总要依据自己的价值观念及思维方式对接触到的信息做出独特的个人解释，使之同受众固有的认识相互协调而不是相互冲突。选择性理解是选择性定律的重心所在，受众对信息的选择性处理主要体现在选择性理解上。信息中包含的意义不是由传播者硬塞到受众手中的，而是由受众根据主观意愿自己从中发现的。即在对信息如何理解上主动权掌握在受众手中，而不是掌握在传播者手中。
（3）选择性记忆
选择性记忆是受众在处理信息之际的选择性倾向之一，即受众在接触信息后，保留在记忆中的往往是那些与自己的既有兴趣、需求、立场、态度或观点一致或接近的内容，选择性记忆的倾向，在实验心理学中也得到了证明。它与选择性接触、选择性认知一样，都是制约传播效果的重要因素。`, explain:`选择性接受假说说的是，人接收信息其实很“挑食”。大家更愿意看自己本来就认同的内容，更容易按自己的立场去理解信息，也更容易记住和自己想法一致的部分。所以大众传播很多时候不是把人彻底改变了，而是在原有态度上继续加固。`, frame:`起手：选择性定律之一，与接触、理解、记忆并列制约效果。分述选择性接触（拉扎斯菲尔德等）、选择性理解（意义由受众建构）、选择性记忆（保留与立场一致信息）。收束：三环节串联说明受众主动性。`},
  {ch:8, type:"short", q:`简述广告策划的特性。`, a:`广告策划是企业经营管理活动的一个重要组成部分，是一个有着特殊规律的系统工程，要遵循一些共有的基本属性。广告策划具有以下几种特性：
（1）目标的明确性
每次广告活动只能实现其中一两个目标，必须明确本次活动的主要目标，为达到特定的目的而采取相应的战略战术。明确目标，能把广告活动的各个环节串联起来，把广告活动的各种功能调动起来，把广告传播过程中的无序转化为有序。明确的目标必须正确。
（2）运作的层次性
应善于把握广告策划活动的性质、职能、特点和运动规律，分清和把握好层次结构，既发挥各层次的能动作用，又确保在整体方针指导之下，依照严格的程序进行运作。既调动个人的积极主动性，又注意集体智慧的整体融合。
（3）筹划的全局性
广告策划需要涉及广告活动的方方面面，是指导整个传播活动的纲领，要多从全局和长远着眼。整个计划一旦确定下来，一般不要随意变动。
（4）决策的事前性
广告策划是建立在对整个广告活动充分了解把握的基础上。要注意做好调查研究工作，要有预见性。
（5）变动的调适性
要随时注意影响广告活动的各种因素的发展变动，需要因时而变，因势而动，能够相应地做适当修正和调整。`, explain:`广告策划的特点，简单说就是它不是随便冒个点子就完了，而是一整套有计划的安排。它要有系统性，前后能连起来；要有前瞻性，提前想好市场和竞争；要有创造性，不然广告没人记得住；还得能落地，不是只停在纸面上。好的策划，既要会想，也要能做。`, frame:`起手点明广告策划是企业经营中的系统工程、须遵循共有规律。接着按答案顺序分五条展开：目标要明确且正确并能串联环节；运作要分层、在整体方针下程序运作并融合集体智慧；筹划要全局、计划不宜轻动；决策须事前调研、有预见；最后写变动调适，强调随环境变化及时修正。收束用一句话回扣“策划统领执行、动态优化”。`},
  {ch:8, type:"short", q:`简述艾维·李对公共事业的主要贡献。`, a:`艾维·李是公共关系早期的开拓者。1904年，艾维·李与派克合资成立了“派克·李氏”公司，不仅开创了一项事业，而且以自己卓有成效的工作，奠定了公关职业的基础。艾维·李对公关事业的主要贡献：
（1）他首创了现代公关事业的模式，出卖劳务而收费。
（2）发现企业管理人性化的众应，把员工及社区列为公关的主要对象，改变了新闻代理人只注重新闻界关系的偏颇。
（3）倡导以事实为根据进行客观报道：通过积极沟通，促进企业的改革，达到改善企业形象的目的。人们对按时开会很在意，但对会议什么时间结束却显得漠不关心，这样，浪费的时间与节约下来的时间实际上是均衡的，我们节省时间的目的并未达到，所以，会议主持者应严格遵守会议的开始与结束时间。如果会议引发了许多问题不能按时结束，那么最好的方法就是再补充一些时间，对这些问题进行进一步探讨。事实上，短而精的会议效果往往远远胜过那些枯燥而冗长的会议。
（4）他提出的“说真话”的思想和“公众应当被告知”的原则，奠定了早期现代公关理论的基础。越是高层的管理人员就越吝惜自己的时间，想要完成任务，首先得有时间。艾维·李方法设定了这一天需要完成的目标，无论你怎么做，这一天总是会结束的。这时候，管理人员又该坐下来，拿出你所列的几项任务，在疲倦的同时反思：这一天究竟都发生了什么事，自己又做了什么-也就是说对照实际对一天的工作做个小结。`, explain:`艾维·李最大的贡献，就是把公共关系从遮遮掩掩、搞噱头，往公开、真实、讲事实的方向拉了一大步。他主张该说真话就说真话，别总想着糊弄媒体和公众，还提出了《原则宣言》。所以大家常把他看成现代公关职业化的开路人。`, frame:`先一句定位艾维·李是现代公共关系职业化的重要奠基者。展开时抓四点：首创以劳务收费的公关经营模式；把员工、社区等纳入公关对象范围；强调以事实为依据、通过沟通推动企业改进；提出“说真话”和“公众应当被告知”的原则。结尾再点明他对现代公关职业伦理和操作范式的开创意义。`},
  {ch:8, type:"essay", q:`分析《循环日报》的历史地位。`, a:`（1）《循环日报》的含义
《循环日报》是我国第一批国人自办报纸中影响最大的报纸，由我国早期资产阶级维新派思想家王韬在香港主编。1874年2月4日，《循环日报》在香港创刊，王韬任该报主笔。该报以“强中以攘外，诹远以师长，变法以自强”为办报宗旨，是我国近代最早宣传资产阶级维新变法思想的报纸之一，首创了一种以政论为灵魂的报纸。该报开创了中国近代报刊的政论文体。王韬的政论文章，后汇编为《弢园文录外编》。
（2）《循环日报》的历史地位
①1864年王韬曾任香港中文报《近事录编》编辑，但报纸所有权和经营方针完全掌握在英国人罗郎手中，王韬深感必须有一份“华人资本、华人操权”的日报才能表达华人的声音和代表华人在香港的利益。
②中外新闻出版史学者公认《循环日报》是中国报刊历史上第一份“华人资本、华人操权”日报，林语堂1936年在芝加哥以英文出版的《中国报刊与舆论史》一书中推崇王韬为“中国新闻报纸之父”。
③王韬用他的笔杆子在《循环日报》发表的政论，为变法强国制造舆论，树立了文人不一定要“学而优则仕”在清朝官府当官才能影响政治的榜样，开创“文人论政”的先河。
洪深在1934年《申报总编纂“长毛状元”王韬考证》一文中认为王韬是政论高手，即使在二十世纪新闻界也未有人能超越他。
④《循环日报》还大胆改革文体，建设报刊文体，王韬为《循环日报》撰写的政论，立场鲜明，短小精悍，深入浅出，通俗易懂，而且富于感情，后来发展成为一种报章文体，对当时的文坛和以后的维新派报人有很大的影响。`, explain:`《循环日报》的重要性，在于它是近代中国人自己办政论报的代表之一，而且王韬借这份报把很多改革、自强、开眼看世界的想法持续讲了出来。它不只是香港的一张报纸，更是在那个时代用中文向国人输入新思想、推动舆论变化的重要平台，所以历史地位很高。`, frame:`起手交代《循环日报》是国人自办报中影响最大者之一及王韬、创刊时间与办报宗旨。先概括“以政论为灵魂”的办报特色与政论文体开创意义。再分层次写历史地位：华人资本华人操权的第一份日报及学界定评；政论推动维新舆论、“文人论政”典范；报章文体对文坛与维新报人的影响。收束升华其在中国新闻史与思想史上的节点意义。`},
  {ch:8, type:"essay", q:`结合当下国际传播形势，论述国际新闻选择中的价值标准。`, a:`运用个体认知心理学原理研究跨文化传播中的差异、冲突和障碍问题的基础上，新闻传播学术界有人提供了一套用以判断国际新闻新闻价值量的标准：
（1）时间跨度
与时效性概念接近，但强调不同媒介组织的不同时效要求。例如，在几小时内发生或完成的事件，适合于日报或广播电视。
（2）强度或临界值
凡是特别重要或者重要性陡然猛增以至引起了特别关注的事件，就更有可能受到媒介的青睐。重要性陡然猛增的事件通常存在于某种媒介监测的情况，如对政府或财政的监别，或对一场不断扩大的冲突的监测。
（3）清晰性
一个事件的意义越清晰，越少受到怀疑，接受新闻处理的可能性就越大。
（4）文化接近性或相关性
一个事件越接近预期受众的文化和兴趣，就越有可能中选，在这里，文化通常指由种族（民族）、语言、宗教、社会制度等因素决定的文化价值观和社会价值观。
（5）一致性
符合某些既定期待和预想的事件，比那些与期待不一致的事件更有可能中选。例如，人们预料某国近期可能发生危机或冲突，与此相关的事件更有可能引起关注。
（6）意外性
事件越不平常和越难预料，就越有可能中选。
（7）连续性
一旦某个事件被确认具有新闻价值，就会引起对该事件或相关事件的持续关注。
（8）组合性
新闻事件的选择必须考虑媒介内容的整体构成和平衡，一些事件因作为对照而中选，
（9）社会文化价值观
除了上述新闻要素以外，社会、受众群体或记者、编辑的社会价值观也会影响新闻选择。`, explain:`国际新闻为什么同一件事，不同国家媒体选出来的样子差很多？因为国际新闻选择不只看“事情大不大”，还看它和本国受众近不近、符不符合媒体预期、有没有持续报道价值、能不能放进现有版面逻辑里。问题在于，这些标准看起来像业务标准，背后往往也带着立场和价值观。所以国际新闻选择从来不只是技术问题，也和国际话语权有关。`, frame:`起手扣题“当下国际传播”：说明新闻选择既受专业标准也受地缘政治与平台逻辑牵引。主体按答案九项依次点名并各用半句说清侧重点：时效差异、强度临界、清晰性、文化接近、预期一致、意外性、连续性、组合平衡、社会文化价值观。收束指出这些标准在跨国报道中如何与“受众接近、议题设置、文化折扣”相互作用。`},
  {ch:9, type:"noun", q:`“竖三民”`, a:`“竖三民”是指革命报人于右任创办的《民呼日报》《民吁日报》和《民立报》，这三份报纸都用“民”字打头，创办时间相衔接，风格和基调协同，为同一人创办，故称“竖三民”，1909年5月15日，《民呼日报》在上海诞生，于右任担任社长，该报以主要篇幅揭露清廷出卖路权、矿权，斥之“以傀儡自待”：井大揭官场黑幕，抨击官僚腐败，1909年10月3日，《民吁日报》在上海创刊，报名有两个含义：①“民不敢声，故仅吁耳”；②“吁”即“呼”去两点，暗喻民众即便被反动当局挖掉双眼，仍要呼喊。《民立报》于1910年10月11日在上海问世，将矛头直指清廷，斥之为“倒行逆施”之政府。在反对袁世凯的斗争中，《民立报》也是重要舆论阵地。`, explain:`“竖三民”就是于右任先后办的三份带“民”字的报纸。它们共同特点很明显，就是用激烈的政论宣传革命、反清和民主思想。在清末那个环境下，这类报纸不只是报道新闻，更像是革命派动员舆论、鼓动人心的武器。`, frame:`起手解释“竖三民”是于右任连续创办的三份以“民”字开头的革命报刊合称。分述《民呼》《民吁》报名寓意与揭露路权矿权、官场腐败的斗争；《民立报》抨击清廷及后续反袁舆论阵地作用。收束点明时间衔接、风格协同因而得名。`},
  {ch:9, type:"noun", q:`埃德加·斯诺`, a:`埃德加·斯诺，美国新闻记者、作家，1928年秋来到中国，曾任欧美几家报社驻华记者、通讯员，发表不少新闻作品。1933年至1935年，任燕京大学新闻系讲师，同时兼任美国《星期六晚邮报》和英国《每日先驱报》特约记者。“一二·九”运动爆发后，积极支持爱国的学生运动。1936年6月斯诺访问陕甘宁边区，写了大量通讯报道，成为第一个采访红区的西方记者，1937年出版的《红星照耀中国》，后改名为《西行漫记》，引起极大轰动。新中国成立后，斯诺三次访华。`, explain:`斯诺之所以特别重要，是因为他不是隔着资料写中国，而是亲自跑到根据地去看、去问、去采访。他写的《红星照耀中国》让很多外国人第一次真正了解中共和红军，不再只听国民党或者西方偏见的一面之词。所以他的报道既客观，又改变了世界对中国革命的看法。`, frame:`起手国籍与身份：美国记者作家，来华时间与在华身份（驻华记者、燕大新闻系等）。中间写关键事迹：支持“一二·九”、1936年访问红区与《红星照耀中国》（《西行漫记》）的影响。收束补一句新中国成立后三次访华，体现其与中国长期关联。`},
  {ch:9, type:"noun", q:`北岩报团`, a:`北岩报团形成于1908年，由哈姆斯沃思创办，是英国第一个现代报团。因为北岩拥有多种报刊，并组成了庞大的报业帝国，故被称为“舰队街的拿破仑”，哈姆斯沃思创办《回答》杂志后，又创办了《每日邮报》《每日镜报》，购买了《观察家报》（1905），控制了《泰晤士报》（1908），以及多种地方报刊，开创了富有英国特色的大众化报刊的事业，被称为“舰队街的拿破仑”，组成了庞大的报业帝国，并开始了英国报业的垄断化进程。他的弟弟H．哈姆斯沃思（1914年受封罗瑟米尔勋爵），继承了该报团的大部分报刊，但《泰晤士报》转让给了阿斯特家族，随后《每日镜报》于1931年分离出去。以后该报团称“罗瑟米尔报团”或联合报业公司。`, explain:`北岩报团是英国报业从单打独斗走向大集团经营的代表。它靠办廉价大众报起家，后来又不断并购扩张，越做越大，最后形成了很强的舆论影响力。你可以把它看成英国现代报业资本化、集团化、垄断化的一块典型样本。`, frame:`起手时间人物：1908年前后哈姆斯沃思与英国首个现代报团。简述代表性报刊与收购控制（如《每日邮报》《每日镜报》《泰晤士报》等）及“舰队街的拿破仑”评价。收束交代报团演变（罗瑟米尔继承、部分报刊转出）与英国报业垄断化开端。`},
  {ch:9, type:"noun", q:`传播障碍`, a:`传播障碍是指在传播活动过程中，由于传播系统本身存在的结构性和功能性障碍，而导致的传播行为受到阻碍。传播障碍包括结构与功能障碍，如传播制度是否合理、传播渠道是否畅通、信息系统的各部分的功能是否正常等。传播障碍的存在是妨碍社会发展的重要因素，会造成社会成员的认知、判断、决策和行动的混乱，带来一系列的社会问题，这些问题如果不及时妥善地解决，必会影响社会的和谐和正常发展，严重的甚至造成社会混乱和国家解体。`, explain:`传播障碍就是信息在传递过程中“卡壳”了。可能是说的人表达不清，也可能是渠道有干扰，还可能是听的人理解偏了。比如语言不通、背景不同、环境太吵、偏见太强，这些都会让信息走样。所以传播不是你说了就算完成，真正难的是让对方按你的意思接收到。`, frame:`起手下定义：传播过程中因系统结构或功能问题导致传播受阻。展开写包含制度、渠道、信息系统各部件是否正常等；再写后果：认知判断混乱、社会问题累积甚至危及稳定。收束强调其是社会发展的妨碍因素，需从系统层面治理。`},
  {ch:9, type:"noun", q:`知沟假说`, a:`答，知沟假说是1970年美国学者卡茨曼，蒂奇诺等人在一系列实证研究的基础上，提出的一种理论
袖是指在人际传播的网络中，经常为他人提供信息，同时为他人“施加影响”的活跃分子，他们在大众传播效果的形成过程中起着重要的中介和过滤作用，由他们将信息传播给受众，形成了信息的两级传播。`, explain:`知沟假说想提醒大家一件事：媒体越发达，不一定大家就越平等。因为条件更好的人，往往更会获取信息、理解信息、利用信息，所以新知识一来，他们涨得更快；条件差的人反而跟不上。结果就是，信息越多，知识差距有时不缩小，反而会被拉大。`, frame:`起手点明知沟假说由20世纪70年代蒂奇诺等提出。核心要写清：大众传播虽然能普遍增加知识，但社会经济条件较好的人吸收更快，因此知识差距可能扩大而不是自动缩小。中间可补几条原因，如传播能力、知识基础、社交网络、选择性接触和媒介使用差异。结尾再落到现实意义：信息越丰富，越要警惕知识分化。`},
  {ch:9, type:"noun", q:`媒介关系`, a:`媒介关系是组织机构与报纸、电视、电台、杂志等大众传播媒介的关系，主要是与新闻界的关系。良好的媒介关系可以把组织机构需要输出的信息最大限度地传播出去，同时，又从媒介方面获取组织需要的信息，媒介关系是公共关系工作对象中最敏感、最重要的一部分，也是现代传媒和社会公共科学的研究系列之一：一方面，新闻媒介是组织与公众实现广泛、有效沟通的必经渠道，具有工具性；另一方面，新闻媒介人员又是组织必须特别重视的公众，具有对象性。`, explain:`媒介关系，说白了就是组织怎么和媒体打交道。不是简单讨好记者，而是通过提供真实信息、安排采访、建立信任，让媒体更愿意准确、公正地报道你。对很多组织来说，媒介关系做得好不好，直接影响外界怎么认识你。`, frame:`起手界定：组织与报纸、广播电视、杂志等大众媒介及其新闻界的关系。分两层写：媒介是组织对外沟通的关键渠道（工具性）；记者编辑又是组织必须重视的公众（对象性）。展开良好媒介关系在信息输出与信息回流上的作用。收束点明其在公关对象中的敏感与核心地位。`},
  {ch:9, type:"noun", q:`公关效果评估`, a:`公关效果评估是指对公共关系活动的效果进行评估。是整个企业公共关系活动流程的最后一个阶段，同调查研究阶段首尾相连，使企业公共关系活动呈现出一个有始有终的完整过程。主要包括覆盖率、有效率、千人成本、准确性、传播力度、传闷率、公关指数提升、销售提升等方面。`, explain:`公关效果评估，就是公关活动做完以后不能只看自己忙了多少，还要看到底有没有用。比如公众是不是更了解你了、态度有没有变好、有没有形成支持行为。它相当于给公关做“成绩单”，否则只顾花钱做活动，却不知道效果怎么样，那就很容易白忙一场。`, frame:`起手定义：对公关活动成效的测量与评判，处于公关流程末端并与调研首尾相接。展开说明评估维度思路：覆盖面、有效触达、成本效率、准确性、传播力度与渗透、指数或销售关联等（按题点列即可）。收束强调评估反哺下一轮策划。`},
  {ch:9, type:"noun", q:`脉冲式媒介排期`, a:`脉冲式媒介排期是指依品牌需要，加强在重点期间露（播）出的强度，是持续性排期和起伏式排期的结合体。好处在于其可持续累积广告效果，而其缺点是广告费用较高。采用这种排期时，广告主全年都维持较低的广告水平，但在销售高峰期采用时段性脉冲增强效果。采用这种方式的产品主要有软饮料、空调等产品，这些产品的消费具有显著的季节性。消费者的购买周期越长，越适合采用脉冲式排期。`, explain:`脉冲式媒介排期可以理解成广告投放时“一阵一阵地发力”。不是每天平均用力，而是在关键时间段集中猛投，形成一波明显声量，过了高峰再收一点，等下个关键节点再冲。这样做的好处是省预算，同时更容易在重要时刻打出存在感。`, frame:`起手界定：持续性排期与起伏式排期的结合，在重点时段加大露出。写清操作逻辑：全年维持基础曝光、旺季脉冲加量。展开适用：季节性明显的品类（如饮料、空调）及购买周期较长者。收束对比利弊：可累积效果但费用高。`},
  {ch:9, type:"noun", q:`营销组合`, a:`营销组合即营销手段，是指公司在目标市场上用来追逐其营销目标的一系列营销工具的综合运用。包括产品、价格、地点（分销或渠道）和促销等，是开展普销的工具和手段，可以整合到营销计划中以争取目标市场的特定反应。从另一方面说，营销组合又称整合营销，是指充分利用好每一种营销方式的优势，进行优势整合，以达到营销的最大目的。`, explain:`营销组合就是企业卖东西时常用的几样核心手段放在一起配合：产品怎么做、价格怎么定、渠道怎么铺、促销怎么搞。广告其实只是里面“促销”这一块的一个工具，不是全部。所以做广告不能脱离产品、价格和渠道单独瞎跑，得和整体营销配起来。`, frame:`起手一句：企业在目标市场为达成营销目标而对营销工具的组合运用。展开“4P”骨架：产品、价格、渠道地点、促销。可补写整合各手段争取目标市场反应。收束点明其与整合营销在“组合协同”上的关联表述。`},
  {ch:9, type:"short", q:`怎样理解“作为权利主体的受众”的观点？`, a:`受众不仅仅是传媒信息的使用者或消费者，他们还是构成社会的基本成员，拥有各种各样的正当权利。受众在大众传播过程中享有的基本权利包括：
（1）传播权
传播权是构成社会的每个成员所享有的基本权利之一，在传统上称为表现自由或言论自由的权利。
（2）知晓权
知晓权广义上是指社会成员获得有关自身所处的环境及其变化的信息、保障社会生活所需的各种有用信息的权利：狭义上是指公民对国家的立法、司法和行政等公共权力机构的活动所拥有的知情或知察的权利，是公民的一项基本政治权利。
（3）媒介接近权
媒介接近权即一般社会成员利用传播媒介阐述主张、发表言论以及开展各种社会和文化活动的权利，其中的一项重要内容是反论权。
（4）媒介监督权
媒介监督权是指大众传播的信息生产和传播活动涉及受众广泛的利益，有权通过各种形式对传媒的活动进行监督。`, explain:`把受众看成“权利主体”，意思就是受众不是任媒体摆布的看客，而是有权利的人。他们不仅可以接收信息，还有知情权、表达权、接近媒介的权利，也有监督媒介的权利。这个观点的重点是把受众从“被动对象”提升成“有公民权的人”。`, frame:`起手亮观点：受众不仅是消费者，更是社会成员与权利主体。按答案顺序列四项权利：传播权（表现自由）、知晓权（广义环境信息与狭义对公共权力知情）、媒介接近权（含反论权等）、媒介监督权。每项用一句界定即可。收束回扣大众传播中权利与责任的平衡。`},
  {ch:9, type:"short", q:`简述“媒介规范理论”。`, a:`媒介规范理论包含以下几种理论：（1）极权主义理论
极权主义理论又称权威主义理论，是欧洲中世纪后期极权主义制度下的产物，现代仍有其残余，其最大特点是主张媒介必须一切以权力或权威的意志为转移，一切必须为统治者服务。主要内容包括：①报刊必须对当权者负责，维护国王和专制国家的利益；②报刊必须绝对服从于权力，不得批判占统治地位的道德和政治价值：③政府有权对出版物进行事先检查，这种检查是合法的：④对当权者或当局制度的批判属于犯罪行为，给予严厉的法律制裁。
（2）自由主义理论
自由主义理论是在欧美资产阶级革命中形成的媒介规范理论，其核心反映了资产阶级自由主义的观点。主要内容包括：①任何人都拥有出版自由的权利而不必经过政府的特别许可：②除人身攻击外，报刊有权批评政府和官吏：③新闻出版不应接受第三者的事先检查：④在涉及意见、观点和信念的问题上，“真理”和“谬误”的传播应该同样得到保证；⑤自由主义理论有两个原则，一是“言论的公开市场”原则，二是“自我修正”原则。
（3）社会责任理论
社会责任理论作为对自由主义理论的一种修正，由美国新闻自由委员会于20世纪40年代后期提出的一种理论。社会责任理论是对自由主义理论的改良。其主要内容包括：①大众传播具有很强的公共性，媒介机构必须对社会和公众承担一定的义务和责任：②媒介的新闻报道和信息传播应该符合真实性、正确性、客观性、公正性等专业标准；③媒介必须在现存法律和制度的范围内进行自我约束：④公众有权要求媒介从事高品位的信息传播，这种干预是正当的。
（4）民主参与理论
20世纪70年代以后在西方国家出现的新的媒介规范理论，它的背景是社会信息化的发展和受众权利意识的提高。民主参与理论要求大众传媒向一般民众开放，允许受众的自主参与，其主要观点有：①任何个人和弱小群体都拥有知晓权、传播权和媒介接近权。②媒介应主要为受众而存在，而不应主要为媒介组织、职业宣传家或广告赞助商而存在。③与大规模的、单向的、垄断的大媒介相比，小规模的、双向的、参与的媒介更合乎社会理想。民主参与理论的核心价值是多元性、小规模性、双向互动性、传播关系的平等性。
（5）发展中国家的媒介规范理论
20世纪70年代以来，发展中国家的媒介制度和理论受到了人们的注目，大多数发展中国家经济比较落后，发展经济是国家的首要目标；政局不稳，有些国家甚至经常面临内战、政变和外来颠覆的威胁；从大众传播的状况而言，在硬件和软件两个方面对西方发达国家依赖程度都很高。发展中国家的媒介制度和理论大致反映了这种现实状况。其要点包括：①大众传播活动必须与国家政策保持同一轨道，以推动国家发展为基本任务。②媒介的自由必须伴随相应的责任和义务。③在传播内容上要优先本国文化、优先使用本民族语言。④在新闻和信息合作领域，优先发展同地理、政治和文化比较接近的其他发展中国家的关系。⑤在事关国家利益和社会稳定的利害问题上，国家有权对传播媒介进行检查、干预、限制乃至管制。
（6）我国的社会主义传播制度和媒介规范理论
我国的社会主义媒介制度及其规范理论正在发展和探索过程当中。就目前而言，它包括了以下几个方面的内容：①新闻传播事业实行社会主义公有制，防止私有资本垄断，保障社会主义新闻自由。②新闻传播事业是中国共产党领导下的事业，必须坚持党性原则。③执行报道新闻、传播信息、引导舆论、提供娱乐等多方面的社会职能。④通过沟通生产、流通和消费服务于国民经济发展，其本身也是新兴的信息和知识产业的重要组成部分。`, explain:`媒介规范理论，其实就是在问一个问题：媒体到底应该怎么存在、该听谁的、该负什么责任。不同理论给出了不同答案，比如有的强调政府控制，有的强调自由放任，有的强调自由同时也要承担社会责任。所以它不是讲媒体实际上怎样，而是讲媒体“应该怎样”。`, frame:`起手一句：关于媒介应如何运作以服务公共利益的不同规范观念。按历史与类型展开六类：极权主义、自由主义、社会责任、民主参与、发展中国家、中国社会主义；每类用两三词抓住核心（权力服从/言论市场与自我修正/专业责任与公众干预/参与与近用权/发展优先与国家调控/公有制与党性等）。收束说明它们反映不同社会制度与媒介角色期待。`},
  {ch:9, type:"short", q:`简述公共关系传播的基本模式。`, a:`（1）公共关系传播是指特定的社会组织为实现公共关系目标，综合运用各种传播方式和传播媒介，有计划地与公众进行信息交流沟通的活动过程。
（2）公共关系传播的基本模式
对于公共关系实践中所形成的传播模式，美国的葛罗尼格（J.E.Gruning）和亨特（T.Hunt）把它概括为四种模式：宣传型、公共信息型、双向非对称性、双向对称型。①宜传型模式。这种模式旨在通过新闻宣传制造轰动效应，以吸引公众的注意力，传播性质为单向。
②公共信息型模式，传播组织的真实情况，以便公众了解组织，传播性质为单向。
③双向非对称型模式。这种模式目的在于通过科学方法，诱导和劝服公众接受组织的某种观点，并进而支持组织的行为方式，此传播模式性质虽为双向，但其在组织和公众之间的效果并不均衡，它相对来说只有利于组织，公共关系人员作为信息的提供者吸引公众的反馈意见仅为提高诱导劝服工作的有效性。
④双向对称型模式。它强调对话，注重坦诚、完整、准确的双向交流，目的是促进相互理解，其传播性质是双向的，且在组织和公众之间的传播效果是均衡的。
（3）公共关系传播模式的发展趋向
从历史的、发展的角度来分析这四个传播模式，还可看到人类对公共关系传播这一事物的认识发展趋向。这种发展趋向主要表现为：
①对公共关系传播功能的认识，从主观宣扬，客观提供信息，科学诱导，到促进相互理解的发展趋向。
向.②对公共关系传播方式的认识，从线性的单向传播、利用反馈的双向沟通，到双向传播沟通的发展趋
③对公共关系传播关系的认识，从任意支配公众、不对称的双向沟通关系，到双向对等共享信息的传播关系的发展趋向。`, explain:`公共关系传播的基本模式，核心还是那四种：宣传型、公共信息型、双向非对称型、双向对称型。你可以把它看成一条发展线：一开始是组织只顾自己说，后来开始告诉公众真实信息，再后来开始听反馈但主要还是想说服别人，最后才发展到更理想的平等对话。重点就是看它从单向走向双向。`, frame:`起手界定公关传播是组织为达成公关目标而综合运用媒介与方式的信息沟通过程。主体写葛罗尼格与亨特四模式：宣传型、公共信息型、双向非对称、双向对称，各用一句区分单向/双向与是否均衡。再写三条发展趋向：功能上从宣传到理解，方式上从单向到双向沟通，关系上从不对称到对等共享。收束落在现代公关重对话与互信。`},
  {ch:9, type:"short", q:`简述广告对社会文化的影响`, a:`（1）广告对社会文化的积极影响
营销人员认为广告能够给整个社会带来益处：广告能够提高生活水平，支持了大多数新闻媒体与艺术的发展，维护了新闻自由，为宣传重大的健康问题和社会问题提供了机会。
①促进大众传播媒体发展
广告为大众传媒提供了主要的财源，提供了可持续发展的条件。广告一方面使传媒获得发展资金，一方面使报刊大量印刷、普及发行成为可能：使广播电视节目得以丰富；促使大众传媒注重信息质量的改进，力求变化和创新，贴近生活、贴近受众（消费者）。
②美化市容环境，丰富文化生活
广告需要运用各种表现手法来反映和传送广告信息内容，广告创作使广告的艺术水平提高。广告要用较强的艺术感染力吸引和打动目标消费者，需要广告创作人员不断创新。设计新颖、构思奇巧的广告作品，实际上也是一件件艺术品，具有一定的欣赏价值和文化品位。广告文化已融入并推动着社会大文化的发展。广告也是现代化城市的一个重要标志，为美化市容环境做出了贡献。
（2）广告对社会文化的消极影响
①广告的欺骗问题
广告通常会表现有利于广告主或者品牌的内容，人们对此有心理准备，多半不会在意。但是如果广告主越过了表达观点与制造骗局之间的界限，就会引发人们的反感，严重的情况下还会招致司法诉讼。
②广告拥堵现象
以美国为例，一个普通的消费者每天要接触1000条以上的广告。过多的广告会产生广告拥堵现象，这一方面会招致消费者的厌烦，另一方面也会大大削弱广告主的广告价值。
③广告和程式化
有人认为，广告在创造话题的同时，也形成了一些社会偏见与成见，铸就了人们对女性、老人、少数族裔等的刻板印象。
④广告和消费主义
消费主义是指人们消费的不是商品或者服务的使用价值，而是它们在一种文化中的符号象征价值。广告激发消费者欲望，倡导消费主义的生活方式。高消费的生活方式及其正当性经由广告传递给全体社会成员，造成与消费有关的身份焦虑。`, explain:`广告对社会文化的影响是两面的。一方面，它会传播新的生活方式、审美趣味和消费观念，推动一些社会观念变化；但另一方面，它也可能把人往过度消费、攀比、物质崇拜那边带。所以广告不只是卖货，它其实也在悄悄塑造社会文化。`, frame:`起手表明广告是经济工具也是文化力量，分两大块。先写积极：对媒体财源与内容创新、城市文化与广告艺术、公共议题传播等。再写消极：欺骗越界、广告拥堵、刻板印象、消费主义与符号消费引发焦虑。收束做简要平衡评价，可提示举一例增强说服力。`},
  {ch:9, type:"essay", q:`分析黄远生对中国近代新闻事业的贡献。`, a:`（1）黄远生个人简介
①黄远生原名黄基，1885年1月15日出生在江西九江的一个书香世家，辛亥革命爆发后，在北京编辑《少年中国》周刊和《庸言》杂志，并担任上海《东方日报》《时报》《申报》等特约撰稿，经常在《东方杂志》《论衡》《国民公报》等处发表文章，与刘少少、徐彬彬在当时被称为“民初三大记者＂。
②方汉奇先生称黄远生是“中国新闻史上第一位名记者”，宁树藩先生视之为“首批以新闻闻名于世的记者中最负盛名者”，其“远生通讯”更是被视为当年中国新闻界的一大品牌。从更深层的价值与更为深远的意义来说，他又是一位新文化的“先驱者。”
（2）黄远生对中国近代新闻事业的贡献
黄远生对中国近代新闻事业的贡献具体体现在以下几个方面：
①通讯
黄远生的通讯极具特色，深受欢迎，更慢慢变为一个专有名词，甚至是一种新闻体裁的名称。此文体始于1912年初的《申报》上以“远生”署名的“北京通讯”专栏，故称“远生通讯”，是指比消息更加详细和生动的报道事物或人物的新闻体裁。
黄远生的通讯有以下几个特点：
a.报道新近发生的事实。黄远生笔锋犀利，言辞充满正义志气，针砭时弊。对袁世凯的倒行逆施和官僚政客腐败痛加斥责。
b.报道重要的人物事件。黄远生自幼受到良好教育，曾高中进士后留学日本，有过在前清为官的经历，人脉甚广，从而使他利于周旋于各界政要之间，并且熟悉民初政治，因此有利于他获得重要价值的新闻。
c.抓住具体的场景细节，嬉笑怒骂，涉笔成趣。黄远生善于捕捉各种细节，描绘十分生动吸引。
d.语言通俗生动。他白描式刻画、极具现场感的文字，广受读者追捧，而且深受欢迎。
②新闻思想和见解
a.强调报刊的舆论监督作用，强调新闻要真实、精确、客观、系统。
黄远生报道的大多是政治上的人和事，强调记者在采访写作中必须要有尊重事实的作风与新闻道德。他主张新闻要掌握第一手资料，把新闻真实性当作金科玉律。他还反对在没有调查清楚事实前就乱下结论。这些新闻思想无论在什么时候看来，都是非常正确和有价值的。
b.“四能说”，即新闻记者要“脑筋有想，腿脚能奔走，耳能听，手能写”
第一，“调查研究，有种种修养”，是谓能想。
第二，“交游肆应，能深知各方面势力之所存，以时访接”，是谓能奔走。
第三，“闻一知十，闻此知彼，由显达隐，由旁得通”，是谓能听。
第四，“刻画叙述，不溢不漏，尊重彼此之人格，力守绅士之态度”，是谓能写。
黄远生这些新闻从业思想和“四能说”的提出在中国新闻采写理论上是一项超越前人的重大发展，对后人影响深远。
c.重视采访，追求新闻的真实、客观、全面、公正
黄远生提倡新闻写作要做到“诚实无欺”，要“归纳”、要“具证”，这就需要注重事实，注意收集第一手材料，以材料和事主对证，使报道准确。他写新闻通讯的材料，大都是亲自采访获得的，在没有充分的事实根据之前，他决不妄加言论，而且一旦发现先前报道的事实或发表的意见有误，以便及时更正。
（3）黄远生对后世新闻事业的影响和贡献
①黄远生是中国近代杰出的新闻工作者，在他短暂的生命里，为近代新闻事业做出了巨大的贡献。他的新闻思想，以及对当时社会的真实报道，不仅仅为是为新闻事业做出了贡献，更能通过他的报道启发民众。
②黄远生更是一位新文化的先驱者，他针砭时弊，讽刺袁世凯的黑暗统治和旧官僚的腐败，是人民的喉舌。黄远生在这古与今、旧与新、中与西转折的焦点时刻，以其奔放的激情与深沉的忧患意识填补了时代的一个空白。是中国文艺启蒙运动的领导者之一。
如何理解“提高我国国际传播能力”与建立世界信息传播秩序的关系。
国际传播能力是文化软实力的组成部分，是维护国家形象的重要手段。构建现代传播体系，提高我国国际传播能力，是适应国际社会了解中国、提升国家文化软实力、塑造国家良好形象的必然要求，对于提升我国的国际影响和国际地位，加强我国媒体在国际舆论格局中的地位和作用具有十分重要的意义。新形势、新任务要求我们必须高度重视和大力加强国际传播能力建设。
（1）提高国际传播能力，是顺应世界传媒发展趋势，实现我国媒体跨越式发展的需要。媒体全球化是与经济全球化的进程相伴而生并随着传播手段的成熟而不断发展的。
这是媒体发展规律，也是媒体发展的必然条件。
（2）提高国际传播能力，是更好地让国际社会了解中国、认识中国，向世界说明中国的需要。
随着经济全球化的深入发展和我国改革开放的全面推进，中国的前途命运与世界的前途命运紧密地联系在一起。实践证明，传播力决定影响力。拥有强大的国际传播力，才能确保传播的自主性，让国际社会更好地了解认识中国。没有强大的国际传播能力，向世界介绍一个真实的中国、营造对我有利的国际舆论环境是难以做到的，
（3）提高国际传播能力，是积极参与国际文化竞争，增强我国国际影响力的需要。
国际传播能力作为软实力，是综合国力的重要组成部分其影响力也是国际竞争力的重要方面。当今激烈的国际竞争中，我国要全面实现对外发展目标，发展与世界各国交往合作关系，在加强经济实力的同时，必须大力加强包括国际传播能力在内的软实力，更加有力地应对国际舆论的新挑战。`, explain:`黄远生对中国近代新闻事业的贡献，关键在于他把新闻写作和新闻职业意识都往前推了一大步。他擅长时政报道，观察敏锐、评论有力，还提出记者要有眼光、有脑子、有腿力这类要求，强调新闻不是简单抄消息，而是要真正去采访、去判断、去写出有质量的报道。所以他是近代新闻专业化的重要代表人物。`, frame:`起手先交代黄远生在中国近代新闻史上的位置，点出“远生通讯”的代表性。中间分两层写：一层写他的业务贡献，如通讯写作重事实、抓人物、写细节、语言通俗；一层写他的新闻思想，如强调舆论监督、真实客观、采访求证和记者能力要求。结尾再评价他对近代新闻专业化和新闻业务改革的推动作用。`},
  {ch:10, type:"noun", q:`新闻信`, a:`新闻信是指传递、交流信息的公私信件。私人新闻信主要流行于上层社会，官方新闻信则时常务有传递政情、军情的性质。产生于罗马帝国时代，直到18世纪才逐渐被近代报纸所取代。与官方公报相比，新闻信虽然形式上有所变化、但它仍然是统治阶级和贵族阶层传递信息的工具。从性质上说，它与封建官报没有根本的区别。`, explain:`新闻信可以理解成现代报纸和通讯社之前的一种早期新闻传递方式。它往往是把重要消息写成信件或简报，送给商人、官员这些需要消息的人看。虽然形式还很原始，但它已经说明社会对及时信息有很强需求，也算是后来新闻业发展的早期雏形。`, frame:`起手定义：以书信传递新闻信息的古老形态，分公私两类。写官方新闻信常涉军政政情，私人流行于上层。交代时代：罗马帝国至近代早期，逐渐被报纸取代。收束点明性质上仍多为统治阶层信息工具，与封建官报相近。`},
  {ch:10, type:"noun", q:`火星报`, a:`《火星报》是由列宁创办和领导的第一个马克思主义全俄政治报纸。1900年在德国菜比锡创刊，先后在基尼黑、伦教和日内瓦出版，该报在建立马克思主义新型政党、动员和组织工人群众进行革命斗争方面起过重大作用，是俄国社会民主工党形成时期马克思主义报纸的典范。坚定的党性、高度的思想性和鲜明的战斗风格是《火星报》的特色，也是它的革命传统。`, explain:`《火星报》是列宁等人办的重要革命报纸，它的作用不是普通意义上的新闻报道，而是替革命运动统一思想、讲清路线、组织力量。换句话说，这份报纸更像是建党和革命行动的思想中枢，所以它在俄国革命史上的地位特别高。`, frame:`起手：列宁创办领导的第一个马克思主义全俄政治报纸。写1900年创刊及辗转出版地点与建党动员作用。收束概括特色：坚定党性、高度思想性、鲜明战斗风格及在俄国工人政党形成中的典范意义。`},
  {ch:10, type:"noun", q:`临聚型公众`, a:`临聚型公众是指因为某一级时事件，活动或某一共同问题而临时聚集起来的公众，如游行、展览、演讲时临时架集在一起的公众群体，公众是公共关系工作的对象客体，按照其稳定程度可以划分为临聚型公众、周期性公众和稳定性公众，这是制定公共关系临时对策、周期性政策和稳定策略的依据。每个组织都难以事先完全预测到某些实发事件的产生，往往会面对一些临聚型公众构成的额外压力，需要进行应急处理，因此需要有应变对策。`, explain:`临聚型公众，就是那种平时并不固定存在，但因为某个突发事件一下子聚到一起的人。比如出了事故、爆了争议，相关人群突然集中关注某个组织，这时他们就构成了临聚型公众。它的特点就是来得快、情绪强、处理不好很容易变成危机。`, frame:`起手界定：因临时事件或共同议题短暂聚集、稳定性低的公众类型。放入公众分类体系中说明与周期性、稳定性公众的对比意义。展开组织面对突发压力需应急公关。收束点明其可预测性弱、对策要快速与灵活。`},
  {ch:10, type:"noun", q:`拟态环境`, a:`拟态环境是指传播媒介通过对象征性事件或信息进行选择、加工并重新结构化以后向人们提示的环境。这是说明大众传播社会影响力的重要概念，由央国学者李普曼提出。李普曼认为，现代社会越来越巨大化和复杂化，人们由于活动范围、精力和注意力有限，不可能对与他们有关的整个外部环境和众多事物都保持经验性接触，对超出自己感知范围以外的事物，只能通过大众传媒去了解。大众传播以提示环境交化为已任，但它所提示的并不是环境的全部，而是一种报态环境，人的行为在很大程度上成了对拟态环境的反应。`, explain:`拟态环境可以再简单说一遍：媒体不会把现实一比一搬给你看，它一定会选择、加工、组织。所以我们脑子里对世界的很多印象，其实不是来自直接经验，而是来自媒体整理后的图景。也就是说，人很多时候是在对“媒体给他看到的世界”作反应。`, frame:`起手提出者李普曼与核心界定：媒介对象征性信息选择加工重构后提示的环境。展开现代人无法全经验接触外界，依赖传媒，但传媒呈现的是“拟态”非全貌。收束点明行为常是对拟态环境的反应，用于解释大众传播的社会影响。`},
  {ch:10, type:"noun", q:`《生活》周刊`, a:`《生活》周刊是民国时期发行量最大的都市通俗文化生活杂志之一。1925年10月11日在上海创刊，1926年10月24日由邹韬奋接办后新辟《信箱》专栏，不断充实内容，革新版面，后又开辟《小言论》专栏，1928年发行量达40000份。邹韬奋接办《生活》周刊后，最重要的改革就是加强刊物的趣味性，强调选取“有趣味、有价值”的材料，这是当时《生活》周刊最显著的一个标志。由于当时广大读者最关心的是求学、就业、社交、恋爱、婚姻等问题，所以《生活》周刊此时刊登的这一类文章比较多。“九一八事变”后，《生活》周刊积极宜传抗日、民主思想。1933年12月，国民党政府下令查封《生活》周刊。`, explain:`《生活》周刊之所以有影响，不只是因为它办得久，而是因为它真的和当时社会现实贴得很近。邹韬奋把它办成了一份既有思想、又能打动普通读者的刊物，尤其在宣传抗日、呼吁民主方面作用很大。所以它不是普通杂志，而是现代中国舆论场上一张很有分量的刊物。`, frame:`起手时间与性质：民国上海著名文化生活周刊，1925年创刊。写邹韬奋接办后的改革：信箱、小言论、趣味与“有趣味有价值”的选材取向及发行量。再写“九一八”后抗日民主立场与1933年被查封。收束点明其在都市通俗期刊史上的位置。`},
  {ch:10, type:"noun", q:`集合行为`, a:`集合行为是指在某种刺激条件下发生的非常态的社会集合现象，多以聚集、恐慌、流言、骚动的形态出现，往往对正常的社会秩序造成严重的干扰和破坏。集合行为中的信息传播受到若干特殊传播机制的制约，包括群体暗示和群体感染。集合行为发生的基本条件有三个：①结构性压力，即经济萧条、自然灾害、失业等社会因素对社会一般人产生的心理压力，部分社会成员企图摆脱这种压力是产生集合行为的原因：②触发性事件；③正常社会传播系统的功能减弱，流言等非常态的传播机制活跃化。
CIS
CIS是企业形象识别系统（Corporate Identity System）的简称，是指一种通过规范组织、企业在传播中所运用的组织形象符号显征系统，如标志、色彩、字体、口号、行为等，从而使组织。企业的信息实现统一高效的传递，并在对象公众的心目中形成对组织、企业的形象识别，进而产生心理认同的组织形象管理方法。CIS由三个子系统构成：理念识别系统（MD），行为识别系统（BI）和视觉识别系统（VD）.`, explain:`集合行为不是普通的集体活动，而是那种在特殊刺激下突然冒出来、容易失控的人群行动。比如一传十十传百的恐慌、抢购、骚动，背后往往都有流言、暗示、感染在起作用。它容易出现在社会压力大、事情说不清、正式信息又不够的时候，所以往往带着很强的不稳定性。`, frame:`起手定义集合行为：在特殊刺激下出现的非常态群体聚集与行动。中间先写它常伴随恐慌、流言、骚动等现象，再写其传播机制通常与暗示、感染有关。接着按条件展开：结构性压力、触发性事件、常态传播机制失灵与流言活跃。结尾点明它对社会秩序的冲击以及其高度不稳定性。`},
  {ch:10, type:"noun", q:`消费主义`, a:`消费主义是市场经济社会中普通流行的一种社会价值观现象，是指导和调节人们在消费方面的行动和关系的原则、思想、愿望、情绪及相应的实践的总称。其主要原则是追求体面的消费，需求无节制的物质享受和消遣，并把这些当作生活的目的和人生的价值，消费主又体现了当下资本主义社会的一些内在逻辑：①商品消费面前人人平等：②消费不仅仅体现在物质文化上，更体现在文化含义上，消费体现个人身份：③人们消费的不是商品或者服务的使用价值，而是它们在一种文化中的符号象征价值。`, explain:`消费主义不是正常消费那么简单，它更像一种观念：把买东西、拥有东西当成生活意义和身份证明。一个人不再只是“需要才买”，而会慢慢变成“通过买来证明自己”。广告和品牌文化经常会推这种心态，所以消费主义其实是现代媒介和市场文化里很值得警惕的一种倾向。`, frame:`起手界定：市场社会中指导消费行为与价值判断的流行观念体系。展开核心原则：追求体面消费、物质享受与消遣作为生活目的。再写符号消费逻辑：平等神话、身份与文化意义、重符号价值轻使用价值。收束一句点其与广告、现代性的关联。`},
  {ch:10, type:"noun", q:`循环模式`, a:`循环模式是由奥斯古德和施拉嫣提出的一个新的传播过程模式。该模式没有传播者和受传者的概念，传播双方都作为传播行为的主体，通过讯息的授受处于你来我往的相互作用之中：参加传播过程的每一方在不同阶段都依次扮演着译码者（执行接收和符号解读功能）、解释者（执行解释意义功能）和编码者（执行符号化和传达功能）的角色，并相互交替着这些角色。循环模式强调了社会传播的互动性，并把传播双方都看作传播行为的主体，具有进步意义，但这个模式把传播双方放在完全对等或平等的关系中，与社会传播的现实情况有不符之处。另一方面，这个模式能够体现人际传播特别是面对面传播的特点，却不能适用于大众传播的过程。`, explain:`循环模式是对早期直线传播模式的一个修正。它告诉我们，传播不是你说我听这么简单，而是双方会来回互动：你说了，我理解，再反馈给你；你再调整，再说。也就是说，传播是一个不断往返的过程，这样就比单向模式更接近真实交流。`, frame:`起手：奥斯古德—施拉姆循环模式，取代固定传受标签。展开双方在不同阶段轮换译码者、解释者、编码者角色，突出互动。收束评价：强调互动有进步性，但把双方完全对等不符大众传播现实，更合人际尤其是面对面情境。`},
  {ch:10, type:"noun", q:`基本需求刺激式广告`, a:`基本需求刺激式广告又称普通需求刺激式广告，是为了使人们增加对某类商品的一次需求为目的而进行的广告。广告的一个潜在功能是刺激基本需求，刺激基本需求的广告往往由行业协会和倡导性团体而非某一个生产商来发布。广告中，广告主努力为整个产品品种创造需求，告诉潜在消费者某种产品的基本价值，而不是强调某类产品中某种具体品牌的价值。`, explain:`基本需求刺激式广告，就是先去碰你最基础的需要，比如吃、穿、安全、健康、舒适这些，然后再告诉你“这个产品能满足你”。它不是先讲大道理，而是先抓住人最本能的需求，所以这类广告通常很直接，也特别容易起效果。`, frame:`起手别名与目的：刺激对某类商品的整体初次需求，而非单一品牌。展开主体多为行业协会或倡导组织；内容强调品类基本价值。收束对比选择性需求广告，点明其行业层面与长期市场培育功能。`},
  {ch:10, type:"short", q:`公共关系的基本特征。`, a:`（1）公共关系的概念
公共关系是指社会组织运用信息传播沟通的手段处理自身的公众关系问题，以达到组织与公众的相互了解、相互适应、优化组织社会生态环境目的的管理活动。
（2）公共关系的基本特征
①以公众为对象
公共关系是一定的社会组织与其相关的社会公众之间的相互关系。社会组织必须着眼于自己的公众，才能生存和发展。公共关系活动的策划者和实施者必须始终坚持以公众利益为导向。
②以美誉为目标
塑造形象是公共关系的核心问题。组织形象的基本目标有两个，即知名度和美誉度。知名度是指一个组织被公众知道、了解的程度，以及社会影响的广度和深度。美誉度是指一个组织获得公众信任、赞美的程度，以及社会影响的美、丑、好、坏。在公众中树立组织的美好形象是公共关系活动的根本目的。
③以互惠为原则
公共关系是以一定的利益关系为基础的。一个社会组织在发展过程中要得到相关组织和公众的长久支持与合作，就要奉行互惠原则，既要实现本组织目标，又要让公众得益。
④以长远为方针
一个社会组织要想给公众留下不可磨灭的组织形象，不是一朝一夕之功所能及的，必须经过长期的、有计划、有目的的艰苦努力。
⑤以真诚为信条
以事实为基础是公共关系活动必须切实遵播的基本原则之一。社会组织必须为自己塑造一个诚实的形象，才能取信于公众。真诚能产生最大的说服力。唯有真诚，才能赢得合作。
⑥以沟通为手段
没有沟通，主客体之间的关系就不会存在，社会组织的良好形象也无从产生，互惠互利也不可能实现。要将公共关系目标和计划付诸实施，只有双向沟通的过程，才是公共关系的完整过程。`, explain:`公共关系的基本特征，可以概括成几个词：有对象、有目标、有沟通、有关系。它面对的是公众，追求的是好形象和好关系，手段主要靠传播和沟通，而且看的不是一时输赢，而是长期的信任和互利。所以公关不是一次活动，而是一种持续经营关系的工作。`, frame:`可先一句公关定义再转特征，或直接列特征。按六条展开：公众导向、美誉度与知名度目标、互惠、长远方针、真诚事实、沟通双向。每条用关键词扩半句即可。收束回扣“形象管理即关系管理”。`},
  {ch:10, type:"short", q:`广告定位主体有几种？`, a:`（1）广告定位
广告定位是指通过广告的沟通，为企业、产品或品牌在消费者心目中确定独特位置的系统活动。广告定位是进行成功广告的基础和前提，为广告作品创作提供了方向和题材；也是与消费者沟通和促成购买行动的关键，有利于消费者识别商品，有利于进一步巩固企业的产品定位。
（2）广告定位主体
定位是一种定位主体有目的的行为过程，主要包括塑造客体形象和传播形象这两个有意行为，这种塑造是由定位主体依据主体目的和客体特征进行的行为。因此，广告定位主体就是广告主体，是企业、政府或其他私人组织所宣传的某种产品、劳务或观念、企业、政府组织通过付费的方式传播自己的观念或者改变受众的某种观念，促使受众产生某种购买欲望。
按照表现形式的不同，广告主体可分为商品类、品牌类、劳务类、节目类、观念类和形象类六大类型。
主体。①商品类广告主体，是指可以通过媒介广告进行促销宣传，以便在市场上销售的商品，是最主要的广告
②品牌类广告主体，是指一类商品中因为技术、功能、风格等因素而分化出来的个性化商品。
③劳务类广告主体，是指一种可以被购买和被消费的有偿服务。
④节目类广告主体，是指一种有娱乐表演性质或游戏性质的专题性的有偿服务。
⑤观念类广告主体，是指为推销商品、改善自身形象而推向社会的观念。
⑥形象类广告主体，主要指企业、政府或组织的形象。`, explain:`广告定位的主体，说白了就是你到底想把“谁”放在消费者脑子里。可以定位产品本身，比如强调功能；也可以定位品牌、企业形象，甚至定位消费者对它的感觉和印象。关键是要先想清楚主角是谁，不然广告会说得很散。`, frame:`起手界定广告定位：通过沟通在消费者心智中为品牌确立独特位置及其对创作与购买转化的意义。再答“定位主体即广告主体”：付费传播的组织与宣传对象。按六类分述商品、品牌、劳务、节目、观念、形象，各用一句说明侧重点。收束提醒“主体类型决定创意与媒介策略”。`},
  {ch:10, type:"short", q:`简述“文化帝国主义”。`, a:`（1）文化帝国主义的概念
文化帝国主义是指个别文化高压国家利用各种手段，以一种文化模式来取代世界文化的多元性和多样性的过程，是现代帝国主义总过程的一部分。在文化扩张的过程中，由于大众传播媒介是一种最有力的制度化手段，因而文化帝国主义也称为媒介帝国主义。
（2）文化帝国主义的特点
①它以强大的经济、资本实力为后盾，主要是通过市场而进行的扩张过程。
②它是一种文化价值的扩张，即通过含有文化价值的产品或商品的倾销而实现的全球性文化支配。
③由于信息产品的文化含量最高，因此这种文化扩张主要是通过信息产品的传播而得到实现的。`, explain:`文化帝国主义还是那个核心意思：强势国家靠文化产品和媒介输出，把自己的价值观和文化模式往全世界推，慢慢占据主导位置，让别的文化越来越边缘化。因为这种扩张很多时候靠媒体完成，所以它和媒介帝国主义基本是一个路数。`, frame:`起手定义文化帝国主义（可点出即媒介帝国主义）：强势文化以多种手段削弱世界文化多样性。再分三点展开：经济资本后盾与市场扩张；借助含文化价值的商品倾销实现价值支配；信息产品文化含量高使扩张常经信息传播实现。收束一句联系全球传播不平等结构。`},
  {ch:10, type:"essay", q:`《新青年》对新文化运动的影响。`, a:`1915年9月15日，由陈独秀主编的《青年杂志》第1卷第1号在上海正式出版发行。不久，为避免与基督教上海青年会主办的《上海青年》杂志混名，遂从第2卷第1号起易名为《新青年》。《新青年》与新文化运动及五四爱国运动紧密联系在一起，并对中国现代社会的走向起着重要的作用。
（1）《新青年》的创刊标志着新文化运动的兴起，它擂响了思想解放运动的战鼓。
《新青年》创刊之后，在一年多的时间里，它首先紧紧抓住思想文化问题，如陈独秀创办《新青年》，就以“除旧布新”作为方向。这一时期，刊物上发表的易白沙的《孔子平议》、胡适的《文学改良刍议》、鲁迅的《狂人日记》和吴虞《吃人与礼教》等文章带给中国思想界的震撼，对于思想解放所起的重大作用，是当时其他报刊上的政治、时评性文字所不可比拟的。
（2）《新青年》是新文化运动的一面旗帜。
《新青年》除了以一般性言论指导全国进步人士之外，还针对性地以通信形式来回答各地青年提出的种种问题。这些回信绝大部分随即发表在《新青年》上，回信是陈独秀作为新文化运动的统帅视不同情况而发出的具体的思想指令，在当时所起的积极作用极大，当时不少青年，如王统照，叶挺、俞颂华等都曾致函《新青年》，在与陈独秀书信往来中，受到启发与鼓励，思想日益进步，投身于新文化运动，为中国革命做出了重要的贡献。
（3）宣传马克思主义，培养新一代青年。
1920年9月，即从8卷1号起，《新青年》改组为中国共产党上海发起组的机关刊物，积极进行马克思主义理论宣传，成为在中国传播马克思主义的主要阵地，在广大革命知识分子中发生了广泛的影响，对中国共产党的成立和中国革命运动的发展做了思想上的准备。《新青年》1915年创刊到1922年体刊的7年。是中国知识分子，尤其是青年知识分子思想大解放的年代，是新旧思潮大激线的年代，也是中国由旧民主主义革命开始向新民主主义革命转变的年代。《新青年》适应了时代的要求，指引着这个时代前进的步伐，培育了新一代的青年。`, explain:`《新青年》对新文化运动的影响非常大，因为它相当于这场运动最重要的舆论阵地之一。它不仅提倡民主和科学，批判旧礼教，还大力推动白话文，把很多新思想真正送到了青年人那里。后来它又转向宣传马克思主义，所以它既是新文化运动的旗帜，也是后来中国革命思想传播的重要起点。`, frame:`起手交代《新青年》创刊、改名梗概。分三层影响：创刊作为新文化兴起与思想解放号角；作为旗帜以言论与通信指导青年；后期转向传播马克思主义、为建党做思想准备。收束总括其与五四及社会走向的联动。`},
  {ch:10, type:"essay", q:`“意见领袖”理论在新媒体环境下的变化和发展。`, a:`（1）“意见领袖”理论的含义和特点
意见领袖是指活跃在人际传播网络中，经常为他人提供信息、观点或建议，并对他人施加个人影响的人物。意见领袖在传播效果形成过程中起着重要的中介和过滤作用。
意见领袖的特点包括以下方面：①与被影响者处于平等关系而非上下等级关系：②广泛分布在社会各个阶层：③影响领域分为“单一型”和“综合型”；④意见领袖的社交范围广，信息渠道多，大众传播信息接触量大。
（2）“意见领袖”理论在新媒体环境下的变化和发展
当今，在许多领域都存在“意见领袖”的说法。例如，微博开通后，许多专家、学者、明星甚至是草根都成为某一圈子的“意见领袖”。他们经常在微博中为他人提供信息、观点或建议，并对他人产生一定的影响。这些名人的微博粉丝量都达到万人以上，他们在微博中所提出的观点可能会影响上万人，甚至是千万人。
根植于互联网络虚拟平台的意见领袖，既具有传统社会意见领袖的本质特征，即选择性地传播有利于自己观点的信息，通过提供建议和观点影响他人，又因为其不同于现实社会的特殊生存环境，而具有一些不同的特点：
①网络意见领袖与受其影响者处于同一虚拟群体并拥有共同的兴趣爱好。与传统社会意见领袖一样，网络意见领袖与受其影响者处于同一群体并拥有共同的兴趣爱好。不同的是，他们所属的同一群体是存在于网络社会的虚拟群体，这些虚拟群体是基于短时的共同兴趣而建立的。
②网络意见领袖与受其影响者之间的关系缺乏稳定性。网络意见领袖与受影响者之间对彼此的现实社会身份和背景所知甚少，缺乏全方位的认识和印象。交往环境的虚拟性使意见领袖与受影响者之间的关系具有某些虚拟成分。加之虚拟群体成员与现实社会群体相比往往具有更高的流动性，因此与传统社会相比，网络意见领袖与受影响者之间的关系缺乏稳定性。
③网络意见领袖的参与行为表现非常活跃。积极的网络参与行为是网民成为意见领袖的前提条件，通过积极的参与行为，网民才能扩大个人的社交范围，提高自己的曝光度。
④网络意见领袖都具有出色的表达能力。网络虚拟空间中的人际交流是一种基于文本的计算机中介交流，在交流的过程中，人们无法根据年龄、性别、教育程度、收入、职业等社会线索来确定社会身份，意见领袖在网络中的个人形象主要依靠文本等符号来塑造，个性化的文字表达成为意见领袖脱颖而出的必备条件。
⑤网络意见领袖都具有某种专长。互联网的平权性尽管为每位参与者提供平等传播信息和发表意见的权利，但只有那些在某一方面拥有知识和专长，并在此基础上具备独到的话题分析能力，能够提供真知灼见的人才可能成为网络意见领袖。`, explain:`新媒体环境下，意见领袖并没有消失，只是变得更多、更分散了。以前可能是报刊评论家、社区活跃人物，现在可能是博主、主播、群主、UP主。变化在于他们借助平台传播得更快、更广，但不变的是，他们依然是很多人理解信息、形成态度时的“中间人”。`, frame:`起手简述意见领袖概念、两级传播中的中介作用与传统四特点。转向新媒体：可举微博等大V现象说明影响规模。再按答案列网络特征：虚拟同好群体、关系不稳定、参与活跃、文本表达塑造形象、专长与议题能力。收束比较传承与变异，点出研究需区分平台逻辑。`},
  {ch:11, type:"noun", q:`《向导》周报`, a:`《向导》周报是中共中央第一个政治机关报，1922年9月13日在上海创刊，蔡和森为第一任主编，该刊以报道评论国内外时事改治为主要内容，致力于阐释贯彻中国共产党制定的反帝反封建的民主革命纲领，国共合作后大力宣传中国共产党关于建立各个革命阶级统一战线的政治主张，1927年7月18日终刊，`, explain:`《向导》周报是中共中央早期非常重要的一份政治刊物。它1922年创刊，主要任务就是宣传党的政治主张、分析时局、推动统一战线。你可以把它理解成共产党早期对社会公开发声的重要窗口和理论阵地。`, frame:`起手定位：中共中央第一个政治机关报，1922年上海创刊，蔡和森首任主编。写内容侧重时事政治评论与阐释反帝反封建纲领、国共合作后统一战线宣传。收束终刊时间与党史地位。`},
  {ch:11, type:"noun", q:`《法兰西共和国公报》`, a:`《法兰西共和国公报》是巴黎公社时期最重要的报纸。它原是梯也尔政府机关报，1871年3月18日起作为国民自卫军中央委员会的机关报，巴黎公社成立后成为公社机关报，共出版66期。该报版面篇幅分为官方和非官方两个部分，除发布重要宜言、法令、决议和指示外，还澄清事实真相，做穿敌人的请言。但该报印刷发行业务掌握在私人手里，文风刻板，不太关心群众利益，且价格较贵，所以销量不高，远低于当时公社的其他报纸。`, explain:`《法兰西共和国公报》本质上就是法国大革命时期的重要官方公报。它负责发布法令、公告和重要政治文件，让革命政权的政策能够公开传达出去。所以它既是信息发布工具，也是革命政权维持政治运转的一部分。`, frame:`起手：巴黎公社时期重要报纸，由旧政府机关报转为公社机关报。写版面分官方与非官方、发布法令同时辟谣澄清。收束评价销量与局限：私营印刷发行、文风刻板、价格高、群众性不足。`},
  {ch:11, type:"noun", q:`埃德加·斯诺`, a:`埃德加·斯诺，美国新闻记者、作家、1928年秋来到中国。曾任欧美几家报社驻华记者、通讯员，发表不少新闻作品。193年至1935年，任燕京大学新闻系讲师，同时兼任美国《星期六晚邮报》和英国《每日先驱报》特约记者、“一二，九”运动爆发后，积极支持爱国的学生运动。1936年6月，斯诺访向陕甘宁边区，写了大量通讯报道，成为第一个采访红区的西方记者。1937年出版的《红星照耀中国》，后改名为《西行漫记》，引起极大变动。新中国成立后，斯诺三次访华。`, explain:`埃德加·斯诺最大的价值，在于他用实地采访把中国革命讲给了世界听。他1936年进入陕北，采访中共领导人和红军，后来写出《红星照耀中国》。这本书让很多外国人第一次看到一个不同于西方主流叙事的中国革命形象，所以它的影响远不只是一本报道作品。`, frame:`与155同人类型：美国记者作家，1928年来华，驻华记者与燕大新闻系经历，支持“一二·九”，1936年访红区，《西行漫记》轰动，新中国成立后三访中国。按时间线串事迹即可收束。`},
  {ch:11, type:"noun", q:`传播障碍`, a:`传播障碍是指在传播活动过程中，由于传播系统本身存在的结构性和功能性障碍，而导致的传播行为受到阻码，传播障码包括结构与功位码，如传系制度是否合理、传播渠道是否畅通、信息系统的各部分的功能是否正常等。传播码的存在是码社会发展的重要因素，会造成社会成员的认知、判断、决策和行动的混乱，带来一系列的社会问题，这些同意如果不及时妥善地解决，必会影响社会的和谐和正常发展，严重的甚至造成社会混乱和国家解体。`, explain:`传播障碍就是信息在路上出了问题。可能是发出的人没说清，可能是传播渠道受干扰，也可能是接收的人因为知识、经验、偏见不同而听偏了。结果就是本来想表达A，传过去可能变成了B，所以传播成不成功，关键不是你说了什么，而是对方到底怎么理解。`, frame:`参照传播障碍标准答法：定义传播过程中结构与功能因素造成的阻滞；列举制度、渠道、系统部件；写对社会认知与秩序的危害。参考答案有错字，答题时用语规范即可。`},
  {ch:11, type:"noun", q:`知沟假说`, a:`知沟假说是指尽管大众传播可以带来整个社会文化水平的提高，但由于经济富有者能够比贫困者出。除经济条件外，产生“知沟”的主要原因还有；传播能力的差异、已有知识储备量的差异、社会交往范围的差异、信息的选择性接触、接受和记忆的因素、大众传播信息本身的性质等。“知沟”假说提出了信息社会的基本矛盾是“信息富有者”和“信息贫困者”之间的两极分化问题。在信息和知识成为重要资源和财富的今天，如何防止“知沟”的扩大已经成了关乎国家和社会发展的重大问题。`, explain:`知沟假说的意思很现实：信息多了，不代表每个人都能同样受益。条件好的人通常更有时间、更有能力、更有渠道去吸收信息，所以跑得更快；条件差的人反而容易落下。结果就是，知识差距不会自动缩小，反而可能越来越明显。`, frame:`起手提出者与背景：蒂奇诺等70年代假说。核心：传播普及未必缩小知识沟，经济优越者获益更快致沟扩大。展开原因除经济外还有能力、储备、交往、选择性接触记忆、信息性质等。收束提出信息社会两极分化问题及缩小知沟的现实意义。`},
